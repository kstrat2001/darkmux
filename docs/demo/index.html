<!doctype html>
<html lang="en">
<head>
<!-- GENERATED from crates/darkmux-serve/assets/viewer.html by scripts/build-demo.sh — edit the viewer, not this file. -->
<meta name="darkmux-mode" content="play">
<meta name="darkmux-flow-src" content="./demo-flow.jsonl">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>darkmux · observability viewer</title>
<!--
  The canonical darkmux observability viewer. ONE file, served three ways:

   - `darkmux serve` at `GET /` (and darkmux.com/viewer) — LIVE: fetches real
     flow records from the daemon's `/flow/<date>` and tails new ones via SSE.
   - `GET /play/<date>` — PLAYBACK of a recorded day from the daemon.
   - darkmux.com/demo — PLAYBACK of a committed flow file
     (docs/demo/demo-flow.jsonl), generated from THIS file by
     scripts/build-demo.sh which injects `mode=play` + `darkmux-flow-src`.

  The demo is this viewer in playback mode loading a real flow file, so it's
  identical to a local `/play` — there is no demo fork. Edit this file; for the
  demo, also run `scripts/build-demo.sh` (CI fails on drift).
-->

<style>
  :root{
    --bg:#0a0a0b; --bg2:#131316; --panel:#1c1c22; --line:#1f1f24;
    --text:#e8e6e3; --muted:#8a8a92; --amber:#6df1ff; --amber-dim:#2a8a96;
    --good:#5af0a3; --warn:#ffb86b; --bad:#ff6b85;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100vh;background:var(--bg);color:var(--text);font:14px/1.4 'Inter',-apple-system,system-ui,sans-serif;overflow:hidden}
  .top{height:46px;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);background:var(--bg2)}
  .brand{font-weight:700;letter-spacing:.04em}.brand b{color:var(--amber)}.brand a{color:inherit;text-decoration:none}.brand a:hover b{text-decoration:underline}
  .topnav{margin-left:auto;display:flex;gap:18px;align-items:center}
  .topnav a{color:var(--muted);text-decoration:none;font:600 12px 'JetBrains Mono',monospace;letter-spacing:.04em}
  .topnav a:hover{color:var(--amber)}
  .badge{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:#0a0a0b;background:var(--amber);padding:5px 9px;border-radius:3px}
  .pb{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);border:1px solid var(--amber-dim);padding:4px 9px;border-radius:3px}
  @keyframes lpulse{0%,100%{opacity:1}50%{opacity:.5}}
  .pb.live{color:#4ade80;border-color:#4ade80;animation:lpulse 1.6s ease-in-out infinite}
  .crumbbar{height:40px;display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid var(--line);background:#131316}
  .backbtn{background:var(--bg);border:1px solid var(--line);color:var(--text);padding:5px 11px;border-radius:4px;cursor:pointer;font:600 12px 'JetBrains Mono',monospace}
  .backbtn[disabled]{opacity:.35;cursor:default}
  .crumb{font:600 13px 'JetBrains Mono',monospace;color:var(--muted)}
  .crumb a{color:var(--amber);cursor:pointer;text-decoration:none}.crumb a:hover{text-decoration:underline}
  .crumb .sep{color:var(--amber-dim);margin:0 6px}
  .meta{margin-left:auto;font:11px/1.4 'JetBrains Mono',monospace;color:var(--muted);text-align:right}.meta b{color:var(--text)}
  .wrap{display:flex;height:calc(100vh - 46px - 40px - 64px)}
  .stage{flex:1;position:relative;overflow:auto;padding:24px}
  .log{width:380px;border-left:1px solid var(--line);background:var(--bg2);display:flex;flex-direction:column}
  .detail{display:flex;flex-direction:column;padding:12px 14px 0;background:#131316}
  #detailbody{flex:1;overflow:auto;min-height:0;padding-bottom:12px}
  .split{height:7px;flex:none;background:var(--line);cursor:row-resize}
  .split:hover{background:var(--amber-dim)}
  .dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .dt{font:600 11px 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .follow{font:600 10px 'JetBrains Mono',monospace;letter-spacing:.06em;padding:4px 9px;border-radius:11px;cursor:pointer;border:1px solid var(--line);color:var(--muted);background:none}
  .follow.on{background:var(--amber);color:#0a0a0b;border-color:var(--amber)}
  .detail pre{margin:0;padding:10px 12px;background:var(--bg);border:1px solid var(--line);border-radius:5px;color:var(--text);white-space:pre-wrap;font:11px/1.55 'JetBrains Mono',monospace}
  .detail pre .k{color:var(--muted)}
  .detail .none{color:var(--muted);font:11px 'JetBrains Mono',monospace;padding:10px 0}
  .loglist{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .loghead{flex:none;padding:10px 14px 8px;border-bottom:1px solid var(--line)}
  .loglist h3{margin:0;font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .logsearch{display:flex;align-items:center;gap:10px;margin-top:8px}
  .searchbox{position:relative;flex:1;min-width:0;display:flex;align-items:center}
  .searchbox .sicon{position:absolute;left:9px;font-size:14px;line-height:1;color:var(--muted);pointer-events:none;transition:color .15s}
  .searchbox input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:7px 28px;font:12px 'JetBrains Mono',monospace;transition:border-color .15s,box-shadow .15s}
  .searchbox input::-webkit-search-cancel-button{-webkit-appearance:none;appearance:none}
  .searchbox input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(109,241,255,.12)}
  .searchbox input:focus-visible{outline:none}
  .searchbox.has-q .sicon{color:var(--amber-dim)}
  .searchbox:focus-within .sicon{color:var(--amber)}
  .searchbox input::placeholder{color:var(--muted);font-style:italic}
  .sclear{position:absolute;right:5px;display:flex;align-items:center;justify-content:center;width:18px;height:18px;padding:0;border:none;border-radius:50%;background:none;color:var(--muted);font-size:11px;line-height:1;cursor:pointer;transition:color .12s,background .12s}
  .sclear:hover{color:var(--text);background:var(--panel)}
  .sclear:focus-visible{outline:none;color:var(--amber);box-shadow:0 0 0 2px var(--amber-dim)}
  .sclear[hidden]{display:none}
  .qcount{flex:none;font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:.04em;color:var(--amber-dim);white-space:nowrap;padding:3px 7px;border:1px solid var(--line);border-radius:10px;opacity:0;transition:opacity .15s}
  .qcount.show{opacity:1}
  .qcount.zero{color:var(--bad);border-color:rgba(255,107,133,.35)}
  #logbody{flex:1;overflow:auto;padding:8px 14px 10px}
  .fbtn{background:none;border:1px solid var(--line);color:var(--muted);font:600 10px 'JetBrains Mono',monospace;letter-spacing:.06em;padding:4px 9px;border-radius:11px;cursor:pointer;text-transform:none}
  .fbtn:hover{border-color:var(--amber-dim);color:var(--amber)}
  .fbtn.on{border-color:var(--amber);color:var(--amber)}
  .rec{font:11px/1.5 'JetBrains Mono',monospace;color:var(--muted);padding:5px 6px;border-bottom:1px solid var(--line);cursor:pointer;border-left:2px solid transparent}
  .rec:hover{background:#1c1c22}
  .rec.sel{background:#23232b;border-left:2px solid var(--amber);color:var(--text)}
  .rec .t{color:var(--amber)}.rec .tag{color:var(--text)}.rec.telemetry .tag{color:var(--warn)}
  .empty{color:var(--muted);font:11px 'JetBrains Mono',monospace;padding:10px 2px}
  .scrub{height:64px;border-top:1px solid var(--line);background:var(--bg2);display:flex;align-items:center;gap:14px;padding:0 18px}
  .scrub button{background:var(--bg);border:1px solid var(--amber-dim);color:var(--text);padding:7px 14px;border-radius:4px;cursor:pointer;font:600 12px 'JetBrains Mono',monospace}
  .scrub button.primary{background:var(--amber);color:#0a0a0b;border-color:var(--amber)}
  /* Live mode follows the tail — historical replay lives at /play/<date>. Hide
     the playback transport and reclaim its reserved 64px back into .wrap. */
  body.live-mode .scrub{display:none}
  body.live-mode .wrap{height:calc(100vh - 46px - 40px)}
  input[type=range]{flex:1;accent-color:var(--amber)}
  .clock{font:12px 'JetBrains Mono',monospace;color:var(--muted);min-width:160px;text-align:right}
  .fleet{display:flex;gap:36px;flex-wrap:wrap;align-items:flex-start}
  .fleettl{margin-top:30px;border-top:1px solid var(--line);padding-top:18px}
  .tlhdr{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .lane{display:flex;align-items:center;gap:12px;margin-bottom:7px}
  .lname{width:var(--lname-w,150px);flex:none;font:12px 'JetBrains Mono',monospace;color:var(--text);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tltrack{position:relative;flex:1;height:28px;background:var(--panel);border:1px solid var(--line);border-radius:4px;overflow:hidden}
  .sbar{position:absolute;top:5px;height:18px;background:var(--amber-dim);border-radius:3px;min-width:2px}
  .sbar.a{background:var(--amber);box-shadow:0 0 6px var(--amber)}
  .tltrack .ph{position:absolute;top:0;bottom:0;width:2px;background:var(--text);opacity:.32}
  .tlaxis{margin-left:calc(var(--lname-w,150px) + 12px);display:flex;justify-content:space-between;font:9px 'JetBrains Mono',monospace;color:var(--muted);margin-top:7px}
  .tlempty{font:11px 'JetBrains Mono',monospace;color:var(--muted)}
  .mach{width:230px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;cursor:pointer;transition:border-color .15s}
  .mach:hover{border-color:var(--amber-dim)}.mach.active{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber-dim)}
  .mach .name{font:600 15px 'JetBrains Mono',monospace;color:var(--text);display:flex;align-items:center;gap:8px}
  .mico{display:inline-flex;color:var(--amber-dim)}.mico svg{width:19px;height:19px;display:block}
  .mach.active .mico{color:var(--amber)}
  .mach .spec{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-top:3px}
  .mach .stat{margin-top:12px;font:12px 'JetBrains Mono',monospace}
  .mach .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber-dim);margin-right:7px;vertical-align:middle}
  .mach.active .dot{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .mach.absent{opacity:.45}.mach.absent .dot{background:var(--muted);box-shadow:none}
  .hint{color:var(--muted);font:11px 'JetBrains Mono',monospace;margin-top:10px}
  .stagehdr{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-bottom:14px}
  .stagehdr a{color:var(--amber);cursor:pointer;text-decoration:none}.stagehdr a:hover{text-decoration:underline}
  .node{display:inline-block;width:260px;vertical-align:top;margin:0 24px 24px 0;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;cursor:pointer}
  .node:hover{border-color:var(--amber-dim)}.node .h{font:600 13px 'JetBrains Mono',monospace}
  .node .s{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-top:4px}
  .pill{display:inline-block;font:600 10px 'JetBrains Mono',monospace;padding:2px 7px;border-radius:10px;margin-top:8px}
  .pill.run{background:#16261d;color:var(--good)}.pill.done{background:#1c1c22;color:var(--muted)}.pill.util{background:var(--bg2);color:var(--amber-dim);border:1px solid var(--line)}
  .pill.ended{background:#241a12;color:var(--amber-dim)}
  .node.util{cursor:default;border-left:3px solid var(--amber-dim)}.node.util:hover{border-color:var(--line)}
  .rglbl{font:11px 'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  /* (#691 Slice 2) "recent runs" — completed dispatches in live mode, dimmed so
     they read as history one click away, not current crew. */
  .rglbl.rgdim{margin-top:8px;color:var(--amber-dim)}
  .recentruns{opacity:.55}.recentruns:hover{opacity:1}
  .sub h2{font:600 13px 'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin:0 0 4px}
  .sub h2 a{color:var(--amber);text-decoration:underline;cursor:pointer}
  .track{margin:18px 0}.track .lbl{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-bottom:6px}
  .seg{display:inline-flex;align-items:center;height:30px;padding:0 12px;margin-right:2px;font:11px 'JetBrains Mono',monospace;border-radius:3px;color:#0a0a0b;background:var(--amber)}
  .seg.b{background:var(--warn)}
  .metrics{display:flex;gap:12px;margin:14px 0 4px;flex-wrap:wrap}
  .met{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:9px 14px;min-width:118px}
  .met .mv{font:600 17px 'JetBrains Mono',monospace;color:var(--text)}
  .met .ml{font:10px 'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .tokbar{height:4px;background:var(--line);border-radius:2px;margin-top:7px;overflow:hidden}.tokbar span{display:block;height:100%;background:var(--amber)}
  .cpuchart{display:flex;gap:8px;align-items:flex-end}
  .yax{display:flex;flex-direction:column;justify-content:space-between;height:80px;font:9px 'JetBrains Mono',monospace;color:var(--muted);text-align:right}
  .bars{display:flex;align-items:flex-end;gap:6px;height:80px;border-bottom:1px solid var(--line)}.bar{width:24px;background:var(--amber-dim);border-radius:2px 2px 0 0}
  .xvals{display:flex;gap:6px;margin-top:4px}.xvals span{width:24px;text-align:center;font:9px 'JetBrains Mono',monospace;color:var(--muted)}
  .ctxchart{width:440px;height:74px;display:block;border-bottom:1px solid var(--line)}
  .finding{border:1px solid var(--line);border-left:3px solid var(--line);border-radius:5px;padding:9px 12px;margin-bottom:7px;background:var(--panel)}
  .finding.warn{border-left-color:var(--warn)}.finding.ok{border-left-color:var(--good)}
  .finding .fk{display:block;font:600 12px 'JetBrains Mono',monospace;color:var(--warn)}.finding.ok .fk{color:var(--good)}
  .finding .fm{display:block;font-size:12px;color:var(--text);margin-top:3px}
  .finding .ff{display:block;font-size:11px;color:var(--muted);margin-top:5px}
  .misslink{cursor:pointer;color:var(--amber);text-decoration:none}.misslink:hover{text-decoration:underline}
  .mgoal{font-size:13px;color:var(--text);margin:8px 0 16px;max-width:680px;line-height:1.5}
  .burn{margin-bottom:18px}.burnbar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;max-width:420px}.burnbar span{display:block;height:100%;background:var(--good)}
  .burnlbl{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-top:6px}
  .sprow{display:flex;align-items:center;gap:14px;padding:10px 12px;border:1px solid var(--line);border-radius:5px;margin-bottom:7px;background:var(--panel)}
  .sps{font:600 10px 'JetBrains Mono',monospace;text-transform:uppercase;padding:3px 8px;border-radius:10px;min-width:74px;text-align:center}
  .sps.complete{background:#1c1c22;color:var(--muted)}.sps.active{background:#16261d;color:var(--good)}.sps.backlog{background:var(--bg2);color:var(--amber-dim);border:1px solid var(--line)}
  .spt{flex:1;font:12px 'JetBrains Mono',monospace;color:var(--text)}
  .spe{font:11px 'JetBrains Mono',monospace;color:var(--muted)}
  .spa{font:11px 'JetBrains Mono',monospace;color:var(--amber-dim);min-width:190px;text-align:right}
  .mscope{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin:-8px 0 16px}
  .eureka{margin-top:16px;border:1px solid var(--warn);background:#1c1c22;border-radius:6px;padding:12px 14px}
  .eureka .k{color:var(--warn);font:600 12px 'JetBrains Mono',monospace}.eureka .m{color:var(--text);font-size:12px;margin-top:4px}.eureka .f{color:var(--muted);font-size:11px;margin-top:6px}
  /* filter modal */
  .modalbg{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;display:none;align-items:center;justify-content:center}
  .modal{width:380px;background:var(--bg2);border:1px solid var(--amber-dim);border-radius:8px;padding:18px 20px}
  .mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font:600 13px 'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--amber)}
  .mx{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer}
  .fgroup{margin-bottom:14px}
  .fgroup h4{margin:0 0 8px;font:600 10px 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .fgroup label{display:inline-flex;align-items:center;gap:6px;margin:0 14px 7px 0;font:12px 'JetBrains Mono',monospace;color:var(--text);cursor:pointer}
  .fgroup input{accent-color:var(--amber);cursor:pointer}
  .mft{display:flex;gap:10px;margin-top:8px}
  .mft input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:4px;padding:8px 10px;font:12px 'JetBrains Mono',monospace}
  .clr{background:var(--bg);border:1px solid var(--amber-dim);color:var(--text);border-radius:4px;padding:8px 12px;cursor:pointer;font:600 12px 'JetBrains Mono',monospace}

  /* ---- Mobile phase 1 — survival #634 -------------------------------
     Desktop locks viewport to 100vh + overflow:hidden + horizontal flex
     of stage|log. On phones (~390px) that produces an unusable layout
     where the 380px log panel covers the screen or the canvas is off
     to the side. Phase 1 makes the viewer SCROLLABLE + STACKED on
     mobile without trying to redesign:
       - body + html scroll (not viewport-locked)
       - .wrap stacks stage above log
       - fleet machine cards go full-width one-per-row
       - scrubber controls wrap onto multiple rows + larger tap targets
       - crumbbar + topnav allow horizontal scroll rather than overlap
     Touch gestures, drawer-based log, swipe drill-in are phase 2+. */
  @media (max-width: 768px) {
    html, body { height: auto; overflow: auto; min-height: 100vh; }
    .wrap { display: block; height: auto; }
    body.live-mode .wrap { height: auto; } /* override the desktop live-mode calc on mobile */
    .stage { padding: 16px; min-height: 50vh; overflow: visible; }
    .log { width: auto; border-left: none; border-top: 1px solid var(--line); max-height: 60vh; }
    .detail { padding: 12px 14px 0; }
    .split { display: none; } /* the row-resize handle isn't useful when stacked */
    .fleet { gap: 16px; }
    .mach { width: 100%; }
    .fleettl { margin-top: 18px; }
    /* Activity lanes stack on phones: the machine name sits on its own line and
       the bar spans the full width below. A side label column would eat ~30% of
       a 390px screen and shove every bar right (the "offset right / empty left"
       report). */
    .lane { flex-direction: column; align-items: stretch; gap: 3px; margin-bottom: 11px; }
    .lname { width: auto; flex: none; text-align: left; font-size: 10px; color: var(--muted); }
    .tltrack { flex: none; width: 100%; height: 26px; }
    .tlaxis { margin-left: 0; }
    /* Pin the playback controls to the viewport bottom on phones so play/scrub
       are reachable without scrolling to the end of the tall stacked layout.
       z-index sits below the filter modal (100). Hidden in live mode (no
       scrub), so the reserved space below is scoped to non-live. */
    .scrub { position: fixed; left: 0; right: 0; bottom: 0; z-index: 50; flex-wrap: wrap; height: auto; padding: 10px 12px; gap: 9px; }
    .scrub button { padding: 10px 14px; font-size: 13px; min-height: 40px; }
    .clock { text-align: left; min-width: 0; flex: 1 0 100%; }
    body:not(.live-mode) { padding-bottom: 104px; } /* clear the fixed scrub bar */

    /* Top bar reflows to two rows on phones: row 1 = brand + status badges,
       row 2 = the nav. Auto-height instead of the desktop 46px so nothing
       collides; the brand stops wrapping mid-word and the badges sit beside
       it. The .wrap height calcs below subtract the desktop bar heights, but
       on mobile .wrap is already height:auto (set above), so the taller bars
       don't need a calc adjustment. */
    .top { height: auto; flex-wrap: wrap; padding: 9px 12px; gap: 8px 10px; row-gap: 8px; }
    .brand { flex: 1 1 100%; font-size: 13px; }
    #srcbadge, #modebadge { order: 2; }
    .badge, .pb { padding: 4px 8px; font-size: 10px; }
    .topnav { order: 3; margin-left: 0; flex: 1 1 100%; gap: 16px; justify-content: flex-start; padding-top: 2px; border-top: 1px solid var(--line); }
    .topnav a { font-size: 11px; }

    /* Crumbbar: keep the back button + crumb on one scrollable row, but let
       the meta block (records/machines/time) drop below instead of being
       shoved off-screen. */
    .crumbbar { height: auto; flex-wrap: wrap; padding: 8px 12px; gap: 6px 8px; }
    .crumb { flex: 1 1 auto; min-width: 0; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
    .meta { flex: 1 1 100%; margin-left: 0; text-align: left; font-size: 10px; }
  }
</style>
</head>
<body>
<div class="top">
  <span class="brand"><a href="https://darkmux.com/" target="_blank" rel="noopener"><b>darkmux</b></a> · observability</span>
  <span class="badge" id="srcbadge">Loading…</span>
  <span class="pb" id="modebadge">▣ playback</span>
  <nav class="topnav">
    <a href="https://darkmux.com/" target="_blank" rel="noopener">home</a>
    <a href="https://darkmux.com/guide/" target="_blank" rel="noopener">guide</a>
    <a href="https://darklyenergized.substack.com" target="_blank" rel="noopener">articles</a>
    <a href="https://github.com/kstrat2001/darkmux" target="_blank" rel="noopener">github</a>
  </nav>
</div>
<div class="crumbbar">
  <button class="backbtn" id="back">‹ back</button>
  <span class="crumb" id="crumb"></span>
  <span class="meta" id="meta"></span>
</div>
<div class="wrap">

<script>
// Live viewer — no embedded sample data.
//
// DATA is populated from the daemon's /flow/<date> endpoint in boot(); new
// records stream in via SSE on /flow/<date>/stream. If the daemon isn't
// reachable (e.g., this file loaded statically from darkmux.com/viewer with
// no daemon running), DATA stays empty and the viewer renders the "no records"
// state instead of falling back to demo content.
//
// darkmux.com/demo IS this viewer in playback mode (mode=play +
// darkmux-flow-src), generated from this file by scripts/build-demo.sh and fed
// docs/demo/demo-flow.jsonl — so the demo is identical to a local `/play`.
// There is no demo fork; edit this viewer, then regenerate.
let DATA = [];
let DATA_SOURCE = "no records yet";

// MACH_SPEC was a hardcoded lookup for the demo's three machines (studio,
// laptop, mini-1). Removed for the live viewer — real machine specs come
// from /machine/specs/<id> (TODO: wire dynamic lookup, follow-up to #624).
// For now the spec field renders empty for real machines, which is honest:
// better than fake specs for unknown machines.
const MACH_SPEC={};
// Mac-form-factor glyphs (inline SVG, Lucide stroke style — license-free, no external load)
const ICON={
  laptop:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="11" rx="1.5"/><path d="M2 19h20l-1.2-3H3.2z"/></svg>',
  desktop:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="16" height="12" rx="2"/><circle cx="8" cy="12" r="1.1"/></svg>',
  mini:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="9" width="18" height="7" rx="2"/><circle cx="7" cy="12.5" r="1"/></svg>'};
// Live viewer — machine form-factor lookup empty; real machines render with no icon
// until /machine/specs/<id> wiring lands (follow-up to #624).
const MACH_ICON={};
const T=s=>Date.parse(s);
const iso=t=>new Date(t).toISOString();
const fmt=ms=>{ms=Math.max(0,ms);return Math.floor(ms/60000)+":"+String(Math.floor(ms/1000)%60).padStart(2,"0");};
// Derived from DATA; recomputed whenever the data source changes (sample <-> real).
let tMin, tMax, missions, FCATS, FTIERS, FSRC;
function recompute(){
  DATA.forEach((r,i)=>r._id=i);
  const ts=DATA.map(r=>T(r.ts)).filter(n=>!isNaN(n));
  tMin = ts.length?Math.min(...ts):Date.now();
  tMax = ts.length?Math.max(...ts):Date.now();
  missions=[...new Set(DATA.filter(r=>r.mission_id).map(r=>r.mission_id))];
  FCATS=[...new Set(DATA.map(r=>r.category))];
  FTIERS=[...new Set(DATA.map(r=>r.tier).filter(Boolean))];
  FSRC=[...new Set(DATA.map(r=>r.source).filter(Boolean))];
}
recompute();
let state={level:"fleet",machine:null,session:null,t:tMax,playing:false,timer:null,selected:null,follow:true,speed:1,
  filters:{cat:new Set(FCATS),tier:new Set(FTIERS),src:new Set(FSRC),q:""}};

const $=id=>document.getElementById(id);
const visible=()=>DATA.filter(r=>T(r.ts)<=state.t);
const scoped=()=>visible().filter(state.stageScope||(()=>true));
function passesFilter(r){
  if(!state.filters.cat.has(r.category))return false;
  if(r.tier&&!state.filters.tier.has(r.tier))return false;
  if(r.source&&!state.filters.src.has(r.source))return false;
  if(state.filters.q&&!JSON.stringify(r).toLowerCase().includes(state.filters.q.toLowerCase()))return false;
  return true;
}
const scopedFiltered=()=>scoped().filter(passesFilter);
const newest=arr=>arr.length?arr.reduce((a,b)=>T(b.ts)>=T(a.ts)?b:a):null;
// (#640) Identity is the STABLE HARDWARE UID, not the operator-set name.
// Records without a uid have UNKNOWN identity — they all bucket under ONE
// "unknown" machine (we never trust the name as identity). `nameOf` is the
// mutable DISPLAY label (the record's machine_id); `specOf` surfaces the
// claimed-but-unverified names on the unknown card. Machines group + filter
// by uid; cards render the name.
const uidOf=r=>r.machine_uid||"unknown";
// (#638) A machine's label/spec resolve from its records first, then fall back
// to its live presence beat (LIVE_MACHINES) — so a present-but-recordless
// machine (freshly synced, no dispatches yet) still renders with its real
// name + specs from the heartbeat, not a bare uid.
const nameOf=m=>{ if(m==="unknown")return"unknown"; const r=DATA.find(x=>uidOf(x)===m&&x.machine_id); if(r)return r.machine_id; const b=LIVE_MACHINES.get(m); return b&&b.display_name?b.display_name:m; };
const specOf=m=>{ if(m==="unknown"){ const ns=[...new Set(DATA.filter(r=>uidOf(r)==="unknown"&&r.machine_id).map(r=>r.machine_id))]; return ns.length?"unverified · claimed: "+ns.join(", "):"unidentified (no hardware uid)"; } const rs=MACH_SPEC[nameOf(m)]; if(rs)return rs; const b=LIVE_MACHINES.get(m); return (b&&b.specs)||''; };
// (#638) Presence is the source of truth for "who's in the fleet" — a machine
// shows if it's broadcasting a heartbeat (LIVE_MACHINES), whether or not it has
// emitted any flow records. Union with the record-derived uids so historical/
// playback machines (which have records but no live beat) still appear too.
const machines=()=>[...new Set([...DATA.map(uidOf), ...LIVE_MACHINES.keys()])];
const sessionsOn=m=>[...new Set(DATA.filter(r=>uidOf(r)===m&&r.session_id).map(r=>r.session_id))];
const dispatch=(sid,act)=>DATA.find(r=>r.session_id===sid&&r.action==="dispatch."+act);
// (#647) The reconciler-emitted `session.end` close-edge for an ABANDONED
// session (crash/kill/timeout — no clean dispatch.complete). Lets playback
// bracket the running interval where there's no complete to close it.
const sessEnd=sid=>DATA.find(r=>r.session_id===sid&&r.action==="session.end");

// (#691) The mission label for the meta bar. Joining EVERY mission_id in the
// window produced an ever-growing title (`◆ japan-trip, test-mission-e11, m1,
// m2, …`) — the live view was showing the whole day's history, not what's live
// now. Live = present-now: prefer missions that have a currently-live session
// (∈ LIVE_SESSIONS); if none are running, fall back to the most recent (DATA is
// ts-sorted, so the last distinct mission_id is newest). Cap the rest behind a
// "+N" so the title never sprawls. Playback isn't presence-scoped (LIVE_SESSIONS
// is empty there) — it shows the window's missions, also capped.
// (#691) Live-scoped missions — present-now, not the whole window. In live
// mode, ONLY missions with a currently-live session (∈ LIVE_SESSIONS). When
// nothing is running, return empty → the title reads "—" and the crumb drops
// the mission link, rather than surfacing a stale old mission with no current
// activity (the "◆ m6 → empty mission detail" bug from the first cut). In
// playback, the window's missions (LIVE_SESSIONS is empty there).
function liveScopedMissions(){
  if(!missions.length) return [];
  if(document.body.classList.contains('live-mode')){
    return missions.filter(mid => DATA.some(r => r.mission_id===mid && LIVE_SESSIONS.has(r.session_id)));
  }
  return missions;
}
// The single mission the crumb + mission panel focus on.
function primaryMission(){ const ms=liveScopedMissions(); return ms.length?ms[0]:null; }
function missionLabel(){
  const ms=liveScopedMissions();
  if(!ms.length) return '—';
  return ms.length>2 ? `${ms.slice(0,2).join(', ')} +${ms.length-2} more` : ms.join(', ');
}
function renderMeta(){
  $("meta").innerHTML=`<a class="misslink" onclick="goMission()">◆ ${missionLabel()}</a> · <b>${DATA_SOURCE}</b> · ${iso(tMin).slice(0,10)} `+
    `${iso(tMin).slice(11,19)}–${iso(tMax).slice(11,19)}Z<br>${DATA.length} records · ${machines().length} machines`;
}
function machActive(m){
  const v=visible();
  const starts=v.filter(r=>uidOf(r)===m&&r.action==="dispatch.start").map(r=>r.session_id);
  const dones=v.filter(r=>uidOf(r)===m&&r.action==="dispatch.complete").map(r=>r.session_id);
  return starts.some(s=>!dones.includes(s));
}
// (#638 Slice 3) Is machine `m` PRESENT at the scrubber time `state.t`?
//   true  = present · false = absent (offline) · null = unknown (no evidence)
// Live: it's broadcasting a heartbeat now (LIVE_MACHINES). Playback: walk its
// machine.online/offline lifecycle edges up to state.t — the most recent one
// wins. No edges → null (render neutral, don't assert absence we can't prove).
function machPresent(m){
  if(LIVE_MACHINES.has(m))return true;
  const edges=DATA.filter(r=>uidOf(r)===m&&(r.action==="machine.online"||r.action==="machine.offline")&&T(r.ts)<=state.t)
                  .sort((a,b)=>T(a.ts)-T(b.ts));
  if(!edges.length)return null;
  return edges[edges.length-1].action==="machine.online";
}
function renderFleet(){
  $("logscope").textContent="fleet"; state.stageScope=()=>true;
  const ms=machines();
  // (#691 Slice 2) In live mode the card counts only RUNNING sessions (∈
  // LIVE_SESSIONS) — completed dispatches from earlier today shouldn't read as
  // current crew ("coder ×7"). Playback counts all sessions in the window.
  const liveMode=document.body.classList.contains('live-mode');
  const cards=ms.map(m=>{
    const all=sessionsOn(m);
    const act=machActive(m), runs=liveMode ? all.filter(sid=>LIVE_SESSIONS.has(sid)).length : all.length;
    // (#638 Slice 3) Presence at the scrubber: an absent machine dims + reads
    // "offline" and can't be "dispatch in flight" (it's gone). present/unknown
    // keep the prior idle/active behavior.
    const absent=machPresent(m)===false;
    const stat=absent?'offline':(act?'dispatch in flight':'idle');
    return `<div class="mach ${act&&!absent?'active':''} ${absent?'absent':''}" onclick="drillMachine('${m}')"><div class="name"><span class="mico">${ICON[MACH_ICON[nameOf(m)]]||""}</span>${nameOf(m)}</div>
      <div class="spec">${specOf(m)}</div><div class="stat"><span class="dot"></span>${stat} · ${runs} ${liveMode?'running':'specialist'+(runs===1?'':'s')} + utility</div>
      <div class="hint">click to drill in →</div></div>`;}).join("");
  // Activity timeline — one lane per machine; each dispatch session is a bar
  // positioned across the recorded window, revealed up to the playhead (an
  // in-flight session grows to the playhead). Fills the fleet view with a
  // "what ran when, where" overview instead of empty canvas.
  const span=Math.max(1,tMax-tMin), pct=t=>(t-tMin)/span*100;
  const lanes=ms.map(m=>{
    const bars=sessionsOn(m).map(sid=>{
      const s=dispatch(sid,"start"); if(!s||T(s.ts)>state.t)return"";
      const c=dispatch(sid,"complete"), done=c&&T(c.ts)<=state.t;
      const end=done?T(c.ts):state.t, L=pct(T(s.ts)), W=Math.max(0.6,pct(end)-L);
      const role=(s.handle||"").replace(/^darkmux\//,"");
      return `<div class="sbar ${done?'':'a'}" style="left:${L}%;width:${W}%" title="${role} · ${sid}${done?'':' · in flight'}"></div>`;
    }).join("");
    return `<div class="lane"><div class="lname" title="${nameOf(m)}">${nameOf(m)}</div><div class="tltrack">${bars}<div class="ph" style="left:${pct(state.t)}%"></div></div></div>`;
  }).join("");
  const ax=`<div class="tlaxis"><span>${iso(tMin).slice(11,16)}</span><span>${iso(tMin+span/2).slice(11,16)}</span><span>${iso(tMax).slice(11,16)}Z</span></div>`;
  // Size the lane-label column to the actual machine names so short names
  // ("studio") don't leave a fixed-150px gap before the bars. CSS var consumed
  // on desktop; mobile stacks the lanes (.lname width:auto) and ignores it.
  const maxLen=ms.length?Math.max(...ms.map(m=>nameOf(m).length)):8;
  const labelW=Math.round(Math.min(170,Math.max(54,maxLen*7.4+10)));
  const tl = ms.length
    ? `<div class="fleettl" style="--lname-w:${labelW}px"><div class="tlhdr">${liveMode?'recent activity':'activity'} · ${iso(tMin).slice(11,19)}–${iso(tMax).slice(11,19)}Z</div>${lanes}${ax}</div>`
    : `<div class="fleettl"><div class="tlempty">waiting for the first flow record…</div></div>`;
  $("stage").innerHTML=`<div class="fleet">${cards}</div>`+tl;
}
function renderMachine(){
  const m=state.machine; $("logscope").textContent=nameOf(m); state.stageScope=r=>uidOf(r)===m;
  // Always-loaded utility role — resident on every machine, runs alongside the specialists
  // to handle compaction + other utility-tier tasks (not a per-mission dispatch).
  // TODO(#624): should read /model/status to surface the actual utility model resident,
  // not a generic placeholder. Until then, mark it as static UI rather than implying it
  // reflects live state.
  const util=`<div class="node util"><div class="h">darkmux/utility</div>
    <div class="s">utility tier · always-loaded</div>
    <div class="s">compaction · mission-compile · estimate · scribe</div>
    <span class="pill util">resident</span></div>`;
  // Specialist roles dispatched on this machine. Defensive against missing
  // dispatch.start records: real flow streams contain telemetry-only sessions,
  // test-fixture sessions emitting dispatch.tool/turn without a proper
  // start record, and isolated records that don't fit the dispatch lifecycle.
  // For each session we render whatever metadata we can recover from the first
  // visible record on that session, rather than throwing if dispatch.start is
  // missing (which silently broke the entire machine-detail panel).
  // (#638 Slice 3) A role can't be "running" on a machine that's absent at the
  // scrubber — when the machine went offline, its dispatches went with it. So
  // an absent machine caps its roles to terminal status (consistency guard;
  // the session.end edges usually already bookend them at the same instant).
  const machAbsent=machPresent(m)===false;
  const nodeObjs=sessionsOn(m).filter(sid=>visible().some(r=>r.session_id===sid)).map(sid=>{
    const s=dispatch(sid,"start");
    // (#638/#647) Session status at the scrubber time `state.t`, from the
    // edge pair — NOT "no dispatch.complete = running" (the old false-running
    // bug). Close-edge = the earliest of dispatch.complete (clean) or the
    // reconciler's session.end (abandoned). Priority:
    //   closed by state.t → "complete" (clean) / "ended" (abandoned)
    //   else live heartbeat now (live mode)            → "running"
    //   else a close-edge exists but is AFTER state.t  → "running"
    //        (playback: the session was running at the scrubber, its bracket
    //         just hasn't been reached yet)
    //   else started, no close evidence, not live      → "ended"
    //        (crashed before the reconciler shipped, or capture truncated —
    //         honest default; never a phantom "running")
    const c=dispatch(sid,"complete"), e=sessEnd(sid);
    const closeCands=[c&&T(c.ts), e&&T(e.ts)].filter(x=>x);
    const closeTs=closeCands.length?Math.min(...closeCands):null;
    const closedBy=closeTs!=null&&closeTs<=state.t;
    const cleanClose=c&&T(c.ts)===closeTs;            // complete is the (or tied) earliest close
    const liveNow=LIVE_SESSIONS.has(sid);
    let cls,lbl;
    if(closedBy){ cls=cleanClose?'done':'ended'; lbl=cleanClose?'complete':'ended'; }
    else if(!machAbsent&&liveNow){ cls='run'; lbl='running'; }
    else if(!machAbsent&&closeTs!=null){ cls='run'; lbl='running'; }
    else { cls='ended'; lbl='ended'; }
    if(s){
      return {cls, html:`<div class="node" onclick="drillSession('${sid}')"><div class="h">${s.handle}</div>
        <div class="s">specialist role · ${s.model||'?'}</div>
        <div class="s">session ${sid} · mission ${s.mission_id}</div>
        <span class="pill ${cls}">${lbl}</span></div>`};
    }
    // Fallback: no dispatch.start — pull handle/model/mission from the first
    // record we have for this session, surface honestly that the lifecycle
    // wasn't captured here.
    const first=visible().find(r=>r.session_id===sid)||{};
    const handle=first.handle||`session ${sid}`;
    const model=first.model||'?';
    const mission=first.mission_id?`mission ${first.mission_id}`:'no mission scope';
    return {cls:'ended', html:`<div class="node" onclick="drillSession('${sid}')"><div class="h">${handle}</div>
      <div class="s">role · ${model}</div>
      <div class="s">session ${sid} · ${mission}</div>
      <span class="pill warn">no dispatch.start</span></div>`};
  });
  // (#691 Slice 2) In live mode, separate RUNNING-now from completed: completed
  // dispatches from earlier today shouldn't sit in the live crew looking
  // current. Running stay prominent; the rest collapse into a dimmed "recent
  // runs" section (still one click to drill / playback). Playback shows all.
  const liveMode=document.body.classList.contains('live-mode');
  let specs;
  if(liveMode){
    const running=nodeObjs.filter(n=>n.cls==='run').map(n=>n.html).join("");
    const recent=nodeObjs.filter(n=>n.cls!=='run').map(n=>n.html).join("");
    const recentCount=nodeObjs.filter(n=>n.cls!=='run').length;
    specs=(running||'<span class="hint">no dispatches running right now</span>')
      +(recentCount?`<div class="rglbl rgdim">recent runs · ${recentCount} today</div><div class="recentruns">${recent}</div>`:'');
  } else {
    specs=nodeObjs.map(n=>n.html).join("");
  }
  // Loose records — records on this machine that don't have a session_id and
  // therefore don't show up in any session card above (flow notes, free-floating
  // telemetry, anything written outside a dispatch). Surface them as a count
  // with a click-through so the operator can still inspect them.
  const loose=visible().filter(r=>uidOf(r)===m&&!r.session_id);
  const looseCard=loose.length
    ? `<div class="node" onclick="drillLoose('${m}')"><div class="h">unscoped records</div>
        <div class="s">${loose.length} record${loose.length===1?'':'s'} without a session</div>
        <div class="s">flow notes, ambient telemetry, etc.</div>
        <span class="pill">loose</span></div>`
    : '';
  $("stage").innerHTML=`<div><div class="stagehdr"><a onclick="goFleet()">fleet</a> › machine · ${nameOf(m)}${specOf(m)?' — '+specOf(m):''}</div>
    <div class="rglbl">crew on ${nameOf(m)}</div>${util}${specs}${looseCard||(specs?'':'<span class="hint">no specialist runs at this point in the timeline</span>')}</div>`;
}
// Drill into the loose-records panel (records on a machine that don't have a
// session_id — e.g. flow notes, ambient telemetry). Scopes the log to those
// records so the operator can still inspect them.
function drillLoose(m){
  state.level="loose"; state.machine=m; state.session=null; state.selected=null;
  state.stageScope=r=>uidOf(r)===m&&!r.session_id;
  $("logscope").textContent=nameOf(m)+" · loose";
  $("stage").innerHTML=`<div><div class="stagehdr"><a onclick="goFleet()">fleet</a> › <a onclick="drillMachine('${m}')">${nameOf(m)}</a> › unscoped records</div>
    <div class="rglbl">${visible().filter(r=>uidOf(r)===m&&!r.session_id).length} record(s) without a session — inspect via the log on the right</div></div>`;
  renderLog();renderMeta();syncTransport();
}
function renderSubsystem(){
  const sid=state.session, m=state.machine; $("logscope").textContent=sid; state.stageScope=r=>r.session_id===sid;
  const tel=visible().filter(r=>r.session_id===sid&&r.category==="telemetry");
  const lms=tel.filter(r=>r.source==="lms"), procs=tel.filter(r=>r.source==="process");
  const rt=tel.filter(r=>r.source==="runtime").slice(-1)[0];
  const dets=tel.filter(r=>r.source==="detector");
  const loads=lms.filter(r=>r.fields.event==="load");
  const distinct=[...new Set(loads.map(r=>r.fields.model))];
  const d=dispatch(sid,"start"), c=dispatch(sid,"complete"), done=c&&T(c.ts)<=state.t;
  const turns=rt?rt.fields.turns:"—";
  const cx=tel.filter(r=>r.source==="context").slice().sort((a,b)=>T(a.ts)-T(b.ts));
  const comps=tel.filter(r=>r.source==="compaction");
  const nctx=cx.length?cx[0].fields.max:0, ctxPeak=cx.length?Math.max(...cx.map(r=>r.fields.used)):0;
  const wall=done?fmt(T(c.ts)-T(d.ts)):fmt(state.t-T(d.ts))+" so far";
  const met=`<div class="metrics">
    <div class="met"><div class="mv">${turns}</div><div class="ml">turns</div></div>
    <div class="met"><div class="mv">${nctx?(ctxPeak/1000).toFixed(0)+"k":"—"}</div><div class="ml">peak ctx / ${nctx?(nctx/1000)+"k window":"—"}</div><div class="tokbar"><span style="width:${nctx?Math.round(ctxPeak/nctx*100):0}%"></span></div></div>
    <div class="met"><div class="mv">${comps.length}</div><div class="ml">compactions</div></div>
    <div class="met"><div class="mv">${wall}</div><div class="ml">wall clock</div></div></div>`;
  const segs=loads.map((r,i)=>`<span class="seg ${i>0?'b':''}">${r.fields.model} · ${r.fields.gb||'?'}GB</span>`).join("");
  const bars=procs.map(r=>`<div class="bar" style="height:${Math.max(3,r.fields.cpu/100*78)}px" title="cpu ${r.fields.cpu}%"></div>`).join("");
  const xvals=procs.map(r=>`<span>${r.fields.cpu}</span>`).join("");
  const cpu=procs.length?`<div class="track"><div class="lbl">process cpu — % busy</div>
    <div class="cpuchart"><div class="yax"><span>100</span><span>50</span><span>0</span></div>
      <div><div class="bars">${bars}</div><div class="xvals">${xvals}</div></div></div></div>`:"";
  let ctxChart="";
  if(cx.length){
    const W=440,H=72,t0=T(d.ts),t1=done?T(c.ts):state.t,span=Math.max(1,t1-t0);
    const xy=cx.map(r=>[Math.max(0,Math.min(W,(T(r.ts)-t0)/span*W)),H-(r.fields.used/nctx)*H]);

  dets.forEach(r=>finds.push({s:r.fields.severity||"warn",k:r.fields.kind,d:r.fields.detail}));

    : `<div class="track"><div class="lbl">detections</div><div class="finding ok"><span class="fk">✓ clean</span><span class="fm">no behavioral flags (cycle, tool-failure, reasoning-loop, edit-drift)</span></div></div>`;
  $("stage").innerHTML=`<div class="sub"><h2>subsystem · ${d.handle} <span style="color:var(--muted);text-transform:none;font-weight:400">(${sid} on <a onclick="drillMachine('${m}')">${nameOf(m)}</a>)</span></h2>
    ${met}
    <div class="track"><div class="lbl">model (lms)</div>${segs||'<span class="hint">no telemetry yet</span>'}</div>
    ${cpu}
    ${ctxChart}
    ${detections}</div>`;
}

function renderMission(){
  // Derived entirely from the flow records — no hardcoded sprint fixture. Each
  // dispatch session in the mission is a row whose status advances with the
  // playhead (backlog → active → complete), so it animates during playback
  // exactly as live data would. (Sprint/burn-down detail is a separate
  // feature — it needs sprint lifecycle records, which dispatch flows don't
  // carry yet.)
  const mid=primaryMission()||"—";
  state.stageScope=r=>r.mission_id===mid; $("logscope").textContent="mission";
  const starts={};
  DATA.filter(r=>r.mission_id===mid&&typeof r.action==="string"&&r.action.indexOf("dispatch")===0&&r.action.indexOf("start")>-1)
      .forEach(r=>{ if(r.session_id&&!starts[r.session_id])starts[r.session_id]=r; });
  const sessions=Object.keys(starts).map(sid=>{
    const st=starts[sid], cp=dispatch(sid,"complete");
    const started=T(st.ts)<=state.t, complete=cp&&T(cp.ts)<=state.t;
    return {role:(st.handle||"").replace(/^darkmux\//,""), machine:nameOf(uidOf(st)),
            model:st.model||"?", status:!started?"backlog":(complete?"complete":"active"), ts:T(st.ts)};
  }).sort((a,b)=>a.ts-b.ts);
  const total=sessions.length, done=sessions.filter(s=>s.status==="complete").length, active=sessions.filter(s=>s.status==="active").length;
  const pct=total?Math.round(done/total*100):0;
  const machs=[...new Set(sessions.map(s=>s.machine))];
  const rows=sessions.map(s=>`<div class="sprow"><span class="sps ${s.status}">${s.status}</span><span class="spt">${s.role} · ${s.machine}</span><span class="spa">${s.model}</span></div>`).join("")||`<div class="none">no dispatches at this point in the timeline</div>`;
  $("stage").innerHTML=`<div class="sub"><h2>mission · ${mid}</h2>
    <div class="mgoal">${total} dispatch${total===1?'':'es'} across ${machs.length} machine${machs.length===1?'':'s'}${machs.length?' · '+machs.join(', '):''}</div>
    <div class="burn"><div class="burnbar"><span style="width:${pct}%"></span></div><div class="burnlbl">${done}/${total} dispatches complete · ${pct}%${active?' · '+active+' in flight':''}</div></div>
    <div class="track"><div class="lbl">dispatches</div>${rows}</div></div>`;
}

// ── Data source: real flow records (daemon) with sample fallback (website) ──
// Normalize real FlowRecords into the viewer's record shape. The flow schema
// is already close: it carries ts/category/tier/stage/action/handle/
// machine_id/mission_id/session_id/model. Differences handled here:
//  - "dispatch start"/"dispatch complete" (space) → dotted form the UI matches
//  - tier may be capitalized ("Local") → lowercased to match the filter set
//  - event-specific data lives under `payload` (schema 1.6+) → exposed as `fields`
//  - category defaults to telemetry when a `source` is present, else work
function flowToRenderModel(records){
  const out=records.map(r=>{
    const o={...r};
    if(o.action==="dispatch start")o.action="dispatch.start";
    if(o.action==="dispatch complete")o.action="dispatch.complete";
    if(o.tier)o.tier=String(o.tier).toLowerCase();
    if(o.payload&&!o.fields)o.fields=o.payload;
    // dispatch.compaction → a compaction telemetry record (the subsystem's
    // compaction count). from/to are message counts here, not the byte
    // sawtooth the sample draws (per-turn context bytes need #557).
    if(o.action==="dispatch.compaction"){
      const p=o.payload||{};
      o.category="telemetry"; o.source="compaction";
      o.fields={from:p.before_messages||0,to:p.after_messages||0};
    }
    if(!o.category)o.category=o.source?"telemetry":"work";
    return o;
  });
  // Per-session turn count (max turn_seq) → one runtime telemetry record, which
  // is where the subsystem view reads the TURNS metric.
  const perS={};
  for(const r of records){
    if(r.action==="dispatch.turn"&&r.session_id){
      const seq=(r.payload&&r.payload.turn_seq)||0;
      const e=perS[r.session_id]||(perS[r.session_id]={turns:0,ts:r.ts,machine_id:r.machine_id,machine_uid:r.machine_uid});
      e.turns=Math.max(e.turns,seq); e.ts=r.ts; if(r.machine_id)e.machine_id=r.machine_id; if(r.machine_uid)e.machine_uid=r.machine_uid;
    }
  }
  for(const s in perS){
    out.push({ts:perS[s].ts,category:"telemetry",source:"runtime",machine_id:perS[s].machine_id,machine_uid:perS[s].machine_uid,session_id:s,fields:{turns:perS[s].turns}});
  }
  // Sort by ts: the per-session runtime aggregates above are APPENDED out of
  // chronological order, and the event log + the follow-latest selection both
  // assume DATA is temporal (log reverses it; "following" = max-ts = topmost
  // row). One sort here keeps the whole pipeline in time order. recompute()
  // assigns `_id` by index AFTER this, so ids track the sorted order.
  return out.sort((a,b)=>T(a.ts)-T(b.ts));
}

// Pick the day to play back: URL hash (#2026-06-01) or ?date=, default today (UTC).
function targetDate(){
  const h=(location.hash||"").replace(/^#/,"").trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(h))return h;
  const q=new URLSearchParams(location.search).get("date");
  if(q&&/^\d{4}-\d{2}-\d{2}$/.test(q))return q;
  return new Date().toISOString().slice(0,10);
}

function todayUTC(){return new Date().toISOString().slice(0,10);}

let RAW=[];            // raw FlowRecords (pre-adapt); the live tail appends here
let LIVE_ES=null;      // EventSource handle when tailing the live stream
// (#638) Sessions with a live heartbeat right now — polled from the daemon's
// /fleet/sessions/live in live mode (stays EMPTY in playback). The machine
// drill keys "running" on membership here, so a dispatch that died without a
// dispatch.complete ages out instead of showing "running" forever.
const LIVE_SESSIONS=new Set();
const liveSig=()=>[...LIVE_SESSIONS].sort().join(",");
// (#638) Machines broadcasting a presence heartbeat right now — uid → beat,
// polled from /fleet/machines/live in live mode (EMPTY in playback). Presence
// is the source of truth for the live fleet: a machine appears here whether or
// not it has any flow records, so machines() unions it, and nameOf/specOf fall
// back to the beat's display_name/specs for a recordless present machine.
const LIVE_MACHINES=new Map();
let lastStageSig=null; // skip stage re-renders that would destroy clickable cards
const SEEN={cat:new Set(),tier:new Set(),src:new Set()};  // filter values ever observed

// When live records introduce a category/tier/source not seen before, include it
// in the active filter set (new = visible by default). Values the operator
// explicitly deselected are already in SEEN, so they stay deselected.
function absorbNewFilterValues(){
  const add=(vals,seen,fset)=>{for(const v of vals){if(!seen.has(v)){seen.add(v);fset.add(v);}}};
  add(FCATS,SEEN.cat,state.filters.cat);
  add(FTIERS,SEEN.tier,state.filters.tier);
  add(FSRC,SEEN.src,state.filters.src);
}

function setBadges(mode,date){

  // Live viewer never enters "sample" mode — the fallback is "no daemon" or

  // gone — that mode belongs to docs/demo/ only.)
  DATA_SOURCE = mode==="live" ? ("live · "+dl) : mode==="play" ? ("flow · "+date) : mode==="empty" ? ("no records · "+date) : mode==="no-daemon" ? "daemon not reachable" : "no records yet";

// Structural signature of the current level's stage. In live mode the cards are
// re-rendered only when this changes — a burst of telemetry records must not
// destroy a card the operator is about to click (same hazard the playback timer
// guards against). Subsystem is a metrics view with no cards → always full-render.
function stageSig(){
  const v=visible(), dis=v.filter(r=>r.action==="dispatch.start"||r.action==="dispatch.complete"||r.action==="session.end").length;
  // Fold the live-session set in: a session going live / ageing out is a
  // lifecycle change that must re-render the cards (so the "running"↔"ended"
  // pill flips), same as a dispatch.start/complete / session.end edge arriving
  // (#638/#647).
  const ls=liveSig();
  // (#638 Slice 3) Live presence set — when a machine stops beating it drops
  // from LIVE_MACHINES (membership stays via its records, so machines() doesn't
  // change), but its card must re-render present→absent. Fold the presence
  // signature in so that flip triggers a render. (Playback re-renders on each
  // scrub, so machPresent re-evaluates against state.t there without help.)
  const ps=[...LIVE_MACHINES.keys()].sort().join(",");
  if(state.level==="fleet")return "f|"+machines().join(",")+"|"+dis+"|"+ls+"|"+ps;
  if(state.level==="machine")return "m|"+state.machine+"|"+sessionsOn(state.machine).join(",")+"|"+dis+"|"+ls+"|"+ps;
  if(state.level==="subsystem")return null;
  return "mission";
}
function applyLive(){
  DATA=flowToRenderModel(RAW);
  recompute();
  absorbNewFilterValues();
  if(state.follow)state.t=tMax;
  const sig=stageSig();
  if(sig===null||sig!==lastStageSig){ lastStageSig=sig; render(); return; }
  // Cards unchanged — refresh only the live readouts (selected event, log, meta, transport).
  if(state.follow){ const n=newest(scopedFiltered()); state.selected=n?n._id:null; }
  renderDetail();renderLog();renderMeta();syncTransport();
}
function startLiveTail(date){
  if(typeof EventSource==="undefined")return;
  if(LIVE_ES)LIVE_ES.close();
  LIVE_ES=new EventSource("/flow/"+date+"/stream");
  let pending=false;
  LIVE_ES.onmessage=ev=>{
    let rec; try{rec=JSON.parse(ev.data);}catch(_){return;}
    if(!rec||typeof rec!=="object"||Array.isArray(rec))return;
    RAW.push(rec);
    if(!pending){pending=true;requestAnimationFrame(()=>{pending=false;applyLive();});}
  };
  LIVE_ES.onerror=()=>{const mb=$("modebadge");if(mb)mb.classList.remove("live");}; // reconnecting — drop the pulse
  window.addEventListener("beforeunload",()=>{if(LIVE_ES)LIVE_ES.close();});
}
// (#638) Poll the live-session set on the heartbeat cadence (~5s, matching
// the emitter's refresh + 15s TTL). Best-effort: a fetch error just leaves
// the set unchanged rather than flapping sessions offline. Only started in
// live mode; playback keeps LIVE_SESSIONS empty so nothing reads "running".
let LIVE_SESS_TIMER=null;
async function pollLiveSessions(){
  try{
    const r=await fetch("/fleet/sessions/live",{headers:{accept:"application/json"}});
    if(!r.ok)return;
    const arr=await r.json();
    const next=(Array.isArray(arr)?arr:[]).map(b=>b&&b.session_id).filter(Boolean);
    LIVE_SESSIONS.clear(); next.forEach(s=>LIVE_SESSIONS.add(s));
    applyLive();   // re-renders only if the live set changed the stage signature
  }catch(_){/* best-effort — keep the last known live set */}
}
// (#638) Poll the live-machine set (presence beats) on the same cadence. A
// machine shows in the fleet view because it's BROADCASTING PRESENCE, not
// because it emitted a flow record — so a freshly-synced, idle machine appears
// here and drops off when it stops beating. Best-effort like the session poll.
async function pollLiveMachines(){
  try{
    const r=await fetch("/fleet/machines/live",{headers:{accept:"application/json"}});
    if(!r.ok)return;
    const arr=await r.json();
    LIVE_MACHINES.clear();
    (Array.isArray(arr)?arr:[]).forEach(b=>{ if(b&&b.machine_uid)LIVE_MACHINES.set(b.machine_uid,b); });
    applyLive();   // machines() unions LIVE_MACHINES → a new present machine re-renders
  }catch(_){/* best-effort — keep the last known live machines */}
}
function startLivePoll(){
  if(LIVE_SESS_TIMER)return;
  pollLiveSessions(); pollLiveMachines();
  LIVE_SESS_TIMER=setInterval(()=>{pollLiveSessions();pollLiveMachines();},5000);
  window.addEventListener("beforeunload",()=>{if(LIVE_SESS_TIMER)clearInterval(LIVE_SESS_TIMER);});
}

// Read injected mode + date from the daemon. The live route (GET /) injects
// content="live"; the playback route (GET /play/<date>) injects
// content="play" and a darkmux-date meta with the captured day. When loaded
// statically (no daemon — e.g., darkmux.com/viewer), no meta is present and
// the viewer falls back to URL-driven targetDate() behavior.
function injectedMeta(name){
  const el=document.querySelector('meta[name="'+name+'"]');
  return el ? el.getAttribute('content') : null;
}
async function boot(){
  const injectedMode=injectedMeta("darkmux-mode");
  const injectedDate=injectedMeta("darkmux-date");
  // Static-playback source (darkmux.com/demo): a committed .jsonl loaded
  // directly — exactly the on-disk flow file the daemon would read for
  // /flow/<date>. No daemon, identical render path. Forces playback.
  const flowSrc=injectedMeta("darkmux-flow-src");
  let date=injectedDate||targetDate();
  // Playback mode is daemon-controlled (or static-flow-src driven): it forces
  // "play" regardless of whether the date happens to be today, and SSE is
  // never started. Live mode follows the original today=tail / past=replay.
  const wantsPlayback = injectedMode==="play" || !!flowSrc;
  let mode="empty";
  if(flowSrc){
    // Parse the flow file line-by-line, the way the daemon parses the on-disk
    // .jsonl — then it's the standard playback render path, nothing demo-specific.
    try{
      const text=await fetch(flowSrc).then(r=>r.text());
      RAW=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean)
              .map(l=>{try{return JSON.parse(l);}catch(_){return null;}}).filter(Boolean);
    }catch(e){ RAW=[]; }
    DATA=flowToRenderModel(RAW);
    if(!injectedDate&&RAW.length)date=String(RAW[0].ts||"").slice(0,10)||date;
    mode = RAW.length?"play":"empty";
  } else {
    try{
      const res=await fetch("/flow/"+date,{headers:{accept:"application/json"}});
      if(res.ok){
        const body=await res.json();
        RAW=Array.isArray(body)?body:(body.records||body.flow||[]);
        DATA=flowToRenderModel(RAW);
        mode = wantsPlayback ? (RAW.length?"play":"empty")
                             : (date===todayUTC() ? "live" : (RAW.length?"play":"empty"));
      }else{ DATA=[]; RAW=[]; mode="empty"; }
    }catch(e){ DATA=[]; RAW=[]; mode="no-daemon"; }   // daemon not reachable — show honest empty state, never demo
  }
  // Tag the body with the daemon-injected mode so CSS and dev tools can
  // distinguish live-route vs playback-route loads at a glance.
  document.body.classList.add("daemon-mode-"+(injectedMode||(flowSrc?"play":"unset")));
  setBadges(mode,date);
  recompute();
  state.t=tMax;
  state.filters={cat:new Set(FCATS),tier:new Set(FTIERS),src:new Set(FSRC),q:""};
  absorbNewFilterValues();
  render();
  if(mode==="live"){ startLiveTail(date); startLivePoll(); }
}
boot();
</script>
