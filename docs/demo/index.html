<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>darkmux · observability · demo</title>
<style>
  :root{
    --bg:#0a0a0b; --bg2:#131316; --panel:#1c1c22; --line:#1f1f24;
    --text:#e8e6e3; --muted:#8a8a92; --amber:#6df1ff; --amber-dim:#2a8a96;
    --good:#5af0a3; --warn:#ffb86b; --bad:#ff6b85;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100vh;background:var(--bg);color:var(--text);font:14px/1.4 'Inter',-apple-system,system-ui,sans-serif;overflow:hidden}
  .top{height:46px;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);background:var(--bg2)}
  .brand{font-weight:700;letter-spacing:.04em}.brand b{color:var(--amber)}.brand a{color:inherit;text-decoration:none}.brand a:hover b{text-decoration:underline}
  .topnav{margin-left:auto;display:flex;gap:18px;align-items:center}
  .topnav a{color:var(--muted);text-decoration:none;font:600 12px 'JetBrains Mono',monospace;letter-spacing:.04em}
  .topnav a:hover{color:var(--amber)}
  .badge{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:#0a0a0b;background:var(--amber);padding:5px 9px;border-radius:3px}
  .pb{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);border:1px solid var(--amber-dim);padding:4px 9px;border-radius:3px}
  @keyframes lpulse{0%,100%{opacity:1}50%{opacity:.5}}
  .pb.live{color:#4ade80;border-color:#4ade80;animation:lpulse 1.6s ease-in-out infinite}
  .crumbbar{height:40px;display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid var(--line);background:#131316}
  .backbtn{background:var(--bg);border:1px solid var(--line);color:var(--text);padding:5px 11px;border-radius:4px;cursor:pointer;font:600 12px 'JetBrains Mono',monospace}
  .backbtn[disabled]{opacity:.35;cursor:default}
  .crumb{font:600 13px 'JetBrains Mono',monospace;color:var(--muted)}
  .crumb a{color:var(--amber);cursor:pointer;text-decoration:none}.crumb a:hover{text-decoration:underline}
  .crumb .sep{color:var(--amber-dim);margin:0 6px}
  .meta{margin-left:auto;font:11px/1.4 'JetBrains Mono',monospace;color:var(--muted);text-align:right}.meta b{color:var(--text)}
  .wrap{display:flex;height:calc(100vh - 46px - 40px - 64px)}
  .stage{flex:1;position:relative;overflow:auto;padding:24px}
  .log{width:380px;border-left:1px solid var(--line);background:var(--bg2);display:flex;flex-direction:column}
  .detail{display:flex;flex-direction:column;padding:12px 14px 0;background:#131316}
  #detailbody{flex:1;overflow:auto;min-height:0;padding-bottom:12px}
  .split{height:7px;flex:none;background:var(--line);cursor:row-resize}
  .split:hover{background:var(--amber-dim)}
  .dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .dt{font:600 11px 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .follow{font:600 10px 'JetBrains Mono',monospace;letter-spacing:.06em;padding:4px 9px;border-radius:11px;cursor:pointer;border:1px solid var(--line);color:var(--muted);background:none}
  .follow.on{background:var(--amber);color:#0a0a0b;border-color:var(--amber)}
  .detail pre{margin:0;padding:10px 12px;background:var(--bg);border:1px solid var(--line);border-radius:5px;color:var(--text);white-space:pre-wrap;font:11px/1.55 'JetBrains Mono',monospace}
  .detail pre .k{color:var(--muted)}
  .detail .none{color:var(--muted);font:11px 'JetBrains Mono',monospace;padding:10px 0}
  .loglist{flex:1;overflow:auto;padding:10px 14px}
  .loglist h3{margin:0 0 8px;font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .fbtn{background:none;border:1px solid var(--line);color:var(--muted);font:600 10px 'JetBrains Mono',monospace;letter-spacing:.06em;padding:4px 9px;border-radius:11px;cursor:pointer;text-transform:none}
  .fbtn:hover{border-color:var(--amber-dim);color:var(--amber)}
  .fbtn.on{border-color:var(--amber);color:var(--amber)}
  .rec{font:11px/1.5 'JetBrains Mono',monospace;color:var(--muted);padding:5px 6px;border-bottom:1px solid var(--line);cursor:pointer;border-left:2px solid transparent}
  .rec:hover{background:#1c1c22}
  .rec.sel{background:#23232b;border-left:2px solid var(--amber);color:var(--text)}
  .rec .t{color:var(--amber)}.rec .tag{color:var(--text)}.rec.telemetry .tag{color:var(--warn)}
  .empty{color:var(--muted);font:11px 'JetBrains Mono',monospace;padding:10px 2px}
  .scrub{height:64px;border-top:1px solid var(--line);background:var(--bg2);display:flex;align-items:center;gap:14px;padding:0 18px}
  .scrub button{background:var(--bg);border:1px solid var(--amber-dim);color:var(--text);padding:7px 14px;border-radius:4px;cursor:pointer;font:600 12px 'JetBrains Mono',monospace}
  .scrub button.primary{background:var(--amber);color:#0a0a0b;border-color:var(--amber)}
  input[type=range]{flex:1;accent-color:var(--amber)}
  .clock{font:12px 'JetBrains Mono',monospace;color:var(--muted);min-width:160px;text-align:right}
  .fleet{display:flex;gap:36px;flex-wrap:wrap;align-items:flex-start}
  .fleettl{margin-top:30px;border-top:1px solid var(--line);padding-top:18px}
  .tlhdr{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .lane{display:flex;align-items:center;gap:12px;margin-bottom:7px}
  .lname{width:150px;flex:none;font:12px 'JetBrains Mono',monospace;color:var(--text);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tltrack{position:relative;flex:1;height:28px;background:var(--panel);border:1px solid var(--line);border-radius:4px;overflow:hidden}
  .sbar{position:absolute;top:5px;height:18px;background:var(--amber-dim);border-radius:3px;min-width:2px}
  .sbar.a{background:var(--amber);box-shadow:0 0 6px var(--amber)}
  .tltrack .ph{position:absolute;top:0;bottom:0;width:2px;background:var(--text);opacity:.32}
  .tlaxis{margin-left:162px;display:flex;justify-content:space-between;font:9px 'JetBrains Mono',monospace;color:var(--muted);margin-top:7px}
  .tlempty{font:11px 'JetBrains Mono',monospace;color:var(--muted)}
  .mach{width:230px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;cursor:pointer;transition:border-color .15s}
  .mach:hover{border-color:var(--amber-dim)}.mach.active{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber-dim)}
  .mach .name{font:600 15px 'JetBrains Mono',monospace;color:var(--text);display:flex;align-items:center;gap:8px}
  .mico{display:inline-flex;color:var(--amber-dim)}.mico svg{width:19px;height:19px;display:block}
  .mach.active .mico{color:var(--amber)}
  .mach .spec{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-top:3px}
  .mach .stat{margin-top:12px;font:12px 'JetBrains Mono',monospace}
  .mach .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber-dim);margin-right:7px;vertical-align:middle}
  .mach.active .dot{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .hint{color:var(--muted);font:11px 'JetBrains Mono',monospace;margin-top:10px}
  .stagehdr{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-bottom:14px}
  .stagehdr a{color:var(--amber);cursor:pointer;text-decoration:none}.stagehdr a:hover{text-decoration:underline}
  .node{display:inline-block;width:260px;vertical-align:top;margin:0 24px 24px 0;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;cursor:pointer}
  .node:hover{border-color:var(--amber-dim)}.node .h{font:600 13px 'JetBrains Mono',monospace}
  .node .s{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-top:4px}
  .pill{display:inline-block;font:600 10px 'JetBrains Mono',monospace;padding:2px 7px;border-radius:10px;margin-top:8px}
  .pill.run{background:#16261d;color:var(--good)}.pill.done{background:#1c1c22;color:var(--muted)}.pill.util{background:var(--bg2);color:var(--amber-dim);border:1px solid var(--line)}
  .node.util{cursor:default;border-left:3px solid var(--amber-dim)}.node.util:hover{border-color:var(--line)}
  .rglbl{font:11px 'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .sub h2{font:600 13px 'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin:0 0 4px}
  .sub h2 a{color:var(--amber);text-decoration:underline;cursor:pointer}
  .track{margin:18px 0}.track .lbl{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-bottom:6px}
  .seg{display:inline-flex;align-items:center;height:30px;padding:0 12px;margin-right:2px;font:11px 'JetBrains Mono',monospace;border-radius:3px;color:#0a0a0b;background:var(--amber)}
  .seg.b{background:var(--warn)}
  .metrics{display:flex;gap:12px;margin:14px 0 4px;flex-wrap:wrap}
  .met{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:9px 14px;min-width:118px}
  .met .mv{font:600 17px 'JetBrains Mono',monospace;color:var(--text)}
  .met .ml{font:10px 'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .tokbar{height:4px;background:var(--line);border-radius:2px;margin-top:7px;overflow:hidden}.tokbar span{display:block;height:100%;background:var(--amber)}
  .cpuchart{display:flex;gap:8px;align-items:flex-end}
  .yax{display:flex;flex-direction:column;justify-content:space-between;height:80px;font:9px 'JetBrains Mono',monospace;color:var(--muted);text-align:right}
  .bars{display:flex;align-items:flex-end;gap:6px;height:80px;border-bottom:1px solid var(--line)}.bar{width:24px;background:var(--amber-dim);border-radius:2px 2px 0 0}
  .xvals{display:flex;gap:6px;margin-top:4px}.xvals span{width:24px;text-align:center;font:9px 'JetBrains Mono',monospace;color:var(--muted)}
  .ctxchart{width:440px;height:74px;display:block;border-bottom:1px solid var(--line)}
  .finding{border:1px solid var(--line);border-left:3px solid var(--line);border-radius:5px;padding:9px 12px;margin-bottom:7px;background:var(--panel)}
  .finding.warn{border-left-color:var(--warn)}.finding.ok{border-left-color:var(--good)}
  .finding .fk{display:block;font:600 12px 'JetBrains Mono',monospace;color:var(--warn)}.finding.ok .fk{color:var(--good)}
  .finding .fm{display:block;font-size:12px;color:var(--text);margin-top:3px}
  .finding .ff{display:block;font-size:11px;color:var(--muted);margin-top:5px}
  .misslink{cursor:pointer;color:var(--amber);text-decoration:none}.misslink:hover{text-decoration:underline}
  .mgoal{font-size:13px;color:var(--text);margin:8px 0 16px;max-width:680px;line-height:1.5}
  .burn{margin-bottom:18px}.burnbar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;max-width:420px}.burnbar span{display:block;height:100%;background:var(--good)}
  .burnlbl{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-top:6px}
  .sprow{display:flex;align-items:center;gap:14px;padding:10px 12px;border:1px solid var(--line);border-radius:5px;margin-bottom:7px;background:var(--panel)}
  .sps{font:600 10px 'JetBrains Mono',monospace;text-transform:uppercase;padding:3px 8px;border-radius:10px;min-width:74px;text-align:center}
  .sps.complete{background:#1c1c22;color:var(--muted)}.sps.active{background:#16261d;color:var(--good)}.sps.backlog{background:var(--bg2);color:var(--amber-dim);border:1px solid var(--line)}
  .spt{flex:1;font:12px 'JetBrains Mono',monospace;color:var(--text)}
  .spe{font:11px 'JetBrains Mono',monospace;color:var(--muted)}
  .spa{font:11px 'JetBrains Mono',monospace;color:var(--amber-dim);min-width:190px;text-align:right}
  .mscope{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin:-8px 0 16px}
  .eureka{margin-top:16px;border:1px solid var(--warn);background:#1c1c22;border-radius:6px;padding:12px 14px}
  .eureka .k{color:var(--warn);font:600 12px 'JetBrains Mono',monospace}.eureka .m{color:var(--text);font-size:12px;margin-top:4px}.eureka .f{color:var(--muted);font-size:11px;margin-top:6px}
  /* filter modal */
  .modalbg{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;display:none;align-items:center;justify-content:center}
  .modal{width:380px;background:var(--bg2);border:1px solid var(--amber-dim);border-radius:8px;padding:18px 20px}
  .mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font:600 13px 'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--amber)}
  .mx{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer}
  .fgroup{margin-bottom:14px}
  .fgroup h4{margin:0 0 8px;font:600 10px 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .fgroup label{display:inline-flex;align-items:center;gap:6px;margin:0 14px 7px 0;font:12px 'JetBrains Mono',monospace;color:var(--text);cursor:pointer}
  .fgroup input{accent-color:var(--amber);cursor:pointer}
  .mft{display:flex;gap:10px;margin-top:8px}
  .mft input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:4px;padding:8px 10px;font:12px 'JetBrains Mono',monospace}
  .clr{background:var(--bg);border:1px solid var(--amber-dim);color:var(--text);border-radius:4px;padding:8px 12px;cursor:pointer;font:600 12px 'JetBrains Mono',monospace}
</style>
</head>

</div>

</div>
<div class="wrap">

      <div id="logbody"></div>
    </div>
  </div>
</div>
<div class="scrub">
  <button id="rewind" title="jump to start">⏮</button>
  <button id="play" class="primary">▶ play</button>
  <input type="range" id="range" min="0" max="100" value="100">
  <button id="speed" title="playback speed">1×</button>
  <span class="clock" id="clock"></span>
</div>
<div class="modalbg" id="modalbg">
  <div class="modal">
    <div class="mhd"><span>filter events</span><button class="mx" onclick="closeFilters()">✕</button></div>

    <div class="mft"><input id="fsearch" placeholder="search text…"><button class="clr" onclick="clearFilters()">clear all</button></div>
  </div>
</div>

function renderMission(){

}
window.toggleFilter=(k,v)=>{const s=state.filters[k];s.has(v)?s.delete(v):s.add(v);render();};
window.openFilters=()=>{renderFilters();$("fsearch").value=state.filters.q;$("modalbg").style.display="flex";};
window.closeFilters=()=>{$("modalbg").style.display="none";};
window.clearFilters=()=>{state.filters={cat:new Set(FCATS),tier:new Set(FTIERS),src:new Set(FSRC),q:""};$("fsearch").value="";renderFilters();render();};
$("fsearch").oninput=e=>{state.filters.q=e.target.value;render();};
$("modalbg").onclick=e=>{if(e.target===$("modalbg"))closeFilters();};
// resizable detail/log split — fixed default height stops the jumpiness; drag the divider to grow it
(function(){const DEF=200,MIN=110,MAX=520;$("detail").style.height=DEF+"px";let drag=false,sy=0,sh=0;
  $("split").addEventListener("mousedown",e=>{drag=true;sy=e.clientY;sh=$("detail").offsetHeight;document.body.style.userSelect="none";e.preventDefault();});
  window.addEventListener("mousemove",e=>{if(!drag)return;$("detail").style.height=Math.max(MIN,Math.min(MAX,sh+(e.clientY-sy)))+"px";});
  window.addEventListener("mouseup",()=>{drag=false;document.body.style.userSelect="";});})();

// ── Data source: real flow records (daemon) with sample fallback (website) ──
// Normalize real FlowRecords into the viewer's record shape. The flow schema
// is already close: it carries ts/category/tier/stage/action/handle/
// machine_id/mission_id/session_id/model. Differences handled here:
//  - "dispatch start"/"dispatch complete" (space) → dotted form the UI matches
//  - tier may be capitalized ("Local") → lowercased to match the filter set
//  - event-specific data lives under `payload` (schema 1.6+) → exposed as `fields`
//  - category defaults to telemetry when a `source` is present, else work
function flowToRenderModel(records){
  const out=records.map(r=>{
    const o={...r};
    if(o.action==="dispatch start")o.action="dispatch.start";
    if(o.action==="dispatch complete")o.action="dispatch.complete";
    if(o.tier)o.tier=String(o.tier).toLowerCase();
    if(o.payload&&!o.fields)o.fields=o.payload;
    // dispatch.compaction → a compaction telemetry record (the subsystem's
    // compaction count). from/to are message counts here, not the byte
    // sawtooth the sample draws (per-turn context bytes need #557).
    if(o.action==="dispatch.compaction"){
      const p=o.payload||{};
      o.category="telemetry"; o.source="compaction";
      o.fields={from:p.before_messages||0,to:p.after_messages||0};
    }
    if(!o.category)o.category=o.source?"telemetry":"work";
    return o;
  });
  // Per-session turn count (max turn_seq) → one runtime telemetry record, which
  // is where the subsystem view reads the TURNS metric.
  const perS={};
  for(const r of records){
    if(r.action==="dispatch.turn"&&r.session_id){
      const seq=(r.payload&&r.payload.turn_seq)||0;
      const e=perS[r.session_id]||(perS[r.session_id]={turns:0,ts:r.ts,machine_id:r.machine_id});
      e.turns=Math.max(e.turns,seq); e.ts=r.ts; if(r.machine_id)e.machine_id=r.machine_id;
    }
  }
  for(const s in perS){
    out.push({ts:perS[s].ts,category:"telemetry",source:"runtime",machine_id:perS[s].machine_id,session_id:s,fields:{turns:perS[s].turns}});
  }
  return out;
}

// Pick the day to play back: URL hash (#2026-06-01) or ?date=, default today (UTC).
function targetDate(){
  const h=(location.hash||"").replace(/^#/,"").trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(h))return h;
  const q=new URLSearchParams(location.search).get("date");
  if(q&&/^\d{4}-\d{2}-\d{2}$/.test(q))return q;
  return new Date().toISOString().slice(0,10);
}

function todayUTC(){return new Date().toISOString().slice(0,10);}

let RAW=[];            // raw FlowRecords (pre-adapt); the live tail appends here
let LIVE_ES=null;      // EventSource handle when tailing the live stream
let lastStageSig=null; // skip stage re-renders that would destroy clickable cards
const SEEN={cat:new Set(),tier:new Set(),src:new Set()};  // filter values ever observed

// When live records introduce a category/tier/source not seen before, include it
// in the active filter set (new = visible by default). Values the operator
// explicitly deselected are already in SEEN, so they stay deselected.
function absorbNewFilterValues(){
  const add=(vals,seen,fset)=>{for(const v of vals){if(!seen.has(v)){seen.add(v);fset.add(v);}}};
  add(FCATS,SEEN.cat,state.filters.cat);
  add(FTIERS,SEEN.tier,state.filters.tier);
  add(FSRC,SEEN.src,state.filters.src);
}

function setBadges(mode,date){
  const dl = date===todayUTC() ? "today" : date;
  DATA_SOURCE = mode==="live" ? ("live · "+dl) : mode==="play" ? ("flow · "+date) : mode==="empty" ? ("no records · "+date) : "sample data";
  const sb=$("srcbadge");
  if(sb) sb.textContent = mode==="live" ? ("Live · "+dl) : mode==="play" ? ("Flow · "+date) : mode==="empty" ? ("No records · "+date) : "Demo — sample data";
  const mb=$("modebadge");
  if(mb){ const live=mode==="live"; mb.textContent=live?"● live":"▣ playback"; mb.classList.toggle("live",live); }
}

// Structural signature of the current level's stage. In live mode the cards are
// re-rendered only when this changes — a burst of telemetry records must not
// destroy a card the operator is about to click (same hazard the playback timer
// guards against). Subsystem is a metrics view with no cards → always full-render.
function stageSig(){
  const v=visible(), dis=v.filter(r=>r.action==="dispatch.start"||r.action==="dispatch.complete").length;
  if(state.level==="fleet")return "f|"+machines().join(",")+"|"+dis;
  if(state.level==="machine")return "m|"+state.machine+"|"+sessionsOn(state.machine).join(",")+"|"+dis;
  if(state.level==="subsystem")return null;
  return "mission";
}
function applyLive(){
  DATA=flowToRenderModel(RAW);
  recompute();
  absorbNewFilterValues();
  if(state.follow)state.t=tMax;
  const sig=stageSig();
  if(sig===null||sig!==lastStageSig){ lastStageSig=sig; render(); return; }
  // Cards unchanged — refresh only the live readouts (selected event, log, meta, transport).
  if(state.follow){ const n=newest(scopedFiltered()); state.selected=n?n._id:null; }
  renderDetail();renderLog();renderMeta();syncTransport();
}
function startLiveTail(date){
  if(typeof EventSource==="undefined")return;
  if(LIVE_ES)LIVE_ES.close();
  LIVE_ES=new EventSource("/flow/"+date+"/stream");
  let pending=false;
  LIVE_ES.onmessage=ev=>{
    let rec; try{rec=JSON.parse(ev.data);}catch(_){return;}
    if(!rec||typeof rec!=="object"||Array.isArray(rec))return;
    RAW.push(rec);
    if(!pending){pending=true;requestAnimationFrame(()=>{pending=false;applyLive();});}
  };
  LIVE_ES.onerror=()=>{const mb=$("modebadge");if(mb)mb.classList.remove("live");}; // reconnecting — drop the pulse
  window.addEventListener("beforeunload",()=>{if(LIVE_ES)LIVE_ES.close();});
}

async function boot(){
  const date=targetDate();
  let mode="sample";
  try{
    const res=await fetch("/flow/"+date,{headers:{accept:"application/json"}});
    if(res.ok){
      const body=await res.json();
      RAW=Array.isArray(body)?body:(body.records||body.flow||[]);
      DATA=flowToRenderModel(RAW);
      mode = date===todayUTC() ? "live" : (RAW.length?"play":"empty");  // today tails; a past date replays
    }else{ DATA=SAMPLE; RAW=[]; mode="sample"; }
  }catch(e){ DATA=SAMPLE; RAW=[]; mode="sample"; }   // no daemon (website) → bundled fixture
  setBadges(mode,date);
  recompute();
  state.t=tMax;
  state.filters={cat:new Set(FCATS),tier:new Set(FTIERS),src:new Set(FSRC),q:""};
  absorbNewFilterValues();
  render();
  if(mode==="live") startLiveTail(date);
}
boot();
</script>
