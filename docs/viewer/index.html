<style>

    --bg-grid:   #25252e;   /* graph-paper grid lines */

     `.react-flow__edge-textbg` rect is the background plate; we fill it

     happens to pass near a node. */
  .react-flow__edge-textbg { fill: var(--bg-label) !important; rx: 4 !important; }

  .react-flow__controls { background: var(--bg-elev); border: 1px solid var(--border); }
  .react-flow__controls button {

  .events .ev-row.ev-current { color: var(--text); }
  .events .ev-row .t { color: var(--accent); }
  .events .ev-row .src-lms { color: var(--good); }
  .events .ev-row .src-process { color: var(--warn); }
  .events .ev-row .src-meta { color: var(--muted); }
  .anomalies {
    background: var(--bg);

  .empty-state {

  .empty-state code { background: var(--bg-elev); padding: 2px 6px; border-radius: 3px; color: var(--text); font-size: 12px; }
  .empty-state .hint { margin-top: 16px; font-size: 11px; color: var(--accent-dim); }

  /* Drag-and-drop affordance. The whole window is a drop target; the

</style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;
const ReactFlow = window.ReactFlow.default;
const { Background, Controls, MarkerType, Handle, Position } = window.ReactFlow;

// ─── Topology — fixed nodes (data-independent) ──────────────────────────
// The first three blocks are always present: dispatcher → gateway →
// inference host. Model nodes are derived from the lms samples in the
// loaded instruments.jsonl (one per identifier seen) and positioned
// dynamically to the right of LMStudio.
const FIXED_NODE_DEFS = [
  {
    id: 'claude',
    pos: { x: 0,    y: 200 },
    title: 'Claude',
    name:  'Agent dispatcher',
  },
  {
    id: 'gateway',
    pos: { x: 340,  y: 200 },
    title: 'OpenClaw Gateway',
    name:  'Runtime + recovery',
  },
  {
    id: 'lmstudio',
    pos: { x: 700,  y: 200 },
    title: 'LMStudio',
    name:  'Inference host',
  },
];

// Each model node gets an id of the form `model-<identifier>` so React
// keeps stable references across re-renders.
const modelNodeId = (identifier) => `model-${identifier}`;
const MODEL_COL_X = 1060;
const MODEL_ROW_GAP = 150;
const MODEL_FIRST_ROW_Y = 60;

// Fixed edges that exist regardless of how many models are loaded.
// Per-model edges (lmstudio↔model-<id>) are derived dynamically below.
const FIXED_EDGE_DEFS = [
  // Request lane: req-out (right) → req-in (left)
  { id: 'e1', source: 'claude',   target: 'gateway',  sourceHandle: 'req-out', targetHandle: 'req-in', label: 'dispatch' },
  { id: 'e2', source: 'gateway',  target: 'lmstudio', sourceHandle: 'req-out', targetHandle: 'req-in', label: 'POST /v1/chat' },
  // Response lane: res-out (left) → res-in (right). Tokens flow right-to-
  // left on this lane, so the source is the right-hand node visually.
  { id: 'e5', source: 'lmstudio', target: 'gateway',  sourceHandle: 'res-out', targetHandle: 'res-in', label: 'stream' },
  { id: 'e6', source: 'gateway',  target: 'claude',   sourceHandle: 'res-out', targetHandle: 'res-in', label: 'tool_call' },
];

// ─── Sample parsing ─────────────────────────────────────────────────────
function parseInstruments(text) {
  const samples = [];
  for (const line of text.split('\n')) {
    const t = line.trim();
    if (!t) continue;
    try {
      samples.push(JSON.parse(t));
    } catch { /* skip malformed */ }
  }
  samples.sort((a, b) => a.t - b.t);
  return samples;
}

// Pull the union of distinct model identifiers seen across the loaded
// samples, in stable sort order. Used to materialize one node per model
// and per-model edges to LMStudio.
function distinctModelIdentifiers(samples) {
  const set = new Set();
  for (const s of samples) {
    if (s.source !== 'lms') continue;
    for (const m of s.payload?.models ?? []) {
      if (m.identifier) set.add(m.identifier);
    }
  }
  return [...set].sort();
}

// Given a current elapsed_ms, derive node/edge activations.
//
// Primary "is the dispatch active?" signal is the lms model status field
// (e.g. "generating" vs "idle"). The gateway-process CPU is a secondary
// hint at best — the gateway is a thin orchestrator and the heavy work
// happens in LMStudio (a separate process whose CPU we don't sample),
// so real long-agentic dispatches routinely show 0.1-0.5% mean gateway
// CPU even while a model is hot. Threshold tuned accordingly.
//
// Rules:
//   - lmstudio is active any time we have a recent lms sample (we
//     polled it; LMStudio is up and we got back state).
//   - per-model: active iff its status != "idle" in the most recent
//     sample. That captures "generating" / "loaded and warming" /
//     anything else lms might report.
//   - gateway/claude/inter-block edges are active when the gateway is
//     non-zero CPU (any value above its idle ceiling) — proxy for "the
//     dispatch is currently in flight, not paused between turns".
function computeActivations(samples, currentT) {
  const recent = (s) => Math.abs(s.t - currentT) < 3000;
  const lmsRecent  = samples.find(s => s.source === 'lms'     && recent(s));
  const procRecent = samples.find(s => s.source === 'process' && recent(s));

  const activeNodes = new Set();
  const activeEdges = new Set();
  const cpu = procRecent?.payload?.cpu_percent ?? 0;

  if (procRecent) activeNodes.add('gateway');
  // Gateway CPU above its idle floor (~0.05%) means a dispatch is in
  // flight on the orchestration side. We use 0.2% as the threshold to
  // give some buffer above true-idle without missing real activity.
  const gwActive = cpu > 0.2;
  if (gwActive) {
    activeNodes.add('claude');
    activeEdges.add('e1');
    activeEdges.add('e2');
    activeEdges.add('e5');
    activeEdges.add('e6');
  }

  if (lmsRecent) {
    activeNodes.add('lmstudio');
    const models = lmsRecent.payload?.models ?? [];
    for (const m of models) {
      const ident = m.identifier;
      if (!ident) continue;
      const nodeId = modelNodeId(ident);
      const isBusy = m.status && m.status !== 'idle';
      if (isBusy) {
        activeNodes.add(nodeId);
        activeEdges.add(`req-to-${ident}`);
        activeEdges.add(`res-from-${ident}`);
      }
    }
  }
  return { activeNodes, activeEdges };
}

// Per-node display state at a given time (latest values up to currentT).
// Returns the gateway / lmstudio summary lines and a map of per-model
// state keyed by identifier (the dynamic model nodes consume this).
function deriveNodeState(samples, currentT) {
  const stateUpTo = samples.filter(s => s.t <= currentT);
  const lastLms  = [...stateUpTo].reverse().find(s => s.source === 'lms');
  const lastProc = [...stateUpTo].reverse().find(s => s.source === 'process');

  let lmsLine = '(no samples yet)';
  const perModel = {};
  if (lastLms) {
    const models = lastLms.payload?.models ?? [];
    lmsLine = `${models.length} model${models.length === 1 ? '' : 's'} loaded`;
    for (const m of models) {
      if (!m.identifier) continue;
      perModel[m.identifier] = `ctx ${m.context} · ${m.status || 'idle'}`;
    }
  }

  let gwLine = '(no samples yet)';
  if (lastProc) {
    const p = lastProc.payload;
    gwLine = `pid=${p.pid} · ${p.rss_mb}MB · ${p.cpu_percent?.toFixed(1)}% cpu`;
  }

  return { lmsLine, gwLine, perModel };
}

function summarizeAnomalies(samples) {
  if (samples.length === 0) return [];
  const lms     = samples.filter(s => s.source === 'lms');
  const procs   = samples.filter(s => s.source === 'process');
  const issues  = [];

  // PID-change rule, scoped to ACTIVE-DISPATCH samples only.
  //
  // Reason: an instrumentation race at sample-0 can pick up a gateway
  // process that's about to be replaced (e.g., the operator swapped
  // models or restarted the gateway just before invoking the run). We
  // don't want to flag that as a within-dispatch PID change; only flag
  // if at least two distinct PIDs are observed while CPU > 0.5%, which
  // means the dispatch was actually running across the change.
  const activePids = new Set(
    procs
      .filter(p => (p.payload?.cpu_percent ?? 0) > 0.5)
      .map(p => p.payload?.pid)
      .filter(Boolean)
  );
  if (activePids.size > 1) {
    issues.push({
      title: 'Gateway PID changed during active dispatch',
      detail: `Saw ${activePids.size} distinct gateway PIDs while the dispatch was running. Possible launchd auto-restart or external swap mid-run.`,
    });
  }

  // model-set change — same scoping nuance: only flag if multiple
  // distinct sets land while CPU > 0.5% (i.e., the workload was
  // running, not bracketed by an operator swap that happens at idle).
  const activeSets = new Set();
  for (const s of lms) {
    const proc = procs.find(p => Math.abs(p.t - s.t) < 1500);
    const cpu = proc?.payload?.cpu_percent ?? 0;
    if (cpu > 0.5) {
      const ids = (s.payload?.models ?? []).map(m => m.identifier).sort().join(',');
      activeSets.add(ids);
    }
  }
  if (activeSets.size > 1) {
    issues.push({
      title: 'Loaded-model set changed mid-dispatch',
      detail: `${activeSets.size} distinct sets observed while CPU was active — probable JIT load/unload during the run.`,
    });
  }

  // No lms samples means lms CLI wasn't reachable.
  if (procs.length > 2 && lms.length === 0) {
    issues.push({
      title: 'No LMStudio state captured',
      detail: '`lms` CLI may not be installed or queryable.',
    });
  }
  return issues;
}

// ─── Components ─────────────────────────────────────────────────────────
// Custom node with separated request/response handles. Top half of each
// node hosts the request lane (left-target, right-source) and the bottom
// half hosts the response lane (right-target, left-source). Edges then
// route along separate horizontal channels above and below the nodes,
// not crashing through them.
function NodeCard({ data }) {
  return (
    <>
      {/* Request lane (top half): incoming on the left, outgoing on the right. */}
      <Handle type="target" position={Position.Left}  id="req-in"
              style={{ top: 14, background: '#2a8a96', border: 'none', width: 8, height: 8 }} />
      <Handle type="source" position={Position.Right} id="req-out"
              style={{ top: 14, background: '#2a8a96', border: 'none', width: 8, height: 8 }} />
      {/* Response lane (bottom half): outgoing on the left, incoming on the right. */}
      <Handle type="source" position={Position.Left}  id="res-out"
              style={{ top: 'auto', bottom: 14, background: '#ffb86b', border: 'none', width: 8, height: 8 }} />
      <Handle type="target" position={Position.Right} id="res-in"
              style={{ top: 'auto', bottom: 14, background: '#ffb86b', border: 'none', width: 8, height: 8 }} />
      <div className="node-title">{data.title}</div>
      <div className="node-name">{data.name}</div>
      <div className="node-meta">
        {data.live && data.live.split('\n').map((line, i) => (
          <div key={i}>{line}</div>
        ))}
      </div>
    </>
  );
}

const NODE_TYPES = { darkmux: NodeCard };

function App() {
  const [samples, setSamples] = useState([]);
  const [currentT, setCurrentT] = useState(0);
  const [tMin, setTMin] = useState(0);
  const [tMax, setTMax] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [speed, setSpeed] = useState(1);
  const [dragOver, setDragOver] = useState(false);
  // User-dragged positions, keyed by node id. Layered on top of the
  // default positions so drag persists across the useMemo rebuilds that
  // happen on every activation state change.
  const [overridePositions, setOverridePositions] = useState({});
  const playTimer = useRef(null);

  const onNodesChange = useCallback((changes) => {
    for (const change of changes) {
      if (change.type === 'position' && change.position && !change.dragging) {
        // Only persist on drag-end (dragging=false in the final change),
        // so we record the final resting position rather than every
        // intermediate frame.
        setOverridePositions(prev => ({ ...prev, [change.id]: change.position }));
      }
    }
  }, []);

  const resetLayout = useCallback(() => {
    setOverridePositions({});
  }, []);

  const ingestFile = useCallback(async (file) => {
    if (!file) return;
    const text = await file.text();
    const parsed = parseInstruments(text);
    setSamples(parsed);
    if (parsed.length > 0) {
      const lo = parsed[0].t;
      const hi = parsed[parsed.length - 1].t;
      setTMin(lo); setTMax(hi); setCurrentT(lo);
      setPlaying(false);
    }
  }, []);

  const onFile = useCallback((e) => {
    const file = e.target.files?.[0];
    if (file) ingestFile(file);
  }, [ingestFile]);

  // Page-wide drag-and-drop. dragenter/dragover must preventDefault to
  // signal acceptance; without it, the browser opens the file in a new
  // tab as a fallback. dragleave fires when leaving the window edge —
  // we use a counter to ignore intra-window flicker between elements.
  const dragCounter = useRef(0);
  useEffect(() => {
    const onDragEnter = (e) => {
      if (!e.dataTransfer?.types?.includes('Files')) return;
      e.preventDefault();
      dragCounter.current += 1;
      setDragOver(true);
    };
    const onDragOver = (e) => {
      if (!e.dataTransfer?.types?.includes('Files')) return;
      e.preventDefault();
    };
    const onDragLeave = (e) => {
      e.preventDefault();
      dragCounter.current = Math.max(0, dragCounter.current - 1);
      if (dragCounter.current === 0) setDragOver(false);
    };
    const onDrop = (e) => {
      e.preventDefault();
      dragCounter.current = 0;
      setDragOver(false);
      const file = e.dataTransfer?.files?.[0];
      if (file) ingestFile(file);
    };
    window.addEventListener('dragenter', onDragEnter);
    window.addEventListener('dragover',  onDragOver);
    window.addEventListener('dragleave', onDragLeave);
    window.addEventListener('drop',      onDrop);
    return () => {
      window.removeEventListener('dragenter', onDragEnter);
      window.removeEventListener('dragover',  onDragOver);
      window.removeEventListener('dragleave', onDragLeave);
      window.removeEventListener('drop',      onDrop);
    };
  }, [ingestFile]);

  // playback
  useEffect(() => {
    if (!playing || tMax === 0) return;
    playTimer.current = setInterval(() => {
      setCurrentT(t => {
        const next = t + 200 * speed;
        if (next >= tMax) { setPlaying(false); return tMax; }
        return next;
      });
    }, 200);
    return () => clearInterval(playTimer.current);
  }, [playing, tMax, speed]);

  const { activeNodes, activeEdges } = useMemo(
    () => computeActivations(samples, currentT),
    [samples, currentT]
  );
  const nodeState = useMemo(() => deriveNodeState(samples, currentT), [samples, currentT]);
  const anomalies = useMemo(() => summarizeAnomalies(samples), [samples]);

  // Distinct model identifiers materialize as dedicated nodes to the
  // right of LMStudio. Recomputed when samples change.
  const modelIdents = useMemo(() => distinctModelIdentifiers(samples), [samples]);

  // Build ReactFlow nodes: 3 fixed + 1 per loaded model. User-dragged
  // positions (overridePositions) win over the layout defaults — that's
  // what makes manual reorganization stick across renders.
  const nodes = useMemo(() => {
    const fixed = FIXED_NODE_DEFS.map(n => {
      let live = '';
      if (n.id === 'gateway')  live = nodeState.gwLine;
      if (n.id === 'lmstudio') live = nodeState.lmsLine;
      if (n.id === 'claude')   live = '(via gateway CPU)';
      return {
        id: n.id,
        position: overridePositions[n.id] ?? n.pos,
        data: { title: n.title, name: n.name, live },
        type: 'darkmux',
        className: activeNodes.has(n.id) ? 'dx-active' : '',
      };
    });
    const modelNodes = modelIdents.map((ident, idx) => {
      const id = modelNodeId(ident);
      const defaultPos = { x: MODEL_COL_X, y: MODEL_FIRST_ROW_Y + idx * MODEL_ROW_GAP };
      return {
        id,
        position: overridePositions[id] ?? defaultPos,
        data: {
          title: 'Model',
          name: ident,
          live: nodeState.perModel?.[ident] ?? '(loaded)',
        },
        type: 'darkmux',
        className: activeNodes.has(id) ? 'dx-active' : '',
      };
    });
    return [...fixed, ...modelNodes];
  }, [activeNodes, nodeState, modelIdents, overridePositions]);

  // Build edges: fixed (claude↔gateway, gateway↔lmstudio) + a request
  // and a response edge per model (lmstudio↔model-<ident>).
  const edges = useMemo(() => {
    const baseStyle = (id) => ({
      labelBgPadding: [8, 4],
      labelBgBorderRadius: 4,
      type: 'smoothstep',
      pathOptions: { offset: 16, borderRadius: 12 },
      animated: false,
      className: activeEdges.has(id) ? 'dx-active' : '',
      markerEnd: { type: MarkerType.ArrowClosed, color: activeEdges.has(id) ? '#6df1ff' : '#3a3a44' },
      style: { strokeWidth: 1.5 },
    });
    const fixed = FIXED_EDGE_DEFS.map(e => ({
      id: e.id,
      source: e.source,
      target: e.target,
      sourceHandle: e.sourceHandle,
      targetHandle: e.targetHandle,
      label: e.label,
      ...baseStyle(e.id),
    }));
    const modelEdges = modelIdents.flatMap(ident => {
      const reqId = `req-to-${ident}`;
      const resId = `res-from-${ident}`;
      return [
        {
          id: reqId,
          source: 'lmstudio',
          target: modelNodeId(ident),
          sourceHandle: 'req-out',
          targetHandle: 'req-in',
          label: 'tokens',
          ...baseStyle(reqId),
        },
        {
          id: resId,
          source: modelNodeId(ident),
          target: 'lmstudio',
          sourceHandle: 'res-out',
          targetHandle: 'res-in',
          label: 'tokens',
          ...baseStyle(resId),
        },
      ];
    });
    return [...fixed, ...modelEdges];
  }, [activeEdges, modelIdents]);

  // Recent events log (window around currentT)
  const eventsToShow = useMemo(() => {
    if (samples.length === 0) return [];
    return samples
      .filter(s => s.t <= currentT && s.t > currentT - 8000)
      .slice(-12)
      .reverse();
  }, [samples, currentT]);

  const elapsedSec = ((currentT - tMin) / 1000).toFixed(1);
  const totalSec = ((tMax - tMin) / 1000).toFixed(1);

  return (
    <>
      <div className={`drop-overlay ${dragOver ? 'active' : ''}`}>
        drop instruments.jsonl to load
      </div>
      <div className="topbar">
        <span className="brand">darkmux <span className="accent">·</span> viewer</span>
        <span className="title">cross-layer telemetry replay</span>
        <label className="file-pick">
          load instruments.jsonl
          <input type="file" accept=".jsonl,.json,.txt" onChange={onFile} />
        </label>
        <button
          className="file-pick"
          onClick={resetLayout}
          disabled={Object.keys(overridePositions).length === 0}
          title="Reset all dragged node positions to defaults"
        >
          reset layout
        </button>
        <div className="privacy">
          <strong>your file stays in your browser.</strong><br />
          no upload · no telemetry · static viewer
        </div>
      </div>

      <div className="stage">
        {samples.length === 0 ? (
          <div className="empty-state">
            <h2>no telemetry loaded</h2>
            <p>capture telemetry on a run with:</p>
            <p><code>darkmux lab run &lt;workload&gt; --instrument</code></p>
            <p>then load <code>~/.darkmux/runs/&lt;run-id&gt;/instruments.jsonl</code></p>
            <p className="hint">drag the file anywhere on this page, or click "load instruments.jsonl" above</p>
          </div>
        ) : (
          <ReactFlow
            nodes={nodes}
            edges={edges}
            nodeTypes={NODE_TYPES}
            onNodesChange={onNodesChange}
            fitView
            fitViewOptions={{ padding: 0.18 }}
            minZoom={0.4}
            maxZoom={1.2}
            proOptions={{ hideAttribution: true }}
            nodesDraggable={true}
            nodesConnectable={false}
            elementsSelectable={true}
          >
            {/* Lab-aesthetic graph paper: fine inner grid every 12px, bold
                grid every 60px. Two Background components stacked. */}
            <Background id="grid-fine" gap={12} size={1} color="#23232c" />
            <Background id="grid-bold" gap={60} size={1.5} color="#2e2e38" />
            <Controls showInteractive={false} />
          </ReactFlow>
        )}
      </div>

      <div className="panel">
        <div>
          <div className="scrubber-row">
            <button className="primary" onClick={() => setPlaying(p => !p)} disabled={samples.length === 0}>
              {playing ? '⏸ pause' : '▶ play'}
            </button>
            <button onClick={() => { setCurrentT(tMin); setPlaying(false); }} disabled={samples.length === 0}>
              ⏮ reset
            </button>
            <span className="speed">×</span>
            {[1, 2, 5].map(s => (
              <button key={s} onClick={() => setSpeed(s)} style={{ borderColor: speed === s ? 'var(--accent)' : 'var(--border-hot)' }}>
                {s}
              </button>
            ))}
            <span className="speed mono">{elapsedSec}s / {totalSec}s</span>
          </div>
          <input
            type="range"
            className="scrubber"
            min={tMin}
            max={tMax}
            value={currentT}
            disabled={samples.length === 0}
            onChange={e => { setPlaying(false); setCurrentT(parseInt(e.target.value, 10)); }}
          />
          <div className="label" style={{ marginTop: 14 }}>recent events</div>
          <div className="events">
            {eventsToShow.length === 0 && <div className="ev-row">(no events yet)</div>}
            {eventsToShow.map((s, i) => (
              <div key={i} className="ev-row ev-current">
                <span className="t">{((s.t - tMin) / 1000).toFixed(1).padStart(5, ' ')}s</span>
                {' '}
                <span className={`src-${s.source}`}>{s.source.padEnd(7, ' ')}</span>
                {' '}
                {s.source === 'lms' && `${s.payload?.models?.length ?? 0} models`}
                {s.source === 'process' && `pid=${s.payload?.pid} rss=${s.payload?.rss_mb}MB cpu=${s.payload?.cpu_percent?.toFixed(1)}%`}
                {s.source === 'meta' && (s.payload?.event ?? '?')}
              </div>
            ))}
          </div>
        </div>

        <div>
          <div className="label">anomalies</div>
          <div className="anomalies">
            {anomalies.length === 0
              ? <div className="none">{samples.length === 0 ? 'load a run to begin' : 'no anomalies detected'}</div>
              : anomalies.map((a, i) => (
                  <div key={i} className="item">
                    <strong>⚠ {a.title}</strong>
                    <div>{a.detail}</div>
                  </div>
                ))}
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
