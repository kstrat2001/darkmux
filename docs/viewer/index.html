<title>darkmux viewer — telemetry replay</title>
<meta name="description" content="React-Flow visualization of darkmux lab run telemetry. Replay instruments.jsonl across the four-block local-AI stack.">

<style>
  :root {
    --bg:        #181820;   /* lab paper — dark grey, distinct from nodes */
    --bg-grid:   #25252e;   /* graph-paper grid lines */
    --bg-elev:   #0a0a0d;   /* nodes — darker than BG so they sit on top of the page */
    --bg-elev2:  #14141a;
    --bg-label:  #1f1f28;   /* edge label background — opaque, readable on grid */
    --border:    #2a2a34;
    --border-hot:#2a8a96;
    --text:      #e8e6e3;
    --muted:     #8a8a92;
    --accent:    #6df1ff;
    --accent-dim:#2a8a96;
    --warn:      #ffb86b;
    --good:      #5af0a3;
  }
  * { box-sizing: border-box; }
  html, body, #root {
    margin: 0; padding: 0; width: 100%; height: 100vh;
    background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    overflow: hidden;
  }
  code, pre, .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
  a { color: var(--accent); }

  .topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 56px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 16px;
    z-index: 10;
  }
  .topbar .brand {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted);
  }
  .topbar .brand .accent { color: var(--accent); }
  .topbar .title { font-size: 14px; color: var(--text); margin-left: 8px; }
  .topbar .file-pick {
    font-size: 12px;
    background: var(--bg);
    color: var(--accent);
    border: 1px solid var(--border-hot);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
  }
  .topbar .file-pick:hover { background: var(--bg-elev2); }
  .topbar .privacy {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    text-align: right;
    line-height: 1.4;
  }
  .topbar .privacy strong { color: var(--good); }
  input[type=file] { display: none; }

  .stage {
    position: absolute; top: 56px; left: 0; right: 0; bottom: 180px;
    background: var(--bg);
  }
  /* React-Flow background */
  .react-flow__renderer { background: var(--bg) !important; }
  .react-flow__node {
    border: 1px solid var(--border);
    background: var(--bg-elev);
    color: var(--text);
    border-radius: 6px;
    padding: 14px 18px;
    font-size: 13px;
    width: 240px;
    min-height: 110px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: all 0.2s ease;
  }
  .react-flow__node.dx-active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(109, 241, 255, 0.15), 0 4px 12px rgba(109, 241, 255, 0.3);
  }
  .react-flow__node.dx-warn {
    border-color: var(--warn);
    box-shadow: 0 0 0 2px rgba(255, 184, 107, 0.15);
  }
  .node-title {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 4px;
  }
  .node-name { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  .node-meta { color: var(--muted); font-size: 11px; line-height: 1.5; }
  .node-meta .k { color: var(--text); font-family: 'JetBrains Mono', monospace; }

  .react-flow__edge-path { stroke: #3a3a44; stroke-width: 1.5; }
  .react-flow__edge.dx-active .react-flow__edge-path {
    stroke: var(--accent);
    stroke-width: 2;
    stroke-dasharray: 4 4;
    animation: dashFlow 0.6s linear infinite;
  }
  @keyframes dashFlow { to { stroke-dashoffset: -16; } }

  /* Edge labels: opaque background, padded, sit on top of edges. The
     `.react-flow__edge-textbg` rect is the background plate; we fill it
     with the dedicated label color so it visibly covers any edge that
     happens to pass near a node. */
  .react-flow__edge-textbg { fill: var(--bg-label) !important; rx: 4 !important; }
  .react-flow__edge-text {
    fill: var(--text) !important;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }
  /* Bring edge labels above the node layer so they're not clipped by
     adjacent nodes. We don't lift the whole edge — just the text/bg —
     so edge lines still render below nodes at their crossing points. */
  .react-flow__edges svg .react-flow__edge .react-flow__edge-textwrapper {
    pointer-events: none;
  }
  .react-flow__edge { z-index: 1001 !important; }
  .react-flow__node { z-index: 1000 !important; }
  .react-flow__controls { background: var(--bg-elev); border: 1px solid var(--border); }
  .react-flow__controls button {
    background: var(--bg-elev) !important; color: var(--text) !important;
    border-color: var(--border) !important;
  }

  /* Bottom control panel */
  .panel {
    position: absolute; bottom: 0; left: 0; right: 0; height: 180px;
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    display: grid; grid-template-columns: 1fr 380px; gap: 24px;
  }
  .scrubber-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .scrubber-row button {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border-hot);
    padding: 6px 12px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
  }
  .scrubber-row button:hover { background: var(--bg-elev2); }
  .scrubber-row button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .scrubber-row .speed { color: var(--muted); font-size: 11px; font-family: 'JetBrains Mono', monospace; }
  .scrubber {
    flex: 1; -webkit-appearance: none; height: 4px;
    background: var(--border); border-radius: 2px; outline: none;
  }
  .scrubber::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
  }
  .panel .label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .events {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    height: 100px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    line-height: 1.6;
  }
  .events .ev-row { color: var(--muted); }
  .events .ev-row.ev-current { color: var(--text); }
  .events .ev-row .t { color: var(--accent); }
  .events .ev-row .src-lms { color: var(--good); }
  .events .ev-row .src-process { color: var(--warn); }
  .events .ev-row .src-meta { color: var(--muted); }
  .anomalies {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--warn);
    border-radius: 4px;
    padding: 8px 12px;
    height: 100px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.5;
  }
  .anomalies .none { color: var(--muted); }
  .anomalies .item { color: var(--warn); margin-bottom: 4px; }
  .anomalies strong { color: var(--text); }

  .empty-state {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .empty-state h2 { font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin: 0 0 12px; }
  .empty-state code { background: var(--bg-elev); padding: 2px 6px; border-radius: 3px; color: var(--text); font-size: 12px; }
  .empty-state .hint { margin-top: 16px; font-size: 11px; color: var(--accent-dim); }

  /* Drag-and-drop affordance. The whole window is a drop target; the
     overlay just gives a visible signal during the drag. */
  .drop-overlay {
    position: fixed; inset: 0;
    background: rgba(10, 10, 11, 0.85);
    border: 3px dashed var(--accent);
    z-index: 100;
    display: none;
    align-items: center; justify-content: center;
    pointer-events: none;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .drop-overlay.active { display: flex; }
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;
const ReactFlow = window.ReactFlow.default;
const { Background, Controls, MarkerType, Handle, Position } = window.ReactFlow;

// ─── Topology — the four blocks + their physical layout ─────────────────
// Spaced wide enough that smoothstep edges have room to route up over the
// top (request lane) and down under the bottom (response lane) without
// visually crashing into adjacent nodes.
const NODE_DEFS = [
  {
    id: 'claude',
    pos: { x: 0,    y: 120 },
    title: 'Claude',
    name:  'Agent dispatcher',
    desc:  'OpenClaw orchestrator (Hudson) or Claude Code session — builds dispatch, maintains conversation history, executes returned tool calls.',
  },
  {
    id: 'gateway',
    pos: { x: 340,  y: 120 },
    title: 'OpenClaw Gateway',
    name:  'Runtime + recovery',
    desc:  'Resolves agent → model, formats OpenAI-compat request via pi-ai. LMStudio extension runs the recovery path (ba2b033 lives here).',
  },
  {
    id: 'lmstudio',
    pos: { x: 700,  y: 120 },
    title: 'LMStudio',
    name:  'Inference host',
    desc:  'OpenAI-compatible HTTP server. Chat-template wrapper translates wire format ↔ model native format. Manages KV cache.',
  },
  {
    id: 'model',
    pos: { x: 1060, y: 120 },
    title: 'Model',
    name:  'gpt-oss / qwen / etc.',
    desc:  'Tokens via llama.cpp Metal or MLX-LM. Native output may include harmony / chatml / family-specific channel syntax.',
  },
];

// Six edges — request path forward (top lane), response path back (bottom
// lane). Each direction routes through dedicated handles so they don't
// overlap each other or pass under the nodes. Labels kept short so they
// fit in the routed segments without clipping into adjacent nodes.
const EDGE_DEFS = [
  // Request lane: req-out (right) → req-in (left)
  { id: 'e1', source: 'claude',   target: 'gateway',  sourceHandle: 'req-out', targetHandle: 'req-in', label: 'dispatch' },
  { id: 'e2', source: 'gateway',  target: 'lmstudio', sourceHandle: 'req-out', targetHandle: 'req-in', label: 'POST /v1/chat' },
  { id: 'e3', source: 'lmstudio', target: 'model',    sourceHandle: 'req-out', targetHandle: 'req-in', label: 'tokens' },
  // Response lane: res-out (left) → res-in (right). Source/target order
  // is reversed visually because tokens flow right-to-left on this lane.
  { id: 'e4', source: 'model',    target: 'lmstudio', sourceHandle: 'res-out', targetHandle: 'res-in', label: 'harmony' },
  { id: 'e5', source: 'lmstudio', target: 'gateway',  sourceHandle: 'res-out', targetHandle: 'res-in', label: 'stream ⚠ bug site' },
  { id: 'e6', source: 'gateway',  target: 'claude',   sourceHandle: 'res-out', targetHandle: 'res-in', label: 'tool_call' },
];

// ─── Sample parsing ─────────────────────────────────────────────────────
function parseInstruments(text) {
  const samples = [];
  for (const line of text.split('\n')) {
    const t = line.trim();
    if (!t) continue;
    try {
      samples.push(JSON.parse(t));
    } catch { /* skip malformed */ }
  }
  samples.sort((a, b) => a.t - b.t);
  return samples;
}

// Given a current elapsed_ms, derive node/edge activations.
// Heuristics:
//   - claude is active any time process-CPU is non-trivial
//   - gateway is active when there's a non-zero process sample within last 4s
//   - lmstudio is active when an lms sample arrives (we polled it)
//   - model is active when lms reports any model status != idle, OR proxied
//     via gateway CPU surge
function computeActivations(samples, currentT) {
  const recent = (s) => Math.abs(s.t - currentT) < 3000;
  const lmsRecent  = samples.find(s => s.source === 'lms'     && recent(s));
  const procRecent = samples.find(s => s.source === 'process' && recent(s));

  const activeNodes = new Set();
  const activeEdges = new Set();

  if (procRecent) {
    activeNodes.add('gateway');
    const cpu = procRecent.payload?.cpu_percent ?? 0;
    if (cpu > 0.5) {
      activeNodes.add('claude');
      activeEdges.add('e1');
      activeEdges.add('e6');
    }
    if (cpu > 1) {
      activeEdges.add('e2');
      activeEdges.add('e5');
    }
  }
  if (lmsRecent) {
    activeNodes.add('lmstudio');
    activeEdges.add('e2');
    activeEdges.add('e5');
    const models = lmsRecent.payload?.models ?? [];
    const anyBusy = models.some(m => m.status && m.status !== 'idle');
    if (anyBusy) {
      activeNodes.add('model');
      activeEdges.add('e3');
      activeEdges.add('e4');
    }
  }
  return { activeNodes, activeEdges };
}

// Per-node display state at a given time (latest values up to currentT).
function deriveNodeState(samples, currentT) {
  const stateUpTo = samples.filter(s => s.t <= currentT);
  const lastLms  = [...stateUpTo].reverse().find(s => s.source === 'lms');
  const lastProc = [...stateUpTo].reverse().find(s => s.source === 'process');

  let lmsLine = '(no samples yet)';
  let modelLine = '(no models yet)';
  if (lastLms) {
    const models = lastLms.payload?.models ?? [];
    lmsLine = `${models.length} model${models.length === 1 ? '' : 's'} loaded`;
    modelLine = models.map(m => `${m.identifier} @ ${m.context}`).join(' · ') || '(none)';
  }

  let gwLine = '(no samples yet)';
  if (lastProc) {
    const p = lastProc.payload;
    gwLine = `pid=${p.pid} · ${p.rss_mb}MB · ${p.cpu_percent?.toFixed(1)}% cpu`;
  }

  return { lmsLine, modelLine, gwLine };
}

function summarizeAnomalies(samples) {
  if (samples.length === 0) return [];
  const lms     = samples.filter(s => s.source === 'lms');
  const procs   = samples.filter(s => s.source === 'process');
  const issues  = [];
  // PID change mid-run
  const pids = new Set(procs.map(p => p.payload?.pid).filter(Boolean));
  if (pids.size > 1) {
    issues.push({
      title: 'Gateway PID changed during run',
      detail: `Saw ${pids.size} distinct gateway PIDs. Possible launchd auto-restart or external swap.`,
    });
  }
  // model set change
  const sets = new Set(lms.map(s =>
    (s.payload?.models ?? []).map(m => m.identifier).sort().join(',')));
  if (sets.size > 1) {
    issues.push({
      title: 'Loaded-model set changed mid-run',
      detail: `${sets.size} distinct sets observed — probable JIT load/unload event.`,
    });
  }
  // No lms samples means lms CLI wasn't reachable
  if (procs.length > 2 && lms.length === 0) {
    issues.push({
      title: 'No LMStudio state captured',
      detail: '`lms` CLI may not be installed or queryable.',
    });
  }
  return issues;
}

// ─── Components ─────────────────────────────────────────────────────────
// Custom node with separated request/response handles. Top half of each
// node hosts the request lane (left-target, right-source) and the bottom
// half hosts the response lane (right-target, left-source). Edges then
// route along separate horizontal channels above and below the nodes,
// not crashing through them.
function NodeCard({ data }) {
  return (
    <>
      {/* Request lane (top half): incoming on the left, outgoing on the right. */}
      <Handle type="target" position={Position.Left}  id="req-in"
              style={{ top: 14, background: '#2a8a96', border: 'none', width: 8, height: 8 }} />
      <Handle type="source" position={Position.Right} id="req-out"
              style={{ top: 14, background: '#2a8a96', border: 'none', width: 8, height: 8 }} />
      {/* Response lane (bottom half): outgoing on the left, incoming on the right. */}
      <Handle type="source" position={Position.Left}  id="res-out"
              style={{ top: 'auto', bottom: 14, background: '#ffb86b', border: 'none', width: 8, height: 8 }} />
      <Handle type="target" position={Position.Right} id="res-in"
              style={{ top: 'auto', bottom: 14, background: '#ffb86b', border: 'none', width: 8, height: 8 }} />
      <div className="node-title">{data.title}</div>
      <div className="node-name">{data.name}</div>
      <div className="node-meta">
        {data.live && data.live.split('\n').map((line, i) => (
          <div key={i}>{line}</div>
        ))}
      </div>
    </>
  );
}

const NODE_TYPES = { darkmux: NodeCard };

function App() {
  const [samples, setSamples] = useState([]);
  const [currentT, setCurrentT] = useState(0);
  const [tMin, setTMin] = useState(0);
  const [tMax, setTMax] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [speed, setSpeed] = useState(1);
  const [dragOver, setDragOver] = useState(false);
  const playTimer = useRef(null);

  const ingestFile = useCallback(async (file) => {
    if (!file) return;
    const text = await file.text();
    const parsed = parseInstruments(text);
    setSamples(parsed);
    if (parsed.length > 0) {
      const lo = parsed[0].t;
      const hi = parsed[parsed.length - 1].t;
      setTMin(lo); setTMax(hi); setCurrentT(lo);
      setPlaying(false);
    }
  }, []);

  const onFile = useCallback((e) => {
    const file = e.target.files?.[0];
    if (file) ingestFile(file);
  }, [ingestFile]);

  // Page-wide drag-and-drop. dragenter/dragover must preventDefault to
  // signal acceptance; without it, the browser opens the file in a new
  // tab as a fallback. dragleave fires when leaving the window edge —
  // we use a counter to ignore intra-window flicker between elements.
  const dragCounter = useRef(0);
  useEffect(() => {
    const onDragEnter = (e) => {
      if (!e.dataTransfer?.types?.includes('Files')) return;
      e.preventDefault();
      dragCounter.current += 1;
      setDragOver(true);
    };
    const onDragOver = (e) => {
      if (!e.dataTransfer?.types?.includes('Files')) return;
      e.preventDefault();
    };
    const onDragLeave = (e) => {
      e.preventDefault();
      dragCounter.current = Math.max(0, dragCounter.current - 1);
      if (dragCounter.current === 0) setDragOver(false);
    };
    const onDrop = (e) => {
      e.preventDefault();
      dragCounter.current = 0;
      setDragOver(false);
      const file = e.dataTransfer?.files?.[0];
      if (file) ingestFile(file);
    };
    window.addEventListener('dragenter', onDragEnter);
    window.addEventListener('dragover',  onDragOver);
    window.addEventListener('dragleave', onDragLeave);
    window.addEventListener('drop',      onDrop);
    return () => {
      window.removeEventListener('dragenter', onDragEnter);
      window.removeEventListener('dragover',  onDragOver);
      window.removeEventListener('dragleave', onDragLeave);
      window.removeEventListener('drop',      onDrop);
    };
  }, [ingestFile]);

  // playback
  useEffect(() => {
    if (!playing || tMax === 0) return;
    playTimer.current = setInterval(() => {
      setCurrentT(t => {
        const next = t + 200 * speed;
        if (next >= tMax) { setPlaying(false); return tMax; }
        return next;
      });
    }, 200);
    return () => clearInterval(playTimer.current);
  }, [playing, tMax, speed]);

  const { activeNodes, activeEdges } = useMemo(
    () => computeActivations(samples, currentT),
    [samples, currentT]
  );
  const nodeState = useMemo(() => deriveNodeState(samples, currentT), [samples, currentT]);
  const anomalies = useMemo(() => summarizeAnomalies(samples), [samples]);

  // Build ReactFlow nodes / edges with current activation state
  const nodes = useMemo(() => NODE_DEFS.map(n => {
    let live = '';
    if (n.id === 'gateway')  live = nodeState.gwLine;
    if (n.id === 'lmstudio') live = nodeState.lmsLine;
    if (n.id === 'model')    live = nodeState.modelLine;
    if (n.id === 'claude')   live = '(deduced from gateway CPU)';
    return {
      id: n.id,
      position: n.pos,
      data: { title: n.title, name: n.name, desc: n.desc, live },
      type: 'darkmux',
      className: activeNodes.has(n.id) ? 'dx-active' : '',
    };
  }), [activeNodes, nodeState]);

  const edges = useMemo(() => EDGE_DEFS.map(e => ({
    id: e.id,
    source: e.source,
    target: e.target,
    sourceHandle: e.sourceHandle,
    targetHandle: e.targetHandle,
    label: e.label,
    labelBgPadding: [8, 4],
    labelBgBorderRadius: 4,
    type: 'smoothstep',
    pathOptions: { offset: 16, borderRadius: 12 },
    animated: false,
    className: activeEdges.has(e.id) ? 'dx-active' : '',
    markerEnd: { type: MarkerType.ArrowClosed, color: activeEdges.has(e.id) ? '#6df1ff' : '#3a3a44' },
    style: { strokeWidth: 1.5 },
  })), [activeEdges]);

  // Recent events log (window around currentT)
  const eventsToShow = useMemo(() => {
    if (samples.length === 0) return [];
    return samples
      .filter(s => s.t <= currentT && s.t > currentT - 8000)
      .slice(-12)
      .reverse();
  }, [samples, currentT]);

  const elapsedSec = ((currentT - tMin) / 1000).toFixed(1);
  const totalSec = ((tMax - tMin) / 1000).toFixed(1);

  return (
    <>
      <div className={`drop-overlay ${dragOver ? 'active' : ''}`}>
        drop instruments.jsonl to load
      </div>
      <div className="topbar">
        <span className="brand">darkmux <span className="accent">·</span> viewer</span>
        <span className="title">cross-layer telemetry replay</span>
        <label className="file-pick">
          load instruments.jsonl
          <input type="file" accept=".jsonl,.json,.txt" onChange={onFile} />
        </label>
        <div className="privacy">
          <strong>your file stays in your browser.</strong><br />
          no upload · no telemetry · static viewer
        </div>
      </div>

      <div className="stage">
        {samples.length === 0 ? (
          <div className="empty-state">
            <h2>no telemetry loaded</h2>
            <p>capture telemetry on a run with:</p>
            <p><code>darkmux lab run &lt;workload&gt; --instrument</code></p>
            <p>then load <code>~/.darkmux/runs/&lt;run-id&gt;/instruments.jsonl</code></p>
            <p className="hint">drag the file anywhere on this page, or click "load instruments.jsonl" above</p>
          </div>
        ) : (
          <ReactFlow
            nodes={nodes}
            edges={edges}
            nodeTypes={NODE_TYPES}
            fitView
            fitViewOptions={{ padding: 0.18 }}
            minZoom={0.4}
            maxZoom={1.2}
            proOptions={{ hideAttribution: true }}
            nodesDraggable={false}
            nodesConnectable={false}
            elementsSelectable={false}
          >
            {/* Lab-aesthetic graph paper: fine inner grid every 12px, bold
                grid every 60px. Two Background components stacked. */}
            <Background id="grid-fine" gap={12} size={1} color="#23232c" />
            <Background id="grid-bold" gap={60} size={1.5} color="#2e2e38" />
            <Controls showInteractive={false} />
          </ReactFlow>
        )}
      </div>

      <div className="panel">
        <div>
          <div className="scrubber-row">
            <button className="primary" onClick={() => setPlaying(p => !p)} disabled={samples.length === 0}>
              {playing ? '⏸ pause' : '▶ play'}
            </button>
            <button onClick={() => { setCurrentT(tMin); setPlaying(false); }} disabled={samples.length === 0}>
              ⏮ reset
            </button>
            <span className="speed">×</span>
            {[1, 2, 5].map(s => (
              <button key={s} onClick={() => setSpeed(s)} style={{ borderColor: speed === s ? 'var(--accent)' : 'var(--border-hot)' }}>
                {s}
              </button>
            ))}
            <span className="speed mono">{elapsedSec}s / {totalSec}s</span>
          </div>
          <input
            type="range"
            className="scrubber"
            min={tMin}
            max={tMax}
            value={currentT}
            disabled={samples.length === 0}
            onChange={e => { setPlaying(false); setCurrentT(parseInt(e.target.value, 10)); }}
          />
          <div className="label" style={{ marginTop: 14 }}>recent events</div>
          <div className="events">
            {eventsToShow.length === 0 && <div className="ev-row">(no events yet)</div>}
            {eventsToShow.map((s, i) => (
              <div key={i} className="ev-row ev-current">
                <span className="t">{((s.t - tMin) / 1000).toFixed(1).padStart(5, ' ')}s</span>
                {' '}
                <span className={`src-${s.source}`}>{s.source.padEnd(7, ' ')}</span>
                {' '}
                {s.source === 'lms' && `${s.payload?.models?.length ?? 0} models`}
                {s.source === 'process' && `pid=${s.payload?.pid} rss=${s.payload?.rss_mb}MB cpu=${s.payload?.cpu_percent?.toFixed(1)}%`}
                {s.source === 'meta' && (s.payload?.event ?? '?')}
              </div>
            ))}
          </div>
        </div>

        <div>
          <div className="label">anomalies</div>
          <div className="anomalies">
            {anomalies.length === 0
              ? <div className="none">{samples.length === 0 ? 'load a run to begin' : 'no anomalies detected'}</div>
              : anomalies.map((a, i) => (
                  <div key={i} className="item">
                    <strong>⚠ {a.title}</strong>
                    <div>{a.detail}</div>
                  </div>
                ))}
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
