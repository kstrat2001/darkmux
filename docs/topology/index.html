<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>darkmux · observability · demo</title>
<style>
  :root{
    --bg:#1b1610; --bg2:#251d12; --panel:#2c2114; --line:#3a2c1a;
    --text:#efe6d4; --muted:#a3937a; --amber:#e0a83d; --amber-dim:#8a6a2c;
    --good:#7fd6a3; --warn:#e8b86b; --bad:#e07a5f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100vh;background:var(--bg);color:var(--text);font:14px/1.4 'Inter',-apple-system,system-ui,sans-serif;overflow:hidden}
  .top{height:46px;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);background:var(--bg2)}
  .brand{font-weight:700;letter-spacing:.04em}.brand b{color:var(--amber)}.brand a{color:inherit;text-decoration:none}.brand a:hover b{text-decoration:underline}
  .topnav{margin-left:auto;display:flex;gap:18px;align-items:center}
  .topnav a{color:var(--muted);text-decoration:none;font:600 12px 'JetBrains Mono',monospace;letter-spacing:.04em}
  .topnav a:hover{color:var(--amber)}
  .badge{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:#1b1610;background:var(--amber);padding:5px 9px;border-radius:3px}
  .pb{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);border:1px solid var(--amber-dim);padding:4px 9px;border-radius:3px}
  .crumbbar{height:40px;display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid var(--line);background:#20180e}
  .backbtn{background:var(--bg);border:1px solid var(--line);color:var(--text);padding:5px 11px;border-radius:4px;cursor:pointer;font:600 12px 'JetBrains Mono',monospace}
  .backbtn[disabled]{opacity:.35;cursor:default}
  .crumb{font:600 13px 'JetBrains Mono',monospace;color:var(--muted)}
  .crumb a{color:var(--amber);cursor:pointer;text-decoration:none}.crumb a:hover{text-decoration:underline}
  .crumb .sep{color:var(--amber-dim);margin:0 6px}
  .meta{margin-left:auto;font:11px/1.4 'JetBrains Mono',monospace;color:var(--muted);text-align:right}.meta b{color:var(--text)}
  .wrap{display:flex;height:calc(100vh - 46px - 40px - 64px)}
  .stage{flex:1;position:relative;overflow:auto;padding:24px}
  .log{width:380px;border-left:1px solid var(--line);background:var(--bg2);display:flex;flex-direction:column}
  .detail{display:flex;flex-direction:column;padding:12px 14px 0;background:#20180e}
  #detailbody{flex:1;overflow:auto;min-height:0;padding-bottom:12px}
  .split{height:7px;flex:none;background:var(--line);cursor:row-resize}
  .split:hover{background:var(--amber-dim)}
  .dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .dt{font:600 11px 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .follow{font:600 10px 'JetBrains Mono',monospace;letter-spacing:.06em;padding:4px 9px;border-radius:11px;cursor:pointer;border:1px solid var(--amber-dim);color:var(--amber);background:none}
  .follow.on{background:var(--amber);color:#1b1610;border-color:var(--amber)}
  .detail pre{margin:0;padding:10px 12px;background:var(--bg);border:1px solid var(--line);border-radius:5px;color:var(--text);white-space:pre-wrap;font:11px/1.55 'JetBrains Mono',monospace}
  .detail pre .k{color:var(--muted)}
  .detail .none{color:var(--muted);font:11px 'JetBrains Mono',monospace;padding:10px 0}
  .loglist{flex:1;overflow:auto;padding:10px 14px}
  .loglist h3{margin:0 0 8px;font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .fbtn{background:none;border:1px solid var(--line);color:var(--muted);font:600 10px 'JetBrains Mono',monospace;letter-spacing:.06em;padding:4px 9px;border-radius:11px;cursor:pointer;text-transform:none}
  .fbtn:hover{border-color:var(--amber-dim);color:var(--amber)}
  .fbtn.on{border-color:var(--amber);color:var(--amber)}
  .rec{font:11px/1.5 'JetBrains Mono',monospace;color:var(--muted);padding:5px 6px;border-bottom:1px solid var(--line);cursor:pointer;border-left:2px solid transparent}
  .rec:hover{background:#2c2114}
  .rec.sel{background:#332715;border-left:2px solid var(--amber);color:var(--text)}
  .rec .t{color:var(--amber)}.rec .tag{color:var(--text)}.rec.telemetry .tag{color:var(--warn)}
  .empty{color:var(--muted);font:11px 'JetBrains Mono',monospace;padding:10px 2px}
  .scrub{height:64px;border-top:1px solid var(--line);background:var(--bg2);display:flex;align-items:center;gap:14px;padding:0 18px}
  .scrub button{background:var(--bg);border:1px solid var(--amber-dim);color:var(--text);padding:7px 14px;border-radius:4px;cursor:pointer;font:600 12px 'JetBrains Mono',monospace}
  .scrub button.primary{background:var(--amber);color:#1b1610;border-color:var(--amber)}
  input[type=range]{flex:1;accent-color:var(--amber)}
  .clock{font:12px 'JetBrains Mono',monospace;color:var(--muted);min-width:160px;text-align:right}
  .fleet{display:flex;gap:36px;flex-wrap:wrap;align-items:flex-start}
  .mach{width:230px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;cursor:pointer;transition:border-color .15s}
  .mach:hover{border-color:var(--amber-dim)}.mach.active{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber-dim)}
  .mach .name{font:600 15px 'JetBrains Mono',monospace;color:var(--text)}
  .mach .spec{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-top:3px}
  .mach .stat{margin-top:12px;font:12px 'JetBrains Mono',monospace}
  .mach .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber-dim);margin-right:7px;vertical-align:middle}
  .mach.active .dot{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .hint{color:var(--muted);font:11px 'JetBrains Mono',monospace;margin-top:10px}
  .stagehdr{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-bottom:14px}
  .stagehdr a{color:var(--amber);cursor:pointer;text-decoration:none}.stagehdr a:hover{text-decoration:underline}
  .node{display:inline-block;width:260px;vertical-align:top;margin:0 24px 24px 0;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;cursor:pointer}
  .node:hover{border-color:var(--amber-dim)}.node .h{font:600 13px 'JetBrains Mono',monospace}
  .node .s{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-top:4px}
  .pill{display:inline-block;font:600 10px 'JetBrains Mono',monospace;padding:2px 7px;border-radius:10px;margin-top:8px}
  .pill.run{background:#2a3a2c;color:var(--good)}.pill.done{background:#2c2114;color:var(--muted)}
  .sub h2{font:600 13px 'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin:0 0 4px}
  .sub h2 a{color:var(--amber);text-decoration:underline;cursor:pointer}
  .track{margin:18px 0}.track .lbl{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-bottom:6px}
  .seg{display:inline-block;height:30px;line-height:30px;padding:0 12px;margin-right:2px;font:11px 'JetBrains Mono',monospace;border-radius:3px;color:#1b1610;background:var(--amber)}
  .seg.b{background:var(--warn)}
  .bars{display:flex;align-items:flex-end;gap:4px;height:80px}.bar{width:26px;background:var(--amber-dim);border-radius:2px 2px 0 0}
  .eureka{margin-top:16px;border:1px solid var(--warn);background:#2c2114;border-radius:6px;padding:12px 14px}
  .eureka .k{color:var(--warn);font:600 12px 'JetBrains Mono',monospace}.eureka .m{color:var(--text);font-size:12px;margin-top:4px}.eureka .f{color:var(--muted);font-size:11px;margin-top:6px}
  /* filter modal */
  .modalbg{position:fixed;inset:0;background:rgba(10,8,5,.66);z-index:100;display:none;align-items:center;justify-content:center}
  .modal{width:380px;background:var(--bg2);border:1px solid var(--amber-dim);border-radius:8px;padding:18px 20px}
  .mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font:600 13px 'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--amber)}
  .mx{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer}
  .fgroup{margin-bottom:14px}
  .fgroup h4{margin:0 0 8px;font:600 10px 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .fgroup label{display:inline-flex;align-items:center;gap:6px;margin:0 14px 7px 0;font:12px 'JetBrains Mono',monospace;color:var(--text);cursor:pointer}
  .fgroup input{accent-color:var(--amber);cursor:pointer}
  .mft{display:flex;gap:10px;margin-top:8px}
  .mft input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:4px;padding:8px 10px;font:12px 'JetBrains Mono',monospace}
  .clr{background:var(--bg);border:1px solid var(--amber-dim);color:var(--text);border-radius:4px;padding:8px 12px;cursor:pointer;font:600 12px 'JetBrains Mono',monospace}
</style>
</head>
<body>
<div class="top">
  <span class="brand"><a href="../"><b>darkmux</b></a> · observability</span>
  <span class="badge">Demo — sample data</span>
  <span class="pb">▣ playback</span>
  <nav class="topnav">
    <a href="../">home</a>
    <a href="../guide/">guide</a>
    <a href="https://darklyenergized.substack.com" target="_blank" rel="noopener">articles</a>
    <a href="https://github.com/kstrat2001/darkmux" target="_blank" rel="noopener">github</a>
  </nav>
</div>
<div class="crumbbar">
  <button class="backbtn" id="back">‹ back</button>
  <span class="crumb" id="crumb"></span>
  <span class="meta" id="meta"></span>
</div>
<div class="wrap">
  <div class="stage" id="stage"></div>
  <div class="log">
    <div class="detail" id="detail"><div class="dh"><span class="dt">selected event</span>
      <button class="follow on" id="follow">⤓ follow latest</button></div>
      <div id="detailbody"></div></div>
    <div class="split" id="split" title="drag to resize"></div>
    <div class="loglist">
      <h3><span>event log · <span id="logscope">fleet</span></span>
          <button class="fbtn" id="fbtn" onclick="openFilters()">⚙ filters</button></h3>
      <div id="logbody"></div>
    </div>
  </div>
</div>
<div class="scrub">
  <button id="rewind" title="jump to start">⏮</button>
  <button id="play" class="primary">▶ play</button>
  <input type="range" id="range" min="0" max="100" value="100">
  <button id="speed" title="playback speed">1×</button>
  <span class="clock" id="clock"></span>
</div>
<div class="modalbg" id="modalbg">
  <div class="modal">
    <div class="mhd"><span>filter events</span><button class="mx" onclick="closeFilters()">✕</button></div>
    <div id="filterbody"></div>
    <div class="mft"><input id="fsearch" placeholder="search text…"><button class="clr" onclick="clearFilters()">clear all</button></div>
  </div>
</div>

<script>
const DATA = [
 {ts:"2026-05-19T01:00:00Z",category:"work",tier:"operator",stage:"scope",action:"note",handle:"mission scoped",machine_id:"studio",mission_id:"redis-tailnet"},
 {ts:"2026-05-19T01:00:30Z",category:"work",tier:"local",stage:"dispatch",action:"dispatch.start",handle:"darkmux/coder",machine_id:"studio",mission_id:"redis-tailnet",session_id:"S1",model:"qwen3.6-35b"},
 {ts:"2026-05-19T01:00:35Z",category:"telemetry",source:"lms",machine_id:"studio",session_id:"S1",fields:{event:"load",model:"qwen3.6-35b",gb:21}},
 {ts:"2026-05-19T01:00:50Z",category:"telemetry",source:"process",machine_id:"studio",session_id:"S1",fields:{cpu:38}},
 {ts:"2026-05-19T01:01:20Z",category:"telemetry",source:"lms",machine_id:"studio",session_id:"S1",fields:{event:"unload",model:"qwen3.6-35b"}},
 {ts:"2026-05-19T01:01:22Z",category:"telemetry",source:"lms",machine_id:"studio",session_id:"S1",fields:{event:"load",model:"qwen3-coder-next",gb:19}},
 {ts:"2026-05-19T01:01:35Z",category:"telemetry",source:"process",machine_id:"studio",session_id:"S1",fields:{cpu:71}},
 {ts:"2026-05-19T01:01:55Z",category:"telemetry",source:"process",machine_id:"studio",session_id:"S1",fields:{cpu:24}},
 {ts:"2026-05-19T01:02:10Z",category:"work",tier:"local",stage:"dispatch",action:"dispatch.complete",handle:"darkmux/coder",machine_id:"studio",mission_id:"redis-tailnet",session_id:"S1",model:"qwen3-coder-next"},
 {ts:"2026-05-19T01:00:55Z",category:"work",tier:"local",stage:"dispatch",action:"dispatch.start",handle:"darkmux/reviewer",machine_id:"laptop",mission_id:"redis-tailnet",session_id:"S2",model:"qwen3.5-122b"},
 {ts:"2026-05-19T01:01:00Z",category:"telemetry",source:"lms",machine_id:"laptop",session_id:"S2",fields:{event:"load",model:"qwen3.5-122b",gb:74}},
 {ts:"2026-05-19T01:01:30Z",category:"telemetry",source:"process",machine_id:"laptop",session_id:"S2",fields:{cpu:55}},
 {ts:"2026-05-19T01:02:40Z",category:"telemetry",source:"process",machine_id:"laptop",session_id:"S2",fields:{cpu:48}},
 {ts:"2026-05-19T01:03:10Z",category:"work",tier:"local",stage:"dispatch",action:"dispatch.complete",handle:"darkmux/reviewer",machine_id:"laptop",mission_id:"redis-tailnet",session_id:"S2",model:"qwen3.5-122b"},
 {ts:"2026-05-19T01:02:20Z",category:"work",tier:"local",stage:"dispatch",action:"dispatch.start",handle:"darkmux/analyst",machine_id:"mini-1",mission_id:"redis-tailnet",session_id:"S3",model:"qwen3.6-35b"},
 {ts:"2026-05-19T01:02:25Z",category:"telemetry",source:"lms",machine_id:"mini-1",session_id:"S3",fields:{event:"load",model:"qwen3.6-35b",gb:21}},
 {ts:"2026-05-19T01:02:55Z",category:"telemetry",source:"process",machine_id:"mini-1",session_id:"S3",fields:{cpu:33}},
 {ts:"2026-05-19T01:03:40Z",category:"work",tier:"local",stage:"dispatch",action:"dispatch.complete",handle:"darkmux/analyst",machine_id:"mini-1",mission_id:"redis-tailnet",session_id:"S3",model:"qwen3.6-35b"},
];
DATA.forEach((r,i)=>r._id=i);
const MACH_SPEC={studio:"M1 Max · 32 GB · hub",laptop:"M5 Max · 128 GB · inference",["mini-1"]:"M4 · 16 GB"};
const T=s=>Date.parse(s);
const tMin=Math.min(...DATA.map(r=>T(r.ts))), tMax=Math.max(...DATA.map(r=>T(r.ts)));
const iso=t=>new Date(t).toISOString();
const fmt=ms=>{ms=Math.max(0,ms);return Math.floor(ms/60000)+":"+String(Math.floor(ms/1000)%60).padStart(2,"0");};
const missions=[...new Set(DATA.filter(r=>r.mission_id).map(r=>r.mission_id))];
const FCATS=[...new Set(DATA.map(r=>r.category))];
const FTIERS=[...new Set(DATA.map(r=>r.tier).filter(Boolean))];
const FSRC=[...new Set(DATA.map(r=>r.source).filter(Boolean))];
let state={level:"fleet",machine:null,session:null,t:tMax,playing:false,timer:null,selected:null,follow:true,speed:1,
  filters:{cat:new Set(FCATS),tier:new Set(FTIERS),src:new Set(FSRC),q:""}};

const $=id=>document.getElementById(id);
const visible=()=>DATA.filter(r=>T(r.ts)<=state.t);
const scoped=()=>visible().filter(state.stageScope||(()=>true));
function passesFilter(r){
  if(!state.filters.cat.has(r.category))return false;
  if(r.tier&&!state.filters.tier.has(r.tier))return false;
  if(r.source&&!state.filters.src.has(r.source))return false;
  if(state.filters.q&&!JSON.stringify(r).toLowerCase().includes(state.filters.q.toLowerCase()))return false;
  return true;
}
const scopedFiltered=()=>scoped().filter(passesFilter);
const newest=arr=>arr.length?arr.reduce((a,b)=>T(b.ts)>=T(a.ts)?b:a):null;
const machines=()=>[...new Set(DATA.map(r=>r.machine_id))];
const sessionsOn=m=>[...new Set(DATA.filter(r=>r.machine_id===m&&r.session_id).map(r=>r.session_id))];
const dispatch=(sid,act)=>DATA.find(r=>r.session_id===sid&&r.action==="dispatch."+act);

function renderMeta(){
  $("meta").innerHTML=`<b>${missions.join(', ')}</b> · recorded ${iso(tMin).slice(0,10)} `+
    `${iso(tMin).slice(11,19)}–${iso(tMax).slice(11,19)}Z<br>${DATA.length} records · ${machines().length} machines · flow schema 1.7`;
}
function machActive(m){
  const v=visible();
  const starts=v.filter(r=>r.machine_id===m&&r.action==="dispatch.start").map(r=>r.session_id);
  const dones=v.filter(r=>r.machine_id===m&&r.action==="dispatch.complete").map(r=>r.session_id);
  return starts.some(s=>!dones.includes(s));
}
function renderFleet(){
  $("logscope").textContent="fleet"; state.stageScope=()=>true;
  $("stage").innerHTML=`<div class="fleet">`+machines().map(m=>{
    const act=machActive(m), runs=sessionsOn(m).length;
    return `<div class="mach ${act?'active':''}" onclick="drillMachine('${m}')"><div class="name">${m}</div>
      <div class="spec">${MACH_SPEC[m]||''}</div><div class="stat"><span class="dot"></span>${act?'dispatch in flight':'idle'} · ${runs} run(s)</div>
      <div class="hint">click to drill in →</div></div>`;}).join("")+`</div>`;
}
function renderMachine(){
  const m=state.machine; $("logscope").textContent=m; state.stageScope=r=>r.machine_id===m;
  const nodes=sessionsOn(m).filter(sid=>visible().some(r=>r.session_id===sid)).map(sid=>{
    const s=dispatch(sid,"start"), done=dispatch(sid,"complete")&&T(dispatch(sid,"complete").ts)<=state.t;
    return `<div class="node" onclick="drillSession('${sid}')"><div class="h">${s.handle}</div>
      <div class="s">session ${sid} · ${s.model||'?'}</div><div class="s">mission ${s.mission_id}</div>
      <span class="pill ${done?'done':'run'}">${done?'complete':'running'}</span></div>`;}).join("")
    || `<div class="hint">no runs yet at this point in the timeline</div>`;
  $("stage").innerHTML=`<div><div class="stagehdr"><a onclick="goFleet()">fleet</a> › machine · ${m} — ${MACH_SPEC[m]||''}</div>${nodes}</div>`;
}
function renderSubsystem(){
  const sid=state.session, m=state.machine; $("logscope").textContent=sid; state.stageScope=r=>r.session_id===sid;
  const tel=visible().filter(r=>r.session_id===sid&&r.category==="telemetry");
  const lms=tel.filter(r=>r.source==="lms"), procs=tel.filter(r=>r.source==="process");
  const loads=lms.filter(r=>r.fields.event==="load");
  const segs=loads.map((r,i)=>`<span class="seg ${i>0?'b':''}">${r.fields.model} · ${r.fields.gb||'?'}GB</span>`).join("");
  const bars=procs.map(r=>`<div class="bar" style="height:${Math.max(6,r.fields.cpu*0.8)}px" title="cpu ${r.fields.cpu}%"></div>`).join("");
  const distinct=[...new Set(loads.map(r=>r.fields.model))];
  const eureka=distinct.length>1?`<div class="eureka"><div class="k">⚠ eureka · jit-model-swap</div>
     <div class="m">${distinct.length} models loaded in one run (${distinct.join(' → ')}) — mid-run swap stalls the dispatch while the new model loads.</div>
     <div class="f">fix: pin one model for the run, or pre-warm the swap target.</div></div>`:"";
  const d=dispatch(sid,"start");
  $("stage").innerHTML=`<div class="sub"><h2>subsystem · ${d.handle} <span style="color:var(--muted);text-transform:none;font-weight:400">(${sid} on <a onclick="drillMachine('${m}')">${m}</a>)</span></h2>
    <div class="track"><div class="lbl">model (lms)</div>${segs||'<span class="hint">no telemetry yet</span>'}</div>
    <div class="track"><div class="lbl">process cpu — ${procs.length} sample(s)</div><div class="bars">${bars}</div></div>${eureka}</div>`;
}
function pretty(r){
  const o={};Object.keys(r).filter(k=>k!=="_id").forEach(k=>o[k]=r[k]);
  return JSON.stringify(o,null,1).replace(/"(\w+)":/g,'<span class="k">$1</span>:');
}
function renderDetail(){
  const r=DATA.find(x=>x._id===state.selected);
  $("follow").className="follow"+(state.follow?" on":"");
  $("detailbody").innerHTML=r?`<pre>${pretty(r)}</pre>`:`<div class="none">no event at this point in the timeline</div>`;
}
function renderLog(){
  const recs=scopedFiltered().slice(-50).reverse();
  $("logbody").innerHTML=recs.length?recs.map(r=>{
    const tt=iso(T(r.ts)).slice(11,19);
    const tag=r.category==="telemetry"?`${r.source}:${r.fields.event||('cpu '+r.fields.cpu+'%')}`:(r.action||r.stage);
    return `<div class="rec ${r.category} ${r._id===state.selected?'sel':''}" onclick="selectRec(${r._id})">
      <span class="t">${tt}</span> <span class="tag">${tag}</span> ${r.machine_id||''}${r.session_id?(' · '+r.session_id):''}</div>`;
  }).join(""):`<div class="empty">no events match the current filters</div>`;
}
function renderCrumb(){
  let c=`<a onclick="goFleet()">fleet</a>`;
  if(state.level!=="fleet") c+=`<span class="sep">›</span><a onclick="drillMachine('${state.machine}')">${state.machine}</a>`;
  if(state.level==="subsystem") c+=`<span class="sep">›</span>${state.session}`;
  $("crumb").innerHTML=c; $("back").disabled=(state.level==="fleet");
}
function filtersActive(){return state.filters.cat.size<FCATS.length||state.filters.tier.size<FTIERS.length||state.filters.src.size<FSRC.length||!!state.filters.q;}
function updateFbtn(){const a=filtersActive();$("fbtn").className="fbtn"+(a?" on":"");$("fbtn").textContent=a?"⚙ filters •":"⚙ filters";}
function render(){
  if(state.level==="fleet")renderFleet(); else if(state.level==="machine")renderMachine(); else renderSubsystem();
  if(state.follow){ const n=newest(scopedFiltered()); state.selected=n?n._id:null; }
  renderDetail();renderLog();renderCrumb();renderMeta();updateFbtn();
  $("range").value=Math.round((state.t-tMin)/(tMax-tMin)*100);
  $("clock").textContent=fmt(state.t-tMin)+" / "+fmt(tMax-tMin)+"  ·  "+visible().length+"/"+DATA.length+" rec";
}
window.drillMachine=m=>{state.level="machine";state.machine=m;state.session=null;state.follow=true;render();};
window.drillSession=s=>{state.level="subsystem";state.session=s;state.follow=true;render();};
window.goFleet=()=>{state.level="fleet";state.machine=null;state.session=null;state.follow=true;render();};
window.selectRec=id=>{state.selected=id;state.follow=false;render();};
$("follow").onclick=()=>{state.follow=!state.follow;render();};
$("back").onclick=()=>{ if(state.level==="subsystem")drillMachine(state.machine); else if(state.level==="machine")goFleet(); };
$("range").oninput=e=>{state.t=tMin+(tMax-tMin)*e.target.value/100;render();};
$("rewind").onclick=()=>{state.t=tMin;state.follow=true;render();};
$("speed").onclick=()=>{const s=[0.5,1,2,4];state.speed=s[(s.indexOf(state.speed)+1)%s.length];$("speed").textContent=state.speed+"×";};
$("play").onclick=()=>{
  if(state.playing){clearInterval(state.timer);state.playing=false;$("play").textContent="▶ play";return;}
  if(state.t>=tMax)state.t=tMin;
  state.follow=true; state.playing=true;$("play").textContent="⏸ pause";
  state.timer=setInterval(()=>{ state.t+=(tMax-tMin)/120*state.speed;
    if(state.t>=tMax){state.t=tMax;clearInterval(state.timer);state.playing=false;$("play").textContent="▶ play";}
    render(); },100);
};
// filter modal
function renderFilters(){
  const grp=(title,vals,k)=>`<div class="fgroup"><h4>${title}</h4>`+vals.map(v=>
    `<label><input type="checkbox" ${state.filters[k].has(v)?'checked':''} onclick="toggleFilter('${k}','${v}')"> ${v}</label>`).join("")+`</div>`;
  $("filterbody").innerHTML=grp('category',FCATS,'cat')+grp('tier',FTIERS,'tier')+grp('telemetry source',FSRC,'src');
}
window.toggleFilter=(k,v)=>{const s=state.filters[k];s.has(v)?s.delete(v):s.add(v);render();};
window.openFilters=()=>{renderFilters();$("fsearch").value=state.filters.q;$("modalbg").style.display="flex";};
window.closeFilters=()=>{$("modalbg").style.display="none";};
window.clearFilters=()=>{state.filters={cat:new Set(FCATS),tier:new Set(FTIERS),src:new Set(FSRC),q:""};$("fsearch").value="";renderFilters();render();};
$("fsearch").oninput=e=>{state.filters.q=e.target.value;render();};
$("modalbg").onclick=e=>{if(e.target===$("modalbg"))closeFilters();};
// resizable detail/log split — fixed default height stops the jumpiness; drag the divider to grow it
(function(){const DEF=200,MIN=110,MAX=520;$("detail").style.height=DEF+"px";let drag=false,sy=0,sh=0;
  $("split").addEventListener("mousedown",e=>{drag=true;sy=e.clientY;sh=$("detail").offsetHeight;document.body.style.userSelect="none";e.preventDefault();});
  window.addEventListener("mousemove",e=>{if(!drag)return;$("detail").style.height=Math.max(MIN,Math.min(MAX,sh+(e.clientY-sy)))+"px";});
  window.addEventListener("mouseup",()=>{drag=false;document.body.style.userSelect="";});})();
render();
</script>
</body>
</html>
