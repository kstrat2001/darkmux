name: Sync Homebrew tap

# When `packaging/homebrew/darkmux.rb` changes on main, propagate the change
# to the kstrat2001/homebrew-darkmux tap repo by opening a PR there with the
# updated formula. The source-of-truth formula lives in THIS repo; the tap
# is downstream metadata.
#
# Requires a repository secret named HOMEBREW_TAP_TOKEN — a fine-grained
# personal access token with `Contents: write` + `Pull requests: write`
# scopes on `kstrat2001/homebrew-darkmux`. Setup is documented in
# packaging/homebrew/tap-bootstrap/BOOTSTRAP.md under "Automated sync".
#
# Without the secret, the workflow logs a notice and skips the sync — it
# does NOT fail. This lets the workflow land cleanly before the secret is
# configured; the manual sync fallback (also in BOOTSTRAP.md) stays usable
# until the operator finishes the PAT setup.
#
# References:
#   - tap repo: https://github.com/kstrat2001/homebrew-darkmux
#   - bundled tracking issue: #618
#   - source formula: packaging/homebrew/darkmux.rb

on:
  push:
    branches: [main]
    paths:
      - 'packaging/homebrew/darkmux.rb'
  # Manual trigger from the Actions tab — useful for forcing a sync after
  # editing the workflow itself, or after a secret-only change.
  workflow_dispatch: {}

permissions:
  # Only need read on THIS repo; cross-repo writes go through the PAT.
  contents: read

concurrency:
  # Serialize sync runs so a fast string of formula commits doesn't open
  # parallel conflicting PRs in the tap repo. `cancel-in-progress: false`
  # is deliberate — every formula change should produce its own sync PR.
  group: homebrew-tap-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync formula to tap repo
    runs-on: ubuntu-latest
    steps:
      - name: Check tap token is set
        id: check_token
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::notice::HOMEBREW_TAP_TOKEN secret not set; skipping sync. See packaging/homebrew/tap-bootstrap/BOOTSTRAP.md for setup."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source of truth (this repo)
        if: steps.check_token.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          path: darkmux

      - name: Checkout tap repo
        if: steps.check_token.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: kstrat2001/homebrew-darkmux
          path: tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Sync formula
        if: steps.check_token.outputs.skip != 'true'
        id: sync
        run: |
          mkdir -p tap/Formula
          cp darkmux/packaging/homebrew/darkmux.rb tap/Formula/darkmux.rb
          cd tap
          if git diff --quiet Formula/darkmux.rb; then
            echo "no formula changes; tap is already in sync"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "source_sha=$(cd ../darkmux && git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "source_short_sha=$(cd ../darkmux && git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR in tap repo
        if: steps.check_token.outputs.skip != 'true' && steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          path: tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          commit-message: |
            sync: formula update from kstrat2001/darkmux@${{ steps.sync.outputs.source_short_sha }}

            Auto-generated by .github/workflows/sync-homebrew-tap.yml in the
            main darkmux repo. Source SHA:
            ${{ steps.sync.outputs.source_sha }}
          title: "sync: formula update from kstrat2001/darkmux@${{ steps.sync.outputs.source_short_sha }}"
          body: |
            Auto-generated by `.github/workflows/sync-homebrew-tap.yml` in the main darkmux repo.

            The formula at `packaging/homebrew/darkmux.rb` in [`kstrat2001/darkmux@${{ steps.sync.outputs.source_short_sha }}`](https://github.com/kstrat2001/darkmux/blob/${{ steps.sync.outputs.source_sha }}/packaging/homebrew/darkmux.rb) differs from `Formula/darkmux.rb` here. This PR pulls in the change.

            ## Review notes

            - Diff is pure formula content (URL, deps, install block, caveats, test block, etc.)
            - `brew audit --strict kstrat2001/darkmux/darkmux` should still pass after merge
            - Operators pick up the new formula on their next `brew upgrade --HEAD darkmux`

            ## Source of truth

            https://github.com/kstrat2001/darkmux/blob/main/packaging/homebrew/darkmux.rb

            ## Related

            - [`#618`](https://github.com/kstrat2001/darkmux/issues/618) — bundled tracking issue for Homebrew packaging
          branch: sync/formula-update
          delete-branch: true
          labels: |
            automated
            sync
