name: CI

# Runs on every pull request and on pushes to main. Fails the workflow
# on ANY warning — see `RUSTFLAGS: "-D warnings"` and `cargo clippy -D warnings`
# below. Tested locally via the same commands.
#
# Performance notes (#523, revised — CI timeout flake, 2026-07-13):
#   * Caching is via Swatinem/rust-cache — it keys on the lockfile + rustc
#     version, scopes per-job, and prunes the stale `target/` artifacts that
#     made the old hand-rolled actions/cache grow slower over time.
#   * The heavy build/test/lint steps are gated behind a paths-filter so a
#     docs-only / viewer-only PR reports green in seconds instead of paying
#     the full Rust pipeline. We deliberately do NOT split by CRATE: a change
#     to a foundational crate (e.g. darkmux-flow) must still exercise its
#     reverse-dependents, so any Rust change runs the full workspace
#     test+clippy. The filter only distinguishes "Rust-relevant changed" from
#     "nothing Rust-relevant changed".
#   * DEV profile, not release: PR-gating CI dropped `--release` from both
#     `cargo test` and `cargo clippy` (and dropped the separate `cargo build
#     --release` step entirely — `cargo clippy --all-targets` already compiles
#     every target, catching build breaks as a side effect). Release-mode
#     optimization doesn't change test/lint CORRECTNESS, only compile time —
#     and it was the single biggest cost driver, routinely pushing this job
#     past its 15-minute cap even on a successful run (13m26s measured on a
#     clean pass, no margin left). A genuinely release-mode-only issue (an
#     LTO/codegen-unit interaction, a `#[cfg(not(debug_assertions))]` path)
#     is a real but rare gap this trades away — covered instead by
#     `release-verify.yml` (workflow_dispatch-only, full `--release` gate),
#     run by hand on the last PR before cutting a release; see that
#     workflow's own header and the `darkmux-point-release` skill.
#   * The runtime/ crate (excluded from the parent workspace, own Cargo.lock —
#     #463) now runs as its OWN parallel job instead of appending to this
#     one's sequential steps, with its OWN paths-filter scoped to `runtime/**`
#     — it has zero dependency on the parent workspace's sources (confirmed:
#     its `include_str!`s only ever resolve within `runtime/`), so a
#     workspace-only PR skips it entirely and a runtime-only PR skips the
#     (much heavier) workspace job.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Daily advisory sweep: catches a newly-disclosed RUSTSEC advisory against an
  # unchanged dependency without waiting for the next dep-touching PR.
  schedule:
    - cron: "17 6 * * *"

env:
  CARGO_TERM_COLOR: always
  # Treat all warnings (build + clippy + rustdoc) as errors. Any new dead-code
  # or lint regression fails CI rather than accumulating silently.
  RUSTFLAGS: "-D warnings"

jobs:
  build-test-lint:
    name: build + test + lint (macos-latest)
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Decide whether this change touches anything that can affect the
      # PARENT WORKSPACE's build, tests, or lints. `templates/**` is included
      # because workload/role/skill assets are `include_str!`'d into the
      # binary, so editing them changes compiled output and the tests that
      # assert on it. The workflow file itself is included so CI changes
      # always self-test. `runtime/**` is EXCLUDED — that crate is its own
      # workspace root (#463) with zero dependency on these sources, and now
      # runs as its own parallel job below with its own scoped filter, so a
      # runtime-only PR doesn't also pay for this (heavier) job.
      - name: Detect Rust-relevant changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'templates/**'
              - '.github/workflows/ci.yml'
              - '!runtime/**'

      - name: Install Rust stable toolchain
        if: steps.filter.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build artifacts
        if: steps.filter.outputs.rust == 'true'
        uses: Swatinem/rust-cache@v2

      # Format check intentionally NOT enforced yet — the codebase has
      # accumulated style drift that would mask the more important
      # lints. Tracked as a follow-up (`cargo fmt --all` once, then
      # re-enable here).

      # DEV profile (see this file's header) — no separate `cargo build`
      # step: `cargo clippy --all-targets` below already compiles every
      # target (bins/examples/tests), so a plain build-only check would be
      # redundant work, not extra coverage.
      - name: Test (whole workspace)
        if: steps.filter.outputs.rust == 'true'
        run: cargo test --workspace

      - name: Clippy (whole workspace, all targets, no warnings allowed)
        if: steps.filter.outputs.rust == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: No Rust-relevant changes — pipeline skipped
        if: steps.filter.outputs.rust != 'true'
        run: echo "No Rust / Cargo / template / workflow changes detected; test+lint skipped (reports green)."

  runtime-test-lint:
    name: runtime crate — test + lint (macos-latest)
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The runtime crate is EXCLUDED from the parent cargo workspace (#463 —
      # it builds against musl in the darkmux-runtime Docker image) and is its
      # own workspace root with its own Cargo.lock. Its `include_str!`s only
      # ever resolve within `runtime/` (confirmed 2026-07-13) — zero
      # dependency on the parent workspace's sources — so this job's filter
      # is scoped to `runtime/**` alone, letting it run IN PARALLEL with
      # `build-test-lint` above instead of appending to that job's sequential
      # steps (the change that fixed this job's chronic near-timeout).
      - name: Detect runtime-relevant changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            runtime:
              - 'runtime/**'
              - '.github/workflows/ci.yml'

      - name: Install Rust stable toolchain
        if: steps.filter.outputs.runtime == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build artifacts
        if: steps.filter.outputs.runtime == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime

      # DEV profile — see ci.yml's header for the reasoning (shared with the
      # parent-workspace job above). Image build itself needs a Docker
      # daemon — deferred to a follow-up Linux job; macOS runners don't ship
      # a working Docker.
      - name: Test (runtime crate)
        if: steps.filter.outputs.runtime == 'true'
        run: cargo test --manifest-path runtime/Cargo.toml

      - name: Clippy (runtime crate, all targets, no warnings allowed)
        if: steps.filter.outputs.runtime == 'true'
        run: cargo clippy --manifest-path runtime/Cargo.toml --all-targets -- -D warnings

      - name: No runtime-relevant changes — pipeline skipped
        if: steps.filter.outputs.runtime != 'true'
        run: echo "No runtime/ changes detected; test+lint skipped (reports green)."

  cargo-audit:
    name: cargo audit (RUSTSEC advisories)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # On a PR, only do real work when the dependency set actually changes —
      # an advisory regression can't ride in on a docs/viewer-only PR, and those
      # PRs aren't blocked by this job. The daily `schedule` run and pushes to
      # main always audit (they have no `before` filter / aren't gated here), so
      # a freshly-disclosed advisory against an unchanged dep still surfaces.
      - name: Detect dependency changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        id: deps
        with:
          filters: |
            deps:
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '.github/workflows/ci.yml'

      - name: Should this run audit?
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ steps.deps.outputs.deps }}" == "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No dependency changes on this PR; cargo audit skipped (reports green)."
          fi

      - name: Install cargo-audit
        if: steps.gate.outputs.run == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # The workspace excludes the runtime crate (#463), so audit both lockfiles.
      - name: Audit workspace + runtime lockfiles
        if: steps.gate.outputs.run == 'true'
        run: |
          cargo audit
          cargo audit --file runtime/Cargo.lock

  viewer-e2e:
    name: viewer e2e (headless XSS gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Only run when the viewer, its generated demo, the XSS fixture, or the e2e
      # harness itself changes — a Rust-only or docs-only PR doesn't pay the
      # browser-download cost.
      - name: Detect viewer-relevant changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            viewer:
              - 'crates/darkmux-serve/assets/viewer.html'
              - 'docs/demo/**'
              - 'tests/fixtures/xss-flow.jsonl'
              - 'tests/fixtures/lifecycle-flow.jsonl'
              - 'tests/e2e/**'
              - '.github/workflows/ci.yml'

      - name: Setup Node
        if: steps.filter.outputs.viewer == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install e2e deps
        if: steps.filter.outputs.viewer == 'true'
        working-directory: tests/e2e
        run: npm ci

      - name: Install Chromium for Playwright
        if: steps.filter.outputs.viewer == 'true'
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run viewer e2e (drives the real viewer over attacker-controlled records)
        if: steps.filter.outputs.viewer == 'true'
        working-directory: tests/e2e
        run: npx playwright test

      - name: No viewer-relevant changes — e2e skipped
        if: steps.filter.outputs.viewer != 'true'
        run: echo "No viewer / demo / fixture / e2e changes detected; viewer e2e skipped (reports green)."

  docs-drift:
    name: docs drift guard (retired terms)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Turns "the docs silently drifted" into a blocked PR — CLAUDE.md's principle
      # that "doc drift is a bug, not a footnote." Grow this guard as the
      # observability-unification guide rewrites land (#556): add 'instruments.jsonl'
      # / '--instrument' once #557 ships, and 'click Connect' / live
      # darkmux.com/{flow,topology,lab} once the daemon-hosted viewer (#554/#558) ships.
      - name: No retired terms in user-facing docs
        run: |
          # 'admin' role family was renamed to 'utility' with NO compat alias —
          # crates/darkmux-crew validate_role_family REJECTS 'admin' at load time.
          # Scanned set: the user-facing doc surfaces PLUS packaging/ — the
          # brew formula's caveats are printed to every installing user, and a
          # retired-verb spelling slipped through there once precisely because
          # packaging/ was outside this set (#1426 phase-2 gate finding).
          # AGENTS.md and skills/ added for the same reason (#1449 gate
          # finding): skills/ ships into users' ~/.claude/skills/ via
          # `darkmux init` (include_str!-embedded), and AGENTS.md is the
          # agent-facing repo doc — both carried retired identity text that
          # the doc-only set missed.
          PAT='admin[- ]agent|admin</code>'
          if bad=$(grep -rniE "$PAT" README.md CONTRIBUTING.md DESIGN.md AGENTS.md docs/index.html docs/guide/ docs/architecture/ packaging/ skills/ 2>/dev/null); then
            echo "::error::Retired term in user-facing docs — use 'utility', not 'admin' (the role_family loader rejects 'admin'):"
            echo "$bad"
            exit 1
          fi
          # (#1426) Verb spellings retired with NO compat alias.
          # Phase 1: `darkmux profiles` -> `darkmux profile list`, `darkmux
          # scan` -> `darkmux profile scan`, `darkmux notebook ...` -> `darkmux
          # lab notebook ...`, `darkmux pr-review ...` -> `darkmux mission
          # launch review`, `darkmux external ...` -> pipe into `mission
          # propose`.
          # Phase 2: `darkmux crew dispatch <role>` -> `darkmux dispatch
          # <role>` (dispatch promoted to a top-level verb), and `darkmux
          # skills ...` -> `darkmux init` (init is the one setup/refresh verb;
          # doctor flags stale darkmux-* skills).
          # Phase 3: `darkmux status` -> `darkmux machine status`, `darkmux
          # swap ...` -> retired (gestalt loads residents at dispatch),
          # `darkmux model ...` -> `darkmux machine {status,resources,eject}`,
          # `darkmux fleet ...` -> `darkmux machine {list,add,remove}`,
          # `darkmux recommendations ...` -> retired.
          # The word boundary + the literal `darkmux ` anchor keep the NEW
          # spellings clean: `darkmux machine status` does not contain the
          # two-word `darkmux status`, and `darkmux profile scan` does not
          # contain `darkmux scan`. `model`/`status`/`fleet` are common words,
          # so the anchor matches ONLY the `darkmux <verb>` invocation form,
          # and the `crew dispatch` alternative anchors on the two-word
          # spelling so the surviving `crew list`/`show`/`index` family does
          # NOT trip. Historical release-notes lines (README's status block,
          # one line per release naming its `**vX.Y.Z**`) legitimately quote
          # old verbs — excluded by the -v filter; live prose never carries
          # that bold-version marker.
          VERBPAT='darkmux (profiles|scan|notebook|pr-review|external|skills|crew dispatch|status|swap|model|fleet|recommendations)\b'
          if bad=$(grep -rniE "$VERBPAT" README.md CONTRIBUTING.md DESIGN.md AGENTS.md docs/index.html docs/guide/ docs/architecture/ packaging/ skills/ 2>/dev/null | grep -v '\*\*v[0-9]*\.'); then
            echo "::error::Retired verb spelling in user-facing docs (#1426) — use machine status / machine resources / machine list / machine add / profile list / profile scan / lab notebook / mission launch review / dispatch (not crew dispatch) / init (not skills); swap + recommendations retired:"
            echo "$bad"
            exit 1
          fi
          echo "docs drift guard passed: no retired terms"
      - name: Demo page is in sync with the canonical viewer
        run: |
          # darkmux.com/demo IS crates/darkmux-serve/assets/viewer.html in
          # playback mode (generated by scripts/build-demo.sh). Regenerate +
          # diff so the demo can never silently re-fork from the viewer.
          bash scripts/build-demo.sh
          if ! git diff --exit-code -- docs/demo/index.html; then
            echo "::error::docs/demo/index.html is out of sync with the viewer. Run scripts/build-demo.sh and commit the result."
            exit 1
          fi
          echo "demo in sync with the canonical viewer"
