# darkmux self-review — darkmux reviews its own PRs, in public, on a local
# crew of models.
#
# darkmux dogfooding itself: a PR diff is dispatched to a **review pipeline**
# (#1222 Phase B) — a saved crew of local LMStudio models, staffed per
# `~/.darkmux/profiles.json`, that probes the diff and hands its findings to
# a judge seat — running on a self-hosted runner. No cloud API is involved.
# The findings post back as native inline PR comments.
#
# SECURITY (public repo + self-hosted runner): the trigger is **workflow_dispatch
# only** — it never fires on a `pull_request` event, so a stranger's PR (or a
# fork) can NOT auto-run anything on the runner. Only someone with write access
# launches it (`gh workflow run darkmux-review.yml -f pr=<n>`), and even then the
# job NEVER checks out the reviewed PR's code: it reads only the PR *diff* via
# the API (data, not executed) and feeds it to the sandboxed, network-isolated
# internal runtime. The review pipeline's `--github` file source (inside the `darkmux
# pr-review run` dispatch below) fetches changed-file + one-hop-import
# CONTENTS via the same GitHub API — also read as data and never executed,
# the same trust class as the diff. The repo checkout below is of trusted
# `main` (the review tooling), not the PR. Runner registration + prerequisites:
# see .github/DARKMUX_REVIEW_RUNNER.md.
name: darkmux self-review

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to review"
        required: true
        type: string
      crew:
        description: >-
          darkmux review crew to dispatch (default: the repo variable
          DARKMUX_REVIEW_CREW, falling back to "review-deep"). A crew's seats
          and which models staff them are defined in the runner's
          ~/.darkmux/profiles.json (#1054) — never in this file.
        required: false
        default: ""
        type: string
      mode:
        description: "Review dispatch mode: sequential (one seat model loaded at a time — the 32GB-tier default), parallel (multiple seat models resident at once), or auto (darkmux picks)."
        required: false
        default: "auto"
        type: string
      k:
        description: "Override draws-per-seat (k) for every staffing in the crew. Leave blank to use each staffing's own k from profiles.json."
        required: false
        default: ""
        type: string

concurrency:
  group: darkmux-review-${{ inputs.pr }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: [self-hosted, darkmux-review]
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ inputs.pr }}
      REPO: ${{ github.repository }}
      CREW: ${{ inputs.crew || vars.DARKMUX_REVIEW_CREW || 'review-deep' }}
      MODE: ${{ inputs.mode }}
      K: ${{ inputs.k }}
    steps:
      - name: Checkout review tooling (trusted main — NOT the reviewed PR)
        uses: actions/checkout@v4
        # Brings the review/posting script from this repo at the dispatch ref
        # (main). The reviewed PR's code is never checked out — only its diff
        # (and, inside the review dispatch, individual file contents via the
        # API) are read — so untrusted PR code never lands on the runner.

      - name: Build the Rust bundler plugin (#1319 reference --bundler implementation)
        run: |
          set -euo pipefail
          # Built from THIS checkout of trusted main — the same tree the
          # review tooling itself came from, not the reviewed PR. The
          # built-in bundler only understands TypeScript; without this,
          # darkmux reviewing its own (Rust) PRs produces 0 bundles ->
          # degenerate on every single one (darkmux#1319, #1318 dogfood).
          #
          # plugins/darkmux-bundler-rust is a genuinely STANDALONE Cargo
          # project (its own [workspace] table, its own Cargo.lock, ZERO
          # darkmux-* dependencies) — excluded from the root workspace on
          # purpose. Building the reference plugin from privileged access
          # to darkmux-lab's own internals wouldn't actually prove the
          # public --bundler contract is sufficient on its own for a real
          # third-party author; a fully standalone build does.
          cd plugins/darkmux-bundler-rust
          cargo build --release --locked
          echo "BUNDLER_RUST_BIN=$PWD/target/release/darkmux-bundler-rust" >> "$GITHUB_ENV"

      - name: Fetch PR diff + head SHA (API only — no PR checkout, no code execution)
        id: diff
        run: |
          set -euo pipefail
          # Defense-in-depth: the `pr` input is maintainer-supplied, but pin it to
          # digits so only a valid PR number ever reaches the gh/API calls below.
          case "$PR" in ''|*[!0-9]*) echo "pr input must be a number"; exit 1 ;; esac
          mkdir -p "$RUNNER_TEMP/qa"
          # The review dispatch (below) reads this FULL diff directly — it caps
          # what it sends to each seat's model internally (the same 80KB model
          # budget the old single-reviewer prompt used) while keeping the full
          # diff on disk for anchor-line resolution when rendering the review.
          gh pr diff "$PR" --repo "$REPO" > "$RUNNER_TEMP/qa/pr.diff"
          if [ -s "$RUNNER_TEMP/qa/pr.diff" ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi
          HEAD_SHA=$(gh pr view "$PR" --repo "$REPO" --json headRefOid --jq .headRefOid)
          # Whole-string bash match, NOT line-anchored grep: grep -Eq '^...$'
          # matches per LINE, so a multiline value with one valid-looking line
          # would slip through; [[ =~ ]] anchors against the entire value.
          [[ "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::bad head sha from gh pr view"; exit 1; }
          echo "HEAD_SHA=$HEAD_SHA" >> "$GITHUB_ENV"

      - name: Write PR intent (title + description — prompt assembly lives in the binary)
        if: steps.diff.outputs.has_diff == 'true'
        run: |
          set -euo pipefail
          # #1053: a reviewer that doesn't know the change's INTENT flags the
          # very bug the PR fixes (the "restate-the-fix" false positive). The
          # review binary now assembles each seat's prompt itself (rubric +
          # intent + diff); this step's only job is handing it the author's
          # stated intent as plain data — NO AI in the loop here, just a `gh`
          # fetch, so it stays within the runner's no-LLM-API constraint.
          PRTITLE=$(gh pr view "$PR" --repo "$REPO" --json title --jq .title)
          PRBODY=$(gh pr view "$PR" --repo "$REPO" --json body --jq '.body // ""')
          # Cap for the model's context budget via a bash substring, NOT `| head`:
          # under `set -o pipefail`, head closing the pipe early would SIGPIPE gh
          # (141) and abort the step on any body over the cap.
          PRBODY="${PRBODY:0:8000}"
          {
            printf '%s\n' "$PRTITLE"
            echo
            if [ -n "$PRBODY" ]; then
              printf '%s\n' "$PRBODY"
            else
              echo "(no description provided)"
            fi
          } > "$RUNNER_TEMP/qa/intent.txt"

      - name: darkmux PR-review dispatch (local crew — no LLM API)
        if: steps.diff.outputs.has_diff == 'true'
        run: |
          set -euo pipefail
          # Defense-in-depth: `crew`/`mode`/`k` are maintainer-supplied
          # (workflow_dispatch is maintainer-only), but constrain them to a
          # sane charset/enum before they reach the dispatch args.
          case "$CREW" in ''|*[!a-zA-Z0-9_.-]*) echo "crew input must match [a-zA-Z0-9_.-]"; exit 1 ;; esac
          case "$MODE" in sequential|parallel|auto) ;; *) echo "mode input must be one of: sequential, parallel, auto"; exit 1 ;; esac
          if [ -n "$K" ]; then
            case "$K" in *[!0-9]*) echo "k input must be digits only"; exit 1 ;; esac
          fi
          # Model selection lives on the MACHINE, not in this public workflow
          # (#1054): `--crew` NAMES a crew (default review-deep, overridable via
          # the `crew` workflow input, or without editing this file via the
          # DARKMUX_REVIEW_CREW repo/environment variable) whose seats and
          # staffing profiles/models are defined in the runner's
          # ~/.darkmux/profiles.json. This workflow never names a model.
          #
          # Resilient: a hiccup leaves no/empty envelope; the review dispatch's own
          # degraded-mode handling (below) turns that into a loud comment plus
          # a failed run rather than a silent green check.
          # --bundler: darkmux-public's own source is Rust, not the
          # built-in bundler's TypeScript — without this every self-review
          # produced 0 bundles -> degenerate (darkmux#1319). Points at the
          # reference plugin built above, run through the SAME public
          # --bundler seam a third-party plugin author would use.
          darkmux pr-review run \
            --github "$REPO" \
            --head-sha "$HEAD_SHA" \
            --diff "$RUNNER_TEMP/qa/pr.diff" \
            --intent-file "$RUNNER_TEMP/qa/intent.txt" \
            --crew "$CREW" \
            --mode "$MODE" \
            --bundler "$BUNDLER_RUST_BIN" \
            ${K:+--k "$K"} \
            --envelope-out "$RUNNER_TEMP/qa/envelope.json" \
            --emit "$RUNNER_TEMP/qa/rendered.json" \
            --timeout 3600 || true

      - name: Post the review (inline comments, or summary fallback)
        if: steps.diff.outputs.has_diff == 'true'
        run: |
          set -euo pipefail
          if [ ! -s "$RUNNER_TEMP/qa/rendered.json" ]; then
            # The dispatch above never wrote a rendered payload at all (e.g. it
            # crashed before its own degraded-mode fallback could run). Same
            # "never read as a green check" contract as mode=degraded (#1113).
            gh pr comment "$PR" --repo "$REPO" --body \
              ":warning: darkmux PR review produced no output (crew=\`$CREW\` mode=\`$MODE\`) — see workflow logs."
            echo "::error::review dispatch produced no rendered payload"
            exit 1
          fi
          MODE_RESULT=$(jq -r .mode "$RUNNER_TEMP/qa/rendered.json")
          case "$MODE_RESULT" in
            review)
              jq .review "$RUNNER_TEMP/qa/rendered.json" > "$RUNNER_TEMP/qa/review.json"
              gh api "repos/$REPO/pulls/$PR/reviews" --input "$RUNNER_TEMP/qa/review.json" ;;
            degraded)
              # (#1113) NO review signal (dead dispatch / empty reply /
              # vacuous pass). Post the honest note, then FAIL this run —
              # a produced-nothing review must never read as a green check.
              jq -r .comment "$RUNNER_TEMP/qa/rendered.json" > "$RUNNER_TEMP/qa/comment.md"
              gh pr comment "$PR" --repo "$REPO" --body-file "$RUNNER_TEMP/qa/comment.md"
              echo "::error::review dispatch produced no usable review (mode=degraded)"
              exit 1 ;;
            *)
              jq -r .comment "$RUNNER_TEMP/qa/rendered.json" > "$RUNNER_TEMP/qa/comment.md"
              gh pr comment "$PR" --repo "$REPO" --body-file "$RUNNER_TEMP/qa/comment.md" ;;
          esac

      - name: Upload review envelope (debugging + audit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-envelope
          path: ${{ runner.temp }}/qa/envelope.json
          if-no-files-found: ignore
          retention-days: 14
