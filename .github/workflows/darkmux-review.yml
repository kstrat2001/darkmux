# darkmux self-review — darkmux reviews its own PRs, in public, on a local model.
#
# darkmux dogfooding itself: a PR diff is dispatched to darkmux's own tool-less
# `pr-reviewer` role running on a LOCAL LMStudio model (no cloud API), on a
# self-hosted runner, and the findings post back as native inline PR comments.
# The work product of darkmux's local-AI review is visible right on the PR.
#
# SECURITY (public repo + self-hosted runner): the trigger is **workflow_dispatch
# only** — it never fires on a `pull_request` event, so a stranger's PR (or a
# fork) can NOT auto-run anything on the runner. Only someone with write access
# launches it (`gh workflow run darkmux-review.yml -f pr=<n>`), and even then the
# job NEVER checks out the reviewed PR's code: it reads only the PR *diff* via
# the API (data, not executed) and feeds it to the sandboxed, network-isolated
# internal runtime. The repo checkout below is of trusted `main` (the review
# tooling), not the PR. Runner registration + prerequisites: see
# .github/DARKMUX_REVIEW_RUNNER.md.
name: darkmux self-review

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to review"
        required: true
        type: string
      role:
        description: "darkmux crew role to dispatch (default: pr-reviewer). Override to test another reviewer role (#1057)."
        required: false
        default: "pr-reviewer"
        type: string
      profile:
        description: "darkmux profile to dispatch with (default: diff-review). Must be defined on the runner; falls back to default_profile if not (#1057)."
        required: false
        default: "diff-review"
        type: string

concurrency:
  group: darkmux-review-${{ inputs.pr }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: [self-hosted, darkmux-review]
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ inputs.pr }}
      REPO: ${{ github.repository }}
      REVIEW_ROLE: ${{ inputs.role }}
      REVIEW_PROFILE: ${{ inputs.profile }}
    steps:
      - name: Checkout review tooling (trusted main — NOT the reviewed PR)
        uses: actions/checkout@v4
        # Brings the review/posting script from this repo at the dispatch ref
        # (main). The reviewed PR's code is never checked out — only its diff is
        # read via the API below — so untrusted PR code never lands on the runner.

      - name: Fetch PR diff (API only — no PR checkout, no code execution)
        id: diff
        run: |
          set -euo pipefail
          # Defense-in-depth: the `pr` input is maintainer-supplied, but pin it to
          # digits so only a valid PR number ever reaches the gh/API calls below.
          case "$PR" in ''|*[!0-9]*) echo "pr input must be a number"; exit 1 ;; esac
          mkdir -p "$RUNNER_TEMP/qa"
          gh pr diff "$PR" --repo "$REPO" > "$RUNNER_TEMP/qa/pr.diff"
          # Capped copy for the model's context; the full diff is kept for
          # line-anchor validation when posting inline comments.
          head -c 80000 "$RUNNER_TEMP/qa/pr.diff" > "$RUNNER_TEMP/qa/pr.capped.diff"
          if [ -s "$RUNNER_TEMP/qa/pr.capped.diff" ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build the review prompt (intent + diff — the rubric lives in the role)
        if: steps.diff.outputs.has_diff == 'true'
        run: |
          set -euo pipefail
          # #1053: a reviewer that doesn't know the change's INTENT flags the very
          # bug the PR fixes (the "restate-the-fix" false positive). Supply the
          # author's own title + description so the role can assess the diff against
          # its stated purpose. This is procedural (a `gh` fetch) — NO AI in the
          # loop, so it stays within the runner's no-LLM-API constraint. The body
          # is the author's data (not executed) and is capped for the model's
          # context budget; an empty body is fine (the role infers from title+diff).
          PRTITLE=$(gh pr view "$PR" --repo "$REPO" --json title --jq .title)
          PRBODY=$(gh pr view "$PR" --repo "$REPO" --json body --jq '.body // ""')
          # Cap for the model's context budget via a bash substring, NOT `| head`:
          # under `set -o pipefail`, head closing the pipe early would SIGPIPE gh
          # (141) and abort the step on any body over the cap.
          PRBODY="${PRBODY:0:8000}"
          {
            printf 'PR #%s in %s: %s\n' "$PR" "$REPO" "$PRTITLE"
            echo
            echo "Description (the author's stated intent for this change):"
            if [ -n "$PRBODY" ]; then
              printf '%s\n' "$PRBODY"
            else
              echo "(no description provided)"
            fi
            echo
            echo "Respond per your role contract (the single JSON object). Assess the"
            echo "diff against the stated intent above. The full diff is below; you"
            echo "have only this diff."
            echo
            echo '```diff'
            cat "$RUNNER_TEMP/qa/pr.capped.diff"
            echo '```'
          } > "$RUNNER_TEMP/qa/prompt.txt"

      - name: darkmux reviewer dispatch (local model — no LLM API)
        if: steps.diff.outputs.has_diff == 'true'
        run: |
          # Defense-in-depth: the `role` + `profile` inputs are maintainer-supplied
          # (workflow_dispatch is maintainer-only), but constrain them to a sane
          # charset before they reach the dispatch args.
          case "$REVIEW_ROLE" in ''|*[!a-zA-Z0-9_.-]*) echo "role input must match [a-zA-Z0-9_.-]"; exit 1 ;; esac
          case "$REVIEW_PROFILE" in ''|*[!a-zA-Z0-9_.-]*) echo "profile input must match [a-zA-Z0-9_.-]"; exit 1 ;; esac
          # The dispatched role defaults to `pr-reviewer`, overridable via the
          # `role` workflow input (#1057) to test another reviewer role.
          # Model selection lives on the MACHINE, not in this public workflow
          # (#1054): `--profile <name>` NAMES the profile this dispatch wants
          # (default `diff-review`, overridable via the `profile` workflow input — #1057
          # — to test other profiles/models). The runner defines that profile in
          # its ~/.darkmux/profiles.json pointing at a lab-validated model. The
          # workflow can't know which machine it lands on, so it names an intent and
          # lets the machine map it to a model that worked in its lab — one that
          # emits its answer in the message content (qwen3-8b does; qwen3_5-family
          # thinking models route to reasoning_content and yield empty reviews). A
          # runner that hasn't defined the named profile falls back to its
          # default_profile. See .github/DARKMUX_REVIEW_RUNNER.md.
          #
          # Resilient: a hiccup leaves no/empty envelope and the posting script
          # falls back to a summary note rather than red-X'ing the PR.
          darkmux crew dispatch "$REVIEW_ROLE" \
            --profile "$REVIEW_PROFILE" \
            --json \
            --timeout 900 \
            --session-id "darkmux-review-pr${PR}" \
            --message-from-file "$RUNNER_TEMP/qa/prompt.txt" \
            > "$RUNNER_TEMP/qa/envelope.json" 2> "$RUNNER_TEMP/qa/err.log" || true

      - name: Post the review (inline comments, or summary fallback)
        if: steps.diff.outputs.has_diff == 'true'
        run: |
          set -euo pipefail
          # Render with darkmux's binary-owned renderer (#1060): resolve each
          # finding's quoted anchor to a line and build the review payload. The
          # render is versioned WITH the pr-reviewer role schema (no copied
          # script to drift); this workflow keeps the gh post, so the operator
          # still controls the trigger + how findings land.
          darkmux pr-review render \
            --envelope "$RUNNER_TEMP/qa/envelope.json" \
            --diff "$RUNNER_TEMP/qa/pr.diff" \
            --emit "$RUNNER_TEMP/qa/rendered.json"
          MODE=$(jq -r .mode "$RUNNER_TEMP/qa/rendered.json")
          case "$MODE" in
            review)
              jq .review "$RUNNER_TEMP/qa/rendered.json" > "$RUNNER_TEMP/qa/review.json"
              gh api "repos/$REPO/pulls/$PR/reviews" --input "$RUNNER_TEMP/qa/review.json" ;;
            degraded)
              # (#1113) NO review signal (dead dispatch / empty reply /
              # vacuous pass). Post the honest note, then FAIL this run —
              # a produced-nothing review must never read as a green check.
              jq -r .comment "$RUNNER_TEMP/qa/rendered.json" > "$RUNNER_TEMP/qa/comment.md"
              gh pr comment "$PR" --repo "$REPO" --body-file "$RUNNER_TEMP/qa/comment.md"
              echo "::error::review dispatch produced no usable review (mode=degraded)"
              exit 1 ;;
            *)
              jq -r .comment "$RUNNER_TEMP/qa/rendered.json" > "$RUNNER_TEMP/qa/comment.md"
              gh pr comment "$PR" --repo "$REPO" --body-file "$RUNNER_TEMP/qa/comment.md" ;;
          esac
