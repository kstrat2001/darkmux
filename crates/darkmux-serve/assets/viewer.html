<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>darkmux · observability viewer</title>
<!-- (#1403) Standalone-app shell. The operator runs the viewer as a chromeless
     home-screen shortcut on mobile, so these make the shortcut behave like an
     app: manifest (display:standalone), apple-mobile-web-app metas, a
     same-origin app icon, and a theme color matching the dark chrome. Every
     asset is served same-origin by the daemon (routes in src/lib.rs) — the
     viewer is self-contained by convention (no external fetches anywhere;
     there is no CSP header — XSS defense is output-encoding plus the e2e
     gate). On the static demo (GitHub Pages) these paths 404 harmlessly; the
     demo is not a standalone app. -->
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="darkmux">
<meta name="theme-color" content="#0a0a0b">
<!--
  The canonical darkmux observability viewer. ONE file, served three ways:

   - `darkmux serve` at `GET /` (and darkmux.com/viewer) — LIVE: fetches real
     flow records from the daemon's `/flow/<date>` and tails new ones via SSE.
   - `GET /play/<date>` — PLAYBACK of a recorded day from the daemon.
   - darkmux.com/demo — PLAYBACK of a committed flow file
     (docs/demo/demo-flow.jsonl), generated from THIS file by
     scripts/build-demo.sh which injects `mode=play` + `darkmux-flow-src`.

  The demo is this viewer in playback mode loading a real flow file, so it's
  identical to a local `/play` — there is no demo fork. Edit this file; for the
  demo, also run `scripts/build-demo.sh` (CI fails on drift).
-->

<style>
  :root{
    --bg:#0a0a0b; --bg2:#131316; --panel:#1c1c22; --line:#1f1f24;
    --text:#e8e6e3; --muted:#8a8a92; --amber:#6df1ff; --amber-dim:#2a8a96;
    --good:#5af0a3; --warn:#ffb86b; --bad:#ff6b85; --run:#ffd166;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100vh;background:var(--bg);color:var(--text);font:14px/1.4 'Inter',-apple-system,system-ui,sans-serif;overflow:hidden}
  .top{height:46px;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);background:var(--bg2)}
  .brand{font-weight:700;letter-spacing:.04em}.brand b{color:var(--amber)}.brand a{color:inherit;text-decoration:none}.brand a:hover b{text-decoration:underline}
  /* (#1129) Build identifier — version (+ git SHA) and flow-schema the daemon injects; empty on the static demo. */
  /* (#1132) When populated (daemon-served) it's the trigger for the about modal. */
  .ver{font:11px/1 'JetBrains Mono',monospace;color:var(--muted);letter-spacing:.02em}
  .ver[data-act]{cursor:pointer}.ver[data-act]:hover{color:var(--text)}
  .topnav{margin-left:auto;display:flex;gap:18px;align-items:center}
  .topnav a{color:var(--muted);text-decoration:none;font:600 12px 'JetBrains Mono',monospace;letter-spacing:.04em}
  .topnav a:hover{color:var(--amber)}
  .badge{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:#0a0a0b;background:var(--amber);padding:5px 9px;border-radius:3px}
  /* (#1098) the source/date badge ("today") doubles as the history trigger when
     a daemon is behind it — looks like a button, opens the catalog (the old ▤
     button read as a "stop" glyph). */
  .badge.srcbtn{cursor:pointer}
  .badge.srcbtn:hover{box-shadow:0 0 0 2px var(--amber-dim)}
  .pb{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);border:1px solid var(--amber-dim);padding:4px 9px;border-radius:3px}
  .catpanel{position:absolute;top:48px;left:16px;z-index:60;background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:5px;min-width:300px;max-width:min(420px,92vw);max-height:60vh;overflow:auto;box-shadow:0 10px 30px rgba(0,0,0,.55)}
  .catpanel .cathdr{font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:7px 8px 4px}
  .catrow{display:block;width:100%;text-align:left;background:none;border:0;color:var(--text);padding:7px 9px;border-radius:4px;cursor:pointer}
  .catrow:hover{background:var(--amber-dim)}
  .catrow .cd{font:600 13px/1.2 Inter,sans-serif}
  .catrow .cs{color:var(--muted);font:11px/1.3 Inter,sans-serif;margin-top:2px}
  .catrow.live .cd{color:var(--amber)}
  .catempty{color:var(--muted);font:12px/1.4 Inter,sans-serif;padding:8px 9px}
  @keyframes lpulse{0%,100%{opacity:1}50%{opacity:.5}}
  /* (#1071) live-MODE badge is cyan, not green — green now means a SUCCESSFUL
     run (status convention). The badge is a viewing-mode cue, not a verdict. */
  .pb.live{color:var(--amber);border-color:var(--amber);animation:lpulse 1.6s ease-in-out infinite}
  /* (#238) Respect prefers-reduced-motion: drop the infinite live-badge pulse
     (and shorten transitions) for vestibular accessibility. Live state stays
     distinguishable WITHOUT motion — the badge keeps its cyan color, the "●"
     glyph, and the word "live" (vs "▣ playback"); recents stay dimmed + labeled.

     The universal `*` reset is the canonical reduced-motion pattern, chosen
     deliberately over a targeted selector: it's robust to future animations
     (which SHOULD also be reduced — correctness must never depend on motion).
     Safe here — this viewer's only animation is the decorative `lpulse`; the
     rest are sub-150ms hover transitions (no spinners / progress / motion-gated
     state). `.001ms` (not 0) keeps animationend/transitionend events firing. */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
  }
  .crumbbar{height:40px;display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid var(--line);background:#131316}
  .crumb{font:600 13px 'JetBrains Mono',monospace;color:var(--muted)}
  .crumb a{color:var(--amber);cursor:pointer;text-decoration:none}.crumb a:hover{text-decoration:underline}
  /* (#827) missions index rows */
  .milist{margin-top:6px}
  .mirow{display:flex;align-items:center;gap:14px;padding:11px 12px;border:1px solid var(--line);border-radius:7px;margin-bottom:8px;cursor:pointer;background:var(--panel)}
  .mirow:hover{border-color:var(--amber-dim)}
  .midimrow{opacity:.55}
  .mistatus{font:600 10px/1 'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;padding:3px 7px;border-radius:3px;border:1px solid var(--line);color:var(--muted);flex:0 0 auto}
  .mistatus.active{color:var(--good);border-color:var(--good)}
  .mistatus.finalized{color:var(--muted)}
  .mistatus.paused{color:var(--warn);border-color:var(--warn)}
  .miname{font:600 13px 'JetBrains Mono',monospace;color:var(--amber);flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .miprog{display:inline-flex;align-items:center;gap:7px;font:11px 'JetBrains Mono',monospace;color:var(--muted);flex:0 0 auto}
  .mibar{display:inline-block;width:60px;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
  .mibar span{display:block;height:100%;background:var(--good)}
  .mimeta{font:11px 'JetBrains Mono',monospace;color:var(--muted);flex:0 0 auto}
  .midim{font:11px 'JetBrains Mono',monospace;color:var(--muted)}
  .mitag{font:600 10px 'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.06em;padding:3px 7px;border-radius:3px;color:var(--muted);background:var(--bg2);border:1px dashed var(--line);flex:0 0 auto}

  /* (#1247 Part 3) Lab observer lens — machine-local room, distinct from the
     fleet/missions lenses' flow-record chrome. MOBILE-FIRST throughout: every
     rule below is single-column / stacking by default (flex-wrap, no fixed
     widths beyond small badges); the `.wrap` reflow to full-width `.stage`
     happens via `.lab-mode` below, and `@media(max-width:768px)` only adds
     touch-target sizing on top, matching the rest of this file's convention. */
  body.lab-mode .log,body.lab-mode .split,body.lab-mode .scrub{display:none}
  body.lab-mode .wrap{display:block;height:auto}
  body.lab-mode .stage{padding:16px 16px 32px}
  .lablist{display:flex;flex-direction:column;gap:14px;margin-top:10px}
  .labnotice{font:12px/1.5 'JetBrains Mono',monospace;color:var(--warn);border:1px solid var(--warn);border-radius:6px;padding:9px 12px;margin-top:10px;overflow-wrap:anywhere}
  .labtaskcard{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px 14px}
  .labtaskhdr{font:600 13px 'JetBrains Mono',monospace;color:var(--amber);display:flex;flex-wrap:wrap;align-items:baseline;gap:8px;margin-bottom:8px}
  .labtaskcount{font:600 10px 'JetBrains Mono',monospace;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
  .labrunrow{display:flex;flex-direction:column;gap:4px;padding:10px 11px;border:1px solid var(--line);border-radius:6px;background:var(--bg2);cursor:pointer;margin-bottom:6px}
  .labrunrow:last-child{margin-bottom:0}
  .labrunrow:hover{border-color:var(--amber-dim)}
  .labrunrow:focus-visible{outline:2px solid var(--amber);outline-offset:1px}
  .labrunmain{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
  .labruncrew{font:600 12px 'JetBrains Mono',monospace;color:var(--text)}
  .labrundir{font:11px 'JetBrains Mono',monospace;color:var(--muted);overflow-wrap:anywhere}
  .labrunmeta{font:11px/1.4 'JetBrains Mono',monospace;color:var(--text);overflow-wrap:anywhere}
  .labrunmeta.dim{color:var(--muted)}
  .labdegenerate{color:var(--bad);font-weight:600}
  .labdiffline{font:11px/1.4 'JetBrains Mono',monospace;color:var(--good);padding:2px 0 8px 6px;border-left:2px solid var(--good);margin:-2px 0 6px 4px;overflow-wrap:anywhere}
  .labdiffline.warn{color:var(--warn);border-left-color:var(--warn)}
  .labdiffline.dim{color:var(--muted);border-left-color:var(--line)}
  .labbadge{display:inline-block;font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:3px;border:1px solid var(--line);flex:0 0 auto}
  .labbadge.finished{color:var(--good);border-color:var(--good)}
  .labbadge.live{color:var(--amber);border-color:var(--amber);animation:lpulse 1.6s ease-in-out infinite}
  /* Pipeline strip — a VERTICAL stage list always (not just on mobile): a
     stacked list reads cleanly at any width and keeps this lens's CSS
     surface small; see the PR notes for the deliberate no-horizontal-strip
     simplification. */
  .labpipe{display:flex;flex-direction:column;gap:6px;margin:14px 0}
  .labstage{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px;padding:9px 11px;border:1px solid var(--line);border-radius:6px;background:var(--panel)}
  .labstage.pending{opacity:.55}
  .labstage.started{border-color:var(--run)}
  .labstage.finished{border-color:var(--good)}
  .labstage.error{border-color:var(--bad)}
  .labstage.synth{border-style:dashed}
  .labstagename{font:600 11px 'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);min-width:90px}
  .labstagemeta{font:11px 'JetBrains Mono',monospace;color:var(--muted);overflow-wrap:anywhere}
  .labcli{display:flex;flex-direction:column;gap:4px;padding:10px 12px;border:1px dashed var(--line);border-radius:6px;background:var(--bg2);margin-bottom:14px}
  .labclilbl{font:600 10px 'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  .labcli code{font:12px/1.5 'JetBrains Mono',monospace;color:var(--text);overflow-wrap:anywhere;user-select:all}
  .labfeedhdr{font:600 12px 'JetBrains Mono',monospace;color:var(--muted);margin-bottom:6px}
  .labfeed{display:flex;flex-direction:column;gap:2px;max-height:none}
  .labfeedrow{display:flex;flex-wrap:wrap;gap:8px;padding:5px 8px;border-radius:4px;font:11px/1.4 'JetBrains Mono',monospace}
  .labfeedrow:nth-child(odd){background:var(--panel)}
  .labfeedts{color:var(--muted);flex:0 0 auto}
  .labfeedtag{color:var(--amber-dim);flex:0 0 auto;text-transform:uppercase;font-weight:600}
  .labfeedtext{color:var(--text);overflow-wrap:anywhere}
  .labfeedrow.host{color:var(--muted)}
  .labfeedrow.host .labfeedtext{color:var(--muted)}
  .labfeedrow.ruling.confirmed .labfeedtext{color:var(--good)}
  .labfeedrow.ruling.needs_check .labfeedtext{color:var(--warn)}
  .labfeedrow.ruling.false_positive .labfeedtext,.labfeedrow.ruling.error .labfeedtext{color:var(--bad)}
  .labfeedrow.task{font-weight:600}

  /* (#1286) Machine memory lens — the live potential-vs-current ledger.
     MOBILE-FIRST like the lab lens: single column, full-width bars, no fixed
     widths (the operator watches from a phone over the tailnet); the media
     query below only adds touch-target sizing. Shares the lab lens's
     full-width no-flow-chrome reflow via its own body class. */
  body.machine-mode .log,body.machine-mode .split,body.machine-mode .scrub{display:none}
  body.machine-mode .wrap{display:block;height:auto}
  body.machine-mode .stage{padding:16px 16px 32px}
  /* (UI nit, 2026-07-13) `.wrap{height:auto}` above lets machine/lab-mode
     content grow past the viewport; without an overflow escape on the
     document itself, `html,body{overflow:hidden;height:100vh}` (the
     desktop split-pane default) just silently clips anything past the
     fold — e.g. the "warnings" card at the bottom of a long machine-memory
     read. Scoped to these two modes only; the flow/mission views keep the
     desktop-locked layout `.stage{overflow:auto}` already handles. */
  body.machine-mode,body.lab-mode{overflow:auto;height:auto;min-height:100vh}
  html:has(body.machine-mode),html:has(body.lab-mode){overflow:auto;height:auto;min-height:100vh}
  /* Was a hardcoded 760px even though the log panel is hidden in this mode
     (full width available) — widened so wide/ultrawide monitors don't
     waste most of the screen on a single narrow column of cards. */
  .memwrap{display:flex;flex-direction:column;gap:12px;margin-top:10px;max-width:min(1200px,92vw)}
  .memcard{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px 14px}
  .memcard.green{border-color:var(--good)}
  .memcard.amber{border-color:var(--warn)}
  .memcard.red{border-color:var(--bad)}
  .memhdr{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px;margin-bottom:4px}
  .memname{font:600 12px 'JetBrains Mono',monospace;color:var(--text);overflow-wrap:anywhere}
  .memowner{font:600 9px 'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:3px;padding:2px 5px;flex:0 0 auto}
  .memstate{font:600 10px 'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:3px;border:1px solid var(--line);color:var(--muted);margin-left:auto;flex:0 0 auto}
  .memstate.green{color:var(--good);border-color:var(--good)}
  .memstate.amber{color:var(--warn);border-color:var(--warn)}
  .memstate.red{color:var(--bad);border-color:var(--bad)}
  /* current fill INSIDE the potential outline (#1286 chart shape) */
  .membar{position:relative;height:26px;border:1px solid var(--line);border-radius:5px;background:var(--bg2);overflow:hidden;margin:6px 0 4px}
  .membar .pot{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.05);border-right:2px dashed var(--muted)}
  .membar .cur{position:absolute;left:0;top:0;bottom:0;opacity:.55}
  .membar .cur.green{background:var(--good)}
  .membar .cur.amber{background:var(--warn)}
  .membar .cur.red{background:var(--bad);opacity:.65}
  .membar .cur.unknown{background:var(--muted);opacity:.3}
  .membar .lim{position:absolute;top:0;bottom:0;width:2px;background:var(--amber)}
  .membar .poolline{position:absolute;top:0;bottom:0;width:2px;background:var(--muted);opacity:.7}
  .memmeta{font:11px/1.5 'JetBrains Mono',monospace;color:var(--muted);overflow-wrap:anywhere}
  .memhint{font:11px/1.4 'JetBrains Mono',monospace;color:var(--warn);border-left:2px solid var(--warn);padding:2px 0 2px 8px;margin-top:6px;overflow-wrap:anywhere}
  .memrow{display:flex;flex-wrap:wrap;gap:8px;font:11px/1.6 'JetBrains Mono',monospace}
  .memrow .k{color:var(--muted);min-width:118px}
  .memrow .v{color:var(--text);overflow-wrap:anywhere}
  .memrow .v.bad{color:var(--bad);font-weight:600}
  .memfoot{font:10px/1.6 'JetBrains Mono',monospace;color:var(--muted);overflow-wrap:anywhere}
  .memwarn{font:11px/1.5 'JetBrains Mono',monospace;color:var(--warn);overflow-wrap:anywhere}
  @media(max-width:768px){.membar{height:34px}}

  /* (#827) fleet | missions lens toggle — two co-equal views of the fleet */
  .lenstabs{display:inline-flex;border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .lens{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:5px 11px;cursor:pointer;text-decoration:none;background:none}
  .lens+.lens{border-left:1px solid var(--line)}
  .lens:hover{color:var(--text)}
  .lens.on{background:var(--amber-dim);color:#0a0f17}
  .crumb .sep{color:var(--amber-dim);margin:0 6px}
  .meta{margin-left:auto;font:11px/1.4 'JetBrains Mono',monospace;color:var(--muted);text-align:right}.meta b{color:var(--text)}
  .wrap{display:flex;height:calc(100vh - 46px - 40px - 64px)}
  .stage{flex:1;position:relative;overflow:auto;padding:24px}
  .log{width:380px;border-left:1px solid var(--line);background:var(--bg2);display:flex;flex-direction:column}
  .detail{display:flex;flex-direction:column;padding:12px 14px 0;background:#131316}
  #detailbody{flex:1;overflow:auto;min-height:0;padding-bottom:12px}
  .split{height:7px;flex:none;background:var(--line);cursor:row-resize}
  .split:hover{background:var(--amber-dim)}
  .dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .dt{font:600 11px 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  /* (#1098) filter (funnel) + follow (clock) are grouped icon buttons in the log header */
  .logbtns{display:inline-flex;align-items:center;gap:6px;flex:none}
  .follow{display:inline-flex;align-items:center;justify-content:center;padding:5px;border-radius:6px;cursor:pointer;border:1px solid var(--line);color:var(--muted);background:none}
  .follow:hover{border-color:var(--amber-dim);color:var(--amber)}
  .follow.on{color:var(--amber);border-color:var(--amber-dim)}
  .fbtn svg,.follow svg{width:16px;height:16px;display:block}
  .fdot{color:var(--amber);font-size:11px;line-height:1;margin-left:1px}
  .detail pre{margin:0;padding:10px 12px;background:var(--bg);border:1px solid var(--line);border-radius:5px;color:var(--text);white-space:pre-wrap;font:11px/1.55 'JetBrains Mono',monospace}
  .detail pre .k{color:var(--muted)}
  .detail .none{color:var(--muted);font:11px 'JetBrains Mono',monospace;padding:10px 0}
  .loglist{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .loghead{flex:none;padding:10px 14px 8px;border-bottom:1px solid var(--line)}
  .loglist h3{margin:0;font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .logsearch{display:flex;align-items:center;gap:10px;margin-top:8px}
  .searchbox{position:relative;flex:1;min-width:0;display:flex;align-items:center}
  .searchbox .sicon{position:absolute;left:9px;font-size:14px;line-height:1;color:var(--muted);pointer-events:none;transition:color .15s}
  .searchbox input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:7px 28px;font:12px 'JetBrains Mono',monospace;transition:border-color .15s,box-shadow .15s}
  .searchbox input::-webkit-search-cancel-button{-webkit-appearance:none;appearance:none}
  .searchbox input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(109,241,255,.12)}
  .searchbox input:focus-visible{outline:none}
  .searchbox.has-q .sicon{color:var(--amber-dim)}
  .searchbox:focus-within .sicon{color:var(--amber)}
  .searchbox input::placeholder{color:var(--muted);font-style:italic}
  .sclear{position:absolute;right:5px;display:flex;align-items:center;justify-content:center;width:18px;height:18px;padding:0;border:none;border-radius:50%;background:none;color:var(--muted);font-size:11px;line-height:1;cursor:pointer;transition:color .12s,background .12s}
  .sclear:hover{color:var(--text);background:var(--panel)}
  .sclear:focus-visible{outline:none;color:var(--amber);box-shadow:0 0 0 2px var(--amber-dim)}
  .sclear[hidden]{display:none}
  /* (#1090) visible keyboard-focus ring for the delegated drill-nav cards
     (role=button + tabindex added at runtime). :focus-visible = keyboard only,
     so mouse clicks don't draw a ring. */
  [data-act]:focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:4px}
  .qcount{flex:none;font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:.04em;color:var(--amber-dim);white-space:nowrap;padding:3px 7px;border:1px solid var(--line);border-radius:10px;opacity:0;transition:opacity .15s}
  .qcount.show{opacity:1}
  .qcount.zero{color:var(--bad);border-color:rgba(255,107,133,.35)}
  #logbody{flex:1;overflow:auto;padding:8px 14px 10px}
  .fbtn{display:inline-flex;align-items:center;justify-content:center;gap:1px;background:none;border:1px solid var(--line);color:var(--muted);padding:5px;border-radius:6px;cursor:pointer}
  .fbtn:hover{border-color:var(--amber-dim);color:var(--amber)}
  .fbtn.on{border-color:var(--amber);color:var(--amber)}
  .rec{font:11px/1.5 'JetBrains Mono',monospace;color:var(--muted);padding:5px 6px;border-bottom:1px solid var(--line);cursor:pointer;border-left:2px solid transparent}
  .rec:hover{background:#1c1c22}
  .rec.sel{background:#23232b;border-left:2px solid var(--amber);color:var(--text)}
  .rec .t{color:var(--amber)}.rec .tag{color:var(--text)}.rec.telemetry .tag{color:var(--warn)}
  .empty{color:var(--muted);font:11px 'JetBrains Mono',monospace;padding:10px 2px}
  .scrub{height:64px;border-top:1px solid var(--line);background:var(--bg2);display:flex;align-items:center;gap:14px;padding:0 18px}
  .scrub button{background:var(--bg);border:1px solid var(--amber-dim);color:var(--text);padding:7px 14px;border-radius:4px;cursor:pointer;font:600 12px 'JetBrains Mono',monospace}
  .scrub button.primary{background:var(--amber);color:#0a0a0b;border-color:var(--amber)}
  /* Live mode follows the tail — historical replay lives at /play/<date>. Hide
     the playback transport and reclaim its reserved 64px back into .wrap. */
  body.live-mode .scrub{display:none}
  body.live-mode .wrap{height:calc(100vh - 46px - 40px)}
  input[type=range]{flex:1;accent-color:var(--amber)}
  .clock{font:12px 'JetBrains Mono',monospace;color:var(--muted);min-width:160px;text-align:right}
  .fleet{display:flex;gap:16px;flex-wrap:wrap;align-items:stretch}
  .fleettl{margin-top:30px;border-top:1px solid var(--line);padding-top:18px}
  .tlhdr{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  /* (#1151) activity-timeline window presets — a mini segmented control,
     mirroring the .lens lens-tabs vocabulary at a smaller scale. */
  .twin{display:inline-flex;border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .twinb{font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:.06em;color:var(--muted);padding:4px 8px;cursor:pointer;background:none;border:0;text-transform:uppercase}
  .twinb+.twinb{border-left:1px solid var(--line)}
  .twinb:hover{color:var(--text)}
  .twinb.on{background:var(--amber-dim);color:#0a0f17}
  .lane{display:flex;align-items:center;gap:12px;margin-bottom:7px}
  .lname{width:var(--lname-w,150px);flex:none;font:12px 'JetBrains Mono',monospace;color:var(--text);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tltrack{position:relative;flex:1;height:28px;background:var(--panel);border:1px solid var(--line);border-radius:4px;overflow:hidden}
  /* (#1071) activity-timeline bars share the status convention: running=yellow
     (pulse), complete=green, canceled=orange, failed=red. */
  .sbar{position:absolute;top:5px;height:18px;background:var(--muted);border-radius:3px;min-width:2px}
  /* (#1092) status cue is color + PATTERN, not color alone — distinguishable
     without hue, and the patterns are static so they survive
     prefers-reduced-motion (which drops the run pulse): run = diagonal stripes ·
     done = solid · canceled = vertical stripes · err = cross-hatch. */
  .sbar.run{background-color:var(--run);box-shadow:0 0 6px var(--run);animation:lpulse 1.6s ease-in-out infinite;background-image:repeating-linear-gradient(45deg,rgba(0,0,0,.34) 0 2px,transparent 2px 5px)}
  .sbar.done{background-color:var(--good)}
  .sbar.canceled{background-color:var(--warn);background-image:repeating-linear-gradient(90deg,rgba(0,0,0,.34) 0 2px,transparent 2px 5px)}
  .sbar.err{background-color:var(--bad);background-image:repeating-linear-gradient(45deg,rgba(0,0,0,.36) 0 1.5px,transparent 1.5px 4px),repeating-linear-gradient(135deg,rgba(0,0,0,.36) 0 1.5px,transparent 1.5px 4px)}
  .tltrack .ph{position:absolute;top:0;bottom:0;width:2px;background:var(--text);opacity:.32}
  .tlaxis{margin-left:calc(var(--lname-w,150px) + 12px);display:flex;justify-content:space-between;font:9px 'JetBrains Mono',monospace;color:var(--muted);margin-top:7px}
  .tlempty{font:11px 'JetBrains Mono',monospace;color:var(--muted)}
  .mach{width:248px;display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;cursor:pointer;transition:border-color .15s}
  .mach:hover{border-color:var(--amber-dim)}.mach.active{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber-dim)}
  .mach .name{font:600 15px 'JetBrains Mono',monospace;color:var(--text);display:flex;align-items:center;gap:8px}
  .mico{display:inline-flex;color:var(--amber-dim)}.mico svg{width:19px;height:19px;display:block}
  .mach.active .mico{color:var(--amber)}
  .mach .spec{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-top:3px}
  .mach .specdim{opacity:.5;font-style:italic}
  .mach .stat{margin-top:12px;font:12px 'JetBrains Mono',monospace}
  .mach .runs{margin-top:5px;font:12px 'JetBrains Mono',monospace;color:var(--text)}
  .mach .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber-dim);margin-right:7px;vertical-align:middle}
  .mach.active .dot{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .mach.absent{opacity:.45}.mach.absent .dot{background:var(--muted);box-shadow:none}
  .hint{display:block;color:var(--muted);font:11px 'JetBrains Mono',monospace;margin-top:10px}
  .stagehdr{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-bottom:14px}
  .stagehdr a{color:var(--amber);cursor:pointer;text-decoration:none}.stagehdr a:hover{text-decoration:underline}
  .node{display:inline-block;width:260px;vertical-align:top;margin:0 24px 24px 0;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;cursor:pointer}
  .node:hover{border-color:var(--amber-dim)}.node .h{font:600 13px 'JetBrains Mono',monospace;display:flex;align-items:center;gap:8px}
  .nico{display:inline-flex;color:var(--amber-dim);flex:none}.nico svg{width:17px;height:17px;display:block}
  .node .s{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-top:4px;overflow-wrap:anywhere}
  .node .s.tsline{color:var(--amber-dim);margin-top:6px}
  .pill{display:inline-block;font:600 10px 'JetBrains Mono',monospace;padding:2px 7px;border-radius:10px;margin-top:8px}
  /* (#1071) status convention — running=yellow(pulse), complete=green,
     canceled=orange, failed=red, anomaly=cyan. */
  .pill.run{background:#2a2410;color:var(--run);animation:lpulse 1.6s ease-in-out infinite}.pill.done{background:#16261d;color:var(--good)}.pill.util{background:var(--bg2);color:var(--amber-dim);border:1px solid var(--line)}
  .pill.canceled{background:#241a12;color:var(--warn)}
  .pill.muted{background:#1c1c22;color:var(--muted)} /* neutral (e.g. utility-model residency states), not a dispatch verdict */
  .pill.warn{background:var(--bg2);color:var(--amber);border:1px solid var(--amber)}
  .pill.err{background:#2a1416;color:var(--bad)}
  .wallerr{color:var(--bad);font-weight:600}
  .node.util{cursor:default;border-left:3px solid var(--amber-dim)}.node.util:hover{border-color:var(--line)}
  .rglbl{font:11px 'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  /* (#691 Slice 2) "recent runs" — completed dispatches in live mode, dimmed so
     they read as history one click away, not current crew. */
  .rglbl.rgdim{margin-top:8px;color:var(--amber-dim)}
  .recentruns{opacity:.55}.recentruns:hover{opacity:1}
  /* (#691) recent runs as an expandable list — richer + scannable vs cards */
  .rrlist{border-top:1px solid var(--line);margin-top:2px;max-width:920px}
  .rr{border-bottom:1px solid var(--line)}
  .rr>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;padding:8px 6px;font:11px 'JetBrains Mono',monospace}
  .rr>summary::-webkit-details-marker{display:none}
  .rr>summary:hover,.rr[open]>summary{background:var(--bg2)}
  .rr .rrmain{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
  .rr .rrmeta{flex-shrink:0;color:var(--muted)}
  .rr .rrtime{flex-shrink:0;color:var(--amber-dim)}
  .rrmore{max-width:920px;text-align:center;padding:8px;cursor:pointer;font:11px 'JetBrains Mono',monospace;color:var(--amber);border-bottom:1px solid var(--line)}
  .rrmore:hover{background:var(--bg2)}
  /* New-run affordances: a row's first render slides in with a settle flash
     (one tick only — the live stage rebuilds ~1/sec, so the class is applied
     ONLY on the render where the run first appears; later rebuilds recreate
     the element without it and the animation can't replay). A dimmer accent
     bar marks rows younger than a minute so "what just landed" survives past
     the animation. Growing per-day ordinal (#N) gives every row a stable,
     scannable identity — newest = highest, numbers don't shift as new runs
     prepend. */
  .rr .rrord{flex-shrink:0;color:var(--muted);min-width:38px;text-align:right}
  .rr.rrfresh>summary{box-shadow:inset 3px 0 0 var(--green,#4ade80)}
  .rr.rrfresh .rrord{color:var(--green,#4ade80)}
  @keyframes rrslide{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:none}}
  @keyframes rrflash{from{background:rgba(74,222,128,.16)}to{background:transparent}}
  .rr.rrnew{animation:rrslide .45s ease-out}
  .rr.rrnew>summary{animation:rrflash 1.4s ease-out}
  @media (prefers-reduced-motion: reduce){.rr.rrnew,.rr.rrnew>summary{animation:none}}
  .rr>summary .pill{margin-top:0;flex-shrink:0;min-width:62px;text-align:center}
  .rrdetail{padding:4px 10px 12px 22px;font:11px 'JetBrains Mono',monospace;color:var(--muted)}
  .rrdetail .kv{display:flex;gap:10px;margin-top:4px}
  .rrdetail .kv b{color:var(--text);font-weight:600;min-width:92px;flex-shrink:0}
  .rrdetail .kv span{min-width:0;word-break:break-all}
  /* (#1127) Collapsed prompt block in the run brief. */
  .rrdetail .promptdet{border-bottom:none;margin-top:6px}
  .rrdetail .promptdet>summary{list-style:none;cursor:pointer;color:var(--amber)}
  .rrdetail .promptdet>summary::-webkit-details-marker{display:none}
  .promptbody{margin:6px 0 2px;padding:8px;background:var(--bg);border:1px solid var(--line);border-radius:4px;max-height:240px;overflow:auto;white-space:pre-wrap;word-break:break-word;font:11px/1.45 'JetBrains Mono',monospace;color:var(--text)}
  .rrdetail a{color:var(--amber);cursor:pointer}.rrdetail a:hover{text-decoration:underline}
  /* (#691) unscoped-records composition breakdown */
  .lbreakdown{max-width:560px;margin-top:2px}
  .lrow{display:flex;align-items:center;gap:12px;padding:6px 8px;border-radius:6px;font:11px 'JetBrains Mono',monospace}
  .lrow[onclick]{cursor:pointer}.lrow[onclick]:hover{background:var(--bg2)}
  .lrow.sel{background:var(--bg2);outline:1px solid var(--amber-dim)}
  .lrlbl{flex:0 0 220px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lrbar{flex:1;height:10px;background:var(--bg2);border-radius:5px;overflow:hidden}
  .lrbar>span{display:block;height:100%;background:var(--amber-dim)}
  .lrcnt{flex:0 0 auto;color:var(--muted);min-width:34px;text-align:right}
  .rghint{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-top:14px}
  .rghint a{color:var(--amber);cursor:pointer}.rghint a:hover{text-decoration:underline}
  .sub h2{font:600 13px 'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin:0 0 4px}
  .sub h2 a{color:var(--amber);text-decoration:underline;cursor:pointer}
  .track{margin:18px 0}.track .lbl{font:11px 'JetBrains Mono',monospace;color:var(--muted);margin-bottom:6px}
  .seg{display:inline-flex;align-items:center;height:30px;padding:0 12px;margin-right:2px;font:11px 'JetBrains Mono',monospace;border-radius:3px;color:#0a0a0b;background:var(--amber)}
  .seg.b{background:var(--warn)}
  .metrics{display:flex;gap:12px;margin:14px 0 4px;flex-wrap:wrap}
  .met{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:9px 14px;min-width:118px}
  .met .mv{font:600 17px 'JetBrains Mono',monospace;color:var(--text)}
  .met .ml{font:10px 'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .tokbar{height:4px;background:var(--line);border-radius:2px;margin-top:7px;overflow:hidden}.tokbar span{display:block;height:100%;background:var(--amber)}
  .cpuchart{display:flex;gap:8px;align-items:flex-end;overflow-x:auto}
  .yax{display:flex;flex-direction:column;justify-content:space-between;height:80px;font:9px 'JetBrains Mono',monospace;color:var(--muted);text-align:right}
  .bars{display:flex;align-items:flex-end;gap:6px;height:80px;border-bottom:1px solid var(--line)}.bar{width:24px;background:var(--amber-dim);border-radius:2px 2px 0 0}
  .xvals{display:flex;gap:6px;margin-top:4px}.xvals span{width:24px;text-align:center;font:9px 'JetBrains Mono',monospace;color:var(--muted)}
  .ctxchart{width:100%;height:74px;display:block;border-bottom:1px solid var(--line)}
  .loadsvg{width:100%;height:40px;display:block;border-bottom:1px solid var(--line)}
  .loadrow{margin-top:6px}
  .loadlbl{font:10px 'JetBrains Mono',monospace;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
  .loadpeak{color:var(--muted);margin-left:6px;opacity:.75}
  .finding{border:1px solid var(--line);border-left:3px solid var(--line);border-radius:5px;padding:9px 12px;margin-bottom:7px;background:var(--panel)}
  .finding.warn{border-left-color:var(--warn)}.finding.ok{border-left-color:var(--good)}
  .finding .fk{display:block;font:600 12px 'JetBrains Mono',monospace;color:var(--warn)}.finding.ok .fk{color:var(--good)}
  .finding .fm{display:block;font-size:12px;color:var(--text);margin-top:3px}
  .finding .ff{display:block;font-size:11px;color:var(--muted);margin-top:5px}
  .misslink{cursor:pointer;color:var(--amber);text-decoration:none}.misslink:hover{text-decoration:underline}
  /* (#789) activity-driven headline: running = live-green subject; idle = muted status (not a link) */
  #meta .run{color:var(--run)}
  #meta .idle{color:var(--muted);cursor:default}
  /* (#1103) the idle headline stays muted, but the status dot carries meaning:
     green = healthy/ready (matches the #1071 status convention) */
  #meta .idle .rdot{font-weight:700}
  #meta .idle .rdot.ok{color:var(--good)}
  /* (#1105) machine-count chip in the headline — the count stays in the muted
     headline color; the chip glyph is tinted like the machine cards (--amber-dim) */
  #meta .idle .mco{white-space:nowrap}
  #meta .idle .mco svg{width:13px;height:13px;vertical-align:-2px;margin-left:2px;color:var(--amber-dim)}
  #meta .metahint{color:var(--muted);font:11px 'JetBrains Mono',monospace}
  /* (#803) hybrid note — the encouraging line inside the savings card */
  .hybnote{margin-top:9px;padding-top:8px;border-top:1px solid var(--line);font:12px 'JetBrains Mono',monospace;color:var(--good)}
  /* (#807) real orchestrator notes: timestamp + history link on the note line,
     and the notes-history modal (wider than filters; notes are prose). */
  .hybts{color:var(--muted);font-size:10px}
  .hyblink{color:var(--amber);cursor:pointer;font-size:11px;margin-left:4px}.hyblink:hover{text-decoration:underline}
  .nmodal{width:540px;max-width:92vw;max-height:72vh;overflow:auto}
  .nrow{border-bottom:1px solid var(--line);padding:9px 0}.nrow:last-child{border-bottom:none}
  .nts{font:10px 'JetBrains Mono',monospace;color:var(--amber-dim)}
  .ntext{font:12px/1.5 'JetBrains Mono',monospace;color:var(--text);margin-top:3px;white-space:pre-wrap}
  /* (#1387) what-changed summary + worktree handoff — replaces the retired
     live-diff panel (#756). The daemon never ships diff content over HTTP
     any more; this renders totals + a copy/zed handoff to the worktree path. */
  .wtpath{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
  .wtpath code{font:11px/1.5 'JetBrains Mono',ui-monospace,monospace;color:var(--text);background:#0a0f17;border:1px solid var(--line);border-radius:6px;padding:6px 10px;overflow-wrap:anywhere}
  .wtcopy{background:var(--bg);border:1px solid var(--amber-dim);color:var(--text);border-radius:4px;padding:4px 10px;cursor:pointer;font:600 11px 'JetBrains Mono',monospace}
  .wtcopy:hover{border-color:var(--amber)}
  .wtzed{color:var(--amber);font:11px 'JetBrains Mono',monospace;text-decoration:none}
  .wtzed:hover{text-decoration:underline}
  /* (#783) savings hero — tokens kept off the meter. The "bang-up" on the fleet view. */
  /* (#803 layout) Horizontal hero: the big number leads on the left, the
     token-class stat blocks fill the width to its right (the breakdown now
     earns the space the old 560px cap was guarding), the hybrid note + hint
     span below. Wraps gracefully as the viewport narrows; spans the full
     content width to align with the recent-activity timeline below it (no
     width cap), and the stat blocks justify right so the breakdown fills the
     space rather than leaving a black gutter (#1095). */
  .savings{margin:0 0 18px;padding:16px 22px;border:1px solid var(--line);border-radius:10px;background:linear-gradient(180deg,rgba(74,222,128,.06),rgba(74,222,128,.01))}
  /* (#1186) "by your fleet" eyebrow frames the local + cloud numbers as one
     hybrid workforce; the cloud lead takes the brand accent (legitimate tier,
     never a warning color). */
  .saveyebrow{font:600 10px/1 'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.18em;margin-bottom:12px}
  .savrow{display:flex;align-items:center;gap:14px 40px;flex-wrap:wrap}
  .savlead{flex:0 0 auto}
  .savnum{font:700 48px/1 'JetBrains Mono',monospace;color:var(--good);letter-spacing:.01em}
  .savlead.cloud .savnum{color:var(--amber)}
  .savlbl{font:600 12px/1 'JetBrains Mono',monospace;color:var(--text);margin-top:7px;text-transform:uppercase;letter-spacing:.12em}
  .savclasses{display:flex;gap:10px 30px;flex-wrap:wrap;align-items:center;justify-content:flex-end;flex:1 1 auto}
  .savc .scv{font:600 23px/1.1 'JetBrains Mono',monospace;color:var(--text)}
  .savc.gen .scv{color:var(--good)}
  .savc.uncls .scv{color:var(--muted)}
  .savc .scl{font:10px/1.5 'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
  .hybnote .hybpre{color:var(--text);font-weight:700}
  /* (#1403) The flat mission drill-down's CSS family (.mgoal, .burn*, .sprow,
     .sps*, .spt/.spa/.spe/.sprun, .cycstrip/.cyc*, .splink, .mscope) retired
     with renderMission/renderMissionFromFlow. .mstat stays — missionBadge
     (the missions index + the static mission summary) still renders it. */
  .mstat{font:600 10px 'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;padding:2px 8px;border-radius:3px;border:1px solid var(--line);color:var(--muted);vertical-align:middle}
  .mstat.active{color:var(--good);border-color:var(--good)}.mstat.finalized{color:var(--muted)}.mstat.paused{color:var(--warn);border-color:var(--warn)}
  .preview-text{color:var(--muted);font-style:italic}
  .rec.sel .preview-text{color:rgba(232,230,227,0.7)}
  /* Per-activity glyph on each log line — scannable "what's the model doing". */
  .aico{display:inline-flex;vertical-align:-2px;width:13px;height:13px;margin-right:2px;color:var(--muted)}
  .aico svg{width:13px;height:13px}
  .aico.act-tool-call{color:var(--amber)}
  .aico.act-reasoning{color:#8ab4f8}
  .aico.act-dispatch-start{color:#4ade80}
  .aico.act-dispatch-end{color:#4ade80}
  .aico.act-compaction{color:#c084fc}
  .aico.act-routing{color:#8ab4f8}
  .aico.act-note{color:var(--amber)}
  .aico.act-dispatch-error{color:var(--warn,#f87171)}
  .aico.act-feedback{color:#8ab4f8}
  .aico.act-machine-online,.aico.act-machine-offline{color:var(--muted)}
  .detail-card{padding:14px;background:var(--bg);border:1px solid var(--line);border-radius:6px;margin-bottom:12px;font:12px/1.55 'JetBrains Mono',monospace}
  .detail-card h3{margin:0 0 10px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber)}
  .detail-card.reasoning{border-left:3px solid var(--amber)}
  .detail-card.tool{border-left:3px solid var(--good)}
  .detail-card.tool.fail{border-left:3px solid var(--bad)}
  .detail-card .content{white-space:pre-wrap;color:var(--text);font-size:11px}
  .detail-table{width:100%;border-collapse:collapse;margin-top:4px}
  .detail-table td{padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:11px}
  .detail-table td:first-child{color:var(--muted);width:120px}
  .detail-table td:last-child{color:var(--text)}
  .detail details{margin-top:14px;cursor:pointer}
  .detail details summary{font:600 10px 'JetBrains Mono',monospace;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;outline:none}

  /* filter modal */
  .modalbg{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;display:none;align-items:center;justify-content:center}
  .modal{width:380px;max-width:92vw;background:var(--bg2);border:1px solid var(--amber-dim);border-radius:8px;padding:18px 20px}
  .mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font:600 13px 'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--amber)}
  .mx{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer}
  .fgroup{margin-bottom:14px}
  .fgroup h4{margin:0 0 8px;font:600 10px 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .fgroup label{display:inline-flex;align-items:center;gap:6px;margin:0 14px 7px 0;font:12px 'JetBrains Mono',monospace;color:var(--text);cursor:pointer}
  .fgroup input{accent-color:var(--amber);cursor:pointer}
  .mft{display:flex;gap:10px;margin-top:8px}
  .mft input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:4px;padding:8px 10px;font:12px 'JetBrains Mono',monospace}
  .clr{background:var(--bg);border:1px solid var(--amber-dim);color:var(--text);border-radius:4px;padding:8px 12px;cursor:pointer;font:600 12px 'JetBrains Mono',monospace}

  /* ---- Mobile phase 1 — survival #634 -------------------------------
     Desktop locks viewport to 100vh + overflow:hidden + horizontal flex
     of stage|log. On phones (~390px) that produces an unusable layout
     where the 380px log panel covers the screen or the canvas is off
     to the side. Phase 1 makes the viewer SCROLLABLE + STACKED on
     mobile without trying to redesign:
       - body + html scroll (not viewport-locked)
       - .wrap stacks stage above log
       - fleet machine cards go full-width one-per-row
       - scrubber controls wrap onto multiple rows + larger tap targets
       - crumbbar + topnav allow horizontal scroll rather than overlap
     Touch gestures, drawer-based log, swipe drill-in are phase 2+. */
  @media (max-width: 768px) {
    html, body { height: auto; overflow: auto; min-height: 100vh; }
    .wrap { display: block; height: auto; }
    body.live-mode .wrap { height: auto; } /* override the desktop live-mode calc on mobile */
    .stage { padding: 16px; min-height: 50vh; overflow: visible; }
    .log { width: auto; border-left: none; border-top: 1px solid var(--line); max-height: 82vh; }
    .detail { padding: 12px 14px 0; }
    .split { display: none; } /* the row-resize handle isn't useful when stacked */
    .fleet { gap: 16px; }
    .mach { width: 100%; }
    /* (#783) compact the savings hero on phones — the 42px number + padding ate
       too much vertical space and forced scrolling. Smaller number, tighter
       box, full-width (the desktop 560px cap is irrelevant below it). */
    .savings { max-width: none; padding: 13px 15px; margin-bottom: 14px; }
    .savnum { font-size: 30px; }
    .savlbl { margin-top: 5px; }
    /* (#803 layout) Stat blocks compress on phones: smaller values, tighter
       gaps; the flex wrap stacks them under the headline number naturally. */
    .savrow { gap: 10px 18px; }
    /* (#1151) When the breakdown wraps BELOW the total on phones, left-align it
       so it lines up under the left-pinned total instead of hugging the right
       edge (the desktop flex-end balances total-left / breakdown-right, which
       reads disconnected once stacked). */
    .savclasses { gap: 8px 16px; justify-content: flex-start; }
    .savc .scv { font-size: 15px; }
    /* (#803) Recent-runs rows wrap to multiple lines on phones so the per-run
       crits (turns · tools · tokens · compactions) stay visible instead of
       being crushed by the single-line flex row. Line 1 = pill + role/model/
       mission (ellipsized), line 2 = the stat bits, line 3 = when/duration. */
    .rr>summary { flex-wrap: wrap; row-gap: 3px; padding: 9px 6px; }
    .rr .rrmain { flex: 1 1 calc(100% - 80px); }
    .rr .rrmeta { flex: 1 1 100%; padding-left: 2px; }
    .rr .rrtime { flex: 1 1 100%; padding-left: 2px; }
    .fleettl { margin-top: 18px; }
    /* Activity lanes stack on phones: the machine name sits on its own line and
       the bar spans the full width below. A side label column would eat ~30% of
       a 390px screen and shove every bar right (the "offset right / empty left"
       report). */
    .lane { flex-direction: column; align-items: stretch; gap: 3px; margin-bottom: 11px; }
    .lname { width: auto; flex: none; text-align: left; font-size: 10px; color: var(--muted); }
    .tltrack { flex: none; width: 100%; height: 26px; }
    .tlaxis { margin-left: 0; }
    /* Pin the playback controls to the viewport bottom on phones so play/scrub
       are reachable without scrolling to the end of the tall stacked layout.
       z-index sits below the filter modal (100). Hidden in live mode (no
       scrub), so the reserved space below is scoped to non-live. */
    .scrub { position: fixed; left: 0; right: 0; bottom: 0; z-index: 50; flex-wrap: wrap; height: auto; padding: 10px 12px; gap: 9px; }
    .scrub button { padding: 10px 14px; font-size: 13px; min-height: 40px; }
    .clock { text-align: left; min-width: 0; flex: 1 0 100%; }
    body:not(.live-mode) { padding-bottom: 104px; } /* clear the fixed scrub bar */

    /* Top bar reflows to two rows on phones: row 1 = brand + status badges,
       row 2 = the nav. Auto-height instead of the desktop 46px so nothing
       collides; the brand stops wrapping mid-word and the badges sit beside
       it. The .wrap height calcs below subtract the desktop bar heights, but
       on mobile .wrap is already height:auto (set above), so the taller bars
       don't need a calc adjustment. */
    .top { height: auto; flex-wrap: wrap; padding: 9px 12px; gap: 8px 10px; row-gap: 8px; }
    /* (#1151) Vertical space is tight on phones, so pack row 1 = brand + status
       badges (source + LIVE). The LIVE pulse rides beside the brand rather than
       taking its own row: .brand grows (auto, not 100%) so the two short badges
       sit at the right edge of the same row. Row 2 is the longer #1129
       version+schema chip on its own line (it caused the orphan-wrap when left on
       the badge row); row 3 is the nav. Four header rows → three. */
    .brand { flex: 1 1 auto; font-size: 13px; }
    #srcbadge, #modebadge { order: 2; }
    #verbadge { flex: 1 1 100%; order: 3; }
    .badge, .pb { padding: 4px 8px; font-size: 10px; }
    .topnav { order: 4; margin-left: 0; flex: 1 1 100%; gap: 16px; justify-content: flex-start; padding-top: 2px; border-top: 1px solid var(--line); }
    .topnav a { font-size: 11px; }

    /* Crumbbar: keep the back button + crumb on one scrollable row, but let
       the meta block (records/machines/time) drop below instead of being
       shoved off-screen. */
    .crumbbar { height: auto; flex-wrap: wrap; padding: 8px 12px; gap: 6px 8px; }
    .crumb { flex: 1 1 auto; min-width: 0; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
    .meta { flex: 1 1 100%; margin-left: 0; text-align: left; font-size: 10px; }

    /* (#1087) Touch-size the icon-only chrome buttons on phones. #1067 stripped
       the text labels that gave .fbtn/.follow their height,
       collapsing them below the WCAG 2.5.8 24px target floor; the mobile block
       had sized only .scrub button. Square ~44px targets, glyph optically
       centered. Icon-only design + title/aria-label unchanged. */
    .fbtn, .follow {
      min-width: 44px; min-height: 44px;
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0 10px; font-size: 15px; line-height: 1;
    }
    .mx {
      min-width: 44px; min-height: 44px;
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0; font-size: 20px;
    }
    /* .sclear sits absolutely inside the search input; a 44px box would overflow
       the field, so keep the 18px circle and expand only the tap area. */
    .sclear::after { content: ""; position: absolute; inset: -13px; }

    /* (#1089) Mobile layout hardening — elements that were fixed-width or didn't
       reflow on a phone. */
    /* crew cards: fixed 260px inline-block → full-width stacked */
    .node { display: block; width: 100%; margin: 0 0 12px 0; }
    /* log detail pane: cap it small so the EVENT LIST is the priority on mobile
       (the split-resize is hidden when stacked). #detailbody scrolls inside, so
       a big selected-event JSON scrolls within this cap instead of squeezing the
       list down to 2-3 rows. A collapse toggle is deferred (right-panel rework). */
    .detail { height: auto !important; max-height: 24vh; }
    /* mission index rows: reflow, meta drops to its own line */
    .mirow { flex-wrap: wrap; }
    .mimeta { flex: 1 1 100%; }
    /* (#1247 Part 3) Lab lens on phones: touch-size the run rows (already
       stacking by default — see the base rules above), and drop the fixed
       stage-name column so a long stage/status line wraps under it instead
       of squeezing both onto one line. */
    .labrunrow { min-height: 44px; justify-content: center; }
    .labstage { flex-direction: column; align-items: flex-start; gap: 2px; }
    .labstagename { min-width: 0; }
    .labcli code { font-size: 11px; }
  }
</style>
</head>
<body>

        <div class="logsearch">

            <button class="sclear" id="sclear" type="button" aria-label="clear search" title="clear search" hidden>✕</button>
          </div>

</div>
<div class="scrub">

    <div id="filterbody"></div>

  </div>
</div>

    <div id="notesbody"></div>
  </div>
</div>
<!-- (#1132) About modal — build/status snapshot. Body-level sibling of #stage so
     the ~1/sec live rebuild never touches it (same guarantee as the modals above). -->
<div class="modalbg" id="imodalbg">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="ihdr">
    <div class="mhd"><span id="ihdr">about · darkmux</span><button class="mx" data-act="closeinfo" aria-label="close">✕</button></div>
    <div class="rrdetail" id="infobody"></div>
  </div>

<script>
// Live viewer — no embedded sample data.
//
// DATA is populated from the daemon's /flow/<date> endpoint in boot(); new
// records stream in via SSE on /flow/<date>/stream. If the daemon isn't
// reachable (e.g., this file loaded statically from darkmux.com/viewer with
// no daemon running), DATA stays empty and the viewer renders the "no records"
// state instead of falling back to demo content.
//
// darkmux.com/demo IS this viewer in playback mode (mode=play +
// darkmux-flow-src), generated from this file by scripts/build-demo.sh and fed
// docs/demo/demo-flow.jsonl — so the demo is identical to a local `/play`.
// There is no demo fork; edit this viewer, then regenerate.
let DATA = [];
// (#827 Slice A) Durable mission/phase structure from /missions + /phases —
// the WORK plan, distinct from the flow-record run history. Fetched at boot
// (best-effort; empty under the static demo / no daemon, where the missions
// index falls back to mission_ids found in the flow). Joined in the missions
// lens so a planned-but-not-yet-run phase still shows.
let MISSIONS = [];
let PHASES = [];
let DATA_SOURCE = "no records yet";
// (#1132) Last mode/date seen by setBadges — the about modal reads these for
// its mode row (they're otherwise function-locals in boot/setBadges).
let STATUS = {mode:null, date:null};
let nextRecordUid = 1;
const runtimeUids = new Map();
function getRuntimeUid(sid) {
  if (!runtimeUids.has(sid)) {
    runtimeUids.set(sid, nextRecordUid++);
  }
  return runtimeUids.get(sid);
}
function assignUids(records) {
  for (let i = 0; i < records.length; i++) {
    const r = records[i];
    if (r && typeof r === "object" && !r._uid) {
      r._uid = nextRecordUid++;
    }
  }
}

// MACH_SPEC was a hardcoded lookup for the demo's three machines (studio,
// laptop, mini-1). Removed for the live viewer — real machine specs come
// from /machine/specs/<id> (TODO: wire dynamic lookup, follow-up to #624).
// For now the spec field renders empty for real machines, which is honest:
// better than fake specs for unknown machines.
const MACH_SPEC={};
// Mac-form-factor glyphs (inline SVG, Lucide stroke style — license-free, no external load)
const ICON={
  laptop:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="11" rx="1.5"/><path d="M2 19h20l-1.2-3H3.2z"/></svg>',
  desktop:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="16" height="12" rx="2"/><circle cx="8" cy="12" r="1.1"/></svg>',
  mini:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="9" width="18" height="7" rx="2"/><circle cx="7" cy="12.5" r="1"/></svg>',
  // (#564 default) generic processor/chip — shown when a machine's form factor
  // isn't known (cross-machine hardware probe not wired), so every machine card
  // still reads as a machine.
  machine:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="7" width="10" height="10" rx="1.5"/><path d="M10 7V4.5M14 7V4.5M10 19.5V17M14 19.5V17M7 10H4.5M7 14H4.5M19.5 10H17M19.5 14H17"/></svg>',
  // (#565 default) person/avatar — the default icon for a crew ROLE card; a
  // role may later override it with a semantic key (#565).
  worker:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/></svg>',
  // (#1098) funnel = filter (the gear read as "settings"); clock = follow-the-
  // live-tail (real-time).
  filter:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16l-6 7.5V19l-4-2v-4.5z"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v4.2l2.6 2.1"/></svg>',
  // Per-activity glyphs shown inline on log lines so the operator can scan
  // "what is the model doing" at a glance (mapped via ACT_ICON below).
  // Wrench = tool call (the model reaching for its belt).
  tool:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5 5L4 17v3h3l5.7-5.7a4 4 0 0 0 5-5l-2.6 2.6-2.1-.5-.5-2.1z"/></svg>',
  // Brain = reasoning (the model thinking).
  brain:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 4A2.5 2.5 0 0 0 7 6.5 2.5 2.5 0 0 0 5 9a2.5 2.5 0 0 0 .5 4.9A2.5 2.5 0 0 0 8 18a2 2 0 0 0 4 0V4.5A2 2 0 0 0 9.5 4z"/><path d="M14.5 4A2.5 2.5 0 0 1 17 6.5 2.5 2.5 0 0 1 19 9a2.5 2.5 0 0 1-.5 4.9A2.5 2.5 0 0 1 16 18a2 2 0 0 1-4 0"/></svg>',
  // Refresh/loop = a turn boundary.
  turn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 0 0-14-4.5L4 8M4 4v4h4M4 13a8 8 0 0 0 14 4.5L20 16M20 20v-4h-4"/></svg>',
  // Play = dispatch start.
  play:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 5l12 7-12 7z"/></svg>',
  // Flag = dispatch end.
  flag:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21V4M5 4h11l-2 4 2 4H5"/></svg>',
  // Compress = compaction.
  compress:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 4v4H4M16 4v4h4M8 20v-4H4M16 20v-4h4"/></svg>',
  // Split = a routing/tier decision.
  route:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="19" r="2"/><circle cx="18" cy="5" r="2"/><circle cx="6" cy="5" r="2"/><path d="M6 7v4a4 4 0 0 0 4 4h6M6 17V7"/></svg>',
  // Speech bubble = an orchestrator note.
  note:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 15a2 2 0 0 1-2 2H8l-4 4V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2z"/></svg>',
  // Pulse = telemetry (host/lms/runtime/tokens/detector).
  pulse:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-6 4 12 2-6h6"/></svg>'};
// Activity label → ICON key. Anything unmapped renders no glyph (a plain row).
const ACT_ICON={"reasoning":"brain","tool call":"tool","turn":"turn","heartbeat":"turn","dispatch start":"play","dispatch end":"flag","dispatch error":"flag","feedback":"note","routing":"route","compaction":"compress","note":"note","machine online":"machine","machine offline":"machine","detector":"pulse","runtime":"pulse","tokens":"pulse","lms":"pulse","host telemetry":"pulse","telemetry":"pulse"};
// Live viewer — machine form-factor lookup empty; real machines render with no icon
// until /machine/specs/<id> wiring lands (follow-up to #624).
const MACH_ICON={};
const T=s=>Date.parse(s);
const fmt=ms=>{ms=Math.max(0,ms);return Math.floor(ms/60000)+":"+String(Math.floor(ms/1000)%60).padStart(2,"0");};
// (#1069) Time-of-day rendered in the browser's LOCAL timezone (was UTC+"Z",
// which read as "machine world" to anyone outside UTC). Storage + comparisons
// stay UTC (T = Date.parse); only display is localized.
//   clk   = HH:MM:SS local        clkhm = HH:MM local
//   lday  = local date            ldt   = full local datetime (title hovers)
const clk=t=>new Date(t).toLocaleTimeString([],{hour12:false});
const clkhm=t=>new Date(t).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",hour12:false});
const lday=t=>new Date(t).toLocaleDateString();
const ldt=t=>new Date(t).toLocaleString([],{hour12:false});
// (#691) Coarse relative-time. Past only (recent runs are completed).
// (#1103) Reference is explicit: playback cards measure vs the scrubber `state.t`;
// the live idle headline passes `Date.now()` so "last run" is real wall-clock
// elapsed, not time-since-newest-record (state.t=tMax in live → a stuck "just now").
const relAgoFrom=(ref,t)=>{const d=ref-t;if(d<0)return"";const s=Math.floor(d/1000);
  if(s<60)return s<5?"just now":s+"s ago";const m=Math.floor(s/60);if(m<60)return m+"m ago";
  const h=Math.floor(m/60);if(h<24)return h+"h ago";return Math.floor(h/24)+"d ago";};
const relAgo=t=>relAgoFrom(state.t,t);
// (#691) "<clock> · <rel ago>", dropping the separator when rel is empty (a
// running card scrubbed to before its start in playback yields no relative).
const stamp=(verb,t)=>{const r=relAgo(t);return `${verb} ${clk(t)}${r?' · '+r:''}`;};
// Derived from DATA; recomputed whenever the data source changes (sample <-> real).
const esc=s=>String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#x27;");
const escBr=s=>esc(s).replace(/\n/g,"<br>");
// Escape sugar for the single most-interpolated lookup. esc() is applied at
// the TEMPLATE EDGE only — never inside nameOf/specOf themselves, whose raw
// values also feed non-HTML logic (MACH_ICON key lookup, label-width math,
// equality checks).
const escN=m=>esc(nameOf(m));
let tMin, tMax, missions, FCATS, FTIERS, FSRC, FACTS;
// Map a record to an ACTIVITY label — a compact "what is happening" vocabulary
// so the operator can filter the log down to just what the model is DOING
// (reasoning / tool call / turn) vs the surrounding telemetry. Coarser than
// the raw `action` (too many, too noisy) and cross-cuts category/source.
function activityOf(r){
  const a=r.action||"";
  if(a==="dispatch.reasoning")return "reasoning";
  if(a==="dispatch.tool")return "tool call";
  if(a==="dispatch.turn")return "turn";
  if(a==="dispatch.turn.heartbeat")return "heartbeat";
  if(a==="dispatch.start"||a==="dispatch start")return "dispatch start";
  if(a==="dispatch.complete"||a==="dispatch complete")return "dispatch end";
  if(a==="dispatch.error"||a==="dispatch error")return "dispatch error";
  if(a==="dispatch.feedback.injected")return "feedback";
  if(a==="tier-decision")return "routing";
  if(a==="dispatch.compaction"||r.source==="compaction")return "compaction";

  const health=`${util}<div class="memwrap">${healthBody}</div>`;

  // ── Runs list (interim — step 4 of #1508 replaces this with the full Runs

  const liveSet=liveSessionSet(); // (#1007) Redis presence, or flow-derived when Redis is down
  const nodeObjs=sessionsOn(m).filter(sid=>visible().some(r=>r.session_id===sid)).map(sid=>{
    const s=dispatch(sid,"start");

  // time) descending, so the operator scans newest → oldest and clicks the
  // right run without hunting.
  }).sort((a,b)=>((b.closeTs??b.startTs??0)-(a.closeTs??a.startTs??0)));

  // the newest RECENT_CAP by default with a show-all/fewer toggle rather than
  // an ever-growing scroll. state.recentAll persists across live re-renders;
  // reset on machine entry (drillMachine).
  const shown=state.recentAll?nodeObjs:nodeObjs.slice(0,RECENT_CAP);

    : '';

    : `<span class="hint">no runs recorded for this machine at this point in the timeline</span>`;

  // telemetry, anything written outside a dispatch). Surface them as a count

    ? `<div class="rglbl rgdim">unscoped records · ${loose.length} today</div>
        <div class="node" data-act="loose" data-arg="${esc(m)}"><div class="h">unscoped records</div>
        <div class="s">${loose.length} record${loose.length===1?'':'s'} without a session</div>
        <div class="s">flow notes, ambient telemetry, etc.</div>
        <span class="pill">loose</span></div>`

    ${health}
    <div class="rglbl rgdim" style="margin-top:16px">runs on ${label}</div>
    ${runsList}${looseSection}</div>`;
}
// (#691) Render the loose-records panel — records on a machine that don't have
// a session_id (flow notes, ambient telemetry). A FIRST-CLASS render path (not
// just a one-shot in drillLoose) so the live-refresh `render()` re-renders it
// with the SAME scope predicate: previously `render()` had no `loose` branch
// and fell through to `renderSubsystem()`, which clobbered `state.stageScope`
// to `session_id===null` (matches nothing) → the log emptied while the header
// count still read N. One source (DATA), one scope — now they can't diverge.
function renderLoose(){
  const m=state.machine;
  state.stageScope=r=>uidOf(r)===m&&!r.session_id;
  $("logscope").textContent=nameOf(m)+" · loose";
  const recs=scoped(), n=recs.length;
  // (#691) Composition breakdown: group the unscoped records by action so the
  // operator sees WHAT they are (mostly machine.online/offline lifecycle +
  // ambient/malformed), not a blank stage. Clicking a type sets the log query
  // so the right-hand event log narrows to that type. Counts are over the full
  // scope (always the true composition); the log reflects the active filter.
  const groups={};
  recs.forEach(r=>{const a=(r.action&&String(r.action))||"(no action)";groups[a]=(groups[a]||0)+1;});
  const rows=Object.entries(groups).sort((a,b)=>b[1]-a[1]);
  const max=rows.length?rows[0][1]:1, q=state.filters.q;
  const body=rows.map(([a,cnt])=>{
    const clickable=a!=="(no action)", sel=clickable&&q===a, w=Math.round(cnt/max*100);
    return `<div class="lrow${sel?' sel':''}"${clickable?` data-act="query" data-arg="${esc(a)}"`:''}>`
      +`<span class="lrlbl">${esc(a)}</span><span class="lrbar"><span style="width:${w}%"></span></span>`
      +`<span class="lrcnt">${cnt}</span></div>`;
  }).join("");
  $("stage").innerHTML=`<div><div class="stagehdr"><a data-act="fleet">fleet</a> › <a data-act="machine" data-arg="${esc(m)}">${escN(m)}</a> › unscoped records</div>
    <div class="rglbl">${n} record(s) without a session · by type</div>
    <div class="lbreakdown">${body||'<span class="hint">none at this point in the timeline</span>'}</div>
    <div class="rghint">${q?`log filtered to <b>${esc(q)}</b> — <a data-act="query" data-arg="">clear</a>`:'click a type to filter the event log →'}</div></div>`;

// Drill into the loose-records panel. Sets state then routes through the shared

// (#1148) Run-view data + region HTML, shared by renderSubsystem (the
// structural render) and refreshSubsystem (the per-tick volatile update), so a
// metric tick updates only the volatile regions and never rebuilds the stable
// header/brief — the prompt's scroll + open state survives the ~1/sec cadence.
function runRegions(){
  const sid=state.session, m=state.machine; $("logscope").textContent=sid;
  // (#1013) A phase re-run REUSES the deterministic session id
  // (mission-run-<mission>-<phase>), so DATA for `sid` can hold MULTIPLE
  // dispatch attempts. Scope this drill-down to the attempt active at the
  // scrubber — records from the most-recent dispatch.start AT/BEFORE state.t
  // onward — so wall clock, detections, and metrics describe ONE dispatch, not a
  // conflated sum spanning both runs + the gap between them (the 94-minute wall
  // clock + merged detections #1013 was filed for). A single-attempt session is
  // unchanged (one start = its own boundary). In live follow state.t=tMax, so
  // this is the genuinely-latest attempt; in playback `visible()` (state.t-capped)
  // already bounds the upper edge to the active attempt.
  const sidStarts=DATA.filter(r=>r.session_id===sid&&r.action==="dispatch.start"&&T(r.ts)<=state.t).sort((a,b)=>T(a.ts)-T(b.ts));
  const d=sidStarts.length?sidStarts[sidStarts.length-1]:null;
  const firstSessRec=DATA.find(r=>r.session_id===sid);
  const startTs=d?T(d.ts):(firstSessRec?T(firstSessRec.ts):tMin);
  const inAttempt=r=>r.session_id===sid&&T(r.ts)>=startTs;
  state.stageScope=inAttempt;
  // This attempt's close-edge: earliest terminal at/after its start. `c` is the
  // dispatch terminal (complete/error — errored/killed STYLING); `close` also
  // counts session.end (brackets the wall clock for an abandoned/killed run).
  const attemptCloses=DATA.filter(r=>inAttempt(r)&&(r.action==="dispatch.complete"||r.action==="dispatch.error"||r.action==="session.end")).sort((a,b)=>T(a.ts)-T(b.ts));
  const close=attemptCloses[0]||null, c=attemptCloses.find(r=>r.action!=="session.end")||null;
  const done=close&&T(close.ts)<=state.t;
  const tel=visible().filter(r=>inAttempt(r)&&r.category==="telemetry");
  const lms=tel.filter(r=>r.source==="lms"), procs=tel.filter(r=>r.source==="process");
  const rt=tel.filter(r=>r.source==="runtime").slice(-1)[0];
  const dets=tel.filter(r=>r.source==="detector");
  const loads=lms.filter(r=>r.fields.event==="load");
  const distinct=[...new Set(loads.map(r=>r.fields.model))];
  const handle=d?d.handle:(firstSessRec?firstSessRec.handle:"unknown");
  const turns=rt?rt.fields.turns:"—";
  const cx=tel.filter(r=>r.source==="context").slice().sort((a,b)=>T(a.ts)-T(b.ts));
  const comps=tel.filter(r=>r.source==="compaction");
  // (#622) Require a POSITIVE, finite window — a null/0/NaN `max` (unconfigured

  const nctx=(cx.length && Number.isFinite(cx[0].fields.max) && cx[0].fields.max>0)?cx[0].fields.max:0;
  const ctxPeak=cx.length?Math.max(...cx.map(r=>r.fields.used||0)):0;
  // (#711) Current usage = the latest sample at/under the playhead (cx is

  // (#720) Surface a failed/killed terminal LOUDLY — a watchdog kill or

  // (#856) Wall time brackets to the CLOSE edge (`close`, which includes
  // session.end), not the bare dispatch terminal `c` — for a session.end-only
  // session `c` is undefined while `done` is true, so `T(c.ts)` would throw.
  // `c` stays for the null-safe errored/killed STYLING (wallLoud) only.
  const wallBase=done?fmt(T(close.ts)-startTs):fmt(state.t-startTs)+" so far";
  const wallLoud=done&&dispatchErrored(c)
    ? `<span class="wallerr"> · ${dispatchKilled(c)?'killed (timeout)':'errored'+((c.payload&&c.payload.exit_code!=null)?' (exit '+esc(c.payload.exit_code)+')':'')}</span>`
    : '';
  const wall=wallBase+wallLoud;
  // (#1125) Run identity + brief. statusVisual() gives the same pill vocabulary
  // the machine cards use; role strips the `darkmux/` prefix like the rail does.
  // The brief surfaces the dispatch's own context (runtime/model/workspace/
  // prompt-chars/mission/timing) on the page dedicated to it — all from data
  // that already exists (start payload + terminal payload + .model). The prompt
  // TEXT is not emitted today (only prompt_chars) — see #1127.
  const role=String(handle||"").replace(/^darkmux\//,"");
  const sv=statusVisual({open:!done, errored:!!c&&dispatchErrored(c), killed:!!c&&dispatchKilled(c), clean:done&&!!c&&!dispatchErrored(c)});
  const sp=(d&&d.payload)||{}, dp=(c&&c.payload)||{};
  const model=d&&d.model?d.model:(distinct[0]||null);
  // (#1151) tokens in/out accumulate LIVE from the per-turn telemetry.tokens
  // records (source="tokens"), whose running sum equals the terminal
  // dispatch.complete totals EXACTLY (verified) — so the tiles grow turn-by-turn
  // during a live run instead of reading "—" until the terminal lands, and they
  // stay scrubber-consistent in playback (tel is visible()-bounded, like ctx).
  // Fall back to the terminal cumulative payload for any path that emits only the
  // terminal token counts (e.g. openclaw) with no per-turn telemetry.
  const toks=tel.filter(r=>r.source==="tokens");
  const tokIn=toks.length?toks.reduce((a,r)=>a+(r.fields.prompt_tokens||0),0):(dp.prompt_tokens!=null?dp.prompt_tokens:null);
  const tokOut=toks.length?toks.reduce((a,r)=>a+(r.fields.completion_tokens||0),0):(dp.completion_tokens!=null?dp.completion_tokens:null);
  const kv=(k,v)=>v!=null&&v!==''?`<div class="kv"><b>${k}</b><span>${v}</span></div>`:'';
  const briefTiming=`${clk(startTs)}${done?' → '+clk(T(close.ts))+' ('+fmt(T(close.ts)-startTs)+')':' · running'}`;
  // (#1177) Dispatch legibility. `sp.endpoint` (e.g. "azure:host/gpt-4o") means the
  // model ran OFF-FLEET on a remote OpenAI-compatible endpoint; absent ⇒ local
  // LMStudio. The `runtime` value is a bare mechanism marker (internal / direct /
  // openclaw) — render it in words so a hosted "direct" isn't cryptic. Route +
  // runtime are separate axes: WHERE the model was served vs HOW darkmux drove it.
  const rtLabel={internal:'internal container',direct:'direct client (hosted · no container)',openclaw:'openclaw shell-out'}[sp.runtime]||sp.runtime;
  const ep=sp.endpoint;
  const route=ep
    ? (()=>{const i=String(ep).indexOf(':');const kind=i>=0?ep.slice(0,i):'';const rest=i>=0?ep.slice(i+1):ep;
        const label=kind==='azure'?'Azure OpenAI':kind==='openai'?'OpenAI':esc(kind||'remote');
        return `${label} <span style="color:var(--muted)">· ${esc(rest)} · off-fleet</span>`;})()
    : `LMStudio <span style="color:var(--muted)">· local · this machine</span>`;
  const briefRows=[
    kv('route', route),
    kv('runtime', sp.runtime?esc(rtLabel):''),
    kv('image', sp.image?esc(sp.image):''),
    kv('model', model?esc(model):''),
    kv('workspace', sp.workspace?esc(sp.workspace):''),
    (d&&d.mission_id)?kv('mission', esc(d.mission_id)+(d.phase_id?' · phase '+esc(d.phase_id):'')):'',

  ].filter(Boolean).join('');
  // (#1127) The prompt is rendered as a collapsed <details> (it can be KB-long)
  // rather than a one-line kv. `sp.prompt` is the capped text the dispatch
  // emitted; `prompt_chars` is the full length, so a stored text shorter than
  // that reads "(truncated)". Falls back to the char-count row when only the
  // count is present (pre-#1127 records / openclaw runs that didn't emit text).
  // Open state survives the ~1/sec live rebuild via state.expanded (the
  // data-expand="prompt:<sid>" key), so it no longer collapses mid-view (#1146).
  const promptBlock = sp.prompt
    ? `<details class="rr promptdet" data-expand="prompt:${esc(sid)}"${state.expanded.has("prompt:"+sid)?" open":""}><summary>prompt · ${esc(sp.prompt_chars!=null?sp.prompt_chars:sp.prompt.length)} chars${(sp.prompt_chars!=null&&sp.prompt.length<sp.prompt_chars)?' · truncated':''}</summary><pre class="promptbody">${esc(sp.prompt)}</pre></details>`
    : (sp.prompt_chars!=null?`<div class="kv"><b>prompt</b><span>${esc(sp.prompt_chars)} chars</span></div>`:'');
  const brief=(briefRows||promptBlock)?`<div class="track"><div class="lbl">run</div><div class="rrdetail">${briefRows}${promptBlock}</div></div>`:'';
  // (#1125) The ctx tile is done-aware, mirroring the wall clock (line ~1408).
  // A finished/failed run leads with PEAK — the last sample read as "now" on a
  // terminal run falsely implies the model is still holding that context. Live
  // keeps the current reading; the bar fill tracks whichever headline shows.
  const ctxHeadline=done?ctxPeak:ctxNow;
  const ctxLabel=!nctx?"context":(done
    ? `ctx peak ${(ctxPeak/1000).toFixed(0)}k / ${(nctx/1000)}k window`
    : `ctx now · peak ${(ctxPeak/1000).toFixed(0)}k / ${(nctx/1000)}k window`);
  const met=`<div class="metrics">
    <div class="met"><div class="mv">${esc(turns)}</div><div class="ml">turns</div></div>
    <div class="met"><div class="mv">${tokIn!=null?fmtC(tokIn):"—"}</div><div class="ml">tokens in</div></div>
    <div class="met"><div class="mv">${tokOut!=null?fmtC(tokOut):"—"}</div><div class="ml">tokens out</div></div>
    <div class="met"><div class="mv">${nctx?(ctxHeadline/1000).toFixed(0)+"k":"—"}</div><div class="ml">${ctxLabel}</div><div class="tokbar"><span style="width:${nctx?Math.round(ctxHeadline/nctx*100):0}%"></span></div></div>
    <div class="met"><div class="mv">${comps.length}</div><div class="ml">compactions</div></div>
    <div class="met"><div class="mv">${wall}</div><div class="ml">wall clock</div></div></div>`;
  const segs=loads.map((r,i)=>`<span class="seg ${i>0?'b':''}">${esc(r.fields.model)} · ${esc(r.fields.gb||'?')}GB</span>`).join("");
  // Shared wall-clock time axis for the telemetry tracks (CPU bars, context
  // step-area, compaction marks): every element is placed by timestamp on the
  // same [t0,t1] domain + width, so a vertical slice is ONE instant across all
  // three. Previously CPU was index-spaced + full-width while the context chart
  // was time-based + capped at 440px, so the timelines never lined up.
  const AX_W=1000, t0=startTs, t1=done?T(close.ts):state.t, span=Math.max(1,t1-t0);
