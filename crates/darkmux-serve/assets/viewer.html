  // so these are HOST-wide %s, not the runtime container's (which reads ~0 and
  // answers the wrong question — #814/#1064). All three share ONE 0–100 scale
  // and a green→amber→red pressure coloring, stacked as three compact rows so a
  // vertical slice reads cpu/ram/gpu at one instant. Exact % on hover.
  const Hc=40,BW=5;
  const pctColor=p=>p<60?'var(--good)':p<85?'var(--warn)':'var(--bad)';
  const loadRow=(key,label)=>{
    const s=procs.filter(r=>r.fields[key]!=null);
    if(!s.length)return "";
    const bars=s.map(r=>{
      const x=tx(r.ts),p=Math.max(0,Math.min(100,+r.fields[key]||0)),h=Math.max(1.5,p/100*Hc);
      return `<rect x="${(x-BW/2).toFixed(1)}" y="${(Hc-h).toFixed(1)}" width="${BW}" height="${h.toFixed(1)}" rx="1" fill="${pctColor(p)}"><title>${label} ${Math.round(p)}%</title></rect>`;
    }).join("");
    const peak=s.reduce((m,r)=>Math.max(m,Math.min(100,+r.fields[key]||0)),0);
    return `<div class="loadrow"><div class="loadlbl">${label} <span class="loadpeak">peak ${Math.round(peak)}%</span></div>
      <svg class="loadsvg" viewBox="0 0 ${AX_W} ${Hc+2}" preserveAspectRatio="none">${bars}</svg></div>`;
  };
  const loadRows=[loadRow('cpu','cpu'),loadRow('mem','ram'),loadRow('gpu','gpu')].join("");
  const cpu=procs.length&&loadRows?`<div class="track"><div class="lbl">host load <span style="color:var(--muted);text-transform:none;font-weight:400">(system-wide — cpu · ram · gpu, % of capacity)</span></div>${loadRows}</div>`:"";
  let ctxChart="";
  if(cx.length && nctx){
    const H=72;
    const xy=cx.map(r=>[tx(r.ts),H-(nctx?(r.fields.used/nctx)*H:0)]);
    // Context is a per-turn LEVEL that holds flat then jumps — draw it as a STEP
    // (not a diagonal interpolation that implies smooth growth: the step height
    // IS the per-turn token delta). Left-anchor at x=0: the first dispatch.context
    // event lands a few seconds after dispatch.start (container spawn + first
    // prompt assembly), so hold the first observed level from the origin instead
    // of letting the line float in from that timestamp. Forward-fill the last
    // level to t1 so a live stall/runaway reads as a flat plateau to "now".
    const step=[[0,xy[0][1]]];
    xy.forEach(p=>{step.push([p[0],step[step.length-1][1]]);step.push(p);});
    step.push([AX_W,xy[xy.length-1][1]]);
    const linePts=step.map(p=>p[0].toFixed(0)+","+p[1].toFixed(0)).join(" ");
    // A dot per turn on the step — marks every turn boundary, including turns
    // whose context delta is too small to render as a visible step (a ~200-token
    // turn is ~0.15px on a 100K window). Makes turns countable + time-locatable,
    // and lines up with the CPU bars + compaction marks on the shared time axis.
    const dots=xy.map((p,i)=>`<circle cx="${p[0].toFixed(0)}" cy="${p[1].toFixed(1)}" r="2.4" fill="var(--bg)" stroke="var(--amber)" stroke-width="1.4" vector-effect="non-scaling-stroke"><title>turn ${i+1} · ${(cx[i].fields.used/1000).toFixed(1)}k ctx</title></circle>`).join("");
    const area="M0,"+H+" L"+step.map(p=>p[0].toFixed(0)+","+p[1].toFixed(0)).join(" L")+" L"+AX_W+","+H+" Z";
    const marks=comps.map(r=>{const x=tx(r.ts).toFixed(0);return `<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="var(--warn)" stroke-width="1" stroke-dasharray="2 3"/><text x="${x}" y="9" fill="var(--warn)" font-size="9" text-anchor="middle">⚡</text>`;}).join("");
    // (#711) Native hover tooltip on the chart — now / peak / window at a glance.
    const tip=`now ${(ctxNow/1000).toFixed(0)}k · peak ${(ctxPeak/1000).toFixed(0)}k · window ${(nctx/1000)}k · ${comps.length} compaction${comps.length===1?'':'s'}`;
    // (#threshold) Dashed line at the compaction TRIGGER level (the token threshold
    // the runtime compacts at, emitted on the context telemetry) — shows WHY the ⚡
    // marks fire: the level crosses this line.
    const thr=cx.reduce((t,r)=>r.fields.threshold!=null?+r.fields.threshold:t,null);
    const thrLine=(thr&&nctx&&thr<nctx)?(()=>{const ty=+(H-thr/nctx*H).toFixed(1);return `<line x1="0" y1="${ty}" x2="${AX_W}" y2="${ty}" stroke="var(--warn)" stroke-dasharray="4 3" stroke-width="0.8" opacity="0.65" vector-effect="non-scaling-stroke"/><text x="${AX_W-3}" y="${(ty-2).toFixed(1)}" fill="var(--warn)" font-size="8" text-anchor="end" opacity="0.85">compact ${(thr/1000).toFixed(0)}k</text>`;})():"";
    // Fill gradient by fullness: green (headroom) low → amber → red as the level
    // approaches the window ceiling (y=0 = nctx). The top-left label names that
    // ceiling so "how full toward the max" reads at a glance (the operator asked
    // to see the max + a danger cue without an exact threshold line).
    ctxChart=`<div class="track"><div class="lbl">context window — ${(nctx/1000)}K · ⚡ = compaction (${comps.length})</div><svg class="ctxchart" viewBox="0 0 ${AX_W} ${H+2}" preserveAspectRatio="none"><title>${esc(tip)}</title><defs><linearGradient id="ctxgrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="${H}"><stop offset="0" stop-color="#ff6b6b"/><stop offset="0.5" stop-color="var(--warn)"/><stop offset="1" stop-color="var(--good)"/></linearGradient></defs><path d="${area}" fill="url(#ctxgrad)" opacity="0.28"/><polyline points="${linePts}" fill="none" stroke="var(--amber)" stroke-width="1.5"/>${thrLine}<text x="2" y="9" fill="var(--muted)" font-size="8" opacity="0.5">${(nctx/1000)}K</text>${marks}${dots}</svg></div>`;
  }
  const finds=[];
  if(distinct.length>1)finds.push({s:"warn",k:"jit-model-swap",d:`${distinct.length} models loaded in one run (${distinct.join(" → ")}) — mid-run swap stalls the dispatch while the new model loads.`,f:"pin one model for the run, or pre-warm the swap target."});
  dets.forEach(r=>finds.push({s:r.fields.severity||"warn",k:r.fields.kind,d:r.fields.detail}));
  const detections=finds.length
    ? `<div class="track"><div class="lbl">detections (${finds.length})</div>`+finds.map(f=>`<div class="finding ${esc(f.s)}"><span class="fk">⚠ ${esc(f.k)}</span><span class="fm">${esc(f.d)}</span>${f.f?`<span class="ff">fix: ${esc(f.f)}</span>`:""}</div>`).join("")+`</div>`
    : `<div class="track"><div class="lbl">detections</div><div class="finding ok"><span class="fk">✓ clean</span><span class="fm">no behavioral flags (cycle, tool-failure, reasoning-loop, edit-drift)</span></div></div>`;
  return {m, sid, brief, met, cpu, ctxChart, detections,
    header:`<h2><span class="pill ${sv.cls}" style="margin-top:0;vertical-align:middle">${sv.lbl}</span> run · ${esc(role)} <span style="color:var(--muted);text-transform:none;font-weight:400">(${esc(sid)} on <a data-act="machine" data-arg="${esc(m)}">${escN(m)}</a>)</span></h2>`,
    modelTrack:`<div class="track"><div class="lbl">model (lms)</div>${segs||'<span class="hint">no telemetry yet</span>'}</div>`};
}

// (#1148) Structural render of the run view: the STABLE shell (header + brief,
// which holds the prompt) + stable-id mounts for the volatile regions. Called
// only when the stage signature changes (entering the view, a new attempt, the
// run completing). refreshSubsystem updates the volatile regions in place on
// every other live tick, so the prompt's scroll + open survive.
function renderSubsystem(){
  const r=runRegions();
  $("stage").innerHTML=`<div class="sub">${r.header}
    ${r.brief}
    <div id="sub-met">${r.met}</div>
    <div id="sub-model">${r.modelTrack}</div>
    <div id="sub-cpu">${r.cpu}</div>
    <div id="sub-ctx">${r.ctxChart}</div>
    <div id="sub-det">${r.detections}</div>
    <div id="wtsumtrack"></div></div>`;
  paintWtSum(r.sid);
}

// (#1148) Per-tick volatile refresh: update only the metric / model / cpu / ctx
// / detection regions IN PLACE. The header + brief (and the prompt's scroll +
// open inside it) are never touched — killing the ~1/sec state loss as a class
// and giving each volatile value a stable DOM node to animate later. The
// what-changed summary is repainted into its own stable #wtsumtrack mount.
function refreshSubsystem(){
  const r=runRegions();
  const set=(id,html)=>{const e=$(id); if(e&&e.innerHTML!==html)e.innerHTML=html;};
  set("sub-met",r.met); set("sub-model",r.modelTrack); set("sub-cpu",r.cpu);
  set("sub-ctx",r.ctxChart); set("sub-det",r.detections);
  paintWtSum(r.sid);
}
// (#1387) What-changed summary + worktree handoff for the session view —
// replaces the retired live-diff panel (#756: a read-only, poll-based diff
// pane that shipped source code over HTTP behind its own always-on auth
// gate). The daemon's GET /worktree-summary/:session_id resolves the
// session's worktree and returns file/adds/dels TOTALS plus the worktree
// path only — no diff content ever leaves the server. Renders only in live
// mode (the static demo and playback have no daemon to ask) and only when
// the daemon reports the summary as available. The path renders with a
// copy-to-clipboard button (universal) and a `zed://file/<path>` anchor —
// a plain link, no editor detection: it's a no-op convenience on machines
// without Zed, rendered unconditionally by design (#1387 operator decision).
function wtSumPanel(sid){
  if(!document.body.classList.contains('live-mode'))return "";
  const d=WTSUM.sid===sid?WTSUM.data:null;
  if(!d||!d.available)return "";
  const files=d.files||0, adds=d.adds||0, dels=d.dels||0, path=d.path||"";
  const changed=files
    ? `${esc(files)} file${files===1?'':'s'} changed · <span style="color:var(--good)">+${esc(adds)}</span> <span style="color:var(--bad)">−${esc(dels)}</span> vs ${esc(d.base)}`
    : `no tracked changes vs ${esc(d.base)}`;
  const handoff=path
    ? `<div class="wtpath"><code>${esc(path)}</code>
      <button type="button" class="wtcopy" data-act="copywt" data-arg="${esc(path)}">copy path</button>
      <a class="wtzed" href="zed://file/${esc(encodeURI(path))}" title="open in Zed — inert if Zed isn't installed on this machine">open in zed</a>
    </div>`
    : "";
  return `<div class="track"><div class="lbl">what changed</div><div class="hint">${changed}</div>${handoff}</div>`;
}
// Paint the what-changed summary into its stable #wtsumtrack mount,
// independent of the full-stage render — repaints only when the content
// changed OR the mount was just rebuilt empty by render(). Live-gated via
// wtSumPanel() (returns "" off-live), and starts the poll.
function paintWtSum(sid){
  const mount=document.getElementById('wtsumtrack');
  if(!mount)return;
  if(document.body.classList.contains('live-mode'))ensureWtSumPoll(sid);
  const html=wtSumPanel(sid);
  if(html!==WTSUM._painted||(html!==""&&mount.childElementCount===0)){
    mount.innerHTML=html; WTSUM._painted=html;
  }
}
// (#1387) Copy the worktree path to the clipboard. Tries the async Clipboard
// API first; falls back to a hidden-textarea + execCommand('copy') because
// the Clipboard API requires a secure context (https or localhost) and the
// phone-over-tailnet case is plain http. Feedback lands on the button that's
// currently rendered in #wtsumtrack (there's only ever one at a time).
function copyWtPath(path){
  const mark=ok=>{
    const el=document.querySelector('#wtsumtrack .wtcopy');
    if(!el)return;
    const orig=el.textContent;
    el.textContent=ok?"copied":"copy failed";
    setTimeout(()=>{ if(el.isConnected)el.textContent=orig; },1400);
  };
  const fallback=()=>{
    try{
      const ta=document.createElement("textarea");
      ta.value=path; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      const ok=document.execCommand("copy");
      document.body.removeChild(ta);
      mark(ok);
    }catch(_){ mark(false); }
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(path).then(()=>mark(true)).catch(fallback);
  }else{
    fallback();
  }
}
function pretty(r){
  const o={};Object.keys(r).filter(k=>!k.startsWith("_")).forEach(k=>o[k]=r[k]);
  return esc(JSON.stringify(o,null,1)).replace(/&quot;(\w+)&quot;:/g,'<span class="k">$1</span>:');
}

// Render a tool call's args (a JSON string like `{"path":"x.ts"}` or
// `{"pattern":"foo","path":"data"}`) as a compact, readable inline form —
// `path=x.ts` / `pattern="foo" path=data` — so the log reads like a command
// history. Non-JSON or unparseable args fall back to the raw (viewer-escaped,
// bounded). The runtime already capped the string; this only reshapes it.
function prettyArgs(args){
  if(typeof args!=="string")return "";
  let o; try{o=JSON.parse(args);}catch{ return esc(args.length>80?args.slice(0,80)+"…":args); }
  if(o&&typeof o==="object"&&!Array.isArray(o)){
    const parts=Object.entries(o).map(([k,v])=>{
      let s=typeof v==="string"?v:JSON.stringify(v);
      if(s.length>60)s=s.slice(0,60)+"…";
      return `${esc(k)}=${esc(s)}`;
    });
    return parts.join(" ");
  }
  const s=esc(String(args));
  return s.length>80?s.slice(0,80)+"…":s;
}
function renderLog(){
  const all=scopedFiltered();
  const recs=all.slice(-50).reverse();
  const qc=$("qcount");
  if(qc){
    const q=!!state.filters.q;
    qc.textContent=q?(all.length?`${all.length} match${all.length===1?'':'es'}${all.length>50?' · newest 50':''}`:"no match"):"";
    qc.classList.toggle("show",q);
    qc.classList.toggle("zero",q&&all.length===0);
  }
  $("logbody").innerHTML=recs.length?recs.map(r=>{
    const tt=clk(T(r.ts));
    const tag=r.category==="telemetry"?(r.source==="lms"?`lms:${r.fields.event}`:r.source==="process"?`host ${r.fields.cpu??'–'}·${r.fields.mem??'–'}·${r.fields.gpu??'–'}%`:r.source==="detector"?`detect:${r.fields.kind}`:r.source==="runtime"?`run:${r.fields.turns}t`:r.source):(r.action||r.stage);
    let detail="";
    const f=r.fields||r.payload;
    if(r.action==="dispatch.reasoning"&&f&&f.reasoning_text){
      detail=` · <span class="preview-text">"${esc(f.reasoning_text.slice(0,60).replace(/\n/g," "))}..."</span>`;
    }else if(r.action==="dispatch.tool"&&f){
      // Show the actual args (FLOW_SCHEMA 1.16 — search pattern / path /
      // command) so the operator can read WHAT the call did; fall back to the
      // size for pre-1.16 records that carry no `args`.
      const argstr=f.args!=null?prettyArgs(f.args):`${esc(f.args_chars||0)}ch`;
      detail=` · <span class="preview-text">${esc(f.tool_name)} ${argstr} → ${esc(f.result_chars||0)}ch${f.ok!==false?'':' ❌'}</span>`;
    }else if(r.action==="dispatch.turn"&&f){
      detail=` · <span class="preview-text">turn ${esc(f.turn_seq||0)} (${esc(f.finish_reason)})</span>`;
    }else if(r.action==="tier-decision"&&r.reasoning){
      detail=` · <span class="preview-text">"${esc(r.reasoning.slice(0,60).replace(/\n/g," "))}..."</span>`;
    }else if(r.action==="dispatch.start"||r.action==="dispatch start"){
      detail=` · <span class="preview-text">start (prompt: ${esc(f?f.prompt_chars:0)}ch)</span>`;
    }
    const act=activityOf(r), ik=ACT_ICON[act];
    const aico=ik?`<span class="aico act-${act.replace(/ /g,'-')}" title="${esc(act)}">${ICON[ik]}</span>`:'';
    return `<div class="rec ${esc(r.category)} ${r._id===state.selected?'sel':''}" data-act="rec" data-arg="${r._id}">
      <span class="t" title="${ldt(T(r.ts))}">${tt}</span> ${aico}<span class="tag">${esc(tag)}</span> ${esc(r.machine_id||'')}${r.session_id?(' · '+esc(r.session_id)):''}${detail}</div>`;
  }).join(""):`<div class="empty">${state.filters.q?'no events match your search':'no events match the current filters'}</div>`;
}
function renderCrumb(){
  // Mission crumb only when the loaded data actually has a mission. Lab/dispatch
  // playback (no mission_id) starts at fleet. (Live mission/phase detail is a
  // follow-up seam — /missions + /phases; MISSION stays the sample fixture.)
  // (#691) Gate on the live-SCOPED mission, not the global count — in live mode
  // with nothing running, primaryMission() is null and the crumb drops the
  // mission link (no stale "◆ m6"). Playback: primaryMission()=missions[0].
  // (#827) Light the active lens. The missions lens covers the index + a
  // mission detail; the lab lens (#1247 Part 3) covers the run list + a run
  // detail; everything else is the fleet lens.
  // (#1403) The missions lens is the index; on daemon-served pages the mission
  // detail is the graph page (a separate document). The in-viewer `mission`
  // level survives only as the daemon-less static summary (renderMissionStatic).
  const inMissions = state.level==="missions"||state.level==="mission";
  const inLab = state.level==="lab"||state.level==="lab-run";
  // (#1508) The unified machine page — live probes (kernel counters + lms
  // metadata via /machine/resources) for the health region plus a plain runs
  // list, a third source class distinct from run artifacts (lab) and flow
  // records (fleet/missions). Absorbed the retired `machinemem` level.
  const inMachine = state.level==="machine";
  const lf=$("lens-fleet"), lm=$("lens-missions"), ll=$("lens-lab"), lmm=$("lens-machine");
  if(lf)lf.className="lens"+((inMissions||inLab||inMachine)?"":" on");
  if(lm)lm.className="lens"+(inMissions?" on":"");
  if(ll)ll.className="lens"+(inLab?" on":"");
  if(lmm)lmm.className="lens"+(inMachine?" on":"");
  // (#1247 Part 3) The lab lens is a SEPARATE machine-local room, not a rung
  // of the fleet drill ladder ("two doors, one viewer, distinct questions" —
  // operator direction) — it has no time-scrubbing story, so the flow-record
  // chrome (event log, detail pane, playback scrub bar) is irrelevant and
  // hidden via this class (see the `.lab-mode` CSS block).
  document.body.classList.toggle("lab-mode", inLab);
  // (#1508) Same reflow for the unified machine page — its own class, same rules.
  document.body.classList.toggle("machine-mode", inMachine);
  // (#1247 deep-link) Every navigation path lands here, so this is the ONE
  // place the address bar is kept in sync with the lab/machine view.
  syncLabHash(inLab, inMachine);
  if(inMachine){
    $("crumb").innerHTML=`<a data-act="fleet">fleet</a><span class="sep">›</span>${state.machine!=null?escN(state.machine):"this machine"}`;
    return;
  }
  if(inLab){
    let lc=`<a data-act="lab">lab</a>`;
    if(state.level==="lab-run") lc+=`<span class="sep">›</span>${esc(state.labRunDir||"—")}`;
    $("crumb").innerHTML=lc; return;
  }
  // Missions-lens crumb: the index, plus the static mission summary's id when
  // a daemon-less context is showing one (#1403 gate remediation).
  if(inMissions){
    let mc=`<a data-act="missions">missions</a>`;
    if(state.level==="mission") mc+=`<span class="sep">›</span>◆ ${esc(state.missionId||primaryMission()||"—")}`;
    $("crumb").innerHTML=mc; return;
  }
  const pm=primaryMission();
  const hasMission=pm!=null;
  let c=hasMission?`<a class="misslink" data-act="mission">◆ ${esc(pm)}</a>`:``;
  c+=(hasMission?`<span class="sep">›</span>`:``)+`<a data-act="fleet">fleet</a>`;
  // (#1094) loose included so the crumb carries the machine link there too —
  // it's the up-nav now that the back button is gone (loose drills from a
  // machine). `machine` itself is handled in the early-return above.
  if(state.level==="subsystem"||state.level==="loose") c+=`<span class="sep">›</span><a data-act="machine" data-arg="${esc(state.machine)}">${escN(state.machine)}</a>`;
  if(state.level==="subsystem") c+=`<span class="sep">›</span>${esc(state.session)}`;

    if(el.matches("button,a[href],input,textarea,select"))continue; // natively focusable + keyed
    if(!el.hasAttribute("tabindex"))el.tabIndex=0;
    if(!el.hasAttribute("role"))el.setAttribute("role","button");
  }
}

// `toggle` doesn't bubble — a capture-phase listener stands in for an inline
// ontoggle. The raw-JSON <details> tracks via state.rawOpen; every other
// stateful <details> carries `data-expand="<key>"` and is tracked in
// state.expanded, so its open state survives the ~1/sec stage rebuild.
document.addEventListener("toggle",e=>{
  const t=e.target;
  if(!t||!t.matches)return;
  if(t.matches("details[data-raw]"))state.rawOpen=t.open;
  else if(t.matches("details[data-expand]")){

// (#691) Playback catalog day-picker. Toggling fetches /flow-days (the
// disk-backed catalog — every day with a flow file, summarized) and renders a
// list: "live (today)" first, then each day newest-first with a one-line
// summary. Selecting a day navigates to /play/<date>; "live" goes to /. Only
// daemon-backed views get the button (the static demo has no /flow-days), so
// this is gated in boot().
async function toggleCatalog(){
  const panel=$("catpanel");
  if(!panel) return;
  if(!panel.hidden){ panel.hidden=true; return; }
  panel.innerHTML=`<div class="cathdr">loading…</div>`;
  panel.hidden=false;
  let days=[], missions=[];
  // Days-index + the cross-day mission catalog, in parallel (#691). allSettled,
  // not all, so a /flow-missions failure doesn't also drop the days list.
  const [rd,rm]=await Promise.allSettled([
    fetch("/flow-days",{headers:{accept:"application/json"}}),
    fetch("/flow-missions",{headers:{accept:"application/json"}}),
  ]);
  try{ if(rd.status==="fulfilled"&&rd.value.ok){ const b=await rd.value.json(); days=Array.isArray(b.days)?b.days:[]; } }catch(_){}
  try{ if(rm.status==="fulfilled"&&rm.value.ok){ const b=await rm.value.json(); missions=Array.isArray(b.missions)?b.missions:[]; } }catch(_){}
  const today=todayUTC();
  const liveRow=`<button class="catrow live" data-act="golive"><div class="cd">● live · today</div><div class="cs">now-ish on present machines</div></button>`;
  const dayRows=days.map(d=>{
    const date=esc(d.date);
    const recs=Number(d.records)||0, disp=Number(d.dispatches)||0;
    const ms=Array.isArray(d.missions)?d.missions:[];
    const missTxt=ms.length?` · ${ms.length===1?'mission':'missions'} ${esc(ms.slice(0,3).join(', '))}${ms.length>3?` +${ms.length-3}`:''}`:'';
    const isToday=d.date===today;
    const summary=`${disp} dispatch${disp===1?'':'es'} · ${recs} record${recs===1?'':'s'}${missTxt}`;
    return `<button class="catrow" data-act="goday" data-arg="${date}"><div class="cd">${date}${isToday?' · today':''}</div><div class="cs">${summary}</div></button>`;
  }).join("");
  // (#691) Missions section — the cross-day catalog. Selecting a mission replays
  // it by query (?mission=), stitching its records across every day it ran.
  const missRows=missions.slice(0,50).map(m=>{
    const id=esc(m.mission_id||"");
    const disp=Number(m.dispatches)||0, recs=Number(m.records)||0;
    const span=(m.first_date&&m.first_date!==m.last_date)
      ? `${esc(m.first_date)}–${esc(m.last_date)}`
      : esc(m.last_date||m.first_date||"");
    const summary=`${disp} dispatch${disp===1?'':'es'} · ${recs} record${recs===1?'':'s'}${span?` · ${span}`:''}`;
    return `<button class="catrow" data-act="gomission" data-arg="${id}"><div class="cd">▣ ${id}</div><div class="cs">${summary}</div></button>`;
  }).join("");
  const missSection=missions.length?`<div class="cathdr">missions</div>${missRows}`:"";
  const daysSection=days.length
    ? `<div class="cathdr">days</div>${dayRows}`
    : `<div class="catempty">no recorded days yet — dispatches you run will appear here.</div>`;
  panel.innerHTML=`<div class="cathdr">playback catalog</div>${liveRow}${missSection}${daysSection}`;
}

// ── Data source: real flow records (daemon) with sample fallback (website) ──
// Normalize real FlowRecords into the viewer's record shape. The flow schema
// is already close: it carries ts/category/tier/stage/action/handle/
// machine_id/mission_id/session_id/model. Differences handled here:
//  - "dispatch start"/"dispatch complete" (space) → dotted form the UI matches
//  - tier may be capitalized ("Local") → lowercased to match the filter set
//  - event-specific data lives under `payload` (schema 1.6+) → exposed as `fields`
//  - category defaults to telemetry when a `source` is present, else work
function flowToRenderModel(records){
  // (#1122) A compaction emits TWO records at the same ts: the dispatch-stage
  // WORK record (action=dispatch.compaction, source=crew_dispatch; message
  // counts) AND — since #557 — a dedicated TOKEN-telemetry record
  // (action=telemetry.compaction, source=compaction; token from/to for the
  // sawtooth). The telemetry record is the canonical compaction signal. The
  // legacy conversion below re-tagged dispatch.compaction as source=compaction
  // too, so the subsystem card's `tel.filter(source==="compaction")` counted
  // BOTH and reported 2× (the markers overlap at the shared ts, so the chart
  // looked right while the meter doubled). Keep the conversion only as a
  // FALLBACK — when no telemetry.compaction covers the same (session_id, ts) —
  // so current dual-emit data counts each compaction once AND pre-#557 history
  // (which has only dispatch.compaction) still renders its compactions.
  const compTelemetryKeys=new Set();
  for(const r of records){
    if(r&&r.action==="telemetry.compaction"){
      compTelemetryKeys.add((r.session_id||"")+"\x1f"+(r.ts||""));
    }
  }
  // Drop non-record meta lines before bucketing. Every flow file leads with a
  // schema header `{"_type":"schema","darkmux_version":...,"version":...}` — it
  // has no machine_uid, so it would otherwise fall into an "unknown" machine
  // card (and inflate record counts) one per file. Real flow records carry no
  // `_type`, so `!r._type` keeps records and drops the header + any future meta.
  const out=records.filter(r=>r&&!r._type).map(r=>{
    const o={...r};
    o._uid = r._uid;
    if(o.action==="dispatch start")o.action="dispatch.start";
    if(o.action==="dispatch complete")o.action="dispatch.complete";
    // (#720) The third terminal: a failed/watchdog-killed dispatch emits
    // "dispatch error" (exit!=0; watchdog kill = exit 137). Normalize it to a
    // DISTINCT dotted form (not collapsed into complete) so the lifecycle
    // closes the run AND the failure stays loud downstream.
    if(o.action==="dispatch error")o.action="dispatch.error";
    if(o.tier)o.tier=String(o.tier).toLowerCase();
    if(o.source&&o.source.startsWith("frontier-"))o.source="frontier";
    if(o.payload&&!o.fields)o.fields=o.payload;
    // (#1122) dispatch.compaction → a compaction telemetry record (message
    // counts), but ONLY when no dedicated #557 telemetry.compaction record
    // covers the same (session_id, ts). With a telemetry sibling present this
    // record stays a plain source=crew_dispatch work event, so the compaction
    // is counted once (by the canonical token-telemetry record).
    if(o.action==="dispatch.compaction"
       && !compTelemetryKeys.has((o.session_id||"")+"\x1f"+(o.ts||""))){
      const p=o.payload||{};
      o.category="telemetry"; o.source="compaction";
      o.fields={from:p.before_messages||0,to:p.after_messages||0};
    }
    if(!o.category)o.category=o.source?"telemetry":"work";
    return o;
  });
  // Per-session turn count (max turn_seq) → one runtime telemetry record, which
  // is where the subsystem view reads the TURNS metric.
  const perS={};
  for(const r of records){
    if(r.action==="dispatch.turn"&&r.session_id){
      const seq=(r.payload&&r.payload.turn_seq)||0;
      const e=perS[r.session_id]||(perS[r.session_id]={turns:0,ts:r.ts,machine_id:r.machine_id,machine_uid:r.machine_uid});
      e.turns=Math.max(e.turns,seq); e.ts=r.ts; if(r.machine_id)e.machine_id=r.machine_id; if(r.machine_uid)e.machine_uid=r.machine_uid;
    }
  }
  for(const s in perS){
    const uid = getRuntimeUid(s);
    out.push({_uid: uid, ts:perS[s].ts,category:"telemetry",source:"runtime",machine_id:perS[s].machine_id,machine_uid:perS[s].machine_uid,session_id:s,fields:{turns:perS[s].turns}});
  }
  // Sort by ts: the per-session runtime aggregates above are APPENDED out of
  // chronological order, and the event log + the follow-latest selection both
  // assume DATA is temporal (log reverses it; "following" = max-ts = topmost
  // row). One sort here keeps the whole pipeline in time order. recompute()
  // assigns `_id` by index AFTER this, so ids track the sorted order.
  return out.sort((a,b)=>T(a.ts)-T(b.ts));
}

// Pick the day to play back: URL hash (#2026-06-01) or ?date=, default today (UTC).
function targetDate(){
  const h=(location.hash||"").replace(/^#/,"").trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(h))return h;
  const q=new URLSearchParams(location.search).get("date");
  if(q&&/^\d{4}-\d{2}-\d{2}$/.test(q))return q;
  return new Date().toISOString().slice(0,10);
}
// (#691) Replay-by-query: ?mission=<id> / ?session=<id> (or #mission=… / #session=…).
// When present, boot loads that thing's records across ALL day files (the daemon
// stitches them chronologically) and plays them back — the playback UNIT is the
// mission/dispatch, not a calendar day. Returns null when no query is present.
function catalogQuery(){
  const p=new URLSearchParams(location.search);
  const h=new URLSearchParams((location.hash||"").replace(/^#/,""));
  const mission=(p.get("mission")||h.get("mission")||"").trim();
  if(mission)return {kind:"mission", id:mission};
  const session=(p.get("session")||h.get("session")||"").trim();
  if(session)return {kind:"session", id:session};
  return null;
}
// (#1247 deep-link) Lab-lens deep link: `#lens=lab` boots straight into the
// lab run list; `#lens=lab&run=<relative-dir>` boots into that run's detail
// (the `run` value is the same URL-encoded relative path `/lab/run/detail`'s
// `dir` param takes — an empty-but-present `run=` addresses a run matched at
// the lab-dir root, whose dir IS ""). Same URLSearchParams-over-hash parsing
// as catalogQuery above; `?lens=lab` in the search string works too.
//
// PRECEDENCE when the hash carries multiple intents: `lens=lab` wins over
// `#mission=` / `#session=` (boot skips catalogQuery when this returns
// non-null — the lab lens is a separate room, so a URL naming both is
// contradictory and the lab half is honored; the mission/session params are
// preserved in the hash untouched, so hand-deleting `lens=lab` from the bar
// recovers the other view). A bare `#<date>` composes fine — it only picks
// which day the flow window loads underneath (targetDate), and it is treated
// as boot-only input: syncLabHash below does not preserve it once the
// operator navigates lenses (the playback route carries its date in the
// /play/<date> PATH, not the hash, so nothing durable is lost).
function labQuery(){
  const p=new URLSearchParams(location.search);
  const h=new URLSearchParams((location.hash||"").replace(/^#/,""));
  const lens=(p.get("lens")||h.get("lens")||"").trim();
  if(lens!=="lab")return null;
  const run=p.has("run")?p.get("run"):(h.has("run")?h.get("run"):null);
  return {run: run==null?null:run.trim()};
}
// (#1247 deep-link) Reflect the current lab-lens state into location.hash so
// the view in front of the operator is always copyable from the address bar
// (the operator bookmarks the viewer on a phone via tailscale-serve —
// tab-only state isn't addressable). replaceState, never pushState: lens
// hops must not spam history. Called from renderCrumb (the one chokepoint
// every navigation path repaints through); the no-change guard keeps live
// mode's ~1/sec renders from touching history at all. Writes only the
// lab-owned params (`lens`/`run`) and passes other hash params through
// untouched; a bare `#<date>` hash (not key=value shaped — URLSearchParams
// would mangle it to `<date>=`) is dropped rather than corrupted, per the
// boot-only-input note on labQuery.
// (#1508) `inMachine` rides the same chokepoint: the unified machine page
// writes `lens=machine` (no `run` param) so the phone view is bookmarkable
// too — for both the local nav-tab visit and a remote fleet-card drill.
function syncLabHash(inLab, inMachine){
  const raw=(location.hash||"").replace(/^#/,"");
  const isBareDate=/^\d{4}-\d{2}-\d{2}$/.test(raw);
  if(!inLab&&!inMachine){
    // Outside the lab/machine lenses, only touch the hash when it carries
    // lens params to REMOVE — a bare-date or #mission=/#session= hash the
    // operator arrived with stays put (renderCrumb repaints every view; an
    // unconditional rewrite here would clear #<date> on the first fleet
    // render after boot).
    if(!raw||isBareDate)return;
    const p=new URLSearchParams(raw);
    if(!p.has("lens")&&!p.has("run"))return;
    p.delete("lens");p.delete("run");
    const next=p.toString();
    history.replaceState(null,"",next?("#"+next):location.pathname+location.search);
    return;
  }
  const p=isBareDate?new URLSearchParams():new URLSearchParams(raw);
  if(inMachine){
    p.set("lens","machine");p.delete("run");
  }else{
    p.set("lens","lab");
    if(state.level==="lab-run"&&state.labRunDir!=null)p.set("run",state.labRunDir);
    else p.delete("run");
  }
  const next=p.toString();
  if(next===raw)return;
  history.replaceState(null,"","#"+next);
}
// (#1508 deep-link) `#lens=machine` (or `?lens=machine`) boots straight into
// the unified machine page (local) — same URLSearchParams-over-hash parsing
// as labQuery. `lens` is a single value, so lab/machine can't conflict; a
// `#mission=`/`#session=` replay query alongside is contradictory and the
// lens half is honored (same precedence rule as the lab lens).
function machineQuery(){
  const p=new URLSearchParams(location.search);
  const h=new URLSearchParams((location.hash||"").replace(/^#/,""));
  return (p.get("lens")||h.get("lens")||"").trim()==="machine";
}

function todayUTC(){return new Date().toISOString().slice(0,10);}
// (#691) The live view is a rolling window, NOT just today's file — otherwise
// crossing midnight (or refreshing after it) drops recent runs from live even
// though they're hours old. Storage stays per-day files; the live VIEW queries
// the last LIVE_WINDOW_MS across day files.
const LIVE_WINDOW_MS=24*60*60*1000;
// (#1173) The reconcile backstop fetches only records newer than (newest held −
// this overlap) rather than the whole day — a safety margin over the SSE cadence
// so a brief reconnect gap is still caught while the response stays a small tail.
const RECONCILE_OVERLAP_MS=30*60*1000;
function prevDateUTC(d){const dt=new Date(d+"T00:00:00Z");dt.setUTCDate(dt.getUTCDate()-1);return dt.toISOString().slice(0,10);}

let RAW=[];            // raw FlowRecords (pre-adapt); the live tail appends here
// (#794) Record-identity dedup for the live tail. The SSE stream is
// at-least-once: a reconnect or a snapshot/stream boundary can re-deliver a
// record the client already holds. Appending blindly RE-COUNTED records, which
// inflated cumulative readouts — the savings hero climbed past the persisted
// truth and then "reset" to the real number on refresh (the live in-memory set
// had diverged from the unique records in the window). SEEN_KEYS makes RAW
// append idempotent: a record is added at most once, so live == refresh always.
const SEEN_KEYS=new Set();
const recKey=r=>[r.ts,r.machine_uid||'',r.session_id||'',r.action||'',r.source||'',r.handle||'',r.level||'',r.stage||'',r.payload!=null?JSON.stringify(r.payload):''].join('\x1f');
function rebuildSeen(){ SEEN_KEYS.clear(); for(const r of RAW)SEEN_KEYS.add(recKey(r)); }
let LIVE_ES=null;      // EventSource handle when tailing the live stream
let LIVE_ES_DATE=null; // UTC date string of the day the SSE stream was opened
// (#638) Sessions with a live heartbeat right now — polled from the daemon's
// /fleet/sessions/live in live mode (stays EMPTY in playback). The machine
// drill keys "running" on membership here, so a dispatch that died without a
// dispatch.complete ages out instead of showing "running" forever.
const LIVE_SESSIONS=new Set();
const liveSig=()=>[...LIVE_SESSIONS].sort().join(",");
// (#638) Machines broadcasting a presence heartbeat right now — uid → beat,
// polled from /fleet/machines/live in live mode (EMPTY in playback). Presence
// is the source of truth for the live fleet: a machine appears here whether or
// not it has any flow records, so machines() unions it, and nameOf/specOf fall
// back to the beat's display_name/specs for a recordless present machine.
const LIVE_MACHINES=new Map();
// (#1008) The local daemon's /machine/specs snapshot (machine_id, cpu_brand,
// ram, loaded_models, utility_model{id,loaded}). Polled in live mode so the
// utility card + spec line render OBSERVED state for THIS machine instead of a
// hardcoded "resident". null until first fetched / in playback.
let MACHINE_SPECS=null;
let lastStageSig=null; // skip stage re-renders that would destroy clickable cards
const SEEN={cat:new Set(),tier:new Set(),src:new Set(),act:new Set()};  // filter values ever observed

// When live records introduce a category/tier/source not seen before, include it
// in the active filter set (new = visible by default). Values the operator
// explicitly deselected are already in SEEN, so they stay deselected.
function absorbNewFilterValues(){
  const add=(vals,seen,fset)=>{for(const v of vals){if(!seen.has(v)){seen.add(v);fset.add(v);}}};
  add(FCATS,SEEN.cat,state.filters.cat);
  add(FTIERS,SEEN.tier,state.filters.tier);
  add(FSRC,SEEN.src,state.filters.src);
  add(FACTS,SEEN.act,state.filters.act);
}

function setBadges(mode,date){
  STATUS.mode=mode; STATUS.date=date; // (#1132) snapshot for the about modal's mode row
  const dl = date===todayUTC() ? "today" : date;
  // Live viewer never enters "sample" mode — the fallback is "no daemon" or
  // "no records yet", both honest empty states. (Demo "sample data" badge is
  // gone — that mode belongs to docs/demo/ only.)
  DATA_SOURCE = mode==="live" ? ("live · "+dl) : mode==="play" ? ("flow · "+date) : mode==="empty" ? ("no records · "+date) : mode==="no-daemon" ? "daemon not reachable" : "no records yet";
  const sb=$("srcbadge");
  // (#1065) Live mode: show just the source/date — the adjacent modebadge
  // ("● live") already carries liveness, so a leading "Live ·" here was the
  // same word twice in one glance. Other modes keep their distinct labels
  // ("Flow"/"playback" aren't redundant).
  if(sb) sb.textContent = mode==="live" ? dl : mode==="play" ? ("Flow · "+date) : mode==="empty" ? ("No records · "+date) : mode==="no-daemon" ? "No daemon" : "No records yet";
  const mb=$("modebadge");
  if(mb){ const live=mode==="live"; mb.textContent=live?"● live":"▣ playback"; mb.classList.toggle("live",live); }
  // Live mode hides the playback scrub bar (CSS keys off this class) — replay is /play/<date>.
  document.body.classList.toggle("live-mode", mode==="live");

// Structural signature of the current level's stage. In live mode the cards are
// re-rendered only when this changes — a burst of telemetry records must not
// destroy a card the operator is about to click (same hazard the playback timer
// guards against). Subsystem is a metrics view with no cards → always full-render.
function stageSig(){
  const v=visible(), dis=v.filter(r=>r.action==="dispatch.start"||r.action==="dispatch.complete"||r.action==="dispatch.error"||r.action==="session.end").length;
  // Fold the live-session set in: a session going live / ageing out is a
  // lifecycle change that must re-render the cards (so the "running"↔"ended"
  // pill flips), same as a dispatch.start/complete / session.end edge arriving
  // (#638/#647). (#1007) When Redis presence is empty, fold the FLOW-DERIVED
  // live set in instead — otherwise a silently-crashed orphan ageing out past
  // FLOW_LIVE_TTL_MS changes nothing in the signature (no new record arrives)
  // and the card stays "running" until an unrelated event re-renders. With the
  // flow-derived set folded in, the next poll past the TTL boundary flips it.
  const ls=LIVE_SESSIONS.size?liveSig():[...flowLiveSessions()].sort().join(",");
  // (#638 Slice 3) Live presence set — when a machine stops beating it drops
  // from LIVE_MACHINES (membership stays via its records, so machines() doesn't
  // change), but its card must re-render present→absent. Fold the presence
  // signature in so that flip triggers a render. (Playback re-renders on each
  // scrub, so machPresent re-evaluates against state.t there without help.)
  const ps=[...LIVE_MACHINES.keys()].sort().join(",");
  // (#1008) Fold the local /machine/specs snapshot in: the utility card's
  // resident/registered/not-configured pill + the spec line read from
  // MACHINE_SPECS, which arrives (and changes — a swap loads the utility model)
  // on its own 5s poll WITHOUT any flow/presence edge. Without this, the card
  // paints once before the first specs fetch and never repaints (the #1007
  // re-render-gap class). Encode utility loaded-state + id + specs-present.
  const um=MACHINE_SPECS&&MACHINE_SPECS.utility_model;
  const ms=MACHINE_SPECS?((um?(um.loaded?'1':'0')+':'+um.id:'null'))+'|'+(MACHINE_SPECS.cpu_brand?'s':''):'na';
  if(state.level==="fleet")return "f|"+machines().join(",")+"|"+dis+"|"+ls+"|"+ps+"|"+ms;
  if(state.level==="machine")return "m|"+state.machine+"|"+sessionsOn(state.machine).join(",")+"|"+dis+"|"+ls+"|"+ps+"|"+ms;
  // (#1148) The run view gets a STRUCTURAL signature (machine + session + count
  // of this session's lifecycle records — start/complete/error/end). It changes
  // only on entering the view, a new attempt, or the run completing — NOT on a
  // metric tick. So a tick refreshes the volatile regions in place
  // (refreshSubsystem) instead of a full rebuild that would reset the prompt's
  // scroll/open. `loose` (the unscoped records list) stays full-render.
  if(state.level==="subsystem"){
    const sd=visible().filter(r=>r.session_id===state.session&&(r.action==="dispatch.start"||r.action==="dispatch.complete"||r.action==="dispatch.error"||r.action==="session.end")).length;
    return "s|"+state.machine+"|"+state.session+"|"+sd;
  }
  if(state.level==="loose")return null;  // (#691) live records list: full-render each tick
  return "mission";
}
// (#691) Fetch yesterday + today's flow records and keep only the last
// LIVE_WINDOW_MS into RAW. Used by boot() for initial live load and by
// the UTC date-rollover handler to reload the rolling window on a new day.
async function loadLiveWindow(today){
  const dates=[prevDateUTC(today),today];
  let recs=[],anyOk=false;
  for(const d of dates){
    const res=await fetch("/flow/"+d,{headers:{accept:"application/json"}});
    if(res.ok){anyOk=true;const body=await res.json();recs=recs.concat(Array.isArray(body)?body:(body.records||body.flow||[]));}
  }
  RAW=recs.filter(r=>T(r.ts)>=Date.now()-LIVE_WINDOW_MS);
  // (#794) Dedup the initial window — the two-day fetch (prevDate + today) can
  // overlap, and we want RAW to start as a clean unique set so the tail's
  // dedup has an accurate baseline. Seeds SEEN_KEYS via rebuildSeen().
  const sk=new Set();
  RAW=RAW.filter(r=>{const k=recKey(r); if(sk.has(k))return false; sk.add(k); return true;});
  assignUids(RAW);
  rebuildSeen();
  return anyOk;
}

function applyLive(){
  // (#691) Keep RAW within the rolling live window so a long-running session
  // (and the SSE tail across midnight) ages old records out instead of growing
  // unbounded. RAW is ~chronological, so only filter when the oldest is stale.
  const cut=Date.now()-LIVE_WINDOW_MS;
  // (#794) Rebuild SEEN_KEYS after an age-out so it tracks exactly what's in
  // RAW — keeps the dedup set bounded and lets a record legitimately re-enter
  // if it ever ages out and is re-sent.
  if(RAW.length&&T(RAW[0].ts)<cut){
    RAW=RAW.filter(r=>T(r.ts)>=cut);rebuildSeen();
    // Prune runtimeUids for sessions that aged out of RAW. It's the one
    // per-session structure the age-out doesn't otherwise reclaim (SEEN_KEYS is
    // rebuilt above, LIVE_SESSIONS/LIVE_MACHINES are cleared+rebuilt), so a
    // long-lived live tab would grow it unbounded — one entry per distinct
    // session_id ever seen. Deleting during Map iteration is safe.
    const liveSids=new Set(); for(const r of RAW)if(r.session_id)liveSids.add(r.session_id);
    for(const sid of runtimeUids.keys())if(!liveSids.has(sid))runtimeUids.delete(sid);
  }
  DATA=flowToRenderModel(RAW);
  recompute();
  absorbNewFilterValues();
  if(state.follow)state.t=tMax;
  const sig=stageSig();
  if(sig===null||sig!==lastStageSig){ lastStageSig=sig; render(); return; }
  // Stage structure unchanged — don't rebuild it. (#1148) For the run view,
  // update only the volatile metric/chart/detection regions IN PLACE so the
  // header + brief (and the prompt's scroll/open) survive. Then refresh the
  // side readouts (selected event, log, meta, transport).
  if(state.level==="subsystem")refreshSubsystem();
  if(state.follow){ const n=newest(scopedFiltered()); state.selected=n?n._id:null; }
  renderDetail();renderLog();renderMeta();syncTransport();
}
function startLiveTail(date){
  if(typeof EventSource==="undefined")return;
  LIVE_ES_DATE=date; // record the day this stream was opened
  if(LIVE_ES)LIVE_ES.close();
  LIVE_ES=new EventSource("/flow/"+date+"/stream");
  let pending=false;
  LIVE_ES.onmessage=ev=>{
    let rec; try{rec=JSON.parse(ev.data);}catch(_){return;}
    if(!rec||typeof rec!=="object"||Array.isArray(rec))return;
    // (#794) Idempotent append — drop a record already in the window. The SSE
    // is at-least-once; without this, a re-delivered record re-counts and
    // inflates cumulative readouts (the savings-hero divergence).
    const k=recKey(rec);
    if(SEEN_KEYS.has(k))return;
    SEEN_KEYS.add(k);
    rec._uid = nextRecordUid++;
    RAW.push(rec);
    if(!pending){pending=true;requestAnimationFrame(()=>{pending=false;applyLive();});}
  };
  LIVE_ES.onerror=()=>{const mb=$("modebadge");if(mb)mb.classList.remove("live");}; // reconnecting — drop the pulse
  window.addEventListener("beforeunload",()=>{if(LIVE_ES)LIVE_ES.close();});
}
// (#638) Poll the live-session set on the heartbeat cadence (~5s, matching
// the emitter's refresh + 15s TTL). Best-effort: a fetch error just leaves
// the set unchanged rather than flapping sessions offline. Only started in
// (#1387) What-changed summary of a session's mission-run worktree. The
// daemon's GET /worktree-summary/:session_id resolves the session's
// worktree from its mission.run.start record and returns file/adds/dels
// totals + the worktree path (numbers + path only — no file content ever
// leaves the server; replaces the retired #756 live-diff poll). Polled
// ONLY while the operator is on that session's view in LIVE mode —
// playback and the static demo never fetch (no daemon there; the catch
// keeps a 404 silent, so this also degrades cleanly against an older
// daemon). One timer max; it self-stops when the view changes. Worktrees
// outlive dispatch complete (until ship/abort), so the panel keeps working
// at the review gate — where the handoff matters most.
const WTSUM={sid:null,data:null,timer:null,_painted:""};

async function pollWtSum(){

    // render(). The rest of the subsystem updates on its own cadence via
    // applyLive; the summary has no business triggering a stage rebuild.

function ensureWtSumPoll(sid){

  stopWtSumPoll();

  pollWtSum();

    if(state.level!=="subsystem"||state.session!==sid){stopWtSumPoll();return;}
    pollWtSum();

// live mode; playback keeps LIVE_SESSIONS empty so nothing reads "running".
let LIVE_SESS_TIMER=null;
async function pollLiveSessions(){
  try{
    const r=await fetch("/fleet/sessions/live",{headers:{accept:"application/json"}});
    if(!r.ok)return;

    const next=(Array.isArray(arr)?arr:[]).map(b=>b&&b.session_id).filter(Boolean);
    LIVE_SESSIONS.clear(); next.forEach(s=>LIVE_SESSIONS.add(s));

// (#638) Poll the live-machine set (presence beats) on the same cadence. A
// machine shows in the fleet view because it's BROADCASTING PRESENCE, not
// because it emitted a flow record — so a freshly-synced, idle machine appears
// here and drops off when it stops beating. Best-effort like the session poll.

  try{
    const r=await fetch("/fleet/machines/live",{headers:{accept:"application/json"}});
    if(!r.ok)return;

// (#1008) Fetch the local machine's specs + utility-model state. Polled so the

// swap loading the utility model. Best-effort; failure keeps the last snapshot.

// (#1151) SSE safety-net. The live tail (/flow/:date/stream) is tail-from-now:
// on a Redis hiccup it can hit MAX_CONSECUTIVE_XREAD_FAILURES, close the stream,
// and the browser EventSource reconnects with a FRESH watermark — silently
// dropping any record XADD'd during the reconnect gap (e.g. a new run's
// dispatch.start, so the run never surfaces until the operator manually
// refreshes). This periodic reconcile re-pulls the bounded live window and
// MERGES anything the tail missed, deduped through SEEN_KEYS exactly like the
// SSE append — so a missed run self-heals on the next tick instead of needing a
// refresh. SSE stays the low-latency path; this is the backstop. Live only
// (started from startLivePoll, which playback/demo never call).
async function reconcileLiveWindow(){
  const today=LIVE_ES_DATE||todayUTC();
  const cut=Date.now()-LIVE_WINDOW_MS;
  // (#1173) Incremental: ask each day file only for records at/after the newest
  // ts we already hold (minus RECONCILE_OVERLAP_MS), server-filtered via
  // `?since=`. The response is the recent tail, not the multi-MB day — so the
  // reconcile parse cost no longer grows with the day (the long-tab-lag cause).
  const newest=RAW.reduce((m,r)=>{const t=T(r.ts);return t>m?t:m;},0);
  const sinceMs=newest?Math.max(cut,newest-RECONCILE_OVERLAP_MS):cut;
  const q="?since="+encodeURIComponent(new Date(sinceMs).toISOString().replace(/\.\d+Z$/,"Z"));
  let added=0;
  for(const d of [prevDateUTC(today),today]){
    let res; try{res=await fetch("/flow/"+d+q,{headers:{accept:"application/json"}});}catch(_){continue;}
    if(!res.ok)continue;
    let body; try{body=await res.json();}catch(_){continue;}
    const recs=Array.isArray(body)?body:(body.records||body.flow||[]);
    for(const r of recs){
      if(!r||!r.ts||T(r.ts)<cut)continue;
      const k=recKey(r);
      if(SEEN_KEYS.has(k))continue;
      SEEN_KEYS.add(k); r._uid=nextRecordUid++; RAW.push(r); added++;
    }
  }
  if(added)applyLive();   // re-renders only if the merged records changed the stage signature
}
function startLivePoll(){
  if(LIVE_SESS_TIMER)return;
  pollLiveSessions(); pollLiveMachines(); pollMachineSpecs();
  let tick=0;
  LIVE_SESS_TIMER=setInterval(async()=>{
    // UTC date-rollover detection: if we're in live mode and the day
    // changed since the SSE stream was opened, close it, reload the
    // rolling window for the new day, reopen the tail, and refresh.
    const nd=todayUTC();
    if(nd!==LIVE_ES_DATE){
      LIVE_ES_DATE=nd;
      if(LIVE_ES)LIVE_ES.close();
      await loadLiveWindow(nd);
      startLiveTail(nd);
      recompute(); render();
    }
    pollLiveSessions();pollLiveMachines();pollMachineSpecs();
    // (#1151) Backstop the SSE every ~20s (every 4th 5s tick). Presence polling
    // above already gives a 5s "something's live" signal; this catches the run
    // DATA up if the tail dropped records in a reconnect gap.
    if((++tick%4)===0)reconcileLiveWindow();
  },5000);
  window.addEventListener("beforeunload",()=>{if(LIVE_SESS_TIMER)clearInterval(LIVE_SESS_TIMER);});
}

// Read injected mode + date from the daemon. The live route (GET /) injects

function injectedMeta(name){

async function boot(){

  // The daemon injects darkmux-version (version + git SHA) + darkmux-flow-schema;
  // the static demo has neither, so the chip stays empty (no daemon to name).
  const verMeta=injectedMeta("darkmux-version"), schemaMeta=injectedMeta("darkmux-flow-schema");
  {const vb=$("verbadge"); if(vb&&verMeta){

    vb.textContent="v"+verMeta+(schemaMeta?" · schema "+schemaMeta:"")+"  ⓘ";
    vb.title="darkmux "+verMeta+(schemaMeta?" · flow schema "+schemaMeta:"")+" — about";
    vb.dataset.act="info"; vb.setAttribute("role","button"); vb.tabIndex=0; vb.setAttribute("aria-haspopup","dialog");
  }}

  // note: when present it wins over a `#mission=`/`#session=` replay query

  // is skipped and the normal live/playback flow load proceeds underneath).
  const lq = labQuery();

  const mq = machineQuery();

  // catalog endpoints). A mission/session query forces playback of that thing.
  const cq = (flowSrc||lq||mq) ? null : catalogQuery();

  // Playback mode is daemon-controlled (or static-flow-src driven): it forces
  // "play" regardless of whether the date happens to be today, and SSE is
  // never started. Live mode follows the original today=tail / past=replay.
  const wantsPlayback = injectedMode==="play" || !!flowSrc || !!cq;

    // daemon returns them chronologically — and play them back as one view.

    try{
      const url = cq.kind==="mission" ? "/flow-mission/"+encodeURIComponent(cq.id)

  } else if(flowSrc){
    // Parse the flow file line-by-line, the way the daemon parses the on-disk
    // .jsonl — then it's the standard playback render path, nothing demo-specific.
    try{
      const text=await fetch(flowSrc).then(r=>r.text());
      RAW=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean)
              .map(l=>{try{return JSON.parse(l);}catch(_){return null;}}).filter(Boolean);
    }catch(e){ RAW=[]; }
    assignUids(RAW);

      // mode is "live" whenever the daemon is reachable, even with zero records,
      // so the SSE tail + rollover poll start and stream the day's first record.
      let anyOk=false;

      } else {
        const res=await fetch("/flow/"+date,{headers:{accept:"application/json"}});
        if(res.ok){ anyOk=true; const body=await res.json(); RAW=Array.isArray(body)?body:(body.records||body.flow||[]); }
        else RAW=[];
      }
      assignUids(RAW);
      DATA=flowToRenderModel(RAW);

    }catch(e){ DATA=[]; RAW=[]; mode="no-daemon"; }

  // distinguish live-route vs playback-route loads at a glance.

  // which the static demo (flowSrc, no daemon) and the no-daemon state don't

  // when a daemon is behind us. (set once at boot; setBadges only updates its
  // text, so the data-act/class/title persist.)
  if(!flowSrc && mode!=="no-daemon"){ const sb=$("srcbadge"); if(sb){ sb.dataset.act="catalog"; sb.classList.add("srcbtn"); sb.title="browse history"; sb.setAttribute("role","button"); } }
  // (#827 Slice A/C) Pull the durable mission/phase plan. Live: the daemon's
  // /missions + /phases endpoints. Static demo: the committed fixture files
  // injected as metas (no daemon). Best-effort either way — absent → the

  absorbNewFilterValues();

  if(cq&&cq.kind==="mission"&&RAW.length){ location.href="/mission/"+encodeURIComponent(cq.id)+"/graph"; return; }
  render();

}
// ── Lab observer lens (#1247 Part 3) ────────────────────────────────────
//
// "I want my lab to be the data accumulated on my machine... Where the
// fleet drill-down is focused on 'is the work getting done?', the lab view
// will answer 'does this model do a better job than another for this
// task?'" (operator direction, #1247). Machine-local by construction: fed
// entirely by THIS daemon's `/lab/*` endpoints, never the flow stream —
// "two doors, one viewer, distinct questions". The organizing object is the
// experiment SERIES (a task/case-set + its sequence of runs with varied
// knobs), not the individual run; the run detail view is the drill-down
// leaf, not the headline.
//
// State lives in its own globals (LAB_*) rather than DATA/RAW — the lab
// lens has no time axis to scrub and no flow-record filters, so it doesn't
// share the fleet/missions lenses' render machinery (see `render()`'s
// early-return above and the `.lab-mode` CSS block that hides the event
// log / detail pane / scrub bar while this lens is active).
let LAB_CONFIGURED = null; // null = not yet fetched

let LAB_EVENTS = []; // accumulated funnel-events.jsonl records for the open run

// run drill (typically a stale/mistyped deep-link `run=` value) can't be
// opened and the view falls back to the list instead of a broken pane.
// Cleared on the next explicit navigation.
let LAB_NOTICE = null;
const LAB_POLL_STEADY_MS = 3000; // cadence once caught up (issue: "every few seconds")
const LAB_POLL_BACKFILL_MS = 150; // rapid re-poll while draining a backlog (a big historical run's playback)

async function loadLabRuns(){
  // Static-playback override (the darkmux.com/demo + e2e-harness pattern
  // already used by `loadMissionsPhases`): a committed fixture stands in
  // for the daemon's `/lab/runs` when no daemon is behind the page.
  const src = injectedMeta("darkmux-lab-runs-src") || "/lab/runs";
  try{
    const res = await fetch(src, {headers:{accept:"application/json"}});
    const body = res.ok ? await res.json() : {configured:false, runs:[]};
    LAB_CONFIGURED = body.configured !== false;

async function loadLabRunDetail(dir){
  try{
    const res = await fetch("/lab/run/detail?dir="+encodeURIComponent(dir), {headers:{accept:"application/json"}});
    LAB_DETAIL = res.ok ? await res.json() : null;
  }catch(_){ LAB_DETAIL=null; }
}
// Poll-based tail (NEVER SSE — issue #1227 found a stuck long-lived stream
// over a tailscale hop drops silently with no client-visible signal; a poll
// loop self-heals on its own next tick). Self-rescheduling: each call checks
// it's still the CURRENT run before fetching and before scheduling the next
// tick, so navigating away (or drilling into a different run) cleanly stops
// the loop rather than requiring a separate cancel path.
async function pollLabEvents(dir){
  if(!(state.level==="lab-run" && state.labRunDir===dir)) return;
  let body=null;
  try{
    const res = await fetch("/lab/run/events?dir="+encodeURIComponent(dir)+"&offset="+LAB_EVENTS_OFFSET, {headers:{accept:"application/json"}});
    if(res.ok) body = await res.json();
  }catch(_){ /* transient — retry next tick */ }
  if(!(state.level==="lab-run" && state.labRunDir===dir)) return; // navigated away mid-fetch
  let gotLines=0;
  if(body){
    if(Array.isArray(body.lines) && body.lines.length){
      LAB_EVENTS = LAB_EVENTS.concat(body.lines);
      gotLines = body.lines.length;
    }
    if(typeof body.next_offset==="number") LAB_EVENTS_OFFSET = body.next_offset;
    if(gotLines) renderLabRun(); // in-place refresh of the pipeline + feed
    if(body.finished && gotLines===0) return; // fully drained a finished run — stop polling
  }
  setTimeout(()=>pollLabEvents(dir), gotLines ? LAB_POLL_BACKFILL_MS : LAB_POLL_STEADY_MS);
}
window.goLab=async()=>{
  state.level="lab"; state.labRunDir=null; LAB_NOTICE=null;

};
window.drillLabRun=async(dir)=>{
  state.level="lab-run"; state.labRunDir=dir; LAB_NOTICE=null;
  LAB_DETAIL=null; LAB_EVENTS=[]; LAB_EVENTS_OFFSET=0;
  render();
  await loadLabRunDetail(dir);
  if(!(state.level==="lab-run" && state.labRunDir===dir)) return;
  // (#1247 deep-link) An unresolvable run — a stale/mistyped `run=` deep
  // link (the daemon 400s an out-of-bounds dir), a run dir deleted since the
  // list was fetched, or an unreachable daemon — falls back to the run LIST
  // with a notice, never a stuck "loading…" pane with a poll loop hammering
  // the same failing request.
  if(!LAB_DETAIL){
    LAB_NOTICE="couldn't open run \""+dir+"\" — it may have been removed, or the link is stale. Showing the run list.";
    state.level="lab"; state.labRunDir=null;
    render();
    await loadLabRuns();
    if(state.level==="lab") render();
    return;
  }
  render();
  pollLabEvents(dir);
};

function shortModel(m){ return String(m||"").replace(/^darkmux:/,""); }
function labFieldVal(v){ return v==null ? "—" : (typeof v==="string" && v.startsWith("darkmux:") ? shortModel(v) : v); }
// The series key: sorted case ids joined, so every run over the same corpus
// groups together regardless of the order darkmux ran them in. A run whose
// first case hasn't completed yet (case ids not known server-side) falls
// into its own "(case pending)" bucket rather than silently merging into an
// unrelated series.
function labTaskKey(run){
  return (run.case_ids && run.case_ids.length) ? run.case_ids.slice().sort().join(", ") : "(case pending)";
}
function groupLabRunsByTask(runs){
  const byKey=new Map();
  runs.forEach(r=>{ const k=labTaskKey(r); if(!byKey.has(k)) byKey.set(k,[]); byKey.get(k).push(r); });
  const groups=[...byKey.entries()].map(([key,rs])=>({key, runs:rs.slice().sort((a,b)=>b.mtime_ms-a.mtime_ms)}));
  groups.sort((a,b)=>b.runs[0].mtime_ms-a.runs[0].mtime_ms);
  return groups;
}
function labKnobSummary(run){
  const st=run.staffing;

  // envelope carries a `staffing` snapshot) vs. a FINISHED run whose
  // envelope simply predates the field (#1247 Part 1 added it; older
  // artifacts deserialize `staffing: None`, not "still running").
  if(!st) return run.finished ? "staffing not recorded (older artifact)" : "staffing pending — first case hasn't completed yet";
  const probes=st.probes||[];
  const pbit = probes.length
    ? probes.length+" probe"+(probes.length===1?"":"s")+" (k="+probes.map(p=>p.k).join(",")+")"
    : "no probes";
  const j=st.judge;
  const jbit = j ? "judge "+shortModel(j.model)+" k="+j.k+" · "+Math.round((j.n_ctx||0)/1000)+"K ctx" : "";
  return [pbit, jbit].filter(Boolean).join(" · ");
}
// The "what changed" line (operator direction, #1247): a run-over-run diff
// of the RECORDED staffing snapshot — model/k/max_tokens/n_ctx per seat,
// matched by seat name so a renamed/added/removed seat reads clearly rather
// than as a positional diff. Computed CLIENT-SIDE from the already-fetched
// `/lab/runs` staffing snapshots (no new endpoint). A single-variable change
// renders as a plain diff line; TWO OR MORE changes render as a warning —
// making the lab-and-the-loop discipline (baseline → single-variable change
// → re-measure) visible by RENDERING rather than by memory.
function labKnobDiff(prev, curr){
  if(!prev || !curr) return null;
  const changes=[];
  if((prev.crew||null)!==(curr.crew||null)) changes.push("crew "+labFieldVal(prev.crew)+"→"+labFieldVal(curr.crew));
  if((prev.exec_mode||null)!==(curr.exec_mode||null)) changes.push("exec_mode "+labFieldVal(prev.exec_mode)+"→"+labFieldVal(curr.exec_mode));
  const ps=prev.staffing, cs=curr.staffing;
  if(ps && cs){
    const byName=arr=>{ const m={}; (arr||[]).forEach(p=>{ m[p.name]=p; }); return m; };
    const pn=byName(ps.probes), cn=byName(cs.probes);
    const names=[...new Set([...Object.keys(pn), ...Object.keys(cn)])].sort();
    names.forEach(n=>{
      const a=pn[n], b=cn[n];
      if(a && b){
        ["model","k","max_tokens","n_ctx"].forEach(f=>{
          if(a[f]!==b[f]) changes.push(n+"."+f+" "+labFieldVal(a[f])+"→"+labFieldVal(b[f]));
        });
      } else if(!a && b){ changes.push("+probe "+n+" ("+shortModel(b.model)+")"); }
      else if(a && !b){ changes.push("-probe "+n); }
    });
    const aj=ps.judge, bj=cs.judge;
    if(aj && bj){
      ["model","k","max_tokens","n_ctx"].forEach(f=>{
        if(aj[f]!==bj[f]) changes.push("judge."+f+" "+labFieldVal(aj[f])+"→"+labFieldVal(bj[f]));
      });
    } else if(!aj && bj){ changes.push("+judge ("+shortModel(bj.model)+")"); }
    else if(aj && !bj){ changes.push("-judge"); }
    // (both-null: no judge either side — nothing to diff.) A judge seat
    // appearing or disappearing between runs is exactly the methodology
    // drift this line exists to surface — silently diffing only when both
    // sides have one was a false "no knob change" (frontier review round,
    // #1262).
  } else if(ps !== cs){
    changes.push("staffing snapshot became available");
  }
  return changes;
}
function labBadge(run){
  return run.finished
    ? `<span class="labbadge finished">finished</span>`
    : `<span class="labbadge live">● live</span>`;
}
function labCounts(run){
  return `bundles ${run.bundles} · flags ${run.raw_flags}→${run.deduped_flags} · confirmed ${run.confirmed} · needs_check ${run.needs_check} · archived ${run.archived}`
    + (run.degenerate ? ` · <span class="labdegenerate">⚠ degenerate</span>` : "");
}
function renderLabRunRow(run){
  return `<div class="labrunrow" data-act="labrun" data-arg="${esc(run.dir)}" tabindex="0" role="button">
    <div class="labrunmain">${labBadge(run)}<span class="labruncrew">${esc(run.crew||"(crew unknown)")}</span><span class="labrundir">${esc(run.dir)}</span></div>
    <div class="labrunmeta">${esc(labKnobSummary(run))}</div>
    <div class="labrunmeta dim">${labCounts(run)}</div>
  </div>`;
}
function renderLabTaskCard(group){
  const rows = group.runs.map((r,i)=>{
    const prev = group.runs[i+1]; // newest-first list; i+1 = the next OLDER run
    let diffLine="";
    if(prev){
      const diff = labKnobDiff(prev, r);
      if(diff && diff.length){
        const warn = diff.length > 1;
        diffLine = `<div class="labdiffline${warn?" warn":""}">${warn?"⚠ multi-variable change: ":"changed vs previous run: "}${esc(diff.join(" · "))}</div>`;
      } else {
        diffLine = `<div class="labdiffline dim">no knob change vs previous run</div>`;
      }
    }
    return renderLabRunRow(r) + diffLine;
  }).join("");
  return `<div class="labtaskcard">
    <div class="labtaskhdr">${esc(group.key)} <span class="labtaskcount">${group.runs.length} run${group.runs.length===1?"":"s"}</span></div>
    ${rows}
  </div>`;
}
function renderLabRunsList(){
  $("logscope").textContent="lab";
  // (#1247 deep-link) The one-shot fallback notice (a stale `run=` deep
  // link) renders atop whichever list state applies below.
  const notice = LAB_NOTICE ? `<div class="labnotice">${esc(LAB_NOTICE)}</div>` : "";
  if(LAB_CONFIGURED===null){
    $("stage").innerHTML = `<div class="stagehdr">lab observer</div>${notice}<div class="none">loading…</div>`;
    return;
  }
  if(LAB_CONFIGURED===false){
    $("stage").innerHTML = `<div class="stagehdr">lab observer</div>${notice}
      <div class="none">not configured — restart <code>darkmux serve</code> with <code>--lab-dir &lt;path&gt;</code> (or set <code>DARKMUX_LAB_DIR</code>) to scan this machine's lab run history. Machine-local by design — never a remote path.</div>`;
    return;
  }
  const groups = groupLabRunsByTask(LAB_RUNS);
  const body = groups.length
    ? groups.map(renderLabTaskCard).join("")
    : `<div class="none">no lab runs found under the configured lab dir yet — run <code>darkmux lab eval --funnel …</code> to produce one.</div>`;
  $("stage").innerHTML = `<div class="stagehdr">lab observer · ${LAB_RUNS.length} run${LAB_RUNS.length===1?"":"s"} · ${groups.length} task${groups.length===1?"":"s"}</div>${notice}
    <div class="lablist">${body}</div>`;
}

// ── run detail: pipeline strip + live/playback event feed ──────────────

/// Fold the review pipeline's generic `step result` companion records (in
/// arrival order — the SAME code path serves a live-polling run and a
/// finished run's full backfilled history, so there is exactly one
/// pipeline-computation function for both) into per-step latest-state + a
/// running judge/verify ruling tally. (#1434 — the review path emits ONE
/// `step result` vocabulary now; the retired per-run task/step/ruling records
/// are gone. Per-ruling records arrive with `step_id === "review-ruling"`;
/// every other step-result is a stage completion keyed by its own `step_id`.)
/// `env` (the completed envelope, when the run has one) supplies the
/// AUTHORITATIVE confirmed/needs_check/archived totals; before any case
/// completes, the synthesis row shows a clearly-labeled provisional tally
/// derived from ruling records instead.
function computeLabPipeline(events){
  const steps={};
  const order=[];
  const rulingTally={1:{}, 2:{}};
  events.forEach(r=>{
    if(r.action!=="step result" || !r.payload) return;
    const p=r.payload;
    if(p.step_id==="review-ruling"){
      const pass=p.pass, rul=p.ruling;
      if((pass===1||pass===2) && rul) rulingTally[pass][rul]=(rulingTally[pass][rul]||0)+1;
      return;
    }
    if(p.step_id){
      if(!(p.step_id in steps)) order.push(p.step_id);
      steps[p.step_id]=p;
    }
  });
  return {steps, order, rulingTally};
}
function labStageMeta(payload){
  if(!payload) return "not started";
  const bits=[];
  if(payload.draws_total!=null) bits.push(`${payload.draws_done||0}/${payload.draws_total} draws${payload.model?" · "+shortModel(payload.model):""}`);
  else if(payload.items_in!=null || payload.items_out!=null) bits.push(`${payload.items_in??"—"} → ${payload.items_out??"—"}`);
  else if(payload.model) bits.push(shortModel(payload.model));
  if(payload.wall_ms!=null) bits.push(`${payload.wall_ms}ms`);
  return bits.length?bits.join(" · "):"done";
}
function labStageRow(label, payload){
  // (#1434) A `step result` record IS the stage's completion — no separate
  // status field, so a present payload renders "complete", an absent one
  // "pending".
  const status = payload ? "complete" : "pending";
  return `<div class="labstage ${esc(status)}"><span class="labstagename">${esc(label)}</span><span class="labstagemeta">${esc(labStageMeta(payload))}</span></div>`;
}
function renderLabPipeline(pipe, env){
  // (#1434) Render each stage that reported a `step result`, in arrival
  // order — the step_ids come straight from the review graph / sequential
  // driver, so this stays correct whichever path produced the run without a
  // hardcoded stage list.
  const rows = pipe.order.map(id=>labStageRow(id, pipe.steps[id]));
  if(!rows.length) rows.push(labStageRow("pipeline", null));
  const tallyStr=t=>Object.entries(t).map(([k,v])=>k+":"+v).join(" ")||"—";
  const synthMeta = env
    ? `confirmed ${env.confirmed} · needs_check ${env.needs_check} · archived ${env.archived}`
    : `(provisional, from rulings so far) pass1 ${tallyStr(pipe.rulingTally[1])} · pass2 ${tallyStr(pipe.rulingTally[2])}`;
  rows.push(`<div class="labstage synth"><span class="labstagename">synthesis</span><span class="labstagemeta">${esc(synthMeta)}</span></div>`);
  return rows.join("");
}
function labShortId(id){ const s=String(id||""); return s.length>18 ? s.slice(0,18)+"…" : s; }
function labFeedTs(ts){ return esc(String(ts||"").replace("T"," ").replace("Z","")); }
function labFeedRow(r){
  const tt=labFeedTs(r.ts);
  const f=r.payload||{};
  if(r.category==="telemetry" && r.source==="process"){
    return `<div class="labfeedrow host"><span class="labfeedts">${tt}</span><span class="labfeedtag">host</span><span class="labfeedtext">cpu ${esc(f.cpu??"–")}% · mem ${esc(f.mem??"–")}% · gpu ${esc(f.gpu??"–")}%</span></div>`;
  }
  // (#1434) The review path emits ONE `step result` companion vocabulary.
  // A `step_id === "review-ruling"` record is a per-flag judge/verify ruling
  // ticker; every other `step result` is a stage completion.
  if(r.action==="step result"){
    if(f.step_id==="review-ruling"){
      const stage = f.stage ? esc(f.stage) : "ruling";
      const passLbl = f.pass!=null ? " pass"+esc(f.pass) : "";
      return `<div class="labfeedrow ruling ${esc(f.ruling||"")}"><span class="labfeedts">${tt}</span><span class="labfeedtag">${stage}</span><span class="labfeedtext">${esc(labShortId(f.bundle_id))}${passLbl} → ${esc(f.ruling)}${f.seconds!=null?" ("+Number(f.seconds).toFixed(1)+"s)":""}</span></div>`;
    }
    return `<div class="labfeedrow step complete"><span class="labfeedts">${tt}</span><span class="labfeedtag">${esc(f.step_id||"step")}</span><span class="labfeedtext">${esc(labStageMeta(f))}</span></div>`;
  }
  return `<div class="labfeedrow"><span class="labfeedts">${tt}</span><span class="labfeedtext">${esc(r.action||"")}</span></div>`;
}
function renderLabFeed(events){
  if(!events.length) return `<div class="none">no events yet.</div>`;
  // Newest at top (issue #1247's "watch it think" narrative).
  return events.slice().reverse().slice(0,500).map(labFeedRow).join("");
}
// The copy-pasteable CLI hint (#915 convention). `--workdirs`/the cases dir
// aren't recorded in the artifact today (a known gap — the harness doesn't
// snapshot its own invocation paths), so those two stay explicit
// placeholders rather than a guess dressed up as fact.
function labCliHint(env, scores){
  const crew = (env && env.crew) || (scores && scores.crew) || "<crew>";
  const mode = (env && env.mode) || (scores && scores.exec_mode) || "auto";
  return `darkmux lab eval --funnel --roster-profile ${crew} --exec-mode ${mode} --workdirs <workdirs-root> <cases-dir>`;
}
function renderLabRun(){
  const dir = state.labRunDir;
  $("logscope").textContent="lab run";
  if(!LAB_DETAIL){
    $("stage").innerHTML = `<div class="stagehdr"><a data-act="lab">‹ lab</a> · ${esc(dir)}</div><div class="none">loading…</div>`;
    return;
  }
  const env = (LAB_DETAIL.funnels && LAB_DETAIL.funnels[0]) || null;
  const scores = LAB_DETAIL.scores || null;
  const pipe = computeLabPipeline(LAB_EVENTS);
  // (#1434) No task-finished record exists anymore; a run is "finished" when
  // its completed envelope or scores artifact is present.
  const finished = !!env || (scores!=null);
  $("stage").innerHTML = `
    <div class="stagehdr"><a data-act="lab">‹ lab</a> · ${esc(dir)} ${finished?labBadge({finished:true}):labBadge({finished:false})}</div>
    <div class="labpipe">${renderLabPipeline(pipe, env)}</div>
    <div class="labcli"><span class="labclilbl">try it yourself</span><code>${esc(labCliHint(env, scores))}</code></div>
    <div class="labfeedwrap">
      <div class="labfeedhdr">event feed${finished?" (playback)":" — live, polling"} · ${LAB_EVENTS.length} record${LAB_EVENTS.length===1?"":"s"}</div>
      <div class="labfeed">${renderLabFeed(LAB_EVENTS)}</div>
    </div>`;
}
function renderLab(){
  if(state.level==="lab-run") renderLabRun(); else renderLabRunsList();
}

// ── Machine memory lens (#1286) ─────────────────────────────────────────
//
// The live machine-scope answer to "what is the machine doing NOW": every
// resident model with its ledger pair — POTENTIAL (weights + KV commitment
// at the loaded ctx + margin: what the config CAN grow to) vs CURRENT
// (observed inference-worker footprint) — color-coded green / amber ("made
// it by luck") / red, plus the unified-memory pressure rows.
//
// Data-source class (#1286 boundary hygiene): fed by THIS daemon's
// /machine/resources — live probes (kernel counters + lms metadata), a third
// source class distinct from run artifacts (lab lens) and the flow stream
// (fleet lenses). Read-only; never flow records. The observer-effect
// constraints hold structurally here: the daemon's gather costs zero model
// dispatches and stamps its own cost (`gather_ms`, rendered below), and the
// chart renders on THIS client — off the measured machine when the operator
// watches from a phone over the tailnet, which is the designed posture.
let MACHINE_MEM=null;        // last /machine/resources payload
let MACHINE_MEM_ERR=false;   // daemon unreachable / non-200
let MACHINE_MEM_SIG=null;    // structural signature — the re-render gate
let MACHINE_MEM_POLLING=false;
const MACHINE_MEM_POLL_MS=5000; // client cadence (server caches ~2s; both recorded)

// (#1508) The entry points (goMachine for local, drillMachine for a specific
// uid) live earlier in the file, near render()/drillMachine — both call
// pollMachineMem() unconditionally on entry; this loop's own level+identity
// guard below is what decides whether it actually does anything.
//
// Poll-based (NEVER SSE — the #1227 stuck-stream lesson), self-rescheduling
// like pollLabEvents: each tick checks it's still the current LOCAL machine
// page before fetching and before scheduling, so navigating away — including
// to a REMOTE machine's page, which the local-vs-remote honesty rule (#1508
// decision 2) never feeds real figures — cleanly stops the loop.
async function pollMachineMem(){
  if(state.level!=="machine"||!machineIsLocalNow()){ MACHINE_MEM_POLLING=false; return; }
  MACHINE_MEM_POLLING=true;
  try{
    const r=await fetch("/machine/resources",{headers:{accept:"application/json"}});
    if(r.ok){ MACHINE_MEM=await r.json(); MACHINE_MEM_ERR=false; }
    else MACHINE_MEM_ERR=true;
  }catch(_){ MACHINE_MEM_ERR=true; }
  if(state.level!=="machine"||!machineIsLocalNow()){ MACHINE_MEM_POLLING=false; return; } // navigated away mid-fetch
  // The stageSig()/re-render-gap discipline: the structural signature
  // EXCLUDES the always-changing stamps (generated_at_ms / gather_ms), so a
  // poll that changes nothing rebuilds nothing — the volatile stamp line
  // refreshes in place instead. MACHINE_MEM_ERR is IN the signature: a
  // daemon going unreachable (or coming back) with a cached payload on
  // screen must repaint so the stale banner appears/clears — a silently
  // frozen gauge is the observability failure this lens exists to prevent.
  const b=MACHINE_MEM||{};
  const sig=MACHINE_MEM_ERR&&!MACHINE_MEM ? "err"
    : JSON.stringify([MACHINE_MEM_ERR,b.models,b.machine,b.pressure,b.pool,b.limit_bytes,b.limit_source,b.attribution,b.attribution_note,b.warnings]);
  if(sig!==MACHINE_MEM_SIG){ MACHINE_MEM_SIG=sig; renderMachine(); }
  else refreshMachineMemStamp();
  setTimeout(pollMachineMem, MACHINE_MEM_POLL_MS);
}
function memBytes(b){
  if(b==null) return "—";
  b=Number(b);
  if(!isFinite(b)) return "—";
  if(b>=1e9) return (b/1e9).toFixed(2)+" GB";
  if(b>=1e6) return Math.round(b/1e6)+" MB";
  if(b>=1e3) return Math.round(b/1e3)+" KB";
  return b+" B";
}
function memPct(part, scale){
  if(part==null||!scale) return 0;
  return Math.max(0, Math.min(100, (Number(part)/scale)*100));
}
function memStateCls(s){ return (s==="green"||s==="amber"||s==="red") ? s : "unknown"; }
// One bar: current fill INSIDE the potential outline, optional limit tick
// (#1243 budget / pool fallback) + physical-pool tick when it differs from
// the limit (i.e. once a budget is configured below the pool).
function memBar(cur, pot, scale, stateCls, limit, poolCap){
  const potW=memPct(pot, scale), curW=memPct(cur, scale);
  const lim=(limit!=null&&scale)?`<span class="lim" style="left:${memPct(limit,scale).toFixed(2)}%"></span>`:"";
  const pl=(poolCap!=null&&scale&&poolCap!==limit)?`<span class="poolline" style="left:${memPct(poolCap,scale).toFixed(2)}%"></span>`:"";
  return `<div class="membar">`
    + (pot!=null?`<span class="pot" style="width:${potW.toFixed(2)}%"></span>`:"")
    + (cur!=null?`<span class="cur ${memStateCls(stateCls)}" style="width:${curW.toFixed(2)}%"></span>`:"")
    + lim + pl + `</div>`;
}
function memStampText(b){
  return `gather ${b.gather_ms!=null?Number(b.gather_ms):"—"} ms (zero model dispatches) · server cache ${b.cache_ttl_ms!=null?Number(b.cache_ttl_ms):"—"} ms · polled every ${MACHINE_MEM_POLL_MS/1000}s`;
}
// In-place refresh of the volatile observer-cost line (no DOM rebuild).
function refreshMachineMemStamp(){
  const el=$("memstamp");
  if(el&&MACHINE_MEM) el.textContent=memStampText(MACHINE_MEM);
}
function renderMachineMemModel(m, scale, limit){
  const st=memStateCls(m.state);
  const kv=m.kv_bytes_at_ctx!=null?`kv@ctx ${memBytes(m.kv_bytes_at_ctx)}`:"kv unknown (no arch facts)";
  const hint=m.shrink_hint?`<div class="memhint">↳ ${esc(m.shrink_hint)}</div>`:"";
  return `<div class="memcard ${st}">
    <div class="memhdr"><span class="memname">${esc(m.identifier||m.model_key)}</span><span class="memowner">${esc(m.owner||"")}</span><span class="memstate ${st}">${esc(m.state||"unknown")}</span></div>
    ${memBar(m.current_bytes, m.potential_bytes, scale, st, limit)}
    <div class="memmeta">ctx ${esc(m.loaded_ctx)} · weights ${memBytes(m.weights_bytes)} · ${esc(kv)} · potential ${memBytes(m.potential_bytes)} · current ${memBytes(m.current_bytes)}</div>
    ${hint}
  </div>`;
}
// (#1508) renderMachineMem() retired — its body now lives inline in the
// unified renderMachine()'s health-region assembly (near the top of the
// file), gated by isLocalMach so a remote machine's page never shows this
// daemon's own figures under the wrong name. renderMachineMemModel() above
// and the memBytes/memPct/memStateCls/memBar/memStampText/refreshMachineMemStamp
// helpers stay — still called from there.

boot();
</script>
