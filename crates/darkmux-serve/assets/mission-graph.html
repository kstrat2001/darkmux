<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>darkmux · mission graph</title>
<!--
  Mission graph lens (#1284 Packet 5) — a DEDICATED page, separate from
  viewer.html on purpose (that file's own header explains why it stays one
  file for the flow-record timeline; this page renders a different shape of
  data — a Phase/Task/Step node-link graph — via a vendored React Flow
  bundle, and mixing the two rendering models into one file would make
  viewer.html's own `stageSig()` re-render-gap discipline harder to reason
  about, not easier).

  Served at `GET /mission/<id>/graph` by `darkmux-serve`. Data comes from
  two same-origin sources, both same-origin (no CDN, no cross-origin
  fetch — see `assets/vendor/README.md`):

    - `GET /mission/<id>/graph.json` — the initial node/edge snapshot
      (`crates/darkmux-serve/src/mission_graph.rs` builds it from the
      persisted Phase/Task/Step JSON under `~/.darkmux/missions/<id>/`).
    - `GET /flow/<date>/stream` (SSE, the SAME stream viewer.html tails) —
      live status deltas, filtered client-side to records whose `handle`
      matches a node id already present in the snapshot.

  No JSX, no build step for THIS file — only the third-party vendor bundle
  (`assets/vendor/reactflow-bundle.min.js`) goes through a bundler. This
  file calls `React.createElement` directly (aliased `h` below) so darkmux's
  own code stays inspectable without a source map.
-->
<link rel="stylesheet" href="/vendor/reactflow-bundle.min.css">
<style>
  :root{
    --bg:#0a0a0b; --bg2:#131316; --panel:#1c1c22; --line:#1f1f24;
    --text:#e8e6e3; --muted:#8a8a92; --amber:#6df1ff; --amber-dim:#2a8a96;
    --good:#5af0a3; --warn:#ffb86b; --bad:#ff6b85; --run:#ffd166;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100vh;background:var(--bg);color:var(--text);font:14px/1.4 'Inter',-apple-system,system-ui,sans-serif;overflow:hidden}
  #root{height:100vh;display:flex;flex-direction:column}
  .top{height:46px;flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);background:var(--bg2)}
  .brand{font-weight:700;letter-spacing:.04em}
  .brand a{color:inherit;text-decoration:none}
  .brand b{color:var(--amber)}
  .brand a:hover b{text-decoration:underline}
  .midname{font:600 13px 'JetBrains Mono',monospace;color:var(--text)}
  .mstatus{font:600 10px/1 'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;padding:3px 7px;border-radius:3px;border:1px solid var(--line);color:var(--muted)}
  .mstatus.active{color:var(--good);border-color:var(--good)}
  .mstatus.closed{color:var(--muted)}
  .mstatus.paused{color:var(--warn);border-color:var(--warn)}
  .livepill{font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);padding:3px 8px;border-radius:3px}
  @keyframes lpulse{0%,100%{opacity:1}50%{opacity:.5}}
  .livepill.on{color:var(--amber);border-color:var(--amber);animation:lpulse 1.6s ease-in-out infinite}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
  }
  .legend{margin-left:auto;display:flex;gap:12px;align-items:center;font:11px 'JetBrains Mono',monospace;color:var(--muted)}
  .legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .canvas{flex:1 1 auto;position:relative}
  .note{position:absolute;top:12px;left:12px;z-index:20;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:8px 12px;font:12px/1.4 'Inter',sans-serif;color:var(--muted);max-width:420px}
  .msg{padding:40px;color:var(--muted);font:13px 'JetBrains Mono',monospace}
  /* React Flow node chrome — the base package supplies layout/interaction
     CSS (vendored); this styles OUR node content. */
  .mnode{border-radius:7px;border:1px solid var(--line);background:var(--panel);padding:8px 10px;min-width:160px;max-width:240px;font-family:'Inter',sans-serif}
  .mnode .mn-label{font:600 12px/1.3 'JetBrains Mono',monospace;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mnode .mn-kind{font:10px/1 'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  .mnode.k-phase{background:var(--bg2);border-color:var(--amber-dim);min-width:200px}
  .mnode.k-phase .mn-label{font-size:13px}
  .mnode.k-task{border-style:solid}
  .mnode.k-step{padding:6px 9px;min-width:120px}
  .mnode.k-step .mn-label{font-size:11px}
  .mnode.s-planned{border-color:var(--line)}
  .mnode.s-running{border-color:var(--run);box-shadow:0 0 0 1px var(--run)}
  .mnode.s-running .mn-label{color:var(--run)}
  .mnode.s-running::after{content:"";position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--run);animation:lpulse 1.1s ease-in-out infinite}
  .mnode{position:relative}
  .mnode.s-complete{border-color:var(--good)}
  .mnode.s-complete .mn-kind{color:var(--good)}
  .mnode.s-error{border-color:var(--bad)}
  .mnode.s-error .mn-label{color:var(--bad)}
  .mnode.s-abandoned{border-color:var(--muted);opacity:.6}
  .react-flow__edge-path{stroke:var(--muted)}
  .react-flow__edge.edge-depends_on .react-flow__edge-path{stroke:var(--amber-dim);stroke-width:1.6}
  .react-flow__edge.edge-contains .react-flow__edge-path{stroke:var(--line);stroke-dasharray:3 3}
  .react-flow__controls{background:var(--panel);border:1px solid var(--line)}
  .react-flow__controls button{background:var(--panel);border-bottom:1px solid var(--line);fill:var(--text)}
  .react-flow__minimap{background:var(--bg2)}
  .react-flow__attribution{display:none}
</style>
</head>
<body>
<div id="root"><div class="msg">loading…</div></div>
<script src="/vendor/reactflow-bundle.min.js"></script>
<script>
(function(){
"use strict";

var V = window.MissionGraphVendor;
var React = V.React;
var h = React.createElement;
var ReactFlow = V.ReactFlow;
var Background = V.Background;
var Controls = V.Controls;
var MiniMap = V.MiniMap;
var ReactFlowProvider = V.ReactFlowProvider;
var MarkerType = V.MarkerType;

// ─── mission id from the URL ────────────────────────────────────────────
// `/mission/<id>/graph` — no server-side injection needed, the id is
// already in the path the browser loaded.
function missionIdFromPath(){
  var m = /^\/mission\/([^/]+)\/graph\/?$/.exec(window.location.pathname);
  return m ? decodeURIComponent(m[1]) : null;
}

// ─── layout (pure function — the JS-side counterpart to the Rust
// `layer_tasks_by_depth`, which already stamped `depth` onto every task
// and step node server-side). Positions nodes in bands: one band per
// phase (stacked top-to-bottom), tasks within a band laid out left-to-
// right by `depth` (so dependency order reads left-to-right and a
// fan-in/fan-out stays legible), steps stacked immediately below/right
// of their owning task. ─────────────────────────────────────────────────
var COL_W = 260, TASK_ROW_H = 92, STEP_ROW_H = 44, PHASE_LABEL_W = 40, BAND_GAP = 40, BAND_PAD = 56;

function computeLayout(nodes){
  var byId = {};
  nodes.forEach(function(n){ byId[n.id] = n; });
  var phases = nodes.filter(function(n){ return n.kind === "phase"; })
    .sort(function(a,b){ return a.depth - b.depth; });
  var tasksByPhase = {};
  nodes.filter(function(n){ return n.kind === "task"; }).forEach(function(n){
    var p = n.parentId || "__none__";
    (tasksByPhase[p] = tasksByPhase[p] || []).push(n);
  });
  var stepsByTask = {};
  nodes.filter(function(n){ return n.kind === "step"; }).forEach(function(n){
    var t = n.parentId || "__none__";
    (stepsByTask[t] = stepsByTask[t] || []).push(n);
  });

  var positions = {};
  var bandTop = 0;
  var phaseList = phases.length ? phases : [{id:"__none__", depth:0}];
  phaseList.forEach(function(phase){
    var tasks = tasksByPhase[phase.id] || [];
    var byDepth = {};
    var maxDepth = 0;
    tasks.forEach(function(t){
      var d = t.depth || 0;
      maxDepth = Math.max(maxDepth, d);
      (byDepth[d] = byDepth[d] || []).push(t);
    });
    var maxRows = 1;
    for (var d = 0; d <= maxDepth; d++){
      var atDepth = byDepth[d] || [];
      maxRows = Math.max(maxRows, atDepth.length);
      atDepth.forEach(function(t, i){
        var x = PHASE_LABEL_W + COL_W + d * COL_W;
        var y = bandTop + BAND_PAD + i * TASK_ROW_H;
        positions[t.id] = {x: x, y: y};
        var steps = (stepsByTask[t.id] || []);
        steps.forEach(function(s, si){
          positions[s.id] = {x: x + 20, y: y + 56 + si * STEP_ROW_H};
        });
      });
    }
    if (phase.id !== "__none__") {
      positions[phase.id] = {x: 0, y: bandTop + BAND_PAD};
    }
    var stepRows = 0;
    tasks.forEach(function(t){ stepRows = Math.max(stepRows, (stepsByTask[t.id]||[]).length); });
    var bandHeight = Math.max(160, maxRows * TASK_ROW_H + stepRows * STEP_ROW_H + BAND_PAD * 2);
    bandTop += bandHeight + BAND_GAP;
  });
  return positions;
}

// ─── node component ─────────────────────────────────────────────────────
function MissionNode(props){
  var d = props.data;
  return h("div", {className: "mnode k-" + d.kind + " s-" + d.status},
    h(V.Handle, {type:"target", position: V.Position.Left, style:{opacity:0}}),
    h("div", {className:"mn-kind"}, d.kind),
    h("div", {className:"mn-label", title: d.label}, d.label),
    h(V.Handle, {type:"source", position: V.Position.Right, style:{opacity:0}})
  );
}
var nodeTypes = { missionNode: MissionNode };

// ─── graph.json -> React Flow shape ─────────────────────────────────────
function toRfNodes(graphNodes, positions){
  return graphNodes.map(function(n){
    var pos = positions[n.id] || {x:0, y:0};
    return {
      id: n.id,
      type: "missionNode",
      position: pos,
      data: { label: n.label, kind: n.kind, status: n.status },
      draggable: true,
    };
  });
}
function toRfEdges(graphEdges){
  return graphEdges.map(function(e){
    return {
      id: e.id,
      source: e.source,
      target: e.target,
      className: "edge-" + e.kind,
      animated: false,
      markerEnd: e.kind === "depends_on" ? { type: MarkerType.ArrowClosed, color: "#2a8a96" } : undefined,
    };
  });
}

// ─── SSE liveness (mirrors viewer.html's own `startLiveTail` shape:
// today's UTC day, native EventSource auto-reconnect, no custom auth
// header — matches the loopback-open / tailnet-terminated posture every
// other same-origin SSE consumer on this daemon already uses). A
// step-lifecycle record's `handle` field IS the step id
// (`scheduler::step_lifecycle_record`); phase/mission transition records'
// `handle` is the phase/mission id (`lifecycle::emit_*_transition_record`).
// Matching on `handle` against the known node-id set works regardless of
// whether the record also carries `mission_id` (scheduler-emitted step
// records currently do NOT — see `mission_graph.rs`'s module doc). ────────
function todayUtc(){
  var d = new Date();
  return d.getUTCFullYear() + "-" + String(d.getUTCMonth()+1).padStart(2,"0") + "-" + String(d.getUTCDate()).padStart(2,"0");
}
var STATUS_ACTIONS = {
  "step start": "running", "step complete": "complete", "step error": "error",
  "phase start": "running", "phase complete": "complete", "phase abandon": "abandoned",
  "mission start": "active", "mission close": "closed", "mission pause": "paused", "mission resume": "active",
};
function statusFromRecord(rec){
  return STATUS_ACTIONS[rec.action] || null;
}

function App(){
  var missionId = missionIdFromPath();
  var _s = React.useState({loading:true, error:null, graph:null});
  var state = _s[0], setState = _s[1];
  var _live = React.useState(false);
  var live = _live[0], setLive = _live[1];
  var nodeIdsRef = React.useRef(new Set());
  var esRef = React.useRef(null);

  function fetchGraph(){
    return fetch("/mission/" + encodeURIComponent(missionId) + "/graph.json", {headers:{accept:"application/json"}})
      .then(function(r){
        if (r.status === 404) { throw new Error("no mission with id `" + missionId + "` found"); }
        if (!r.ok) { throw new Error("graph.json fetch failed: " + r.status); }
        return r.json();
      });
  }

  React.useEffect(function(){
    if (!missionId) { setState({loading:false, error:"no mission id in URL (expected /mission/<id>/graph)", graph:null}); return; }
    var cancelled = false;
    fetchGraph().then(function(g){
      if (cancelled) return;
      nodeIdsRef.current = new Set(g.nodes.map(function(n){ return n.id; }));
      setState({loading:false, error:null, graph:g});
    }).catch(function(e){
      if (cancelled) return;
      setState({loading:false, error:String(e.message||e), graph:null});
    });
    return function(){ cancelled = true; };
  }, [missionId]);

  // SSE subscription — starts once the initial graph has loaded so the
  // known-node-id set is populated before any delta needs matching.
  React.useEffect(function(){
    if (!state.graph || typeof EventSource === "undefined") return;
    var es = new EventSource("/flow/" + todayUtc() + "/stream");
    esRef.current = es;
    setLive(true);
    es.onopen = function(){ setLive(true); };
    es.onerror = function(){ setLive(false); }; // native EventSource keeps retrying
    es.onmessage = function(ev){
      var rec; try { rec = JSON.parse(ev.data); } catch(_e) { return; }
      if (!rec || typeof rec !== "object") return;
      var newStatus = statusFromRecord(rec);
      if (!newStatus || !rec.handle) return;
      if (!nodeIdsRef.current.has(rec.handle)) return;
      setState(function(prev){
        if (!prev.graph) return prev;
        var nodes = prev.graph.nodes.map(function(n){
          return n.id === rec.handle ? Object.assign({}, n, {status: newStatus}) : n;
        });
        return Object.assign({}, prev, {graph: Object.assign({}, prev.graph, {nodes: nodes})});
      });
    };
    // (#1151-style safety net) periodic reconcile in case an SSE gap
    // (a reconnect between the last delta and now) dropped a status flip —
    // matches viewer.html's own reconcile-on-a-timer discipline.
    var reconcile = setInterval(function(){
      fetchGraph().then(function(g){
        nodeIdsRef.current = new Set(g.nodes.map(function(n){ return n.id; }));
        setState(function(prev){ return Object.assign({}, prev, {graph: g}); });
      }).catch(function(){ /* best-effort; keep showing the last-known graph */ });
    }, 20000);
    return function(){ es.close(); clearInterval(reconcile); };
  }, [!!state.graph]);

  React.useEffect(function(){
    return function(){ if (esRef.current) esRef.current.close(); };
  }, []);

  if (state.loading) return h("div", {className:"msg"}, "loading mission graph…");
  if (state.error) return h("div", {className:"msg"}, "darkmux mission graph: " + state.error);

  var g = state.graph;
  var positions = computeLayout(g.nodes);
  var rfNodes = toRfNodes(g.nodes, positions);
  var rfEdges = toRfEdges(g.edges);

  return h(React.Fragment, null,
    h("div", {className:"top"},
      h("div", {className:"brand"}, h("a", {href:"/"}, h("b", null, "darkmux"), " · mission graph")),
      h("span", {className:"midname"}, g.mission_id),
      h("span", {className:"mstatus " + g.mission_status}, g.mission_status),
      h("span", {className:"livepill" + (live ? " on" : "")}, live ? "● live" : "○ reconnecting"),
      h("div", {className:"legend"},
        h("span", null, h("span", {className:"dot", style:{background:"var(--muted)"}}), "planned"),
        h("span", null, h("span", {className:"dot", style:{background:"var(--run)"}}), "running"),
        h("span", null, h("span", {className:"dot", style:{background:"var(--good)"}}), "complete"),
        h("span", null, h("span", {className:"dot", style:{background:"var(--bad)"}}), "error"),
        h("span", null, h("span", {className:"dot", style:{background:"var(--muted)"}}), "abandoned")
      )
    ),
    h("div", {className:"canvas"},
      g.note ? h("div", {className:"note"}, g.note) : null,
      h(ReactFlowProvider, null,
        h(ReactFlow, {
          nodes: rfNodes, edges: rfEdges, nodeTypes: nodeTypes,
          fitView: true, minZoom: 0.1, maxZoom: 2,
          proOptions: {hideAttribution: true},
        },
          h(Background, {color:"#1f1f24", gap: 24}),
          h(Controls, null),
          h(MiniMap, {pannable:true, zoomable:true, style:{background:"#131316"}})
        )
      )
    )
  );
}

var root = V.createRoot(document.getElementById("root"));
root.render(h(App));

// Exposed for anything that wants to sanity-check the layout function from
// the browser console during manual verification (not a formal test hook).
window.__missionGraphComputeLayout = computeLayout;
})();
</script>
</body>
</html>
