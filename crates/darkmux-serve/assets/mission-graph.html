<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>darkmux · mission graph</title>
<!-- (#1403) Standalone-app shell — same as viewer.html. The operator reaches
     this page as a chromeless home-screen shortcut, so browser back can never
     be assumed; the manifest + app metas make an installed shortcut behave
     like an app, and every asset is served same-origin by the daemon (the
     page is self-contained by convention — no external fetches anywhere;
     there is no CSP header). -->
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="darkmux">
<meta name="theme-color" content="#0a0a0b">
<!--
  Mission graph lens (#1284 Packet 5) — a DEDICATED page, separate from
  viewer.html on purpose (that file's own header explains why it stays one
  file for the flow-record timeline; this page renders a different shape of
  data — a Phase/Task/Step node-link graph — via a vendored React Flow
  bundle, and mixing the two rendering models into one file would make
  viewer.html's own `stageSig()` re-render-gap discipline harder to reason
  about, not easier).

  Served at `GET /mission/<id>/graph` by `darkmux-serve`. Data comes from
  two same-origin sources, both same-origin (no CDN, no cross-origin
  fetch — see `assets/vendor/README.md`):

    - `GET /mission/<id>/graph.json` — the initial node/edge snapshot
      (`crates/darkmux-serve/src/mission_graph.rs` builds it from the
      persisted Phase/Task/Step JSON under `~/.darkmux/missions/<id>/`).
    - `GET /flow/<date>/stream` (SSE, the SAME stream viewer.html tails) —
      live status deltas, filtered client-side to records whose `handle`
      matches a node id already present in the snapshot.

  No JSX, no build step for THIS file — only the third-party vendor bundle
  (`assets/vendor/reactflow-bundle.min.js`) goes through a bundler. This
  file calls `React.createElement` directly (aliased `h` below) so darkmux's
  own code stays inspectable without a source map.
-->
<link rel="stylesheet" href="/vendor/reactflow-bundle.min.css">
<style>
  :root{
    --bg:#0a0a0b; --bg2:#131316; --panel:#1c1c22; --line:#1f1f24;
    --text:#e8e6e3; --muted:#8a8a92; --amber:#6df1ff; --amber-dim:#2a8a96;
    --good:#5af0a3; --warn:#ffb86b; --bad:#ff6b85; --run:#ffd166;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100vh;background:var(--bg);color:var(--text);font:14px/1.4 'Inter',-apple-system,system-ui,sans-serif;overflow:hidden}
  #root{height:100vh;display:flex;flex-direction:column}
  .top{height:46px;flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);background:var(--bg2)}
  .brand{font-weight:700;letter-spacing:.04em}
  .brand a{color:inherit;text-decoration:none}
  .brand b{color:var(--amber)}
  .brand a:hover b{text-decoration:underline}
  .midname{font:600 13px 'JetBrains Mono',monospace;color:var(--text)}
  .mstatus{font:600 10px/1 'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;padding:3px 7px;border-radius:3px;border:1px solid var(--line);color:var(--muted)}
  .mstatus.active{color:var(--good);border-color:var(--good)}
  .mstatus.closed{color:var(--muted)}
  .mstatus.paused{color:var(--warn);border-color:var(--warn)}
  .livepill{font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);padding:3px 8px;border-radius:3px}
  @keyframes lpulse{0%,100%{opacity:1}50%{opacity:.5}}
  .livepill.on{color:var(--amber);border-color:var(--amber);animation:lpulse 1.6s ease-in-out infinite}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
  }
  .legend{margin-left:auto;display:flex;gap:12px;align-items:center;font:11px 'JetBrains Mono',monospace;color:var(--muted)}
  .legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .canvas{flex:1 1 auto;position:relative}
  .note{position:absolute;top:12px;left:12px;z-index:20;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:8px 12px;font:12px/1.4 'Inter',sans-serif;color:var(--muted);max-width:420px}
  .msg{padding:40px;color:var(--muted);font:13px 'JetBrains Mono',monospace}
  /* React Flow node chrome — the base package supplies layout/interaction
     CSS (vendored); this styles OUR node content. */
  .mnode{border-radius:7px;border:1px solid var(--line);background:var(--panel);padding:8px 10px;min-width:170px;max-width:260px;font-family:'Inter',sans-serif}
  .mnode .mn-label{font:600 12px/1.3 'JetBrains Mono',monospace;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mnode .mn-kind{font:10px/1 'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  .mnode.k-phase{background:var(--bg2);border-color:var(--amber-dim);min-width:200px}
  .mnode.k-phase .mn-label{font-size:13px}
  .mnode.k-task{border-style:solid}
  .mnode.s-planned{border-color:var(--line)}
  .mnode.s-running{border-color:var(--run);box-shadow:0 0 0 1px var(--run)}
  .mnode.s-running .mn-label{color:var(--run)}
  .mnode.s-running::after{content:"";position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--run);animation:lpulse 1.1s ease-in-out infinite}
  .mnode{position:relative}
  .mnode.s-complete{border-color:var(--good)}
  .mnode.s-complete .mn-kind{color:var(--good)}
  .mnode.s-error{border-color:var(--bad)}
  .mnode.s-error .mn-label{color:var(--bad)}
  .mnode.s-abandoned{border-color:var(--muted);opacity:.6}
  /* (#1401) Step ROWS inside a task node's card — replaces the former
     separate step-node styling above. Each row is kind label + a status
     dot; a running row's dot pulses (same @keyframes lpulse the top-level
     livepill/node-corner indicators already use). */
  .mnode .mn-steps{margin-top:6px;padding-top:6px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:4px}
  .mnode .mn-step-row{display:flex;align-items:center;gap:6px;font:11px/1.3 'JetBrains Mono',monospace;color:var(--muted)}
  .mnode .mn-step-row .mn-step-dot{display:inline-block;flex:0 0 auto;width:6px;height:6px;border-radius:50%;background:var(--line)}
  .mnode .mn-step-row .mn-step-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mnode .mn-step-row.s-running .mn-step-dot{background:var(--run);animation:lpulse 1.1s ease-in-out infinite}
  .mnode .mn-step-row.s-running .mn-step-label{color:var(--run)}
  .mnode .mn-step-row.s-complete .mn-step-dot{background:var(--good)}
  .mnode .mn-step-row.s-error .mn-step-dot{background:var(--bad)}
  .mnode .mn-step-row.s-error .mn-step-label{color:var(--bad)}
  .mnode .mn-step-row.s-abandoned .mn-step-dot{background:var(--muted);opacity:.6}
  .react-flow__edge-path{stroke:var(--muted)}
  .react-flow__edge.edge-depends_on .react-flow__edge-path{stroke:var(--amber-dim);stroke-width:1.6}
  .react-flow__edge.edge-contains .react-flow__edge-path{stroke:var(--line);stroke-dasharray:3 3}
  .react-flow__controls{background:var(--panel);border:1px solid var(--line)}
  .react-flow__controls button{background:var(--panel);border-bottom:1px solid var(--line);fill:var(--text)}
  .react-flow__minimap{background:var(--bg2)}
  .react-flow__attribution{display:none}

  /* (#1403) In-site navigation — explicit, not the wordmark. The operator
     runs this page as a chromeless home-screen shortcut, so browser back can
     never be assumed; these are the ONLY way out of the page. */
  .nav{display:inline-flex;align-items:center;gap:8px}
  .nav a{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:5px;padding:5px 9px;background:none}
  .nav a:hover{color:var(--text);border-color:var(--amber-dim)}

  /* (#1403) Header live token/turn readout — mission-scoped, local vs cloud
     honesty split, same convention as the main viewer's savings hero. */
  .mmeter{display:inline-flex;align-items:baseline;gap:6px;font:11px/1 'JetBrains Mono',monospace;color:var(--muted)}
  .mmeter b{color:var(--amber);font-weight:700}
  .mmeter .split{color:var(--muted)}
  .mmeter .cloud{color:var(--warn)}

  /* (#1403) Per-step token/turn meter on an AI-dispatching step row. */
  .mn-step-meter{margin-left:auto;flex:0 0 auto;display:inline-flex;gap:6px;font:10px/1 'JetBrains Mono',monospace;color:var(--muted);white-space:nowrap}
  .mn-step-meter .tok{color:var(--amber)}
  .mn-step-meter .tok.cloud{color:var(--warn)}
  .mn-step-meter .idle{opacity:.45}
  .mnode .mn-step-row{gap:6px}

  /* (#1403) Mission-scoped events panel — a right-side rail on desktop, a
     bottom sheet on phones. Newest first, this mission's flow records only. */
  .evbtn{font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:5px 9px;background:none;cursor:pointer}
  .evbtn:hover{color:var(--text);border-color:var(--amber-dim)}
  .evbtn.on{color:var(--amber);border-color:var(--amber)}
  .body{flex:1 1 auto;display:flex;min-height:0;position:relative}
  .body .canvas{flex:1 1 auto}
  .evpanel{flex:0 0 340px;border-left:1px solid var(--line);background:var(--bg2);display:flex;flex-direction:column;min-height:0}
  .evpanel .evhd{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line);font:600 11px/1 'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  .evpanel .evhd .evx{margin-left:auto;cursor:pointer;color:var(--muted);border:none;background:none;font-size:15px;line-height:1}
  .evpanel .evhd .evx:hover{color:var(--text)}
  .evlist{flex:1 1 auto;overflow-y:auto;padding:6px 0}
  .evrow{display:flex;gap:8px;align-items:baseline;padding:5px 12px;font:11px/1.35 'JetBrains Mono',monospace;border-bottom:1px solid var(--line)}
  .evrow .evt{flex:0 0 auto;color:var(--muted);font-size:10px}
  .evrow .eva{flex:0 0 auto;color:var(--text)}
  .evrow .evh{flex:1 1 auto;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .evrow.telemetry .eva{color:var(--amber-dim)}
  .evrow.review .eva,.evrow.work .eva{color:var(--text)}
  .evrow.err .eva{color:var(--bad)}
  .evempty{padding:20px 12px;color:var(--muted);font:12px 'Inter',sans-serif}

  /* (#1404) Mobile vertical phase timeline — the narrow-viewport renderer.
     Below the ~700px breakpoint the React Flow canvas (pan/zoom/minimap, a
     touch failure mode on a portrait phone) is REPLACED by this plain-DOM
     vertical list: phases stack top-to-bottom, task cards stack inside each
     phase, tap a card to expand step detail. Consumes the SAME merged graph
     state as the canvas — one data source, two renderers. */
  .timeline{flex:1 1 auto;overflow-y:auto;padding:12px 12px 40px;display:flex;flex-direction:column;gap:16px}
  .tlphase{border:1px solid var(--amber-dim);border-radius:8px;background:var(--bg2);overflow:hidden}
  .tlphase .tlph-hd{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line)}
  .tlphase .tlph-hd .tlph-dot{flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:var(--line)}
  .tlphase.s-running .tlph-dot{background:var(--run);animation:lpulse 1.1s ease-in-out infinite}
  .tlphase.s-complete .tlph-dot{background:var(--good)}
  .tlphase.s-error .tlph-dot{background:var(--bad)}
  .tlphase.s-abandoned{opacity:.6}
  .tlphase .tlph-hd .tlph-name{font:600 13px/1.3 'JetBrains Mono',monospace;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tlphase .tlph-hd .tlph-tag{margin-left:auto;font:10px/1 'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .tltasks{display:flex;flex-direction:column;gap:8px;padding:10px}
  .tltask{border:1px solid var(--line);border-radius:7px;background:var(--panel);overflow:hidden}
  .tltask .tlt-hd{display:flex;align-items:center;gap:8px;padding:10px 11px;cursor:pointer;min-height:44px}
  .tltask .tlt-hd .tlt-dot{flex:0 0 auto;width:7px;height:7px;border-radius:50%;background:var(--line)}
  .tltask.s-running{border-color:var(--run)}
  .tltask.s-running .tlt-dot{background:var(--run);animation:lpulse 1.1s ease-in-out infinite}
  .tltask.s-running .tlt-name{color:var(--run)}
  .tltask.s-complete{border-color:var(--good)}
  .tltask.s-complete .tlt-dot{background:var(--good)}
  .tltask.s-error{border-color:var(--bad)}
  .tltask.s-error .tlt-dot{background:var(--bad)}
  .tltask.s-abandoned{opacity:.6}
  .tltask .tlt-name{font:600 12px/1.3 'JetBrains Mono',monospace;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tltask .tlt-chev{margin-left:auto;flex:0 0 auto;color:var(--muted);font-size:11px;transition:transform .15s}
  .tltask.open .tlt-chev{transform:rotate(90deg)}
  .tltask .tlt-waits{padding:0 11px 8px;font:10px/1.3 'JetBrains Mono',monospace;color:var(--muted)}
  .tltask .tlt-steps{border-top:1px solid var(--line);padding:8px 11px;display:flex;flex-direction:column;gap:7px}
  .tltask .tlt-step{display:flex;align-items:center;gap:7px;font:11px/1.3 'JetBrains Mono',monospace;color:var(--muted)}
  .tltask .tlt-step .tlt-sdot{flex:0 0 auto;width:6px;height:6px;border-radius:50%;background:var(--line)}
  .tltask .tlt-step.s-running .tlt-sdot{background:var(--run);animation:lpulse 1.1s ease-in-out infinite}
  .tltask .tlt-step.s-running{color:var(--run)}
  .tltask .tlt-step.s-complete .tlt-sdot{background:var(--good)}
  .tltask .tlt-step.s-error .tlt-sdot{background:var(--bad)}
  .tltask .tlt-step .tlt-slabel{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tlnote{padding:14px;color:var(--muted);font:12px/1.4 'Inter',sans-serif;background:var(--panel);border:1px solid var(--line);border-radius:6px;margin:12px}

  /* (#1404) Compact single-line header on phones — the desktop header wrapped
     to three lines on a portrait phone (operator repro). Mission id truncates
     with an ellipsis; the status legend hides behind a tap (the .legend below
     the breakpoint becomes a popover). */
  .legendpop{position:absolute;top:44px;right:8px;z-index:30;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:8px 10px;display:none;flex-direction:column;gap:6px}
  .legendpop.on{display:flex}
  .legbtn{display:none}
  @media (max-width:700px){
    html,body{overflow:hidden}
    .top{gap:8px;padding:0 10px}
    .brand{font-size:12px}
    .brand .sub{display:none}
    .midname{font-size:11px;max-width:34vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .legend{display:none}
    .legbtn{display:inline-block}
    .nav a{padding:6px 8px}
    /* Bottom-sheet events panel on phones. */
    .body{flex-direction:column}
    .evpanel{flex:0 0 45vh;border-left:none;border-top:1px solid var(--line)}
    .evrow{padding:9px 12px}
  }
</style>

<body>
<div id="root"><div class="msg">loading…</div></div>
<script src="/vendor/reactflow-bundle.min.js"></script>
<script>
(function(){
"use strict";

var V = window.MissionGraphVendor;
var React = V.React;
var h = React.createElement;
var ReactFlow = V.ReactFlow;
var Background = V.Background;
var Controls = V.Controls;
var MiniMap = V.MiniMap;
var ReactFlowProvider = V.ReactFlowProvider;
var MarkerType = V.MarkerType;

// ─── mission id from the URL ────────────────────────────────────────────
// `/mission/<id>/graph` — no server-side injection needed, the id is
// already in the path the browser loaded.
function missionIdFromPath(){
  var m = /^\/mission\/([^/]+)\/graph\/?$/.exec(window.location.pathname);
  return m ? decodeURIComponent(m[1]) : null;
}

// ─── layout (pure function — the JS-side counterpart to the Rust
// `layer_tasks_by_depth`, which already stamped `depth` onto every task
// node server-side). Positions nodes in bands: one band per phase (stacked
// top-to-bottom), tasks within a band laid out left-to-right by `depth`
// (so dependency order reads left-to-right and a fan-in/fan-out stays
// legible). (#1401) Steps no longer get their own position — they render
// as rows INSIDE their owning task's card (see `MissionNode`), so the
// per-task vertical pitch just needs to grow with the task's OWN step
// count instead of laying out a separate node per step. ──────────────────
var COL_W = 260, TASK_MIN_PITCH = 70, TASK_HEADER_H = 40, STEP_ROW_H = 20,
    TASK_GAP = 16, PHASE_LABEL_W = 40, BAND_GAP = 40, BAND_PAD = 56;

// Vertical space one task's CARD occupies, header + its own row stack —
// the per-task pitch, so cards in the same depth column don't overlap
// (review-gate C3's original fixed-pitch bug, now keyed off the task's own
// `steps` array length instead of a separately-positioned step node count).
function taskPitch(stepCount){
  return Math.max(TASK_MIN_PITCH, TASK_HEADER_H + stepCount * STEP_ROW_H + TASK_GAP);
}

function computeLayout(nodes){
  var phases = nodes.filter(function(n){ return n.kind === "phase"; })
    .sort(function(a,b){ return a.depth - b.depth; });
  var tasksByPhase = {};
  nodes.filter(function(n){ return n.kind === "task"; }).forEach(function(n){
    var p = n.parentId || "__none__";
    (tasksByPhase[p] = tasksByPhase[p] || []).push(n);
  });

  var positions = {};
  var bandTop = 0;
  var phaseList = phases.length ? phases : [{id:"__none__", depth:0}];
  phaseList.forEach(function(phase){
    var tasks = tasksByPhase[phase.id] || [];
    var byDepth = {};
    var maxDepth = 0;
    tasks.forEach(function(t){
      var d = t.depth || 0;
      maxDepth = Math.max(maxDepth, d);
      (byDepth[d] = byDepth[d] || []).push(t);
    });
    var maxColumnHeight = 0;
    for (var d = 0; d <= maxDepth; d++){
      var atDepth = byDepth[d] || [];
      var x = PHASE_LABEL_W + COL_W + d * COL_W;
      var yCursor = bandTop + BAND_PAD;
      atDepth.forEach(function(t){
        positions[t.id] = {x: x, y: yCursor};
        yCursor += taskPitch((t.steps || []).length);
      });
      maxColumnHeight = Math.max(maxColumnHeight, yCursor - (bandTop + BAND_PAD));
    }
    if (phase.id !== "__none__") {
      positions[phase.id] = {x: 0, y: bandTop + BAND_PAD};
    }
    var bandHeight = Math.max(160, maxColumnHeight + BAND_PAD * 2);
    bandTop += bandHeight + BAND_GAP;
  });
  return positions;
}

// ─── node component ─────────────────────────────────────────────────────
// (#1401) A task node renders its OWN steps as rows — kind display label
// (server-resolved via the fallback chain — #1402) + a status dot; a
// running row's dot pulses via the `.mn-step-row.s-running` CSS rule. A
// phase node has no `steps` array (empty), so `mnSteps` is a no-op for it.
// (#1403) A per-step token/turn meter element from the step's precomputed
// `_meter` (attached in `toRfNodes`). Shared by the canvas node and — via the
// same `stepMeterFor` data — the mobile timeline. `null` for a procedural step
// with no metrics (procedural kinds show none). An AI kind with no data yet
// renders an idle placeholder so the meter's absence never reads as "this
// step isn't AI-dispatching".
function stepMeterEl(meter){
  if (!meter || !meter.show) return null;
  if (!meter.tokens && !meter.turns) {
    return h("span", {className:"mn-step-meter"}, h("span", {className:"idle"}, "· tok"));
  }
  var children = [];
  if (meter.tokens) {
    children.push(h("span", {key:"t", className:"tok" + (meter.cloud ? " cloud" : "")}, fmtTok(meter.tokens) + " tok"));
  }
  if (meter.turns) {
    children.push(h("span", {key:"n"}, meter.turns + (meter.turns === 1 ? " turn" : " turns")));
  }
  return h("span", {className:"mn-step-meter"}, children);
}
// The `_meter` descriptor for one step given the live metrics map. Pure, so
// both renderers stay on one code path.
function stepMeterFor(step, metrics){
  var d = stepDisplayMetrics(metrics[step.id]);
  var show = isAiKind(step.kind) || d.has;
  return { show: show, tokens: d.tokens, turns: d.turns, cloud: d.cloud };
}

function MissionNode(props){
  var d = props.data;
  var mnSteps = (d.steps && d.steps.length)
    ? h("div", {className:"mn-steps"}, d.steps.map(function(s){
        return h("div", {key: s.id, className: "mn-step-row s-" + s.status, title: s.label},
          h("span", {className:"mn-step-dot"}),
          h("span", {className:"mn-step-label"}, s.label),
          stepMeterEl(s._meter)
        );
      }))
    : null;
  return h("div", {className: "mnode k-" + d.kind + " s-" + d.status, title: d.description || d.label},
    h(V.Handle, {type:"target", position: V.Position.Left, style:{opacity:0}}),
    h("div", {className:"mn-kind"}, d.kind),
    h("div", {className:"mn-label"}, d.label),
    mnSteps,
    h(V.Handle, {type:"source", position: V.Position.Right, style:{opacity:0}})
  );
}
var nodeTypes = { missionNode: MissionNode };

// ─── graph.json -> React Flow shape ─────────────────────────────────────
function toRfNodes(graphNodes, positions, metrics){
  metrics = metrics || {};
  return graphNodes.map(function(n){
    var pos = positions[n.id] || {x:0, y:0};
    // (#1403) Attach a live `_meter` to each step so the canvas node re-renders
    // when metrics change (new data objects each render → React Flow updates).
    var steps = (n.steps || []).map(function(s){

    // stream, so a straight replace would regress live statuses every tick.
    // The same tick also handles UTC midnight (review-gate C4): the flow
    // stream is per-day, so a tab left open across midnight would otherwise
    // tail yesterday's stream forever while looking live — re-open against
    // the new day the first tick after rollover.
    var reconcile = setInterval(function(){
      if (todayUtc() !== sseDate) openStream();
      fetchGraph().then(function(g){
        idxRef.current = indexGraph(g);
        setState(function(prev){
          if (!prev.graph) return prev;
          return Object.assign({}, prev, {graph: mergeGraphs(prev.graph, g)});
        });
      }).catch(function(){ /* best-effort; keep showing the last-known graph */ });
    }, 20000);
    return function(){ if (es) es.close(); clearInterval(reconcile); };
  }, [!!state.graph]);

  React.useEffect(function(){
    return function(){ if (esRef.current) esRef.current.close(); };
  }, []);

  if (state.loading) return h("div", {className:"msg"}, "loading mission graph…");
  if (state.error) return h("div", {className:"msg"}, "darkmux mission graph: " + state.error);

  var g = state.graph;
  // (#1404) One data source, two renderers. Timeline is the narrow-viewport
  // default (viewMode "auto" + mobile) and available anywhere via the toggle.
  var useTimeline = viewMode === "timeline" || (viewMode === "auto" && isMobile);
  var tot = missionTotals(metrics);

  var body;
  if (useTimeline) {
    body = h("div", {className:"timeline"}, renderMissionTimeline(g, metrics, expanded, toggleTask));
  } else {
    var positions = computeLayout(g.nodes);
    var rfNodes = toRfNodes(g.nodes, positions, metrics);
    var rfEdges = toRfEdges(g.edges);
    body = h("div", {className:"canvas"},
      g.note ? h("div", {className:"note"}, g.note) : null,
      h(ReactFlowProvider, null,
        h(ReactFlow, {
          nodes: rfNodes, edges: rfEdges, nodeTypes: nodeTypes,
          fitView: true, minZoom: 0.1, maxZoom: 2,
          proOptions: {hideAttribution: true},
        },
          h(Background, {color:"#1f1f24", gap: 24}),
          h(Controls, null),
          h(MiniMap, {pannable:true, zoomable:true, style:{background:"#131316"}})
        )
      )
    );
  }

  // (#1403) Mission-scoped live token readout, local vs cloud honesty split.
  var meterEl = tot.total || tot.turns ? h("span", {className:"mmeter"},
    tot.total ? h("b", null, fmtTok(tot.total) + " tok") : null,
    (tot.total && tot.cloud) ? h("span", {className:"split"},
      fmtTok(tot.local) + " local + ", h("span", {className:"cloud"}, fmtTok(tot.cloud) + " cloud")) : null,
    tot.turns ? h("span", {className:"split"}, "· " + tot.turns + (tot.turns === 1 ? " turn" : " turns")) : null
  ) : null;

  return h(React.Fragment, null,
    h("div", {className:"top"},
      // (#1403) Explicit in-site nav — the ONLY way out on a chromeless
      // home-screen shortcut, so it reads as navigation, not a logo.
      h("div", {className:"nav"}, h("a", {href:"/", title:"back to the darkmux viewer"}, "‹ viewer")),
      h("div", {className:"brand"}, h("a", {href:"/"}, h("b", null, "darkmux"), h("span", {className:"sub"}, " · mission"))),
      h("span", {className:"midname", title: g.mission_id}, g.mission_id),
      h("span", {className:"mstatus " + g.mission_status}, g.mission_status),
      h("span", {className:"livepill" + (live ? " on" : "")}, live ? "● live" : "○ reconnecting"),
      meterEl,
      h("button", {className:"evbtn", title:"switch renderer",
                   onClick: function(){ setViewMode(useTimeline ? "canvas" : "timeline"); }},
        useTimeline ? "graph" : "list"),
      h("button", {className:"evbtn" + (evOpen ? " on" : ""), title:"mission events",
                   onClick: function(){ setEvOpen(!evOpen); }}, "events"),
      h("button", {className:"legbtn", title:"status legend",
                   onClick: function(){ setLegendOpen(!legendOpen); }}, "legend"),
      h("div", {className:"legend"}, legendDots()),
      legendOpen ? h("div", {className:"legendpop on"}, legendDots()) : null
    ),
    h("div", {className:"body"},
      body,
      evOpen ? h("div", {className:"evpanel"}, eventsPanelEls(events, function(){ setEvOpen(false); })) : null
    )
  );
}

var root = V.createRoot(document.getElementById("root"));
root.render(h(App));

// Exposed for anything that wants to sanity-check the pure functions from
// the browser console during manual verification (not a formal test hook).
window.__missionGraphComputeLayout = computeLayout;
window.__missionGraphMergeGraphs = mergeGraphs;
})();
</script>
</body>
</html>
