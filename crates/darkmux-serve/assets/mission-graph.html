<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>darkmux · mission graph</title>
<!-- (#1403) Standalone-app shell — same as viewer.html. The operator reaches
     this page as a chromeless home-screen shortcut, so browser back can never
     be assumed; the manifest + app metas make an installed shortcut behave
     like an app, and every asset is served same-origin by the daemon (the
     page is self-contained by convention — no external fetches anywhere;
     there is no CSP header). -->
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="darkmux">
<meta name="theme-color" content="#0a0a0b">
<!--
  Mission graph lens (#1284 Packet 5) — a DEDICATED page, separate from
  viewer.html on purpose (that file's own header explains why it stays one
  file for the flow-record timeline; this page renders a different shape of
  data — a Phase/Task/Step node-link graph — via a vendored React Flow
  bundle, and mixing the two rendering models into one file would make
  viewer.html's own `stageSig()` re-render-gap discipline harder to reason
  about, not easier).

  Served at `GET /mission/<id>/graph` by `darkmux-serve`. Data comes from
  two same-origin sources, both same-origin (no CDN, no cross-origin
  fetch — see `assets/vendor/README.md`):

    - `GET /mission/<id>/graph.json` — the initial node/edge snapshot
      (`crates/darkmux-serve/src/mission_graph.rs` builds it from the
      persisted Phase/Task/Step JSON under `~/.darkmux/missions/<id>/`).
    - `GET /flow/<date>/stream` (SSE, the SAME stream viewer.html tails) —
      live status deltas, filtered client-side to records whose `handle`
      matches a node id already present in the snapshot.

  No JSX, no build step for THIS file — only the third-party vendor bundle
  (`assets/vendor/reactflow-bundle.min.js`) goes through a bundler. This
  file calls `React.createElement` directly (aliased `h` below) so darkmux's
  own code stays inspectable without a source map.
-->
<link rel="stylesheet" href="/vendor/reactflow-bundle.min.css">
<style>
  :root{
    --bg:#0a0a0b; --bg2:#131316; --panel:#1c1c22; --line:#1f1f24;
    --text:#e8e6e3; --muted:#8a8a92; --amber:#6df1ff; --amber-dim:#2a8a96;
    --good:#5af0a3; --warn:#ffb86b; --bad:#ff6b85; --run:#ffd166;
  }
  *{box-sizing:border-box}
  /* (mobile-nav fix) `100vh` is a known trap on iOS Safari — it resolves to
     the LARGE viewport (address bar hidden), can exceed the ACTUAL visible
     screen while the address bar is showing, and does not react live as the
     browser chrome collapses/expands. Real-device repro: the canvas-mode
     graph pushed `.top` almost entirely off-screen, only a sliver peeking
     out under the status bar, with no way back to the nav (#1403 — this is
     a chromeless home-screen shortcut; there is no browser back). `100dvh`
     (dynamic viewport height) tracks the ACTUAL visible viewport live;
     layered on as a second declaration so an engine without `dvh` support
     silently keeps the `100vh` fallback (plain CSS cascade, no
     `@supports` needed) — desktop and older engines are unchanged.
     `overscroll-behavior:none` additionally stops the page from entering
     the rubber-band/bounce state a touch-drag on the React Flow canvas can
     trigger — that bounce is a well-documented way `overflow:hidden` alone
     fails to keep an iOS Safari document pinned at y=0. */
  html,body{margin:0;height:100vh;height:100dvh;background:var(--bg);color:var(--text);font:14px/1.4 'Inter',-apple-system,system-ui,sans-serif;overflow:hidden;overscroll-behavior:none}
  #root{height:100vh;height:100dvh;display:flex;flex-direction:column}
  /* min-height (not a fixed 46px) + safe-area padding so the bar clears the
     notch/status bar when the page runs as a standalone home-screen PWA
     (#1403, viewport-fit=cover). env() resolves to 0 in a normal browser tab,
     so desktop is unchanged.
     (mobile-nav fix) `position:sticky;top:0` is the belt to the `100dvh`
     suspenders above: EVEN IF something (the iOS bounce, a stray scroll)
     shifts the document, sticky re-anchors `.top` to the visible viewport's
     own top edge instead of trusting the flex layout alone — the nav (back
     button + tabs) is the ONLY way out of this page, so it stays reachable
     unconditionally, not just "reachable when the layout math is perfect".
     Previously only the timeline branch had this (`html.timeline-mode .top`
     below); the canvas branch — where the real bug was observed — had none. */
  .top{position:sticky;top:0;z-index:50;min-height:46px;flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:env(safe-area-inset-top,0px) calc(16px + env(safe-area-inset-right,0px)) 0 calc(16px + env(safe-area-inset-left,0px));border-bottom:1px solid var(--line);background:var(--bg2)}
  .brand{font-weight:700;letter-spacing:.04em}
  .brand a{color:inherit;text-decoration:none}
  .brand b{color:var(--amber)}
  .brand a:hover b{text-decoration:underline}
  .midname{font:600 13px 'JetBrains Mono',monospace;color:var(--text)}
  .mstatus{font:600 10px/1 'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;padding:3px 7px;border-radius:3px;border:1px solid var(--line);color:var(--muted)}
  .mstatus.active{color:var(--good);border-color:var(--good)}
  .mstatus.finalized{color:var(--muted)}
  .mstatus.paused{color:var(--warn);border-color:var(--warn)}
  .livepill{font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);padding:3px 8px;border-radius:3px}
  @keyframes lpulse{0%,100%{opacity:1}50%{opacity:.5}}
  .livepill.on{color:var(--amber);border-color:var(--amber);animation:lpulse 1.6s ease-in-out infinite}
  /* (#1480) Disconnected/reconnecting is a LOUD state, not a calm one — a
     stale page that still "looks live" is the failure this guards. The warn
     hue + a faster pulse read unmistakably as "not live right now" so the
     operator never trusts stale data as current. */
  .livepill.off{color:var(--warn);border-color:var(--warn);animation:lpulse 1s ease-in-out infinite}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
  }
  .legend{margin-left:auto;display:flex;gap:12px;align-items:center;font:11px 'JetBrains Mono',monospace;color:var(--muted)}
  .legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  /* min-height:0 (not the flex-item default `auto`) so the canvas can
     actually SHRINK to the remaining space below `.top` rather than being
     floored at its own content's intrinsic size — belt-and-suspenders
     alongside the `100dvh`/sticky-nav fix above for "the canvas fills only
     the REMAINING height", never pushing the nav out. */
  .canvas{flex:1 1 auto;min-height:0;position:relative}
  .note{position:absolute;top:12px;left:12px;z-index:20;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:8px 12px;font:12px/1.4 'Inter',sans-serif;color:var(--muted);max-width:420px}
  .msg{padding:40px;color:var(--muted);font:13px 'JetBrains Mono',monospace}
  /* React Flow node chrome — the base package supplies layout/interaction
     CSS (vendored); this styles OUR node content. */
  .mnode{border-radius:7px;border:1px solid var(--line);background:var(--panel);padding:8px 10px;min-width:170px;max-width:260px;font-family:'Inter',sans-serif}
  .mnode .mn-label{font:600 12px/1.3 'JetBrains Mono',monospace;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mnode .mn-kind{font:10px/1 'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  .mnode.k-phase{background:var(--bg2);border-color:var(--amber-dim);min-width:200px}
  .mnode.k-phase .mn-label{font-size:13px}
  .mnode.k-task{border-style:solid}
  .mnode.s-planned{border-color:var(--line)}
  .mnode.s-running{border-color:var(--run);box-shadow:0 0 0 1px var(--run)}
  .mnode.s-running .mn-label{color:var(--run)}
  .mnode.s-running::after{content:"";position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--run);animation:lpulse 1.1s ease-in-out infinite}
  .mnode{position:relative}
  .mnode.s-complete{border-color:var(--good)}
  .mnode.s-complete .mn-kind{color:var(--good)}
  .mnode.s-error{border-color:var(--bad)}
  .mnode.s-error .mn-label{color:var(--bad)}
  .mnode.s-abandoned{border-color:var(--muted);opacity:.6}
  /* (#1401/#1432 item 6) Step ROWS inside a task node's card. The row
     STRUCTURE (hollow ring + tree rail + muted-caps kind lead) is the
     shared `.steprow` Concept A block below — used by BOTH this canvas node
     and the mobile timeline so the sub-item vocabulary is one. This just
     sizes the container; the canvas node's tighter 260px width shrinks the
     lead column via the `.mnode` override in the shared block. */
  .mnode .mn-steps{margin-top:6px;padding-top:6px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:2px}
  .react-flow__edge-path{stroke:var(--muted)}
  .react-flow__edge.edge-depends_on .react-flow__edge-path{stroke:var(--amber-dim);stroke-width:1.6}
  .react-flow__edge.edge-contains .react-flow__edge-path{stroke:var(--line);stroke-dasharray:3 3}
  /* (#1230 graph-lens lineage) Phase-order edges — a client-synthesized
     phase[i]->phase[i+1] arrow (see `phaseOrderEdges`) showing the mission's
     phase sequence. Heavier, solid, `--good` green so it reads as the
     graph's structural backbone at a glance — distinct from both the teal
     `depends_on` task-dependency edges and the fine dashed `contains`
     phase->task membership edges, but still the same dark-theme teal/green
     edge family, just a third, more prominent member of it. */
  .react-flow__edge.edge-phase_order .react-flow__edge-path{stroke:var(--good);stroke-width:2.4;opacity:.85}
  .react-flow__controls{background:var(--panel);border:1px solid var(--line)}
  .react-flow__controls button{background:var(--panel);border-bottom:1px solid var(--line);fill:var(--text)}
  /* (#1482) The minimap must never INTERLEAVE with node cards — React Flow's
     default z-order let a node (the Judge card, in the operator repro) render
     through it. A solid background + border + a z-index above the node layer
     makes it read as one opaque overlay parked in its corner, on top of the
     canvas rather than tangled into it. Corner-anchored (bottom-right) is the
     React Flow default; we only firm up the stacking + chrome here. */
  .react-flow__minimap{background:var(--bg2)!important;border:1px solid var(--line);border-radius:6px;z-index:6}
  .react-flow__attribution{display:none}

  /* (#1403) In-site navigation — explicit, not the wordmark. The operator
     runs this page as a chromeless home-screen shortcut, so browser back can
     never be assumed; these are the ONLY way out of the page. */
  .nav{display:inline-flex;align-items:center;gap:8px}
  .nav a{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:5px;padding:5px 9px;background:none}
  .nav a:hover{color:var(--text);border-color:var(--amber-dim)}

  /* (#1403) Header live token/turn readout — mission-scoped, local vs cloud
     honesty split, same convention as the main viewer's savings hero. */
  .mmeter{display:inline-flex;align-items:baseline;gap:6px;font:11px/1 'JetBrains Mono',monospace;color:var(--muted);white-space:nowrap}
  .mmeter b{color:var(--amber);font-weight:700}
  .mmeter .split{color:var(--muted)}
  .mmeter .cloud{color:var(--warn)}

  /* (#1403) Per-step token/turn meter on an AI-dispatching step row. */
  .mn-step-meter{margin-left:auto;flex:0 0 auto;display:inline-flex;gap:6px;font:10px/1 'JetBrains Mono',monospace;color:var(--muted);white-space:nowrap}
  .mn-step-meter .tok{color:var(--amber)}
  .mn-step-meter .tok.cloud{color:var(--warn)}
  .mn-step-meter .idle{opacity:.45}
  /* (#1483) Live "generating" affordance on a running dispatch — an elapsed
     timer that ticks client-side + a pulsing dot. This is what kills the
     "looks idle during a long dispatch" ambiguity: a seat with an open
     dispatch (dispatch.start with no terminal yet) shows a live-climbing
     clock, not a static card. Corroborated by the header GPU readout below
     (host telemetry.process). */
  .mn-step-meter .gen{display:inline-flex;align-items:center;gap:4px;color:var(--run);font-weight:700}
  .mn-step-meter .gen .genpulse{width:6px;height:6px;border-radius:50%;background:var(--run);
    animation:lpulse 1.1s ease-in-out infinite}

  /* (#1481) Resolved-model chip on a seat row — the model that actually
     staffed this dispatch seat (role→profile→model, #1475), so the operator
     reads it without re-navigating to the run view. Omitted entirely for a
     step with no resolved model (procedural / Tier 3). The namespace prefix
     is stripped for the label; the full id is one hover away (title). */
  .steprow .smodel{flex:0 1 auto;min-width:0;font:9px/1 'JetBrains Mono',monospace;color:var(--amber-dim);
    border:1px solid var(--line);border-radius:3px;padding:2px 5px;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap;max-width:140px}
  .mnode .steprow .smodel{max-width:86px}

  /* (#1483) Header host-activity readout — cpu/gpu from telemetry.process,
     the OFF-model corroboration that the box is actually working (host
     kernel counters, zero model dispatches — observability doctrine). */
  .mproc{display:inline-flex;align-items:baseline;gap:8px;font:11px/1 'JetBrains Mono',monospace;
    color:var(--muted);white-space:nowrap}
  .mproc b{color:var(--good);font-weight:700}
  .mproc .hot{color:var(--run)}

  /* (#1432 item 6) Concept A step hierarchy — SHARED by both renderers (the
     canvas `.mn-steps` and the timeline `.tlt-steps`). A step reads as a
     sub-item INSIDE its task via three stacked signals: (1) a hollow OUTLINE
     ring, vs the task's FILLED dot — border-color carries status; (2) a drawn
     tree connector rail down the ring column, clipped to a half-height on the
     first/last row so the line begins/ends at the outer rings; (3) a
     muted-caps kind lead label (the #1410 display names — PROBE / JUDGE /
     VERIFY / …), whose vocabulary itself signals "this is a step". Concept C
     (rings + lead, no rail) is one rule away — deleting the `::before`/
     `::after` rail rules leaves a valid downgrade on the same markup. */
  .steprow{position:relative;display:flex;align-items:center;gap:8px;padding:5px 0 5px 32px;
    font:11px/1.3 'JetBrains Mono',monospace;color:var(--muted)}
  .steprow::before{content:"";position:absolute;left:9px;top:0;bottom:0;width:1px;background:var(--amber-dim);opacity:.5}
  .steprow:first-child::before{top:50%}
  .steprow:last-child::before{bottom:50%}
  .steprow::after{content:"";position:absolute;left:9px;top:50%;width:8px;height:1px;background:var(--amber-dim);opacity:.5}
  .steprow .sring{position:absolute;left:17px;top:50%;transform:translateY(-50%);width:9px;height:9px;
    border-radius:50%;border:1.5px solid var(--muted);background:var(--bg2);box-sizing:border-box}
  .steprow.s-running .sring{border-color:var(--run);animation:lpulse 1.1s ease-in-out infinite}
  .steprow.s-complete .sring{border-color:var(--good)}
  .steprow.s-error .sring{border-color:var(--bad)}
  .steprow.s-abandoned .sring{border-color:var(--muted);opacity:.55}
  .steprow .slead{flex:0 0 auto;font:600 9px/1 'JetBrains Mono',monospace;letter-spacing:.09em;
    text-transform:uppercase;color:var(--muted);min-width:58px;max-width:110px;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}
  .steprow .sname{flex:0 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .steprow.s-running .sname{color:var(--run)}
  .steprow.s-error .sname{color:var(--bad)}
  .steprow .mn-step-meter{margin-left:auto}
  /* Canvas node is a tight 260px card — shrink the lead column so the step
     name still gets room (the rail/rings survive the narrower column). */
  .mnode .steprow{padding-left:30px}
  .mnode .steprow::before,.mnode .steprow::after{left:8px}
  .mnode .steprow .sring{left:15px}
  .mnode .steprow .slead{min-width:50px}

  /* (#1403) Mission-scoped events panel — a right-side rail on desktop, a
     bottom sheet on phones. Newest first, this mission's flow records only. */
  /* .legbtn shares the .evbtn appearance (it's shown only below the mobile
     breakpoint, where it stands in for the inline .legend dots) — without this
     it fell back to a raw white default-button on phones. */
  .evbtn,.legbtn{font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:5px 9px;background:none;cursor:pointer}
  .evbtn:hover{color:var(--text);border-color:var(--amber-dim)}
  .evbtn.on{color:var(--amber);border-color:var(--amber)}
  .body{flex:1 1 auto;display:flex;min-height:0;position:relative}
  .body .canvas{flex:1 1 auto}
  .evpanel{flex:0 0 340px;border-left:1px solid var(--line);background:var(--bg2);display:flex;flex-direction:column;min-height:0}
  .evpanel .evhd{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line);font:600 11px/1 'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  .evpanel .evhd .evx{margin-left:auto;cursor:pointer;color:var(--muted);border:none;background:none;font-size:15px;line-height:1}
  .evpanel .evhd .evx:hover{color:var(--text)}
  .evlist{flex:1 1 auto;overflow-y:auto;padding:6px 0}
  .evrow{display:flex;gap:8px;align-items:baseline;padding:5px 12px;font:11px/1.35 'JetBrains Mono',monospace;border-bottom:1px solid var(--line)}
  .evrow .evt{flex:0 0 auto;color:var(--muted);font-size:10px}
  .evrow .eva{flex:0 0 auto;color:var(--text)}
  .evrow .evh{flex:1 1 auto;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .evrow.telemetry .eva{color:var(--amber-dim)}
  .evrow.review .eva,.evrow.work .eva{color:var(--text)}
  .evrow.err .eva{color:var(--bad)}
  .evempty{padding:20px 12px;color:var(--muted);font:12px 'Inter',sans-serif}

  /* (#1404) Mobile vertical phase timeline — the narrow-viewport renderer.
     Below the ~700px breakpoint the React Flow canvas (pan/zoom/minimap, a
     touch failure mode on a portrait phone) is REPLACED by this plain-DOM
     vertical list: phases stack top-to-bottom, task cards stack inside each
     phase, tap a card to expand step detail. Consumes the SAME merged graph
     state as the canvas — one data source, two renderers. */
  .timeline{flex:1 1 auto;overflow-y:auto;padding:12px 12px 40px;display:flex;flex-direction:column;gap:16px}
  .tlphase{border:1px solid var(--amber-dim);border-radius:8px;background:var(--bg2);overflow:hidden}
  .tlphase .tlph-hd{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line)}
  .tlphase .tlph-hd .tlph-dot{flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:var(--line)}
  .tlphase.s-running .tlph-dot{background:var(--run);animation:lpulse 1.1s ease-in-out infinite}
  .tlphase.s-complete .tlph-dot{background:var(--good)}
  .tlphase.s-error .tlph-dot{background:var(--bad)}
  .tlphase.s-abandoned{opacity:.6}
  .tlphase .tlph-hd .tlph-name{font:600 13px/1.3 'JetBrains Mono',monospace;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tlphase .tlph-hd .tlph-tag{margin-left:auto;font:10px/1 'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .tltasks{display:flex;flex-direction:column;gap:8px;padding:10px}
  .tltask{border:1px solid var(--line);border-radius:7px;background:var(--panel);overflow:hidden}
  /* (#1432 item 5) Fixed grid for the collapsed task row — dot | title |
     count | meter | chevron — so the meter + chevron pin to consistent
     columns instead of drifting with the title's length (the old two
     `margin-left:auto` flow layout floated the "· tok" meter at a different
     offset per title). Every cell is ALWAYS rendered (the count + meter
     cells are empty spans when they have nothing) so the five grid tracks
     never shift out from under each other. */
  .tltask .tlt-hd{display:grid;grid-template-columns:auto 1fr auto auto auto;align-items:center;gap:9px;padding:10px 11px;cursor:pointer;min-height:44px}
  .tltask .tlt-hd .tlt-dot{flex:0 0 auto;width:7px;height:7px;border-radius:50%;background:var(--line)}
  .tltask.s-running{border-color:var(--run)}
  .tltask.s-running .tlt-dot{background:var(--run);animation:lpulse 1.1s ease-in-out infinite}
  .tltask.s-running .tlt-name{color:var(--run)}
  .tltask.s-complete{border-color:var(--good)}
  .tltask.s-complete .tlt-dot{background:var(--good)}
  .tltask.s-error{border-color:var(--bad)}
  .tltask.s-error .tlt-dot{background:var(--bad)}
  .tltask.s-abandoned{opacity:.6}
  .tltask .tlt-name{font:600 12px/1.3 'JetBrains Mono',monospace;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  /* (#1432 item 6) Collapsed step count — "N steps" is visible BEFORE any
     tap, so the presence of expandable sub-items is announced. Hidden while
     the card is open (the steps themselves are then on screen). */
  .tltask .tlt-count{font:10px/1 'JetBrains Mono',monospace;color:var(--muted);white-space:nowrap}
  .tltask .tlt-hd .tlt-meter-cell{display:inline-flex;min-width:0}
  .tltask .tlt-hd .tlt-meter-cell .mn-step-meter{margin-left:0}
  .tltask .tlt-chev{flex:0 0 auto;color:var(--muted);font-size:11px;transition:transform .15s}
  .tltask.open .tlt-chev{transform:rotate(90deg)}
  .tltask .tlt-waits{padding:0 11px 8px;font:10px/1.3 'JetBrains Mono',monospace;color:var(--muted)}
  /* Step region + rows: the shared `.steprow` Concept A block (rings + rail +
     kind lead) styles the rows; this just sizes the container. */
  .tltask .tlt-steps{border-top:1px solid var(--line);padding:8px 11px;display:flex;flex-direction:column;gap:2px}
  .tltask .tlt-empty{padding:5px 2px;font:11px/1.3 'JetBrains Mono',monospace;color:var(--muted)}
  .tlnote{padding:14px;color:var(--muted);font:12px/1.4 'Inter',sans-serif;background:var(--panel);border:1px solid var(--line);border-radius:6px;margin:12px}

  /* (#1404) Compact single-line header on phones — the desktop header wrapped
     to three lines on a portrait phone (operator repro). Mission id truncates
     with an ellipsis; the status legend hides behind a tap (the .legend below
     the breakpoint becomes a popover). */
  /* Anchored to the bottom of `.top` (which is a positioning context) rather
     than a hard-coded 44px — the header grows to two rows + a safe-area inset
     on phones, so a fixed offset opened the popover ON TOP of the tab row. */
  .legendpop{position:absolute;top:calc(100% + 4px);right:8px;z-index:30;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:8px 10px;display:none;flex-direction:column;gap:6px}
  .legendpop.on{display:flex}
  .legbtn{display:none}

  /* (#1432 item 1) Timeline renderer -> document scroll. The base shell locks
     the page to a 100vh viewport with `overflow:hidden` because the React
     Flow canvas needs a fixed-height pan surface. On a phone the vertical
     timeline REPLACES that canvas, and the lock clips the list so it cannot
     scroll at all (a nested-flex `overflow-y:auto` child is unreliable on
     iOS). Release the lock for the TIMELINE BRANCH ONLY — keyed on the
     `timeline-mode` class the app stamps on <html> when the timeline
     renders — so the page flows in the document and scrolls natively. The
     canvas branch keeps the untouched locked viewport. The header sticks so
     the in-site nav (the only way out of a chromeless home-screen shortcut)
     stays reachable while scrolling. Same overflow-escape shape as the main
     viewer's machine/lab modes. Deleting these rules is the Concept-C-style
     graceful fallback: the timeline then relies on its inner scroll again. */
  html.timeline-mode,html.timeline-mode body{height:auto;min-height:100vh;overflow:visible}
  html.timeline-mode #root{height:auto;min-height:100vh}
  html.timeline-mode .top{position:sticky;top:0;z-index:40}
  html.timeline-mode .timeline{overflow:visible}
  /* (#1432·1 consider) With the document scrolling, a flex-child events
     panel would scroll away with the page — pin the open panel to the
     viewport as a fixed bottom sheet instead (it already IS a bottom sheet
     below the breakpoint; this keeps it one at any width while the timeline
     renders). The timeline's tall bottom padding keeps the last card
     reachable above it. */
  html.timeline-mode .evpanel{position:fixed;left:0;right:0;bottom:0;z-index:45;
    max-height:45vh;border-left:none;border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom,0px)}
  /* Only pad the list past the sheet while the sheet is actually open
     (`:has` — degrades to the base 40px padding on engines without it,
     where the open sheet may cover the last card until closed). */
  html.timeline-mode .body:has(.evpanel) .timeline{padding-bottom:48vh}

  @media (max-width:700px){
    html,body{overflow:hidden}
    /* (#1432 follow-up) The header packs 8–9 controls; on a phone they
       overflowed a single non-wrapping 46px row and the rightmost tabs + the
       token split clipped off-screen (unreachable). Reflow to two rows:
       row 1 = identity + status (nav · brand · mission · status · live),
       row 2 = the token readout + the graph/events/legend tabs. `.midname`
       grows to fill row 1, which forces the meter + tabs to wrap together as
       the second row. Safe-area padding keeps the bar clear of the notch /
       status bar when the page runs as a standalone home-screen PWA (#1403). */
    .top{flex-wrap:wrap;align-items:center;gap:8px;row-gap:6px;min-height:0;
      padding:calc(7px + env(safe-area-inset-top,0px)) calc(10px + env(safe-area-inset-right,0px)) 7px calc(10px + env(safe-area-inset-left,0px))}
    .brand{font-size:12px}
    .brand .sub{display:none}
    .midname{flex:1 1 30px;min-width:0;max-width:none;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    /* One shared box height so the back button, status pill, live toggle and
       tabs sit on a common center line instead of reading as a pile of
       differently-sized boxes. */
    .nav a,.mstatus,.livepill,.evbtn,.legbtn{display:inline-flex;align-items:center;min-height:30px;box-sizing:border-box}
    .nav a{padding:6px 8px}
    /* The token readout leads row 2 and pushes the tabs to the right edge; keep
       it on ONE line (it wrapped to "170k / tok" when squeezed) and drop the
       verbose local+cloud breakdown on phones — the headline total is what a
       glance needs, and the split still shows on the per-step meters. */
    .mmeter{margin-right:auto}
    .mmeter .split:has(.cloud){display:none}
    .legend{display:none}
    .legbtn{display:inline-flex}
    /* Bottom-sheet events panel on phones. */
    .body{flex-direction:column}
    .evpanel{flex:0 0 45vh;border-left:none;border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom,0px)}
    .evrow{padding:9px 12px}
    /* (#1482) Cap the minimap footprint on phones — the default ~200x150
       dominated the shrunken canvas when the events sheet was open. Small +
       corner-anchored so it can't eat the graph. Paired with the default-
       HIDDEN-on-narrow toggle below (the operator opts in on a phone). */
    .react-flow__minimap{width:104px!important;height:78px!important;margin:8px!important}
  }
</style>
</head>
<body>
<div id="root"><div class="msg">loading…</div></div>
<script src="/vendor/reactflow-bundle.min.js"></script>
<script>
(function(){
"use strict";

var V = window.MissionGraphVendor;
var React = V.React;
var h = React.createElement;
var ReactFlow = V.ReactFlow;
var Background = V.Background;
var Controls = V.Controls;
var MiniMap = V.MiniMap;
var ReactFlowProvider = V.ReactFlowProvider;
var MarkerType = V.MarkerType;

// ─── mission id from the URL ────────────────────────────────────────────
// `/mission/<id>/graph` — no server-side injection needed, the id is
// already in the path the browser loaded.
function missionIdFromPath(){
  var m = /^\/mission\/([^/]+)\/graph\/?$/.exec(window.location.pathname);
  return m ? decodeURIComponent(m[1]) : null;
}

// ─── layout (pure function — the JS-side counterpart to the Rust
// `layer_tasks_by_depth`, which already stamped `depth` onto every task
// node server-side). Positions nodes in bands: one band per phase (stacked
// top-to-bottom), tasks within a band laid out left-to-right by `depth`
// (so dependency order reads left-to-right and a fan-in/fan-out stays
// legible). (#1401) Steps no longer get their own position — they render
// as rows INSIDE their owning task's card (see `MissionNode`), so the
// per-task vertical pitch just needs to grow with the task's OWN step
// count instead of laying out a separate node per step. ──────────────────
// (mobile fan-in fix) `COL_W` doubles as BOTH a node's own max render width
// (`.mnode{max-width:260px}`) AND, pre-fix, the column-to-column PITCH — so
// a card rendered at its full width sat with its right edge FLUSH against
// the very next depth column's left edge, zero px of routing room between
// them. Every `depends_on` edge crossing that boundary (not just dedup's
// 3-way probe fan-in — Verify -> Synthesis, and any single fan-in/fan-out,
// generalized graph-wide per operator report) had nowhere to route and
// rendered hidden behind/under the node column (#1230 lineage). `COL_GAP`
// is genuine breathing room ON TOP of `COL_W`, applied uniformly to every
// column step so no depth transition anywhere in the graph can jam.
var COL_W = 260, COL_GAP = 80, TASK_MIN_PITCH = 70, TASK_HEADER_H = 40, STEP_ROW_H = 20,
    TASK_GAP = 16, PHASE_LABEL_W = 40, BAND_GAP = 40, BAND_PAD = 56;

// Vertical space one task's CARD occupies, header + its own row stack —
// the per-task pitch, so cards in the same depth column don't overlap
// (review-gate C3's original fixed-pitch bug, now keyed off the task's own
// `steps` array length instead of a separately-positioned step node count).
function taskPitch(stepCount){
  return Math.max(TASK_MIN_PITCH, TASK_HEADER_H + stepCount * STEP_ROW_H + TASK_GAP);
}

function computeLayout(nodes){
  var phases = nodes.filter(function(n){ return n.kind === "phase"; })
    .sort(function(a,b){ return a.depth - b.depth; });
  var tasksByPhase = {};
  nodes.filter(function(n){ return n.kind === "task"; }).forEach(function(n){
    var p = n.parentId || "__none__";
    (tasksByPhase[p] = tasksByPhase[p] || []).push(n);
  });

  var positions = {};
  var bandTop = 0;
  var phaseList = phases.length ? phases : [{id:"__none__", depth:0}];
  phaseList.forEach(function(phase){
    var tasks = tasksByPhase[phase.id] || [];
    var byDepth = {};
    var maxDepth = 0;
    tasks.forEach(function(t){
      var d = t.depth || 0;
      maxDepth = Math.max(maxDepth, d);
      (byDepth[d] = byDepth[d] || []).push(t);
    });
    var maxColumnHeight = 0;
    for (var d = 0; d <= maxDepth; d++){
      var atDepth = byDepth[d] || [];
      // Column pitch is `COL_W + COL_GAP` (card width + routing room), so
      // every depth step gets the same breathing room regardless of how
      // many predecessors converge into it. `d===0` is unaffected (no `d *`
      // term applies yet), so single-column missions and the first task
      // column keep their existing position — this only widens spacing
      // BETWEEN columns, at depth >= 1.
      var x = PHASE_LABEL_W + COL_W + d * (COL_W + COL_GAP);
      var yCursor = bandTop + BAND_PAD;
      atDepth.forEach(function(t){
        positions[t.id] = {x: x, y: yCursor};
        yCursor += taskPitch((t.steps || []).length);
      });
      maxColumnHeight = Math.max(maxColumnHeight, yCursor - (bandTop + BAND_PAD));
    }
    if (phase.id !== "__none__") {
      positions[phase.id] = {x: 0, y: bandTop + BAND_PAD};
    }
    var bandHeight = Math.max(160, maxColumnHeight + BAND_PAD * 2);
    bandTop += bandHeight + BAND_GAP;
  });
  return positions;
}

// ─── node component ─────────────────────────────────────────────────────
// (#1401) A task node renders its OWN steps as rows — kind lead label
// (server-resolved via the fallback chain — #1402) + a hollow status ring;
// a running row's ring pulses via the shared `.steprow.s-running` CSS rule
// (#1432 item 6 — the old `.mn-step-row` dot styling retired with it). A
// phase node has no `steps` array (empty), so `mnSteps` is a no-op for it.
// (#1403) A per-step token/turn meter element from the step's precomputed
// `_meter` (attached in `toRfNodes`). Shared by the canvas node and — via the
// same `stepMeterFor` data — the mobile timeline. `null` for a procedural step
// with no metrics (procedural kinds show none). An AI kind with no data yet
// renders an idle placeholder so the meter's absence never reads as "this
// step isn't AI-dispatching".
function stepMeterEl(meter){
  if (!meter || !meter.show) return null;
  var children = [];
  // (#1483) The live "generating" affordance leads the meter — a pulsing dot
  // + the elapsed clock (or "live" before a start ts is known). This is the
  // signal that a long dispatch is WORKING, not idle.
  if (meter.generating) {
    children.push(h("span", {key:"g", className:"gen"},
      h("span", {className:"genpulse"}),
      meter.elapsedMs ? fmtElapsed(meter.elapsedMs) : "live"));
  }
  if (meter.tokens) {
    children.push(h("span", {key:"t", className:"tok" + (meter.cloud ? " cloud" : "")}, fmtTok(meter.tokens) + " tok"));
  }
  if (meter.turns) {
    children.push(h("span", {key:"n"}, meter.turns + (meter.turns === 1 ? " turn" : " turns")));
  }
  // (#1483) Tool-calls for AGENTIC seats — ticks live alongside turns. Absent
  // on single-shot seats (probe/judge/verify emit no `dispatch.tool`), so the
  // meter is task-type-aware without an explicit kind branch.
  if (meter.tools) {
    children.push(h("span", {key:"c"}, meter.tools + (meter.tools === 1 ? " tool" : " tools")));
  }
  // AI kind with no data yet AND not running — the idle placeholder, so the
  // meter's absence never reads as "this step isn't AI-dispatching".
  if (!children.length) {
    return h("span", {className:"mn-step-meter"}, h("span", {className:"idle"}, "· tok"));
  }
  return h("span", {className:"mn-step-meter"}, children);
}
// (#1483) The dispatch's start epoch-ms: the live bookend from `metrics` when
// present, else the server-stamped `started_ts` (camelCase on the wire).
function stepStartMs(step, m){
  if (m && m.startTs) return m.startTs;
  return tsToMs(step.startedTs);
}
// The `_meter` descriptor for one step given the live metrics map + the client
// `now` (for the ticking elapsed clock). Pure, so both renderers stay on one
// code path.
function stepMeterFor(step, metrics, now){
  var m = metrics[step.id];
  var d = stepDisplayMetrics(m);
  var show = isAiKind(step.kind) || d.has;
  // (#1483) Generating = the step's own status is running — an OPEN dispatch
  // (SSE flips it on `step start`, off on the terminal). The elapsed clock
  // reads from the dispatch-start bookend (metrics) or the server started_ts.
  var generating = step.status === "running";
  var startMs = stepStartMs(step, m);
  var elapsedMs = (generating && startMs && now) ? Math.max(0, now - startMs) : 0;
  return { show: show || generating, tokens: d.tokens, turns: d.turns, tools: d.tools, cloud: d.cloud,
           generating: generating, elapsedMs: elapsedMs };
}

// (#1432 item 6) The muted-caps kind LEAD for a step row — the #1410 display
// name for the step's kind ("Probe"/"Judge"/"Verify"/…, uppercased by CSS).
// This vocabulary is the signal that a row is a STEP inside its task.
function stepLead(s){ return s.label || s.kind || "step"; }
// A step's distinguishing NAME, shown after the lead. A probe seat rides in
// the kind as `review.probe:<seat>`; surfacing the seat here is what tells six
// otherwise-identical "Probe" rows apart. No `:` suffix -> the lead stands
// alone (a judge/verify/bundle step needs no second token).
function stepSeat(kind){
  if (!kind) return "";
  var i = kind.lastIndexOf(":");
  return i >= 0 ? kind.slice(i + 1) : "";
}
// (#1432 item 6) One step row's children, Concept A shape, shared by BOTH
// renderers so the sub-item vocabulary (hollow ring + kind lead + name) is
// identical on the canvas node and the mobile timeline. The rail is pure CSS
// (`.steprow::before/::after`), so it needs no element here.
function stepRowEls(s, meter){
  var seat = stepSeat(s.kind);
  return [
    h("span", {key:"r", className:"sring"}),
    h("span", {key:"l", className:"slead"}, stepLead(s)),
    seat ? h("span", {key:"n", className:"sname"}, seat) : null,
    // (#1481) The seat's resolved model, when the server threaded one onto the
    // step row (dispatch.map seats do; procedural / Tier 3 steps omit it).
    s.model ? h("span", {key:"m", className:"smodel", title:s.model}, fmtModel(s.model)) : null,
    stepMeterEl(meter)
  ];
}

// (phase-order edges) A phase node ALSO carries a dedicated Top/Bottom
// handle pair (ids "phase-in"/"phase-out"), separate from the Left/Right
// pair every node uses for `depends_on`/`contains`. This lets the synthetic
// phase[i]->phase[i+1] edge (see `phaseOrderEdges`) route straight down
// through the left phase-label column instead of bowing out through the
// task-card area the Left/Right handles serve — phase nodes stack at the
// same x, so a vertical Top->Bottom path is the natural one. Every handle on
// every node now carries an explicit `id` ("lr-in"/"lr-out", plus
// "phase-in"/"phase-out" on phase nodes only) so React Flow never has to
// guess which of a node's multiple same-type handles an edge means.
function MissionNode(props){
  var d = props.data;
  var mnSteps = (d.steps && d.steps.length)
    ? h("div", {className:"mn-steps"}, d.steps.map(function(s){
        return h("div", {key: s.id, className: "steprow mn-step-row s-" + s.status, title: s.label},
          stepRowEls(s, s._meter)
        );
      }))
    : null;
  var phaseHandles = d.kind === "phase" ? [
    h(V.Handle, {key:"pin", type:"target", id:"phase-in", position: V.Position.Top, style:{opacity:0}}),
    h(V.Handle, {key:"pout", type:"source", id:"phase-out", position: V.Position.Bottom, style:{opacity:0}})
  ] : null;
  return h("div", {className: "mnode k-" + d.kind + " s-" + d.status, title: d.description || d.label},
    h(V.Handle, {type:"target", id:"lr-in", position: V.Position.Left, style:{opacity:0}}),
    phaseHandles,
    h("div", {className:"mn-kind"}, d.kind),
    h("div", {className:"mn-label"}, d.label),
    mnSteps,
    h(V.Handle, {type:"source", id:"lr-out", position: V.Position.Right, style:{opacity:0}})
  );
}
var nodeTypes = { missionNode: MissionNode };

// ─── graph.json -> React Flow shape ─────────────────────────────────────
function toRfNodes(graphNodes, positions, metrics, now){
  metrics = metrics || {};
  return graphNodes.map(function(n){
    var pos = positions[n.id] || {x:0, y:0};
    // (#1403) Attach a live `_meter` to each step so the canvas node re-renders
    // when metrics change (new data objects each render → React Flow updates).
    // (#1483) `now` threads the client tick so a generating step's elapsed
    // clock advances on every second's re-render.
    var steps = (n.steps || []).map(function(s){
      return Object.assign({}, s, { _meter: stepMeterFor(s, metrics, now) });
    });
    return {
      id: n.id,
      type: "missionNode",
      position: pos,
      // (#1398) `description` carries the FULL phase/task description text
      // (never the short `label`) into the node's `title` attribute — a
      // hover tooltip, so the long text (which for coder-phase doubles as
      // the coder's dispatch brief) stays available without crowding the
      // card. (#1401) `steps` is the task's own row list; empty on a
      // phase node.
      data: { label: n.label, kind: n.kind, status: n.status, description: n.description, steps: steps },
      draggable: true,
    };
  });
}
// (#1230 graph-lens lineage) Consecutive phase[i]->phase[i+1] edges,
// synthesized CLIENT-SIDE — no new server data needed. `depth` is already
// stamped on every phase node (the same field `computeLayout` sorts phases
// by, mirroring the Rust `layer_tasks_by_depth`), so phase ORDER is already
// present in the payload the server sends today; this just draws the arrow
// the server never had to. A single-phase (or phase-less/freeform) mission
// has zero consecutive pairs, so it's a no-op there — no edge invented where
// there's no "next phase" to point to.
function phaseOrderEdges(nodes){
  var phases = (nodes || []).filter(function(n){ return n.kind === "phase"; })
    .sort(function(a,b){ return a.depth - b.depth; });
  var edges = [];
  for (var i = 0; i < phases.length - 1; i++){
    edges.push({
      id: "phase-order:" + phases[i].id + ":" + phases[i + 1].id,
      source: phases[i].id,
      target: phases[i + 1].id,
      kind: "phase_order",
    });
  }
  return edges;
}

function toRfEdges(graphEdges, graphNodes){
  var all = graphEdges.concat(phaseOrderEdges(graphNodes));
  return all.map(function(e){
    var isPhaseOrder = e.kind === "phase_order";
    return {
      id: e.id,
      source: e.source,
      target: e.target,
      // Phase-order edges route through the dedicated Top/Bottom handle pair
      // (see `MissionNode`); every other edge kind (`depends_on`/`contains`)
      // keeps using the original Left/Right pair, same as before this
      // feature — just explicit now that phase nodes carry more than one
      // handle of each type.
      sourceHandle: isPhaseOrder ? "phase-out" : "lr-out",
      targetHandle: isPhaseOrder ? "phase-in" : "lr-in",
      className: "edge-" + e.kind,
      animated: false,
      markerEnd: (e.kind === "depends_on" || isPhaseOrder)
        ? { type: MarkerType.ArrowClosed, color: isPhaseOrder ? "#5af0a3" : "#2a8a96" }
        : undefined,
    };
  });
}

// ─── SSE liveness (mirrors viewer.html's own `startLiveTail` shape:
// today's UTC day, native EventSource auto-reconnect, no custom auth
// header — matches the loopback-open / tailnet-terminated posture every
// other same-origin SSE consumer on this daemon already uses). A
// step-lifecycle record's `handle` field IS the step id
// (`scheduler::step_lifecycle_record`); phase/mission transition records'
// `handle` is the phase/mission id (`lifecycle::emit_*_transition_record`).
// Matching on `handle` against the known node-id set works regardless of
// whether the record also carries `mission_id` (scheduler-emitted step
// records currently do NOT — see `mission_graph.rs`'s module doc). ────────
function todayUtc(){
  var d = new Date();
  return d.getUTCFullYear() + "-" + String(d.getUTCMonth()+1).padStart(2,"0") + "-" + String(d.getUTCDate()).padStart(2,"0");
}
var STATUS_ACTIONS = {
  "step start": "running", "step complete": "complete", "step error": "error",
  "phase start": "running", "phase complete": "complete", "phase abandon": "abandoned",
  "mission start": "active", "mission close": "finalized", "mission pause": "paused", "mission resume": "active",
};
function statusFromRecord(rec){
  return normalizeMissionStatus(STATUS_ACTIONS[rec.action] || null);
}

// (Closed→Finalized rename, #1463 lineage) Lenient-read on the viewer side:
// a disk mission.json written before this rename self-migrates to
// "finalized" on its next save (the darkmux-crew serde alias), but a flow
// record or any other un-normalized source may still carry the old
// "closed" value. Normalize here so status handling (class name, display
// label, rank lookup) never has to special-case both spellings at every
// call site.
function normalizeMissionStatus(s){
  return s === "closed" ? "finalized" : s;
}

// How advanced a node status is, for the merge in the reconcile poll.
// planned < running < any terminal state. Terminal states share one rank —
// a page-side "complete" is never overwritten by a disk-side "error" or
// vice versa on rank alone (equal rank keeps the page's value; the SSE
// delta that set it is more recent than the disk snapshot).
var STATUS_RANK = { planned: 0, running: 1, complete: 2, error: 2, abandoned: 2,
                    active: 1, finalized: 2, closed: 2, paused: 1 };
function statusRank(s){
  return STATUS_RANK[s] !== undefined ? STATUS_RANK[s] : 0;
}

// Merge a freshly-fetched disk snapshot into the page's current graph
// (review-gate MF2b). Structure (node/edge SET, labels, depths, timestamps)
// refreshes from disk; per-node STATUS is monotone — disk wins only when
// strictly MORE advanced than what the page already shows. The three
// production runners persist steps only AFTER the whole graph finishes, so
// mid-run the disk snapshot is all-planned; a replace would regress every
// status the SSE stream had advanced (and the running pulse would flicker
// off every 20 seconds).
//
// (#1401) The SAME monotone merge now also applies ONE LEVEL DOWN, per
// STEP ROW inside a task's `steps` array — a step row is where SSE deltas
// actually land (see `onMessage` below), so without this a reconcile tick
// would regress a row's live "running"/"complete" status back to the
// disk snapshot's stale "planned" the instant it lags the stream, exactly
// the flicker this function already exists to prevent at the node level.
function mergeGraphs(prevGraph, fresh){
  if (!prevGraph) return fresh;
  var prevStatus = {};
  var prevStepStatus = {};
  prevGraph.nodes.forEach(function(n){
    prevStatus[n.id] = n.status;
    (n.steps || []).forEach(function(s){ prevStepStatus[s.id] = s.status; });
  });
  var nodes = fresh.nodes.map(function(n){
    var old = prevStatus[n.id];
    // Disk wins ONLY when strictly more advanced; on equal rank the page's
    // value stands (identical when the statuses match; when two terminal
    // states disagree, the SSE delta that set the page's is more recent
    // than the disk snapshot).
    var merged = (old !== undefined && statusRank(old) >= statusRank(n.status))
      ? Object.assign({}, n, {status: old})
      : n;
    if (merged.steps && merged.steps.length) {
      var steps = merged.steps.map(function(s){
        var oldS = prevStepStatus[s.id];
        return (oldS !== undefined && statusRank(oldS) >= statusRank(s.status))
          ? Object.assign({}, s, {status: oldS})
          : s;
      });
      merged = Object.assign({}, merged, {steps: steps});
    }
    return merged;
  });
  return Object.assign({}, fresh, {nodes: nodes});
}

// (#1401) Index a freshly-fetched graph into the two lookup refs `App`
// needs to route an incoming flow record: `nodeIds` (phase/task ids, for a
// record whose `handle` names a node directly) and `stepToTask` (step id
// -> owning task's node id, since a step-lifecycle record's `handle` is a
// STEP id — `scheduler::step_lifecycle_record` — but a step is now a ROW
// inside its task's card, not its own node — see `onMessage`).
function indexGraph(g){
  var nodeIds = new Set(g.nodes.map(function(n){ return n.id; }));
  var stepToTask = {};
  var stepIds = new Set();
  var taskIds = new Set();

  var esRef = React.useRef(null);
  var evSeqRef = React.useRef(0);
  // (#1480) Track whether the live stream is currently down so an `onopen`
  // can tell a RE-connect (was down, now up → refetch stale state) from the
  // first connect. `refreshRef` gives the SSE effect a stable handle to the
  // refresh callback without re-subscribing the stream on every render.
  var wasDownRef = React.useRef(false);
  var refreshRef = React.useRef(function(){});
  var toggleTask = React.useCallback(function(id){
    setExpanded(function(prev){ var n = Object.assign({}, prev); n[id] = !n[id]; return n; });
  }, []);
  // (#1482) Toggle + persist the minimap choice.
  var toggleMinimap = React.useCallback(function(){
    setMinimapOn(function(p){
      var n = !p;
      try { localStorage.setItem("dmux.mmap", n ? "1" : "0"); } catch(_e) {}
      return n;
    });
  }, []);

  function fetchGraph(){
    return fetch("/mission/" + encodeURIComponent(missionId) + "/graph.json", {headers:{accept:"application/json"}})
      .then(function(r){
        // (mobile-nav lineage: #1403/#1495) Tag a 404 distinctly from any other fetch failure —
        // the id is well-formed but the server has no mission dir for it
        // (deleted/ephemeral run, or an "untracked" flow-only mission the
        // missions index already showed with no durable plan behind it —
        // see viewer.html's `mitag untracked`). The render below reads
        // `notFound` to show a calm in-chrome message instead of the raw
        // server error text.
        if (r.status === 404) {
          var notFoundErr = new Error("no mission with id `" + missionId + "` found");
          notFoundErr.notFound = true;
          throw notFoundErr;
        }
        if (!r.ok) { throw new Error("graph.json fetch failed: " + r.status); }
        return r.json();
      });
  }

  // (#1471/#1480) Fetch today's flow records, filter to THIS mission, and merge
  // (dedup) into the events buffer. Extracted so the load-time backfill, the
  // manual refresh, and the reconnect-refetch all reuse ONE path. Best-effort:
  // a failed fetch never breaks the live panel or graph. Single-day scope
  // matches the SSE tail (`todayUtc()`), same as the original inline backfill.
  var backfillEvents = React.useCallback(function(){
    fetch("/flow/" + todayUtc(), {headers:{accept:"application/json"}})
      .then(function(r){ return r.ok ? r.json() : []; })
      .then(function(body){
        var recs = Array.isArray(body) ? body : (body && (body.records || body.flow)) || [];
        var idx = idxRef.current;
        var rows = [];
        for (var i = 0; i < recs.length; i++) {
          var rec = recs[i];
          if (!rec || typeof rec !== "object") continue;
          if (!recordInMission(rec, idx, missionId)) continue;
          rows.push({ id: evSeqRef.current++, ts: rec.ts, action: rec.action || "",
                      handle: rec.handle || "", category: rec.category || "",
                      level: rec.level || "" });
        }
        rows.sort(function(a, b){ return (b.ts < a.ts) ? -1 : (b.ts > a.ts) ? 1 : 0; });
        setEvents(function(prev){
          // Dedup on (ts + action + handle) so a backfilled row never clobbers
          // a live one that already arrived via SSE in the race window.
          var seen = {};
          var keyOf = function(x){ return String(x.ts) + " " + x.action + " " + x.handle; };
          var merged = [];
          for (var j = 0; j < prev.length; j++) { seen[keyOf(prev[j])] = true; merged.push(prev[j]); }
          for (var k = 0; k < rows.length; k++) {
            var key = keyOf(rows[k]);
            if (seen[key]) continue;
            seen[key] = true;
            merged.push(rows[k]);
          }
          merged.sort(function(a, b){ return (b.ts < a.ts) ? -1 : (b.ts > a.ts) ? 1 : 0; });
          return merged.length > EVENTS_CAP ? merged.slice(0, EVENTS_CAP) : merged;
        });
      })
      .catch(function(){ /* best-effort; the live panel + graph keep working */ });
  }, [missionId]);

  // (#1480) Refetch the mission graph + reseed metrics + re-backfill events.
  // Backs BOTH the manual refresh control and the auto-refetch on SSE
  // reconnect. MERGES the graph (never a straight replace — see mergeGraphs)
  // so a live status the stream advanced is never regressed by a lagging disk
  // snapshot. The core answer to "standalone PWA has no browser reload".
  var refresh = React.useCallback(function(){
    fetchGraph().then(function(g){
      idxRef.current = indexGraph(g);
      setMetrics(function(prev){ return seedMetricsFromGraph(prev, g); });
      setState(function(prev){
        if (!prev.graph) return { loading:false, error:null, errorNotFound:false, graph:g };
        return Object.assign({}, prev, {graph: mergeGraphs(prev.graph, g)});
      });
    }).catch(function(){ /* best-effort; keep showing the last-known graph */ });
    backfillEvents();
  }, [missionId, backfillEvents]);
  // Keep a stable handle so the SSE effect's `onopen` reconnect path calls the
  // CURRENT refresh without re-subscribing the stream every render.
  refreshRef.current = refresh;

  React.useEffect(function(){
    if (!missionId) { setState({loading:false, error:"no mission id in URL (expected /mission/<id>/graph)", errorNotFound:false, graph:null}); return; }
    var cancelled = false;
    fetchGraph().then(function(g){
      if (cancelled) return;
      idxRef.current = indexGraph(g);
      // (#1432 item 4) Seed the meters from the server's finalized backfill
      // BEFORE the SSE stream (which only carries deltas from now on) starts.
      setMetrics(function(prev){ return seedMetricsFromGraph(prev, g); });
      setState({loading:false, error:null, errorNotFound:false, graph:g});
    }).catch(function(e){
      if (cancelled) return;
      setState({loading:false, error:String(e.message||e), errorNotFound:!!e.notFound, graph:null});
    });
    return function(){ cancelled = true; };
  }, [missionId]);

  // (#1432 item 1) Reflect the active renderer onto <html> so the CSS can
  // release the locked 100vh viewport for the TIMELINE branch (which needs
  // the document to scroll — the canvas branch keeps the lock). Mirrors the
  // `useTimeline` decision the render below makes.
  React.useEffect(function(){
    var timeline = timelineActive(viewMode, isMobile);
    var root = document.documentElement;
    if (root) root.classList.toggle("timeline-mode", timeline);
    return function(){ if (root) root.classList.remove("timeline-mode"); };
  }, [viewMode, isMobile]);

  // (#1404) Track the viewport-width breakpoint so the renderer switches
  // between the React Flow canvas (wide) and the vertical timeline (narrow).
  React.useEffect(function(){
    var onResize = function(){ setIsMobile(isNarrowViewport()); };
    window.addEventListener("resize", onResize);
    return function(){ window.removeEventListener("resize", onResize); };
  }, []);

  // SSE subscription — starts once the initial graph has loaded so the
  // known-node-id / step-to-task index is populated before any delta needs
  // matching.
  React.useEffect(function(){
    if (!state.graph || typeof EventSource === "undefined") return;
    var es = null;
    var sseDate = null;
    function onMessage(ev){
      var rec; try { rec = JSON.parse(ev.data); } catch(_e) { return; }
      if (!rec || typeof rec !== "object") return;
      var idx = idxRef.current;
      // (#1483) Host telemetry.process (cpu/gpu/mem) is a MACHINE-level sample,
      // not per-step — the off-model corroboration that the box is working.
      // Stamp our own receive time so "recent?" ignores host/client clock skew.
      if ((rec.action === "telemetry.process" || (rec.category === "telemetry" && rec.source === "process"))
          && rec.payload && typeof rec.payload === "object") {
        var pp = rec.payload;
        setProc({ cpu: pp.cpu, gpu: pp.gpu, mem: pp.mem, rx: Date.now() });
      }
      // (#1403) Metrics + events accumulate from ALL mission-scoped records,
      // not just status transitions — token/turn records carry no status, and
      // the events panel wants every record for this mission. Run these BEFORE
      // the status-transition early-return below.
      setMetrics(function(prev){ return applyRecordToMetrics(prev, rec, idx); });
      if (recordInMission(rec, idx, missionId)) {
        var seq = evSeqRef.current++;
        setEvents(function(prev){
          var row = { id: seq, ts: rec.ts, action: rec.action || "",
                      handle: rec.handle || "", category: rec.category || "",
                      level: rec.level || "" };
          var next = [row].concat(prev);
          return next.length > EVENTS_CAP ? next.slice(0, EVENTS_CAP) : next;
        });
      }
      var newStatus = statusFromRecord(rec);
      var handle = rec.handle;
      if (!newStatus || !handle) return;
      // (#1403 gate remediation) SSE flips are rank-guarded with the SAME
      // monotone rule the reconcile poll's mergeGraphs applies: a delta may
      // never regress a status to a lower rank (a stale or replayed record
      // arriving after a terminal state stays a no-op). Equal rank still
      // applies — a NEWER delta wins between two same-rank states (e.g. two
      // terminal states disagreeing), matching mergeGraphs's "the more recent
      // source wins on equal rank" reasoning. The invariant is now enforced
      // at BOTH ingest points instead of relying on record ordering.
      var advance = function(oldStatus){
        return statusRank(newStatus) >= statusRank(oldStatus) ? newStatus : oldStatus;
      };
      if (idx.nodeIds.has(handle)) {
        // A phase (or task) node id directly — flip that node's own status.
        setState(function(prev){
          if (!prev.graph) return prev;
          var nodes = prev.graph.nodes.map(function(n){
            return n.id === handle ? Object.assign({}, n, {status: advance(n.status)}) : n;
          });
          return Object.assign({}, prev, {graph: Object.assign({}, prev.graph, {nodes: nodes})});
        });
        return;
      }
      // (#1401) A step id — find its owning task's node and flip ONLY that
      // row's status, leaving every other row (and the task node's own
      // aggregate status, refreshed by the reconcile poll below) alone.
      var taskId = idx.stepToTask[handle];
      if (!taskId) return;
      setState(function(prev){
        if (!prev.graph) return prev;
        var nodes = prev.graph.nodes.map(function(n){
          if (n.id !== taskId || !n.steps) return n;
          var steps = n.steps.map(function(s){
            return s.id === handle ? Object.assign({}, s, {status: advance(s.status)}) : s;
          });
          return Object.assign({}, n, {steps: steps});
        });
        return Object.assign({}, prev, {graph: Object.assign({}, prev.graph, {nodes: nodes})});
      });
    }
    function openStream(){
      if (es) es.close();
      sseDate = todayUtc();
      es = new EventSource("/flow/" + sseDate + "/stream");
      esRef.current = es;
      setLive(true);
      es.onopen = function(){
        setLive(true);
        // (#1480) Auto-refetch on RECONNECT. A standalone home-screen PWA has
        // no browser reload, so a dropped-and-reestablished stream (daemon
        // restart, phone sleep/wake) would otherwise leave the page showing
        // stale state that still LOOKS live. On a re-open (was down, now up),
        // pull the current graph + events so the reconnect closes the gap the
        // SSE tail-from-now can't. The first connect skips this (the initial
        // load already fetched).
        if (wasDownRef.current) {
          wasDownRef.current = false;
          refreshRef.current();
        }
      };
      es.onerror = function(){ setLive(false); wasDownRef.current = true; }; // native EventSource keeps retrying
      es.onmessage = onMessage;
    }
    // (#1471/#1480) One-shot events backfill on load — the SSE stream only
    // carries records from NOW, so without this a fresh page shows "no events"
    // until the next record streams. Extracted to `backfillEvents` (reused by
    // the manual refresh + reconnect paths).
    backfillEvents();

    openStream();
    // (#1151-style safety net) periodic reconcile in case an SSE gap
    // (a reconnect between the last delta and now) dropped a status flip —
    // matches viewer.html's own reconcile-on-a-timer discipline. MERGES,
    // never replaces (see mergeGraphs): mid-run the disk snapshot lags the
    // stream, so a straight replace would regress live statuses every tick.
    // The same tick also handles UTC midnight (review-gate C4): the flow
    // stream is per-day, so a tab left open across midnight would otherwise
    // tail yesterday's stream forever while looking live — re-open against
    // the new day the first tick after rollover.
    var reconcile = setInterval(function(){
      if (todayUtc() !== sseDate) openStream();
      fetchGraph().then(function(g){
        idxRef.current = indexGraph(g);
        // (#1432 item 4) The reconcile also refolds the server backfill — a
        // step that completed while the tab was open (and whose SSE delta an
        // intervening reconnect may have missed) then still shows its total.
        setMetrics(function(prev){ return seedMetricsFromGraph(prev, g); });
        setState(function(prev){
          if (!prev.graph) return prev;
          return Object.assign({}, prev, {graph: mergeGraphs(prev.graph, g)});
        });
      }).catch(function(){ /* best-effort; keep showing the last-known graph */ });
    }, 20000);
    return function(){ if (es) es.close(); clearInterval(reconcile); };
  }, [!!state.graph]);

  React.useEffect(function(){
    return function(){ if (esRef.current) esRef.current.close(); };
  }, []);

  // (#1483) Is any node/step generating right now? Gates the elapsed-clock
  // ticker below so an idle mission never re-renders on a timer.
  var anyRunning = !!(state.graph && state.graph.nodes && state.graph.nodes.some(function(n){
    if (n.status === "running") return true;
    return (n.steps || []).some(function(s){ return s.status === "running"; });
  }));
  // (#1483) Tick `now` once a second WHILE something is generating, so every
  // seat's elapsed clock advances client-side. The 1s repaint is cheap and
  // renders off the measured host (observability doctrine); gating it on
  // `anyRunning` keeps it from perturbing an idle page at all.
  React.useEffect(function(){
    if (!anyRunning) return;
    setNow(Date.now());
    var id = setInterval(function(){ setNow(Date.now()); }, 1000);
    return function(){ clearInterval(id); };
  }, [anyRunning]);

  // (mobile-nav lineage: #1403/#1495) The loading/error renders MUST keep the
  // same sticky `.top` nav shell the loaded graph gets — this is a chromeless
  // home-screen PWA with no browser back, so the back link is the ONLY way
  // out of the page. Before this fix, both early returns below skipped the
  // `.top` bar entirely and rendered a bare full-screen `.msg`, trapping the
  // user on a fetch failure (observed: a stale/untracked mission id 404s and
  // strands the phone on a blank screen). `minimalTopBar` renders a reduced
  // nav (back link + brand + mission id, no graph-derived meters/buttons —
  // there's no graph to derive them from) so the content area is the only
  // thing that changes between loading/error/loaded.
  function minimalTopBar(showRetry){
    return h("div", {className:"top"},
      h("div", {className:"nav"}, h("a", {href:"/", title:"back to the darkmux viewer"}, "‹ viewer")),
      h("div", {className:"brand"}, h("a", {href:"/"}, h("b", null, "darkmux"), h("span", {className:"sub"}, " · mission"))),
      missionId ? h("span", {className:"midname", title: missionId}, missionId) : null,
      showRetry ? h("button", {className:"evbtn", title:"retry — refetch graph",
                   onClick: function(){ refresh(); }}, "↻") : null
    );
  }
  if (state.loading) {
    return h(React.Fragment, null,
      minimalTopBar(false),
      h("div", {className:"body"}, h("div", {className:"msg"}, "loading mission graph…"))
    );
  }
  if (state.error) {
    // (mobile-nav lineage: #1403/#1495) A 404 (id well-formed, no mission dir — an ephemeral run
    // whose directory was cleared, or an "untracked" flow-only mission the
    // missions index already flagged with no durable plan behind it) reads
    // as a calm, expected outcome, not a technical fault — the raw server
    // error text (`no mission with id \`...\` found`) is reserved for the
    // non-404 branch (network failure, 500, malformed id) where the detail
    // is actually diagnostic.
    var errMsg = state.errorNotFound
      ? "This mission's graph data isn't available — it may have been an ephemeral or cleared run."
      : "darkmux mission graph: " + state.error;
    return h(React.Fragment, null,
      minimalTopBar(true),
      h("div", {className:"body"}, h("div", {className:"msg"}, errMsg))
    );
  }

  var g = state.graph;
  // (#1404) One data source, two renderers. Timeline is the narrow-viewport
  // default (viewMode "auto" + mobile) and available anywhere via the toggle.
  var useTimeline = timelineActive(viewMode, isMobile);
  var tot = missionTotals(metrics);

  var body;
  if (useTimeline) {
    body = h("div", {className:"timeline"}, renderMissionTimeline(g, metrics, expanded, toggleTask, now));
  } else {
    var positions = computeLayout(g.nodes);
    var rfNodes = toRfNodes(g.nodes, positions, metrics, now);
    var rfEdges = toRfEdges(g.edges, g.nodes);
    body = h("div", {className:"canvas"},
      g.note ? h("div", {className:"note"}, g.note) : null,
      h(ReactFlowProvider, null,
        h(ReactFlow, {
          nodes: rfNodes, edges: rfEdges, nodeTypes: nodeTypes,
          fitView: true, minZoom: 0.1, maxZoom: 2,
          proOptions: {hideAttribution: true},
        },
          h(Background, {color:"#1f1f24", gap: 24}),
          h(Controls, null),
          // (#1482) The minimap is toggleable + persisted (default hidden on
          // narrow viewports). Rendering it conditionally keeps it out of the
          // DOM entirely when off, so it can't interleave with node cards.
          minimapOn ? h(MiniMap, {pannable:true, zoomable:true, style:{background:"#131316"}}) : null
        )
      )
    );
  }

  // (#1403) Mission-scoped live token readout, local vs cloud honesty split.
  var meterEl = tot.total || tot.turns ? h("span", {className:"mmeter"},
    tot.total ? h("b", null, fmtTok(tot.total) + " tok") : null,
    (tot.total && tot.cloud) ? h("span", {className:"split"},
      fmtTok(tot.local) + " local + ", h("span", {className:"cloud"}, fmtTok(tot.cloud) + " cloud")) : null,
    tot.turns ? h("span", {className:"split"}, "· " + tot.turns + (tot.turns === 1 ? " turn" : " turns")) : null
  ) : null;

  // (#1483) Host-activity readout — the latest telemetry.process sample, shown
  // only while FRESH (received in the last ~12s). Corroborates the seat
  // "generating" pulses: the box's GPU is actually working, not stalled.
  var procFresh = proc && proc.rx && (Date.now() - proc.rx < 12000);
  var procEl = procFresh ? h("span", {className:"mproc", title:"host activity (telemetry.process)"},
    (typeof proc.gpu === "number") ? h("span", {key:"g"}, "gpu ", h("b", {className: proc.gpu >= 60 ? "hot" : ""}, proc.gpu + "%")) : null,
    (typeof proc.cpu === "number") ? h("span", {key:"c"}, "cpu " + proc.cpu + "%") : null
  ) : null;

  return h(React.Fragment, null,
    h("div", {className:"top"},
      // (#1403) Explicit in-site nav — the ONLY way out on a chromeless
      // home-screen shortcut, so it reads as navigation, not a logo.
      h("div", {className:"nav"}, h("a", {href:"/", title:"back to the darkmux viewer"}, "‹ viewer")),
      h("div", {className:"brand"}, h("a", {href:"/"}, h("b", null, "darkmux"), h("span", {className:"sub"}, " · mission"))),
      h("span", {className:"midname", title: g.mission_id}, g.mission_id),
      h("span", {className:"mstatus " + normalizeMissionStatus(g.mission_status)}, normalizeMissionStatus(g.mission_status)),
      // (#1480) Connection state — "● live" (calm amber) vs a LOUD warn
      // "○ reconnecting" so stale-but-looks-live never happens silently.
      h("span", {className:"livepill" + (live ? " on" : " off")}, live ? "● live" : "○ reconnecting"),
      meterEl,
      procEl,
      // (#1480) Manual refresh — the first-class control the activity-window
      // hack stood in for; the answer to "no browser reload in a PWA".
      h("button", {className:"evbtn", title:"refresh — refetch graph + events",
                   onClick: function(){ refresh(); }}, "↻"),
      h("button", {className:"evbtn", title:"switch renderer",
                   onClick: function(){ setViewMode(useTimeline ? "canvas" : "timeline"); }},
        useTimeline ? "graph" : "list"),
      // (#1482) Minimap toggle — canvas renderer only (the timeline has no
      // minimap). Persisted; default hidden on narrow viewports.
      !useTimeline ? h("button", {className:"evbtn" + (minimapOn ? " on" : ""), title:"toggle minimap",
                   onClick: toggleMinimap}, "map") : null,
      h("button", {className:"evbtn" + (evOpen ? " on" : ""), title:"mission events",
                   onClick: function(){ setEvOpen(!evOpen); }}, "events"),
      h("button", {className:"legbtn", title:"status legend",
                   onClick: function(){ setLegendOpen(!legendOpen); }}, "legend"),
      h("div", {className:"legend"}, legendDots()),
      legendOpen ? h("div", {className:"legendpop on"}, legendDots()) : null
    ),
    h("div", {className:"body"},
      body,
      evOpen ? h("div", {className:"evpanel"}, eventsPanelEls(events, function(){ setEvOpen(false); })) : null
    )
  );
}

var root = V.createRoot(document.getElementById("root"));
root.render(h(App));

// Exposed for anything that wants to sanity-check the pure functions from
// the browser console during manual verification (not a formal test hook).
window.__missionGraphComputeLayout = computeLayout;
window.__missionGraphMergeGraphs = mergeGraphs;
window.__missionGraphSeedMetricsFromGraph = seedMetricsFromGraph;
})();
</script>
</body>
</html>
